<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR Fleet Master Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dar-green: #003811; --dar-gold: #D4AF37; }
        body { background: #f1f5f9; font-family: 'Inter', system-ui, sans-serif; color: #1e293b; }
        .bg-dar { background: var(--dar-green); }
        .text-dar { color: var(--dar-green); }
        .bg-gold { background: var(--dar-gold); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* INDUSTRY STANDARD CENTERED MODALS */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box {
            background: white; width: 100%; max-width: 600px;
            border-radius: 12px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-height: 90vh; display: flex; flex-direction: column; 
            overflow: visible;
        }

        .search-results-box { 
            position: absolute; width: 100%; max-height: 250px; 
            overflow-y: auto; z-index: 2000; background: white; 
            border: 2px solid var(--dar-green); border-radius: 8px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            top: 100%; left: 0;
        }

        .btn-primary { @apply bg-dar text-white px-6 py-3 rounded font-bold uppercase text-xs transition active:scale-95 hover:opacity-90 shadow-md; }
        .btn-gold { background: var(--dar-gold); color: white; padding: 0.75rem 1.5rem; border-radius: 0.25rem; font-weight: 800; text-transform: uppercase; font-size: 0.75rem; }

        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100% !important; background: white; }
            .card-item { border: 1px solid #e2e8f0 !important; margin-bottom: 10px; break-inside: avoid; padding: 20px; border-radius: 0; }
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col overflow-hidden">

    <div id="app" class="flex flex-col h-full w-full">
        <div id="login-screen" class="h-full w-full flex items-center justify-center p-6 bg-dar">
            <div class="bg-white p-10 rounded-2xl w-full max-w-sm shadow-2xl border-t-8 border-dar-gold">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-black text-dar tracking-tighter uppercase">DAR Fleet</h1>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Official Dispatch Command</p>
                </div>
                <div class="space-y-4">
                    <input id="un" type="text" placeholder="Username" class="w-full p-4 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-dar bg-slate-50">
                    <input id="pw" type="password" placeholder="Password" class="w-full p-4 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-dar bg-slate-50">
                    <button onclick="handleLogin()" class="w-full btn-primary py-4 mt-2">Enter Console</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SB_KEY = "sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo"; 
        const db = window.supabase.createClient(SB_URL, SB_KEY);

        const VEHICLES = ["MAZDA", "REVO", "INNOVA", "SKY", "BLACK"];
        const DRIVERS = ["Driver 1", "Driver 2", "Driver 3", "Driver 4", "Driver 5"];

        let user = null, currentTab = 'inbox', scheduleFilter = 'day'; 
        let emps = [], orders = [], itins = [];
        let activeTO = "", selectedEmpForAdd = null, activeVehForMaint = "";
        let manualPassengerQueue = [];

        async function handleLogin() {
            const u = document.getElementById('un').value.trim(), p = document.getElementById('pw').value.trim();
            const { data } = await db.from('users').select('*');
            const found = data.find(x => x.username === u && String(x.password) === String(p));
            if (found && found.role === 'VEHICLE_APPROVER') { 
                user = found; 
                const {data: e} = await db.from('employees').select('*');
                emps = e || []; 
                renderDashboard(); 
            } else alert("Invalid Login.");
        }

        async function sync() {
            const [o, i] = await Promise.all([
                db.from('travel_orders').select('*').neq('status','CANCELLED'), 
                db.from('itinerary').select('*')
            ]);
            orders = o.data || []; itins = i.data || [];
            if(currentTab === 'inbox') renderInbox();
            else if(currentTab === 'manifest') renderManifest();
            else renderSchedule();
        }

        function renderDashboard() {
            document.getElementById('app').innerHTML = `
            <div class="flex flex-col h-screen">
                <header class="bg-dar text-white px-8 py-5 flex justify-between items-center no-print shadow-md shrink-0">
                    <div class="leading-tight"><span class="block font-black text-xl tracking-tight uppercase">${user.full_name}</span><p class="text-[9px] text-dar-gold font-bold uppercase tracking-widest mt-1">DISPATCHER</p></div>
                    <div class="flex gap-6 items-center"><button onclick="sync()" class="text-2xl hover:opacity-70 transition">🔄</button><button onclick="location.reload()" class="bg-white/10 border border-white/20 px-4 py-2 rounded text-[10px] font-bold uppercase">Logout</button></div>
                </header>
                <nav class="bg-white border-b flex no-print shadow-sm shrink-0">
                    <button onclick="switchTab('inbox')" class="flex-1 p-5 text-xs font-black ${currentTab==='inbox'?'border-b-4 border-green-900 text-dar':'text-slate-400'} uppercase">Inbox</button>
                    <button onclick="switchTab('manifest')" class="flex-1 p-5 text-xs font-black ${currentTab==='manifest'?'border-b-4 border-green-900 text-dar':'text-gray-400'} uppercase">Manifest</button>
                    <button onclick="switchTab('schedule')" class="flex-1 p-5 text-xs font-black ${currentTab==='schedule'?'border-b-4 border-green-900 text-dar':'text-gray-400'} uppercase">Schedule</button>
                </nav>
                <main id="main-content" class="flex-1 overflow-y-auto p-10 no-scrollbar print-area bg-slate-100"></main>
                <footer class="p-5 no-print bg-white border-t flex justify-end shrink-0 shadow-lg">
                    <button onclick="openModal('bookModal')" class="btn-primary py-4 px-10 tracking-widest">+ Create Booking</button>
                </footer>
            </div>
            ${modalsMarkup()}`;
            sync();
        }

        function modalsMarkup() {
            return `
            <div id="bookModal" class="hidden modal-overlay">
                <div class="modal-box">
                    <div class="p-6 border-b flex justify-between items-center bg-slate-50 shrink-0">
                        <h2 class="font-black text-dar uppercase text-sm tracking-widest">Manual Reservation</h2>
                        <button onclick="closeModal('bookModal')" class="text-slate-400 hover:text-red-500 text-2xl font-light">✕</button>
                    </div>
                    <div class="p-8 space-y-6 overflow-y-auto no-scrollbar flex-1 bg-white">
                        <div class="relative"><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Lead Passenger</label><input id="resN" oninput="runEmpSearch(this, 'resResults')" placeholder="Search and click a name..." class="w-full p-3 border rounded text-sm outline-none focus:ring-2 focus:ring-dar bg-slate-50"><div id="resResults" class="search-results-box hidden"></div></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Start Date</label><input id="resD1" type="date" class="w-full p-3 border rounded text-sm"></div>
                            <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">End Date</label><input id="resD2" type="date" class="w-full p-3 border rounded text-sm"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Assignment</label><select id="resS" class="w-full p-3 border rounded text-sm font-bold bg-white"><option>WHOLE DAY</option><option>AM</option><option>PM</option></select></div>
                            <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Vehicle</label><select id="resV" class="w-full p-3 border rounded text-sm font-bold bg-white text-dar">${VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select></div>
                        </div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Driver (Editable)</label><input id="resDr" list="drivers" value="Driver 1" class="w-full p-3 border rounded text-sm font-bold bg-slate-50"></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Purpose / RSO Number</label><input id="resP" placeholder="Trip details..." class="w-full p-3 border rounded text-sm outline-none bg-slate-50"></div>
                        
                        <div class="border-t pt-4">
                            <label class="text-[10px] font-black text-dar uppercase mb-2 block tracking-widest">Add Additional Passengers:</label>
                            <div class="flex gap-2 relative">
                                <input id="resPAdd" oninput="runEmpSearch(this, 'resPResults')" placeholder="Search extra people..." class="flex-1 p-3 border rounded text-sm outline-none bg-slate-50 focus:bg-white focus:ring-2 focus:ring-dar">
                                <button onclick="queuePassenger()" class="bg-dar text-white px-4 rounded font-bold text-[10px] uppercase">Queue</button>
                                <div id="resPResults" class="search-results-box hidden"></div>
                            </div>
                            <div id="manualPList" class="mt-4 space-y-1"></div>
                        </div>
                    </div>
                    <div class="p-6 border-t flex gap-4 bg-slate-50 shrink-0">
                        <button onclick="closeModal('bookModal')" class="btn-cancel flex-1 text-slate-500 font-bold uppercase text-[10px]">Cancel</button>
                        <button onclick="saveManual()" class="btn-primary flex-[2] py-4 tracking-widest">Confirm Trip</button>
                    </div>
                </div>
            </div>

            <div id="peopleModal" class="hidden modal-overlay">
                <div class="modal-box h-[600px]">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                        <div><h2 class="font-black text-dar uppercase text-sm tracking-widest">Manage Passengers</h2><p id="pSub" class="text-[10px] text-slate-500 font-bold uppercase mt-1"></p></div>
                        <button onclick="closeModal('peopleModal')" class="text-slate-400 hover:text-red-500 text-2xl font-light">✕</button>
                    </div>
                    <div id="pList" class="p-8 flex-1 space-y-3 overflow-y-auto no-scrollbar bg-slate-100/50"></div>
                    <div class="p-8 border-t bg-white relative shrink-0">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Add Passenger:</label>
                        <div class="flex gap-3">
                            <div class="relative flex-1">
                                <input id="pAdd" oninput="runEmpSearch(this, 'pResults')" placeholder="Enter name..." class="w-full p-4 border border-slate-200 rounded text-sm outline-none focus:ring-2 focus:ring-dar transition bg-slate-50" autocomplete="off">
                                <div id="pResults" class="search-results-box hidden"></div>
                            </div>
                            <button id="pAddBtn" onclick="handleAddPersonnel()" class="btn-primary px-8 tracking-widest">Add</button>
                        </div>
                    </div>
                    <div class="p-5 border-t text-center bg-slate-50 shrink-0">
                        <button onclick="closeModal('peopleModal')" class="bg-slate-800 text-white px-16 py-3 rounded font-bold text-[10px] uppercase tracking-widest hover:bg-black transition shadow-lg active:scale-95">Done / OK</button>
                    </div>
                </div>
            </div>

            <div id="transferModal" class="hidden modal-overlay">
                <div class="modal-box max-w-sm">
                    <div class="p-6 border-b bg-slate-50"><h2 class="font-black text-dar text-xs uppercase tracking-widest">Smart Transfer</h2><p id="tSub" class="text-[10px] text-slate-500 font-bold mt-1 uppercase"></p></div>
                    <div class="p-10 space-y-4 bg-white">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Available Fleet (Matching Dates):</label>
                        <select id="tSelect" class="w-full p-5 border border-slate-200 rounded-lg font-black text-dar outline-none bg-slate-50 text-base shadow-inner"></select>
                    </div>
                    <div class="p-6 border-t flex gap-4 bg-slate-50">
                        <button onclick="closeModal('transferModal')" class="btn-cancel flex-1 py-4 text-[10px] font-bold uppercase text-slate-500">Cancel</button>
                        <button id="tExec" class="btn-primary flex-1 py-4 tracking-widest shadow-lg">Confirm</button>
                    </div>
                </div>
            </div>

            <div id="maintModal" class="hidden modal-overlay">
                <div class="modal-box max-w-sm">
                    <div class="p-6 border-b bg-slate-50">
                        <h2 class="font-black text-dar text-xs uppercase tracking-widest">Schedule Maintenance</h2>
                        <p id="maintSub" class="text-[10px] text-slate-500 font-bold mt-1 uppercase"></p>
                    </div>
                    <div class="p-10 space-y-4 bg-white">
                        <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Start Date</label><input id="maintD1" type="date" class="w-full p-3 border rounded text-sm bg-slate-50"></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">End Date (Optional)</label><input id="maintD2" type="date" class="w-full p-3 border rounded text-sm bg-slate-50"></div>
                    </div>
                    <div class="p-6 border-t flex gap-4 bg-slate-50">
                        <button onclick="closeModal('maintModal')" class="btn-cancel flex-1 py-4 text-[10px] font-bold uppercase text-slate-500">Cancel</button>
                        <button onclick="saveMaintenance()" class="btn-primary bg-red-600 flex-1 py-4 tracking-widest shadow-lg hover:bg-red-700">Off-Road</button>
                    </div>
                </div>
            </div>
            
            <datalist id="drivers">${DRIVERS.map(d=>`<option value="${d}">`).join('')}</datalist>`;
        }

        // --- DASHBOARD FUNCTIONS ---
        function renderInbox() {
            const m = document.getElementById('main-content');
            const data = orders.filter(x => x.status === 'PENDING_VEHICLE_APPROVER' && x.transport === "GOV'T VEHICLE");
            if (!data.length) { m.innerHTML = `<div class="p-20 text-center opacity-20 uppercase font-black text-xs mt-20">Queue Empty</div>`; return; }
            m.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">` + data.map(o => {
                const itin = itins.find(i => i.to_no === o.to_no) || {travel_date: '?'};
                return `
                <div class="bg-white p-8 rounded-xl shadow-md border border-slate-200 flex flex-col hover:border-dar transition">
                    <div class="flex justify-between mb-5 border-b pb-3"><span class="text-[10px] font-black text-dar uppercase bg-green-50 px-2 py-1 rounded">ID: ${o.to_no}</span><button onclick="toLand('${o.to_no}','${o.unit}')" class="text-blue-600 text-[10px] font-bold underline uppercase tracking-tighter">LAND</button></div>
                    <h3 class="font-black text-slate-800 text-lg leading-tight mb-2">${o.emp_name}</h3>
                    <p class="text-[11px] text-slate-500 font-bold mb-6 uppercase tracking-widest leading-none">📅 ${itin.travel_date}</p>
                    <div class="space-y-4 mb-8 bg-slate-50 p-5 rounded-lg border border-slate-100 mt-auto">
                        <div class="flex justify-between items-center"><label class="text-[9px] font-black text-gray-400 uppercase">Unit</label><select id="v-${o.to_no}" class="border rounded font-bold p-1 text-xs text-dar outline-none bg-white">${VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select></div>
                        <div class="flex justify-between items-center"><label class="text-[9px] font-black text-gray-400 uppercase">Slot</label><select id="s-${o.to_no}" class="border rounded font-bold p-1 text-xs text-slate-600 outline-none bg-white"><option>WHOLE DAY</option><option>AM</option><option>PM</option></select></div>
                        <div class="flex flex-col pt-2"><label class="text-[9px] font-black text-gray-400 uppercase mb-2">Assigned Driver</label><input id="d-${o.to_no}" list="drivers" placeholder="Edit driver..." class="border border-slate-200 rounded p-3 text-xs font-bold outline-none shadow-inner"></div>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="toLand('${o.to_no}','${o.unit}')" class="btn-cancel flex-1 text-slate-500 font-bold uppercase text-[10px]">Reject</button>
                        <button onclick="approveTrip('${o.to_no}','${o.unit}')" class="btn-primary flex-[2] shadow-lg">Approve</button>
                    </div>
                </div>`;
            }).join('') + `</div>`;
        }

        async function approveTrip(to, unit) {
            const v = document.getElementById(`v-${to}`).value, s = document.getElementById(`s-${to}`).value, d = document.getElementById(`d-${to}`).value || "TBD";
            const next = getApprovalTarget(unit);
            await db.from('travel_orders').update({ received: v, driver: d, remarks: s, status: next }).eq('to_no', to);
            sync();
        }

        async function toLand(to, unit) {
            const next = getApprovalTarget(unit);
            await db.from('travel_orders').update({ transport: 'LAND', status: next, received: null, driver: null }).eq('to_no', to);
            sync();
        }

        function renderManifest() {
            const container = document.getElementById('main-content');
            const data = orders.filter(x => x.transport === "GOV'T VEHICLE" && x.status !== 'PENDING_VEHICLE_APPROVER');
            const grp = {}; data.forEach(x => { if(!grp[x.to_no]) grp[x.to_no] = []; grp[x.to_no].push(x); });
            if (!Object.keys(grp).length) { container.innerHTML = `<div class="p-20 text-center opacity-30 uppercase font-black text-xs mt-20">Manifest Empty</div>`; return; }
            
            container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">` + Object.entries(grp).map(([to, list]) => {
                const isMaint = list[0].remarks === 'MAINTENANCE';
                return `
            <div class="bg-white p-6 rounded-xl shadow-md border-l-8 ${isMaint ? 'border-red-600' : 'border-dar'} relative flex flex-col h-full hover:shadow-lg transition">
                <div>
                    <div class="flex justify-between items-start mb-4"><span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">ID: ${to}</span><span class="text-[9px] ${isMaint ? 'bg-red-50 text-red-600' : 'bg-green-50 text-dar'} font-black px-2 py-1 rounded uppercase tracking-wider">${list[0].remarks||'WHOLE'}</span></div>
                    
                    <h3 class="font-black ${isMaint ? 'text-red-700' : 'text-slate-800'} text-sm uppercase mb-1 leading-tight flex items-center gap-2">
                        ${list[0].emp_name} ${!isMaint ? `<span class="bg-dar text-white text-[8px] px-1.5 py-0.5 rounded">LEAD</span>` : ''}
                    </h3>
                    
                    ${list.length > 1 ? `<div class="text-[10px] text-slate-500 font-bold uppercase mb-4 leading-tight pl-2 border-l-2 border-slate-100">${list.slice(1).map(x=>x.emp_name).join('<br>')}</div>` : '<div class="mb-4"></div>'}

                    <div class="bg-slate-50 p-3 rounded border border-slate-100 mb-6"><p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">🚙 ${list[0].received}</p><p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">👤 ${list[0].driver}</p></div>
                </div>
                <div class="flex gap-3 pt-4 border-t border-slate-100 mt-auto">
                    <button onclick="cancelTrip('${to}','${list[0].status}')" class="bg-white border border-red-200 text-red-600 px-4 py-3 rounded text-[10px] font-black uppercase flex-1 active:scale-95 transition">Cancel</button>
                    ${!isMaint ? `<button onclick="openManagePersonnel('${to}')" class="bg-slate-100 text-dar font-black px-4 py-3 rounded text-[10px] uppercase flex-[2] active:bg-slate-200 transition">Personnel (${list.length})</button>` : `<div class="flex-[2]"></div>`}
                </div>
            </div>`}).join('') + `</div>`;
        }

        async function cancelTrip(to, status) {
            if(!confirm("Change to LAND or Cancel?")) return;
            if(status === 'APPROVED') await db.from('travel_orders').update({ transport: 'LAND' }).eq('to_no', to);
            else await db.from('travel_orders').update({ transport: 'LAND', status: 'PENDING_UNIT_HEAD' }).eq('to_no', to);
            sync();
        }

        function renderSchedule() {
            const container = document.getElementById('main-content');
            const now = new Date(); now.setHours(0,0,0,0);
            const filteredItins = itins.filter(i => {
                const d = new Date(i.travel_date); d.setHours(0,0,0,0);
                if (scheduleFilter === 'day') return d.getTime() === now.getTime();
                if (scheduleFilter === 'week') {
                    const s = new Date(now); s.setDate(now.getDate() - now.getDay());
                    const e = new Date(s); e.setDate(s.getDate() + 6);
                    return d >= s && d <= e;
                }
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            const validToNos = filteredItins.map(i => i.to_no);

            container.innerHTML = `
            <div class="no-print bg-white p-3 rounded-lg mb-10 flex gap-2 shadow-sm border w-full max-w-2xl mx-auto items-center">
                <button onclick="setFilter('day')" class="flex-1 py-3 text-[11px] font-black rounded ${scheduleFilter==='day'?'bg-dar text-white shadow':'text-slate-500 hover:bg-slate-50'} uppercase tracking-widest">Daily</button>
                <button onclick="setFilter('week')" class="flex-1 py-3 text-[11px] font-black rounded ${scheduleFilter==='week'?'bg-dar text-white shadow':'text-slate-500 hover:bg-slate-50'} uppercase tracking-widest">Weekly</button>
                <button onclick="setFilter('month')" class="flex-1 py-3 text-[11px] font-black rounded ${scheduleFilter==='month'?'bg-dar text-white shadow':'text-slate-500 hover:bg-slate-50'} uppercase tracking-widest">Monthly</button>
                <button onclick="window.print()" class="btn-gold flex-[1.5] py-3 text-[11px] shadow-lg active:scale-95 transition flex items-center justify-center gap-2">🖨️ Print Report</button>
            </div>
            <div class="print-area grid grid-cols-1 xl:grid-cols-2 gap-10">
                <h1 class="print-header text-dar uppercase font-black col-span-full mb-2 border-b-2 border-dar pb-4 text-2xl text-center tracking-tighter">Official Fleet Deployment Report (${scheduleFilter.toUpperCase()})</h1>
                ` + VEHICLES.map(v => {
                const logs = orders.filter(o => o.received === v && validToNos.includes(o.to_no));
                const uniqueTo = [...new Set(logs.map(l => l.to_no))].sort();
                let html = `<div class="card-item bg-white p-8 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden"><div class="flex justify-between items-center mb-6 border-b pb-3"><h3 class="font-black text-base text-dar uppercase border-l-8 border-dar-gold pl-3 tracking-widest">${v}</h3><button onclick="setOffRoad('${v}')" class="no-print bg-red-600 text-white text-[9px] px-3 py-1.5 rounded font-black shadow tracking-widest active:scale-95 transition">OFF-ROAD</button></div>`;
                if(!uniqueTo.length) html += `<p class="p-8 text-center text-[11px] text-slate-300 font-black uppercase tracking-widest">Available</p>`;
                else html += uniqueTo.map(toNo => {
                    const h = logs.find(l => l.to_no === toNo);
                    const dates = [...new Set(filteredItins.filter(itin => itin.to_no === toNo).map(itin => itin.travel_date))].join(', ');
                    const allPass = orders.filter(o => o.to_no === toNo).map(o => o.emp_name).join('<br> • ');
                    const isMaint = h.remarks === 'MAINTENANCE';
                    if(isMaint) return `<div class="bg-red-50 p-5 rounded-lg border border-red-200"><p class="text-sm font-black text-red-700 uppercase tracking-widest">🚨 UNAVAILABLE</p><p class="text-[10px] text-red-500 font-bold uppercase tracking-widest mt-1">${dates} | MAINTENANCE</p></div>`;
                    return `<div class="bg-slate-50 p-5 rounded-lg mb-3 flex justify-between items-start border border-slate-200 shadow-sm hover:bg-white transition"><div class="overflow-hidden leading-tight pr-4"><p class="text-xs font-black text-slate-800 uppercase mb-2"> • ${allPass}</p><p class="text-[10px] text-slate-500 font-bold tracking-widest font-mono uppercase mt-3 pt-2 border-t">${dates} | ${h.remarks || 'WHOLE'}</p></div><button onclick="smartTransfer('${h.to_no}','${v}')" class="text-3xl no-print active:scale-75 transition hover:opacity-70 bg-white rounded-full w-12 h-12 flex items-center justify-center border border-slate-100 shadow-sm shrink-0">🔄</button></div>`;
                }).join('');
                return html + `</div>`;
            }).join('') + `</div>`;
        }

        async function smartTransfer(toNo, curV) {
            activeTO = toNo;
            const dates = itins.filter(i => i.to_no === toNo).map(i => i.travel_date);
            const busy = orders.filter(o => {
                if (o.status === 'CANCELLED' || o.to_no === toNo || o.transport !== "GOV'T VEHICLE") return false;
                const oDates = itins.filter(i => i.to_no === o.to_no).map(i => i.travel_date);
                return oDates.some(d => dates.includes(d));
            }).map(o => ({ v: o.received, to: o.to_no, drv: o.driver }));

            const opts = VEHICLES.filter(v => v !== curV).map(v => {
                const m = busy.find(b => b.v === v);
                return `<option value="${v}" data-drv="${m?m.drv:''}">${v} ${m ? `(JOIN TRIP #${m.to})` : '(AVAILABLE)'}</option>`;
            }).join('');

            document.getElementById('tSub').innerText = `Transfer Trip ID #${toNo} for Dates: ${dates.join(', ')}`;
            document.getElementById('tSelect').innerHTML = opts;
            document.getElementById('tExec').onclick = async () => {
                const targetV = document.getElementById('tSelect').value;
                const targetD = document.getElementById('tSelect').options[document.getElementById('tSelect').selectedIndex].dataset.drv;
                await db.from('travel_orders').update({ received: targetV, driver: targetD || orders.find(o=>o.to_no===toNo).driver }).eq('to_no', toNo);
                closeModal('transferModal'); sync();
            };
            openModal('transferModal');
        }

        // --- NEW MAINTENANCE LOGIC ---
        function setOffRoad(veh) {
            activeVehForMaint = veh;
            document.getElementById('maintSub').innerText = `Vehicle: ${veh}`;
            document.getElementById('maintD1').value = "";
            document.getElementById('maintD2').value = "";
            openModal('maintModal');
        }

        async function saveMaintenance() {
            const d1 = document.getElementById('maintD1').value;
            const d2 = document.getElementById('maintD2').value;
            if(!d1) return alert("Select at least a start date.");
            
            const to = `MAINT-${Math.floor(Date.now()%10000)}`;
            await db.from('travel_orders').insert({ to_no: to, emp_name: '🚨 UNAVAILABLE', received: activeVehForMaint, remarks: 'MAINTENANCE', status: 'APPROVED', transport: "GOV'T VEHICLE" });
            
            let st = new Date(d1), en = new Date(d2 || d1);
            while(st <= en) {
                await db.from('itinerary').insert({ to_no: to, travel_date: st.toISOString().split('T')[0], destination: "Authorized Shop", purpose: "Fleet Maintenance" });
                st.setDate(st.getDate() + 1);
            }
            closeModal('maintModal');
            sync();
        }

        // --- DOUBLE BOOKING CHECKER ---
        async function isDoubleBooked(empName, checkDates) {
            const empTrips = orders.filter(o => o.emp_name === empName && o.status !== 'CANCELLED' && o.transport === "GOV'T VEHICLE");
            for (let trip of empTrips) {
                const tripDates = itins.filter(i => i.to_no === trip.to_no).map(i => i.travel_date);
                const overlap = tripDates.filter(d => checkDates.includes(d));
                if (overlap.length > 0) return true; // Found a conflict
            }
            return false;
        }

        // --- PERSONNEL MANAGEMENT ---
        function runEmpSearch(inp, resId) {
            const div = document.getElementById(resId);
            const val = inp.value.toLowerCase().trim();
            if (val.length < 2) { div.classList.add('hidden'); return; }
            const match = emps.filter(e => e.full_name.toLowerCase().includes(val)).slice(0, 5);
            div.innerHTML = match.map(e => `<div onclick="pickPersonnel('${safeStr(e.full_name)}','${resId}','${inp.id}','${safeStr(e.unit)}','${safeStr(e.division)}')" class="p-4 border-b border-slate-100 text-[11px] font-black active:bg-slate-100 cursor-pointer uppercase text-slate-700 hover:bg-slate-50 transition">${e.full_name}</div>`).join('');
            div.classList.remove('hidden');
        }

        function pickPersonnel(n, rId, iId, u, d) {
            document.getElementById(iId).value = n;
            document.getElementById(rId).classList.add('hidden');
            if(iId === 'pAdd' || iId === 'resPAdd') selectedEmpForAdd = { n, u, d };
        }

        async function queuePassenger() {
            if(!selectedEmpForAdd) return alert("Search and click a name first.");
            
            const d1 = document.getElementById('resD1').value, d2 = document.getElementById('resD2').value;
            if(!d1) return alert("Please set the Start Date first to verify availability.");
            
            let st = new Date(d1), en = new Date(d2 || d1), dates = [];
            while(st <= en) { dates.push(st.toISOString().split('T')[0]); st.setDate(st.getDate() + 1); }
            
            if (await isDoubleBooked(selectedEmpForAdd.n, dates)) {
                return alert(`${selectedEmpForAdd.n} is already scheduled on a Gov't Vehicle during these dates!`);
            }

            manualPassengerQueue.push(selectedEmpForAdd);
            document.getElementById('resPAdd').value = "";
            selectedEmpForAdd = null;
            renderManualPList();
        }

        function renderManualPList() {
            document.getElementById('manualPList').innerHTML = manualPassengerQueue.map((p, idx) => `
                <div class="flex justify-between items-center bg-slate-50 p-2 rounded text-[10px] font-black uppercase border border-slate-200">
                    <span>${p.n}</span><button onclick="manualPassengerQueue.splice(${idx},1);renderManualPList();" class="text-red-500 font-bold hover:scale-110">✕</button>
                </div>`).join('');
        }

        async function openManagePersonnel(to) {
            activeTO = to;
            document.getElementById('pSub').innerText = `Trip Reference: ${to}`;
            openModal('peopleModal');
            renderPList();
        }

        async function renderPList() {
            const { data } = await db.from('travel_orders').select('id, emp_name').eq('to_no', activeTO).order('id', { ascending: true });
            document.getElementById('pList').innerHTML = (data || []).map((p, idx) => `
                <div class="flex justify-between items-center p-4 bg-white rounded-lg border border-slate-200 shadow-sm transition">
                    <span class="text-xs font-black text-slate-800 uppercase tracking-widest">${p.emp_name} ${idx===0?'<span class="ml-2 bg-dar text-[9px] text-white px-2 py-1 rounded">LEAD</span>':''}</span>
                    ${idx!==0 ? `<button onclick="doRemovePerson('${p.id}')" class="bg-red-50 text-red-600 px-4 py-2 rounded text-[10px] font-black uppercase active:scale-90 transition">Remove</button>` : `<span class="text-[8px] text-slate-300 font-bold uppercase mr-4 italic">Source Person</span>`}
                </div>`).join('');
        }

        async function handleAddPersonnel() {
            if(!selectedEmpForAdd) return alert("Search and click a name first.");
            
            const tripDates = itins.filter(i => i.to_no === activeTO).map(i => i.travel_date);
            if (await isDoubleBooked(selectedEmpForAdd.n, tripDates)) {
                return alert(`${selectedEmpForAdd.n} is already scheduled on a Gov't Vehicle for these dates!`);
            }

            const head = orders.find(o => o.to_no === activeTO);
            const row = { ...head, emp_name: selectedEmpForAdd.n, unit: selectedEmpForAdd.u, division: selectedEmpForAdd.d };
            delete row.id; delete row.created_at;
            await db.from('travel_orders').insert([row]);
            document.getElementById('pAdd').value = ""; selectedEmpForAdd = null;
            await sync(); await renderPList();
        }

        async function doRemovePerson(id) { await db.from('travel_orders').delete().eq('id', id); await renderPList(); sync(); }

        async function saveManual() {
            const n = document.getElementById('resN').value, d1 = document.getElementById('resD1').value, d2 = document.getElementById('resD2').value;
            const s = document.getElementById('resS').value, v = document.getElementById('resV').value, dr = document.getElementById('resDr').value, p = document.getElementById('resP').value;
            if(!n || !d1 || !p) return alert("Missing Details.");

            let st = new Date(d1), en = new Date(d2 || d1), dates = [];
            while(st <= en) { dates.push(st.toISOString().split('T')[0]); st.setDate(st.getDate() + 1); }

            if (await isDoubleBooked(n, dates)) return alert(`Lead Passenger ${n} is already booked on these dates!`);

            const to = `MAN-${Math.floor(Date.now()%10000)}`;
            const head = { to_no: to, emp_name: n, transport: "GOV'T VEHICLE", received: v, driver: dr, remarks: s, status: "APPROVED" };
            
            await db.from('travel_orders').insert([head]);
            if(manualPassengerQueue.length) await db.from('travel_orders').insert(manualPassengerQueue.map(pass => ({ ...head, emp_name: pass.n, unit: pass.u, division: pass.d })));
            
            for(let date of dates) {
                await db.from('itinerary').insert({ to_no: to, travel_date: date, destination: "Manual Booking", purpose: p });
            }
            
            manualPassengerQueue = []; 
            document.getElementById('resN').value = "";
            document.getElementById('resP').value = "";
            closeModal('bookModal'); 
            sync();
        }

        // --- UTILS ---
        function switchTab(t) { currentTab = t; renderDashboard(); }
        function setFilter(f) { scheduleFilter = f; renderSchedule(); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function safeStr(str) { return (str || "").replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
        function getApprovalTarget(u) { const unit = (u || "").toUpperCase(); if (unit === "PARPO") return "PENDING_PARPO"; return (unit && unit !== "NULL") ? "PENDING_UNIT_HEAD" : "PENDING_CHIEF"; }
    </script>
</body>
</html>
