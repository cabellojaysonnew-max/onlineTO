<style>
:root {
    --dar-green: #003811;
    --dar-light: #006400;
    --dar-gold: #D4AF37;
    --bg-main: #eef3f1;
    --card-bg: #ffffff;
    --text-main: #1f2937;
    --text-muted: #6b7280;
    --danger: #dc2626;
    --success: #16a34a;
    --warning: #f59e0b;
}

* { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

body {
    margin: 0;
    background: linear-gradient(180deg, #f4f7f6, #e6efec);
    color: var(--text-main);
    -webkit-tap-highlight-color: transparent;
}

/* ORIGINAL STRUCTURE PRESERVED */
.screen { display: none; }
.screen.active { display: block; animation: fadeIn 0.3s ease; }

.view { display: none; padding: 16px; padding-bottom: 120px; }
.view.active { display: block; animation: fadeIn 0.2s ease; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* UI IMPROVEMENTS ONLY */
.app-header {
    background: linear-gradient(135deg, var(--dar-green), #025928);
    color: white;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--dar-gold);
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

.card {
    background: var(--card-bg);
    padding: 16px;
    border-radius: 16px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.08);
    margin-bottom: 16px;
    border: none;
    transition: 0.2s;
}

.card:hover { transform: translateY(-2px); }

h4 {
    margin-top: 0;
    font-size: 13px;
    color: var(--dar-green);
    border-left: 4px solid var(--dar-gold);
    padding-left: 8px;
}

input, select, textarea {
    border-radius: 10px;
    background: #fafafa;
}

input:focus, select:focus, textarea:focus {
    border-color: var(--dar-green);
    box-shadow: 0 0 0 2px rgba(0,56,17,0.1);
}

.btn {
    border-radius: 12px;
}

.bottom-nav {
    box-shadow: 0 -5px 15px rgba(0,0,0,0.25);
}

.nav-item.active {
    background: rgba(255,255,255,0.05);
}

.calendar-day {
    border-radius: 10px;
}

.today {
    background: #fffbea;
}
</style>
</head>

<body>

<div id="login-screen" class="screen active">
    <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 25px;">
        <div style="background: white; padding: 35px 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--dar-gold);">
            <h2 style="color: var(--dar-green); text-align: center; margin: 0;">DAR PORTAL</h2>
            <p style="text-align: center; font-size: 12px; color: gray; margin-bottom: 25px; font-weight: bold;">CAMARINES SUR I - MOBILE</p>
            <input type="text" id="login-id" placeholder="Employee ID" inputmode="numeric">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn btn-primary" onclick="handleLogin()">SECURE LOGIN</button>
        </div>
    </div>
</div>
