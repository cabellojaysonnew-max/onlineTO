<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR Fleet Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dar-green: #003811; --dar-gold: #D4AF37; }
        body { background: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #1e293b; }
        .bg-dar { background: var(--dar-green); }
        .text-dar { color: var(--dar-green); }
        .border-dar { border-color: var(--dar-green); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* CENTERED MODALS - STANDARD INDUSTRY UX */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal-box {
            background: white; width: 100%; max-width: 550px;
            border-radius: 8px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .search-results-box { 
            position: absolute; width: 100%; max-height: 200px; 
            overflow-y: auto; z-index: 1000; background: white; 
            border: 1px solid #e2e8f0; border-radius: 4px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
        }
        
        .btn-primary { background: var(--dar-green); color: white; padding: 0.75rem 1.5rem; border-radius: 0.25rem; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; transition: all 0.1s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .btn-primary:active { transform: scale(0.95); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-cancel { background: #f1f5f9; color: #475569; padding: 0.75rem 1.5rem; border-radius: 0.25rem; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; transition: background 0.1s; }
        .btn-cancel:hover { background: #e2e8f0; }

        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100% !important; background: white; }
            .card-item { border: 1px solid #cbd5e1 !important; margin-bottom: 15px; break-inside: avoid; padding: 20px; border-radius: 0 !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col overflow-hidden">

    <div id="app" class="flex flex-col h-full w-full">
        <div id="login-screen" class="h-full w-full flex items-center justify-center p-6 bg-dar">
            <div class="bg-white p-10 rounded-lg w-full max-w-sm shadow-2xl border-t-8 border-dar-gold">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-black text-dar tracking-tighter uppercase">DAR Fleet</h1>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Official Dispatch Console</p>
                </div>
                <div class="space-y-4">
                    <input id="un" type="text" placeholder="Username" class="w-full p-4 border rounded outline-none focus:ring-2 focus:ring-green-800 bg-slate-50">
                    <input id="pw" type="password" placeholder="Password" class="w-full p-4 border rounded outline-none focus:ring-2 focus:ring-green-800 bg-slate-50" onkeypress="if(event.key==='Enter') handleLogin()">
                    <button onclick="handleLogin()" class="w-full btn-primary py-4 mt-2 tracking-widest text-sm">Secure Login</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SB_KEY = "sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo"; 
        const db = window.supabase.createClient(SB_URL, SB_KEY);

        const VEHICLES = ["MAZDA", "REVO", "INNOVA", "SKY", "BLACK"];
        const DRIVERS = ["Driver 1", "Driver 2", "Driver 3", "Driver 4", "Driver 5"];

        let user = null, currentTab = 'inbox', scheduleFilter = 'day'; 
        let emps = [], orders = [], itins = [];
        let activeTO = "", selectedEmpForAdd = null;

        // --- 1. CORE SYSTEM LOGIC ---
        async function logAction(to, app, act, date = "N/A") {
            try { await db.from('vehicle_logs').insert({ to_no: to, applicant: app, travel_date: date, action: act }); } catch(e) {}
        }

        function getApprovalTarget(unit) {
            const u = (unit || "").toUpperCase();
            if (u === "PARPO") return "PENDING_PARPO";
            return (u && u !== "NULL" && u !== "NAN") ? "PENDING_UNIT_HEAD" : "PENDING_CHIEF";
        }

        async function handleLogin() {
            const u = document.getElementById('un').value.trim(), p = document.getElementById('pw').value.trim();
            if(!u || !p) return alert("Please enter credentials.");
            
            try {
                const { data, error } = await db.from('users').select('*');
                if(error) throw error;
                const found = data.find(x => x.username === u && String(x.password) === String(p));
                
                if (found && found.role === 'VEHICLE_APPROVER') { 
                    user = found; 
                    const {data: e} = await db.from('employees').select('*');
                    emps = e || []; 
                    renderDashboard(); 
                } else alert("Access Denied: Invalid Credentials or Missing Approver Role.");
            } catch(e) { alert("System Error: " + e.message); }
        }

        async function sync() {
            try {
                const [o, i] = await Promise.all([
                    db.from('travel_orders').select('*').neq('status','CANCELLED'), 
                    db.from('itinerary').select('*')
                ]);
                orders = o.data || []; itins = i.data || [];
                if(currentTab === 'inbox') renderInbox();
                else if(currentTab === 'manifest') renderManifest();
                else renderSchedule();
            } catch (e) { console.error("Sync Error", e); }
        }

        // --- 2. DASHBOARD LAYOUT ---
        function renderDashboard() {
            document.getElementById('app').innerHTML = `
            <div class="flex flex-col h-screen">
                <header class="bg-dar text-white px-8 py-5 flex justify-between items-center no-print shadow-md shrink-0">
                    <div class="leading-tight"><span class="block font-black text-xl tracking-tight uppercase">${user.full_name}</span><p class="text-[10px] text-dar-gold font-bold uppercase tracking-widest mt-1">DISPATCH CONSOLE</p></div>
                    <div class="flex gap-4 items-center">
                        <button onclick="sync()" class="text-2xl hover:opacity-70 transition">🔄</button>
                        <button onclick="location.reload()" class="bg-white/10 border border-white/20 px-4 py-2 rounded text-[10px] font-bold uppercase hover:bg-white/20 transition">Log Out</button>
                    </div>
                </header>

                <nav class="bg-white border-b flex no-print shadow-sm shrink-0">
                    <button onclick="switchTab('inbox')" class="flex-1 p-5 text-xs font-black ${currentTab==='inbox'?'border-b-4 border-green-900 text-dar':'text-slate-400 hover:bg-slate-50'} uppercase tracking-widest transition">Inbox</button>
                    <button onclick="switchTab('manifest')" class="flex-1 p-5 text-xs font-black ${currentTab==='manifest'?'border-b-4 border-green-900 text-dar':'text-slate-400 hover:bg-slate-50'} uppercase tracking-widest transition">Manifest</button>
                    <button onclick="switchTab('schedule')" class="flex-1 p-5 text-xs font-black ${currentTab==='schedule'?'border-b-4 border-green-900 text-dar':'text-slate-400 hover:bg-slate-50'} uppercase tracking-widest transition">Schedule</button>
                </nav>

                <main id="main-content" class="flex-1 overflow-y-auto p-8 no-scrollbar print-area bg-slate-50"></main>

                <footer class="p-5 no-print bg-white border-t flex justify-end shrink-0 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                    <button onclick="openModal('bookModal')" class="btn-primary py-4 px-10 tracking-widest shadow-lg">+ Create Booking</button>
                </footer>
            </div>
            ${modalsMarkup()}`;
            sync();
        }

        function modalsMarkup() {
            return `
            <div id="bookModal" class="hidden modal-overlay">
                <div class="modal-box">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                        <h2 class="font-black text-dar uppercase text-sm tracking-widest">Manual Reservation</h2>
                        <button onclick="closeModal('bookModal')" class="text-slate-400 hover:text-red-500 text-2xl font-light">✕</button>
                    </div>
                    <div class="p-8 space-y-5 overflow-y-auto no-scrollbar flex-1 bg-white">
                        <div class="relative">
                            <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Personnel Lead</label>
                            <input id="resN" oninput="runEmpSearch(this, 'resResults')" placeholder="Search Employee Name..." class="w-full p-4 border border-slate-200 rounded text-sm outline-none focus:ring-2 focus:ring-dar focus:border-dar transition bg-slate-50">
                            <div id="resResults" class="search-results-box hidden"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Start Date</label><input id="resD1" type="date" class="w-full p-4 border border-slate-200 rounded text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-dar"></div>
                            <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">End Date</label><input id="resD2" type="date" class="w-full p-4 border border-slate-200 rounded text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-dar"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Time Slot</label><select id="resS" class="w-full p-4 border border-slate-200 rounded text-sm font-bold bg-white outline-none focus:ring-2 focus:ring-dar"><option>WHOLE DAY</option><option>AM</option><option>PM</option></select></div>
                            <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Assign Vehicle</label><select id="resV" class="w-full p-4 border border-slate-200 rounded text-sm font-bold bg-white text-dar outline-none focus:ring-2 focus:ring-dar">${VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select></div>
                        </div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Driver (Editable)</label><input id="resDr" list="drivers" placeholder="Pick or type driver..." class="w-full p-4 border border-slate-200 rounded text-sm font-bold outline-none focus:ring-2 focus:ring-dar bg-slate-50"></div>
                        <div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Purpose / RSO Number</label><input id="resP" placeholder="Trip details..." class="w-full p-4 border border-slate-200 rounded text-sm outline-none focus:ring-2 focus:ring-dar bg-slate-50"></div>
                    </div>
                    <div class="p-6 border-t border-slate-100 flex gap-4 bg-slate-50">
                        <button onclick="closeModal('bookModal')" class="btn-cancel flex-1 py-4">Cancel</button>
                        <button onclick="saveManual()" class="btn-primary flex-[2] py-4 tracking-widest">Save Booking</button>
                    </div>
                </div>
            </div>

            <div id="peopleModal" class="hidden modal-overlay">
                <div class="modal-box h-[600px]">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                        <div><h2 class="font-black text-dar uppercase text-sm tracking-widest">Manage Manifest</h2><p id="pSub" class="text-[10px] text-slate-500 font-bold uppercase mt-1"></p></div>
                        <button onclick="closeModal('peopleModal')" class="text-slate-400 hover:text-red-500 text-2xl font-light">✕</button>
                    </div>
                    
                    <div id="pList" class="p-6 flex-1 space-y-3 overflow-y-auto no-scrollbar bg-slate-100/50"></div>
                    
                    <div class="p-6 border-t border-slate-100 bg-white relative shrink-0">
                        <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Search & Add Personnel:</label>
                        <div class="flex gap-3">
                            <div class="relative flex-1">
                                <input id="pAdd" oninput="runEmpSearch(this, 'pResults')" placeholder="Enter name to search..." class="w-full p-4 border border-slate-200 rounded text-sm outline-none focus:ring-2 focus:ring-dar transition bg-slate-50" autocomplete="off">
                                <div id="pResults" class="search-results-box hidden bottom-full mb-1 border-2 border-dar"></div>
                            </div>
                            <button id="pAddBtn" onclick="handleAddPersonnel()" class="btn-primary px-8 tracking-widest">Add Person</button>
                        </div>
                    </div>
                    
                    <div class="p-4 border-t border-slate-100 text-center bg-slate-50 shrink-0">
                        <button onclick="closeModal('peopleModal')" class="bg-slate-800 text-white px-16 py-3 rounded font-bold text-xs uppercase tracking-widest hover:bg-black transition shadow-lg active:scale-95">Done / OK</button>
                    </div>
                </div>
            </div>

            <div id="transferModal" class="hidden modal-overlay">
                <div class="modal-box max-w-md">
                    <div class="p-6 border-b border-slate-100 bg-slate-50">
                        <h2 class="font-black text-dar text-sm uppercase tracking-widest">Smart Transfer</h2>
                        <p id="tSub" class="text-[10px] text-slate-500 font-bold mt-1 uppercase"></p>
                    </div>
                    <div class="p-8 space-y-4 bg-white">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Available Vehicles (Matching Dates):</label>
                        <select id="tSelect" class="w-full p-4 border border-slate-200 rounded text-sm font-black text-dar outline-none bg-slate-50 focus:ring-2 focus:ring-dar"></select>
                    </div>
                    <div class="p-6 border-t border-slate-100 flex gap-4 bg-slate-50">
                        <button onclick="closeModal('transferModal')" class="btn-cancel flex-1 py-4">Cancel</button>
                        <button id="tExec" class="btn-primary flex-1 py-4 tracking-widest shadow-lg">Confirm Transfer</button>
                    </div>
                </div>
            </div>
            
            <datalist id="drivers">${DRIVERS.map(d=>`<option value="${d}">`).join('')}</datalist>`;
        }

        // --- 3. INBOX (Features 2 & 3) ---
        function renderInbox() {
            const m = document.getElementById('main-content');
            const data = orders.filter(x => x.status === 'PENDING_VEHICLE_APPROVER' && x.transport === "GOV'T VEHICLE");
            
            if (!data.length) { 
                m.innerHTML = `<div class="flex flex-col items-center justify-center h-full opacity-30 mt-10"><span class="text-6xl mb-4">✨</span><p class="font-black uppercase text-sm tracking-widest">Inbox is Clear</p></div>`; 
                return; 
            }

            m.innerHTML = `<div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-8">` + data.map(o => {
                const itin = itins.find(i => i.to_no === o.to_no) || {travel_date: '?'};
                return `
                <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200 flex flex-col">
                    <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-3">
                        <span class="text-[10px] font-black text-dar uppercase bg-green-50 px-3 py-1 rounded tracking-wider">#${o.to_no}</span>
                        <button onclick="toLand('${o.to_no}','${o.unit}')" class="text-blue-600 text-[10px] font-bold underline uppercase hover:text-blue-800 transition">Switch to LAND</button>
                    </div>
                    <h3 class="font-black text-slate-800 text-lg leading-tight mb-2">${o.emp_name}</h3>
                    <p class="text-[11px] text-slate-500 font-bold mb-1">📍 ${safeStr(itin.destination)}</p>
                    <p class="text-[11px] text-dar font-black uppercase tracking-widest mb-6">📅 ${itin.travel_date}</p>
                    
                    <div class="space-y-4 mb-8 bg-slate-50 p-5 rounded-lg border border-slate-100 mt-auto">
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Vehicle</label>
                            <select id="v-${o.to_no}" class="border border-slate-200 rounded font-bold p-2 text-xs text-dar outline-none bg-white">${VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select>
                        </div>
                        <div class="flex justify-between items-center">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Assignment</label>
                            <select id="s-${o.to_no}" class="border border-slate-200 rounded font-bold p-2 text-xs text-slate-600 outline-none bg-white"><option>WHOLE DAY</option><option>AM</option><option>PM</option></select>
                        </div>
                        <div class="flex flex-col pt-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase mb-2">Driver</label>
                            <input id="d-${o.to_no}" list="drivers" placeholder="Type or Select..." class="border border-slate-200 rounded p-3 text-xs font-bold outline-none focus:border-dar shadow-inner">
                        </div>
                    </div>
                    
                    <div class="flex gap-3">
                        <button onclick="toLand('${o.to_no}','${o.unit}')" class="btn-cancel flex-1 py-4">Reject</button>
                        <button onclick="approveTrip('${o.to_no}','${o.unit}','${safeStr(o.emp_name)}')" class="btn-primary flex-[2] py-4 shadow-lg tracking-widest">Dispatch Trip</button>
                    </div>
                </div>`;
            }).join('') + `</div>`;
        }

        async function approveTrip(to, unit, name) {
            const v = document.getElementById(`v-${to}`).value, s = document.getElementById(`s-${to}`).value, d = document.getElementById(`d-${to}`).value || "TBD";
            const next = getApprovalTarget(unit);
            await db.from('travel_orders').update({ received: v, driver: d, remarks: s, status: next }).eq('to_no', to);
            await logAction(to, name, `APPROVED: ${v} (${s}) - Driver: ${d}`);
            sync();
        }

        async function toLand(to, unit) {
            if(!confirm("Change to LAND? This removes the request from your queue and resets routing.")) return;
            const next = getApprovalTarget(unit);
            await db.from('travel_orders').update({ transport: 'LAND', status: next, received: null, driver: null }).eq('to_no', to);
            sync();
        }

        // --- 4. MANIFEST (Features 6 & 7) ---
        function renderManifest() {
            const m = document.getElementById('main-content');
            const data = orders.filter(x => x.transport === "GOV'T VEHICLE" && x.status !== 'PENDING_VEHICLE_APPROVER');
            const grp = {}; data.forEach(x => { if(!grp[x.to_no]) grp[x.to_no] = []; grp[x.to_no].push(x); });
            
            if (Object.keys(grp).length === 0) { m.innerHTML = `<div class="p-20 text-center opacity-30 uppercase font-black text-xs mt-20">No Active Manifests</div>`; return; }

            m.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">` + Object.entries(grp).map(([to, list]) => `
            <div class="bg-white p-6 rounded-xl shadow-md border-l-8 border-dar relative flex flex-col h-full hover:shadow-lg transition">
                <div>
                    <div class="flex justify-between items-start mb-4"><span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">TRIP #${to}</span><span class="text-[9px] bg-green-50 text-dar font-black px-2 py-1 rounded uppercase">${list[0].remarks||'WHOLE DAY'}</span></div>
                    <h3 class="font-black text-slate-800 text-sm uppercase mb-4 leading-tight">${list[0].emp_name}</h3>
                    <div class="bg-slate-50 p-3 rounded border border-slate-100 mb-6">
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">🚙 ${list[0].received}</p>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">👤 ${list[0].driver}</p>
                    </div>
                </div>
                <div class="flex gap-3 pt-4 border-t border-slate-100 mt-auto">
                    <button onclick="cancelTrip('${to}','${list[0].status}')" class="bg-white border border-red-200 text-red-600 px-4 py-3 rounded text-[10px] font-black uppercase hover:bg-red-50 transition flex-1">Cancel</button>
                    <button onclick="managePersonnel('${to}')" class="bg-slate-100 text-dar font-black px-4 py-3 rounded text-[10px] uppercase hover:bg-slate-200 transition flex-[2]">Personnel (${list.length})</button>
                </div>
            </div>`).join('') + `</div>`;
        }

        async function cancelTrip(to, status) {
            if(!confirm("Cancel deployment? \n\nApproved requests will maintain approval but switch to LAND.\nPending requests will reset routing entirely.")) return;
            if(status === 'APPROVED') await db.from('travel_orders').update({ transport: 'LAND' }).eq('to_no', to);
            else await db.from('travel_orders').update({ transport: 'LAND', status: 'PENDING_UNIT_HEAD' }).eq('to_no', to);
            sync();
        }

        // --- 5. SCHEDULE & FEATURE 8 (Smart Transfer & Off-Road) ---
        function renderSchedule() {
            const m = document.getElementById('main-content');
            const now = new Date(); now.setHours(0,0,0,0);
            const validItins = itins.filter(i => {
                if(!i || !i.travel_date) return false;
                const d = new Date(i.travel_date); d.setHours(0,0,0,0);
                if (scheduleFilter === 'day') return d.getTime() === now.getTime();
                if (scheduleFilter === 'week') {
                    const s = new Date(now); s.setDate(now.getDate() - now.getDay());
                    const e = new Date(s); e.setDate(s.getDate() + 6);
                    return d >= s && d <= e;
                }
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            const validIds = validItins.map(i => i.to_no);

            m.innerHTML = `
            <div class="no-print bg-white p-2 rounded-lg mb-8 flex gap-1 shadow-sm border border-slate-200 w-full max-w-xl mx-auto">
                <button onclick="setFilter('day')" class="flex-1 py-3 text-[11px] font-black rounded ${scheduleFilter==='day'?'bg-dar text-white shadow':'text-slate-500 hover:bg-slate-50'} uppercase transition">Daily</button>
                <button onclick="setFilter('week')" class="flex-1 py-3 text-[11px] font-black rounded ${scheduleFilter==='week'?'bg-dar text-white shadow':'text-slate-500 hover:bg-slate-50'} uppercase transition">Weekly</button>
                <button onclick="setFilter('month')" class="flex-1 py-3 text-[11px] font-black rounded ${scheduleFilter==='month'?'bg-dar text-white shadow':'text-slate-500 hover:bg-slate-50'} uppercase transition">Monthly</button>
                <button onclick="window.print()" class="flex-1 py-3 text-[11px] bg-dar-gold text-white font-black rounded uppercase shadow active:scale-95 transition">Print Report</button>
            </div>
            <div class="print-area grid grid-cols-1 xl:grid-cols-2 gap-10">
                <h1 class="print-header text-dar uppercase font-black col-span-full mb-2 border-b-2 border-dar pb-4 text-2xl">Official Fleet Status (${scheduleFilter.toUpperCase()})</h1>
                ` + VEHICLES.map(v => {
                const logs = orders.filter(o => o.received === v && o.transport === "GOV'T VEHICLE" && validIds.includes(o.to_no));
                const uniqueIds = [...new Set(logs.map(l => l.to_no))];
                
                let html = `<div class="card-item bg-white p-6 rounded-xl border border-slate-200 shadow-sm relative overflow-hidden">
                    <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                        <h3 class="font-black text-lg text-dar uppercase border-l-8 border-dar-gold pl-3 tracking-widest">${v}</h3>
                        <button onclick="declareOffRoad('${v}')" class="no-print bg-white text-red-600 border border-red-200 text-[9px] px-3 py-1.5 rounded font-black tracking-widest shadow-sm hover:bg-red-50 active:scale-95 transition uppercase">Set Off-Road</button>
                    </div>`;

                if(uniqueIds.length === 0) {
                    html += `<div class="p-8 text-center text-[11px] text-slate-400 font-black uppercase tracking-widest border border-dashed border-slate-200 rounded-lg bg-slate-50">Vehicle Available</div>`;
                } else {
                    html += `<div class="space-y-3">` + uniqueIds.map(toNo => {
                        const h = logs.find(l => l.to_no === toNo);
                        const dates = validItins.filter(itin => itin.to_no === toNo).map(itin => itin.travel_date).join(', ');
                        const isMaint = h.remarks === 'MAINTENANCE';
                        
                        // IF UNAVAILABLE/MAINTENANCE, RENDER RED BLOCK (Bug 2 Fix)
                        if(isMaint) {
                            return `
                            <div class="bg-red-50 p-5 rounded-lg flex justify-between items-center border border-red-200 shadow-sm">
                                <div>
                                    <p class="text-sm font-black text-red-700 uppercase tracking-widest mb-1">🚨 UNAVAILABLE / OFF-ROAD</p>
                                    <p class="text-[10px] text-red-500 font-bold uppercase">${dates} | MAINTENANCE</p>
                                </div>
                                <button onclick="restoreVehicle('${h.to_no}')" class="bg-white text-red-600 px-4 py-2 rounded text-[10px] font-black shadow hover:bg-red-100 transition no-print uppercase tracking-wider border border-red-200 active:scale-95">Restore</button>
                            </div>`;
                        }

                        // NORMAL TRIP RENDER
                        return `
                        <div class="bg-slate-50 p-5 rounded-lg flex justify-between items-center border border-slate-200 shadow-sm hover:bg-white transition">
                            <div class="overflow-hidden leading-tight pr-4">
                                <p class="text-sm font-black text-slate-800 uppercase truncate mb-1">${h.emp_name}</p>
                                <p class="text-[10px] text-slate-500 font-bold tracking-widest font-mono uppercase">${dates} | ${h.remarks || 'WHOLE'}</p>
                            </div>
                            <button onclick="openSmartTransfer('${h.to_no}','${v}')" class="text-3xl no-print active:scale-75 transition hover:opacity-70 bg-white rounded-full w-12 h-12 flex items-center justify-center shadow border border-slate-100">🔄</button>
                        </div>`;
                    }).join('') + `</div>`;
                }
                return html + `</div>`;
            }).join('') + `</div>`;
        }

        // --- FEATURE 8 LOGIC (Fix 3) ---
        async function openSmartTransfer(toNo, curV) {
            activeTO = toNo;
            const dates = itins.filter(i => i.to_no === toNo).map(i => i.travel_date);
            const busy = orders.filter(o => {
                if (o.status === 'CANCELLED' || o.to_no === toNo || o.transport !== "GOV'T VEHICLE") return false;
                return itins.filter(i => i.to_no === o.to_no).some(i => dates.includes(i.travel_date));
            }).map(o => ({ v: o.received, to: o.to_no, drv: o.driver }));

            const opts = VEHICLES.filter(v => v !== curV).map(v => {
                const m = busy.find(b => b.v === v);
                return `<option value="${v}" data-drv="${m?m.drv:''}">${v} ${m ? `(JOIN TRIP #${m.to})` : '(AVAILABLE)'}</option>`;
            }).join('');

            document.getElementById('tSub').innerText = `Trip #${toNo} | Dates: ${dates.join(', ')}`;
            document.getElementById('tSelect').innerHTML = opts;
            document.getElementById('tExec').onclick = async () => {
                const sel = document.getElementById('tSelect');
                const targetV = sel.value;
                const targetD = sel.options[sel.selectedIndex].dataset.drv;
                
                const payload = { received: targetV };
                if(targetD) payload.driver = targetD; // Join logic: sync the driver
                
                await db.from('travel_orders').update(payload).eq('to_no', toNo);
                await logAction(toNo, "System", `TRANSFER: ${curV} to ${targetV}`);
                closeModal('transferModal'); sync();
            };
            openModal('transferModal');
        }

        // --- OFF-ROAD LOGIC (Fix 2) ---
        async function declareOffRoad(veh) {
            const d = prompt("Enter Maintenance Date (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
            if(!d) return;
            const to = `MAINT-${Math.floor(Math.random()*10000)}`;
            // Uses a distinct remark 'MAINTENANCE' to trigger the red block in UI
            await db.from('travel_orders').insert({ to_no: to, emp_name: 'MAINTENANCE', received: veh, remarks: 'MAINTENANCE', status: 'APPROVED', transport: "GOV'T VEHICLE" });
            await db.from('itinerary').insert({ to_no: to, travel_date: d, destination: "Authorized Shop", purpose: "Fleet Maintenance" });
            sync();
        }

        async function restoreVehicle(toNo) {
            if(!confirm("Restore vehicle and remove maintenance block?")) return;
            await db.from('travel_orders').delete().eq('to_no', toNo);
            sync();
        }

        // --- PERSONNEL MANAGEMENT (Fix 1) ---
        function runEmpSearch(inp, resId) {
            const div = document.getElementById(resId);
            const val = inp.value.toLowerCase().trim();
            if (val.length < 2) { div.classList.add('hidden'); return; }
            
            const match = emps.filter(e => e.full_name.toLowerCase().includes(val)).slice(0, 5);
            div.innerHTML = match.map(e => `
                <div onclick="pickPersonnel('${safeStr(e.full_name)}','${resId}','${inp.id}','${safeStr(e.unit)}','${safeStr(e.division)}')" class="p-4 border-b border-slate-100 text-[11px] font-black active:bg-slate-100 cursor-pointer uppercase text-slate-700 hover:bg-slate-50 transition">
                    ${e.full_name} <span class="block text-[9px] text-slate-400 mt-1">${e.unit||'N/A'} - ${e.division||'N/A'}</span>
                </div>
            `).join('');
            div.classList.remove('hidden');
        }

        function pickPersonnel(n, rId, iId, u, d) {
            document.getElementById(iId).value = n; // Visually confirm selection
            document.getElementById(rId).classList.add('hidden');
            if(iId === 'pAdd') selectedEmpForAdd = { n, u, d };
        }

        async function managePersonnel(to) {
            activeTO = to;
            document.getElementById('pSub').innerText = `Trip Reference: ${to}`;
            openModal('peopleModal');
            renderPList();
        }

        async function renderPList() {
            const { data } = await db.from('travel_orders').select('id, emp_name').eq('to_no', activeTO);
            document.getElementById('pList').innerHTML = (data || []).map((p, idx) => `
                <div class="flex justify-between items-center p-4 bg-white rounded-lg border border-slate-200 shadow-sm">
                    <span class="text-xs font-black text-slate-800 uppercase tracking-widest">${p.emp_name} ${idx===0?'<span class="ml-2 bg-dar text-[9px] text-white px-2 py-1 rounded tracking-tighter">LEAD</span>':''}</span>
                    ${idx!==0?`<button onclick="doRemovePerson('${p.id}')" class="btn-danger shadow-sm">Remove</button>`:''}
                </div>`).join('');
        }

        async function handleAddPersonnel() {
            if(!selectedEmpForAdd) return alert("Please search and click a name from the dropdown first.");
            
            const btn = document.getElementById('pAddBtn');
            btn.innerText = "ADDING..."; btn.disabled = true;

            try {
                const head = orders.find(o => o.to_no === activeTO);
                const row = { 
                    to_no: head.to_no, emp_name: selectedEmpForAdd.n, unit: selectedEmpForAdd.u, division: selectedEmpForAdd.d, 
                    transport: head.transport, received: head.received, driver: head.driver, remarks: head.remarks, status: head.status 
                };
                
                const { error } = await db.from('travel_orders').insert([row]);
                if(error) throw error;

                document.getElementById('pAdd').value = "";
                selectedEmpForAdd = null;
                await sync(); 
                await renderPList(); // Refresh the list inside the modal instantly
            } catch (e) {
                alert("Database Error: " + e.message);
            } finally {
                btn.innerText = "ADD PERSONNEL"; btn.disabled = false;
            }
        }

        async function doRemovePerson(id) { 
            await db.from('travel_orders').delete().eq('id', id); 
            await renderPList(); 
            sync();
        }

        // --- MANUAL BOOKING ---
        async function saveManual() {
            const n = document.getElementById('resN').value, d1 = document.getElementById('resD1').value, d2 = document.getElementById('resD2').value;
            const s = document.getElementById('resS').value, v = document.getElementById('resV').value, dr = document.getElementById('resDr').value;
            const r = document.getElementById('resR').value, p = document.getElementById('resP').value;
            const u = document.getElementById('resN').dataset.unit, dDiv = document.getElementById('resN').dataset.div;
            
            if(!n || !d1 || !p) return alert("Required Fields: Personnel, Start Date, Purpose.");
            
            const to = r || `RES-${Math.floor(Date.now()%10000)}`;
            await db.from('travel_orders').insert({ to_no: to, emp_name: n, unit: u, division: dDiv, transport: "GOV'T VEHICLE", received: v, driver: dr, remarks: s, status: "APPROVED" });
            
            let st = new Date(d1), en = new Date(d2 || d1);
            while(st <= en) {
                await db.from('itinerary').insert({ to_no: to, travel_date: st.toISOString().split('T')[0], destination: "MANUAL", purpose: p });
                st.setDate(st.getDate() + 1);
            }
            closeModal('bookModal'); sync();
            document.getElementById('resN').value = ''; document.getElementById('resD1').value = ''; document.getElementById('resD2').value = ''; document.getElementById('resR').value = ''; document.getElementById('resP').value = ''; document.getElementById('resDr').value = '';
        }

        function switchTab(t) { currentTab = t; renderDashboard(); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function setFilter(f) { scheduleFilter = f; renderSchedule(); }
    </script>
</body>
</html>
