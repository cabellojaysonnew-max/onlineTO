<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR CS I - Mobile Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --dar-green: #003811;
            --dar-light: #006400;
            --dar-gold: #D4AF37;
            --bg-main: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --danger: #dc2626;
            --success: #16a34a;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; background-color: var(--bg-main); color: var(--text-main); }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        .view { display: none; padding: 15px; padding-bottom: 120px; }
        .view.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .app-header { background: var(--dar-green); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--dar-gold); }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #e5e7eb; }
        
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-primary { background: var(--dar-green); }
        .btn-gold { background: var(--dar-gold); color: var(--dar-green); }
        .btn-danger { background: var(--danger); }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--dar-green); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 15px 0; text-align: center; color: #9ca3af; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--dar-gold); border-top: 3px solid var(--dar-gold); }

        .badge { font-size: 10px; padding: 3px 8px; border-radius: 12px; font-weight: bold; float: right; }
        .bg-approved { background: #ecfdf5; color: #166534; }
        .bg-pending { background: #fefce8; color: #854d0e; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 25px;">
            <div class="card" style="padding: 35px 25px; border-top: 6px solid var(--dar-gold);">
                <h2 style="color: var(--dar-green); text-align: center;">DAR PORTAL</h2>
                <input type="text" id="login-id" placeholder="Employee ID">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn btn-primary" onclick="handleLogin()">SECURE LOGIN</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-header">
            <div>
                <div id="user-name" style="font-weight: bold;">User</div>
                <div id="user-info" style="font-size: 10px; color: var(--dar-gold);">Division | Position</div>
            </div>
            <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; border-radius:4px; font-size:10px;">Logout</button>
        </div>

        <div id="status-view" class="view active">
            <h3 style="color: var(--dar-green);">My Applications</h3>
            <div id="status-list"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('status-view', this)">📋 Status</div>
        </div>
    </div>

    <script type="module">
        const supabaseUrl = 'https://ytfpiyfapvybihlngxks.supabase.co';
        const supabaseKey = 'sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;

        window.handleLogin = async function() {
            const id = document.getElementById('login-id').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const { data } = await supabase.from('employees').select('*').eq('emp_id', id).single();
            if (data && data.pass === pass) {
                currentUser = data;
                document.getElementById('user-name').innerText = data.full_name;
                document.getElementById('user-info').innerText = `${data.division} | ${data.position}`; 
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('app-screen').classList.add('active');
                loadStatus();
            } else { alert("Invalid Credentials"); }
        };

        // --- PDF LOGIC EXTRACTED FROM PYTHON ---
        window.generateOfficialPDF = async function(toNo) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const getAssetUrl = (file) => `${supabaseUrl}/storage/v1/object/public/assets/${file}`;

            try {
                // Fetch Data
                const { data: group_orders } = await supabase.from('travel_orders').select('*').eq('to_no', toNo);
                const { data: itin_list } = await supabase.from('itinerary').select('*').eq('to_no', toNo).order('travel_date');
                if(!group_orders.length) return;

                // Resolve Signatures via Username lookup
                const getSig = async (name) => {
                    if (!name || name.includes("___")) return null;
                    const { data } = await supabase.from('users').select('username').eq('full_name', name).single();
                    return data ? getAssetUrl(`${data.username}.png`) : null;
                };

                const t_unit = await getSig(group_orders[0].unithead_signed);
                const t_dc = await getSig(group_orders[0].dc_signed);
                const t_p2 = getAssetUrl("P2.png");
                const bg_img = getAssetUrl("bg_form.jpg");

                // Layout constants
                const filingDate = new Date(group_orders[0].created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${toNo}`;

                // Multi-Copy Loop
                const copies = [];
                group_orders.forEach(() => copies.push({ label: "ORIGINAL", esign: false }));
                copies.push({ label: "DUPLICATE", esign: true }, { label: "TRIPLICATE", esign: true });

                for (let i = 0; i < copies.length; i++) {
                    const copy = copies[i];
                    if (i > 0) doc.addPage();

                    // Background & Label
                    try { doc.addImage(bg_img, 'JPEG', 0, 0, 210, 297); } catch(e){}
                    doc.setFontSize(7); doc.text(copy.label, 185, 8, { align: 'center' });
                    doc.addImage(qrUrl, 'PNG', 175, 10, 25, 25);

                    // Header
                    doc.setFontSize(17); doc.setFont("helvetica", "bold");
                    doc.text(`TRAVEL ORDER NO. ${toNo}`, 105, 40, { align: 'center' });
                    doc.setFontSize(10); doc.setFont("helvetica", "normal");
                    doc.text(`Date: ${filingDate}`, 190, 48, { align: 'right' });

                    // Remarks (Red Text Logic)
                    if (group_orders[0].remarks === "PSO_OVERRIDE") {
                        doc.setTextColor(192, 0, 0); doc.setFont("helvetica", "bold");
                        doc.text("WITH EXISTING PSO/TO, SUBJECT FOR PARPO'S APPROVAL", 105, 55, { align: 'center' });
                    }
                    if (group_orders[0].transport === "GOV'T VEHICLE") {
                        doc.setTextColor(192, 0, 0); doc.setFont("helvetica", "bold");
                        doc.text("NOT VALID FOR TRANSPORTATION REIMBURSEMENT CLAIM", 105, 60, { align: 'center' });
                    }
                    doc.setTextColor(0, 0, 0);

                    // Personnel Details
                    doc.setFontSize(11); doc.text("NAME:", 15, 75);
                    doc.text(group_orders.map(o => o.emp_name.toUpperCase()).join(", "), 35, 75);
                    doc.line(35, 76, 195, 76);

                    // Destination & Dates
                    doc.setFontSize(10); doc.text("DESTINATION:", 15, 110);
                    const dests = itin_list.map(it => `${it.destination} - ${it.travel_date}`).join(", ");
                    doc.text(doc.splitTextToSize(dests, 150), 45, 110);
                    doc.line(45, 111, 195, 111);

                    // Checkboxes for Seminar Purpose
                    const purp = (itin_list[0]?.purpose || "").toUpperCase();
                    doc.setFontSize(8); doc.text("In case of seminar, indicate:", 15, 160);
                    const chk = (x, y, active) => { doc.rect(x, y, 4, 4); if(active) doc.text("X", x+1, y+3.5); };
                    chk(80, 157, purp.includes("LIVE IN")); doc.text("LIVE IN", 86, 160);
                    chk(110, 157, purp.includes("LIVE OUT")); doc.text("LIVE OUT", 116, 160);

                    // Electronic Signatures
                    if (copy.esign) {
                        if(t_unit) try { doc.addImage(t_unit, 'PNG', 30, 200, 35, 20); } catch(e){}
                        if(t_dc) try { doc.addImage(t_dc, 'PNG', 110, 200, 35, 20); } catch(e){}
                        try { doc.addImage(t_p2, 'PNG', 85, 245, 40, 20); } catch(e){}
                    }

                    // Signatory Names
                    doc.setFontSize(10);
                    doc.text(String(group_orders[0].unithead_signed || "").toUpperCase(), 45, 225, { align: 'center' });
                    doc.text(String(group_orders[0].dc_signed || "").toUpperCase(), 145, 225, { align: 'center' });
                    doc.setFontSize(11); doc.text("RICARDO C. GARCIA", 105, 275, { align: 'center' });
                }

                doc.save(`TO_${toNo}.pdf`);
            } catch(e) { alert("PDF Error: " + e.message); }
        };

        async function loadStatus() {
            const list = document.getElementById('status-list');
            const { data: tos } = await supabase.from('travel_orders').select('*').eq('emp_id', currentUser.emp_id).order('id', {ascending: false});
            list.innerHTML = tos.map(to => `
                <div class="card">
                    <span class="badge ${to.status === 'APPROVED' ? 'bg-approved' : 'bg-pending'}">${to.status}</span>
                    <strong>${to.to_no}</strong>
                    <div style="font-size:11px; margin-top:10px;">Destination: ${to.remarks || 'Official Business'}</div>
                    <button class="btn btn-primary" style="margin-top:10px; padding:8px;" onclick="generateOfficialPDF('${to.to_no}')">Print PDF</button>
                </div>
            `).join('');
        }

        window.switchTab = (id, el) => {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        };
    </script>
</body>
</html>
