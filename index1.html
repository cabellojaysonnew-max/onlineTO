<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAR CAM SUR 1 - Dispatch Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root {
            --dar-green: #003811;
            --dar-gold: #D4AF37;
        }
        body { background-color: #F3F4F6; font-family: 'Segoe UI', sans-serif; }
        .bg-dar { background-color: var(--dar-green); }
        .text-dar-gold { color: var(--dar-gold); }
        .border-dar-gold { border-color: var(--dar-gold); }
        .tab-active { border-bottom: 4px solid var(--dar-gold); color: var(--dar-gold); font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div id="login-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-dar">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-md mx-4">
            <div class="text-center mb-6">
                <h1 class="text-2xl font-bold text-dar">DAR CAM SUR 1</h1>
                <p class="text-gray-500 text-sm">Vehicle Dispatch Control</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-green-900">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded focus:outline-none focus:ring-2 focus:ring-green-900">
                <button onclick="handleLogin()" class="w-full bg-dar text-white p-3 rounded font-bold hover:bg-opacity-90 transition">ENTER SYSTEM</button>
            </div>
            <p id="login-error" class="text-red-500 text-sm mt-4 hidden text-center"></p>
        </div>
        <div class="text-white text-xs mt-8 opacity-50 text-center max-w-md px-4">
            <p>&copy; System Intellectual Property remains personally with the Developer.</p>
        </div>
    </div>

    <div id="main-app" class="hidden flex-col h-full">
        <header class="bg-dar text-white p-4 shadow-lg flex justify-between items-center">
            <div>
                <h1 class="font-bold text-lg leading-tight">DISPATCH CONTROL</h1>
                <p id="user-display" class="text-xs text-dar-gold uppercase tracking-widest"></p>
            </div>
            <button onclick="syncData()" class="p-2 bg-green-800 rounded-full hover:bg-green-700">
                <i class="fas fa-sync-alt"></i>
            </button>
        </header>

        <nav class="bg-dar text-white flex border-t border-green-900 sticky top-0 z-10">
            <button onclick="switchTab('pending')" id="tab-pending" class="flex-1 py-3 text-sm tab-active">PENDING</button>
            <button onclick="switchTab('dispatched')" id="tab-dispatched" class="flex-1 py-3 text-sm">DISPATCHED</button>
            <button onclick="switchTab('calendar')" id="tab-calendar" class="flex-1 py-3 text-sm">CALENDAR</button>
        </nav>

        <main class="flex-1 overflow-y-auto p-4 no-scrollbar pb-20">
            
            <div id="content-pending" class="space-y-4">
                <div class="bg-white p-4 rounded shadow border-l-4 border-dar-gold mb-4">
                    <h2 class="font-bold text-dar mb-2"><i class="fas fa-tasks mr-2"></i>Quick Assignment</h2>
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <select id="assign-veh" class="p-2 border rounded text-sm bg-gray-50">
                            <option value="">Select Vehicle</option>
                            <option>MAZDA</option><option>REVO</option><option>INNOVA</option><option>SKY</option><option>BLACK</option>
                        </select>
                        <select id="assign-drv" class="p-2 border rounded text-sm bg-gray-50">
                            <option value="">Select Driver</option>
                            <option>Driver 1</option><option>Driver 2</option><option>Driver 3</option><option>Driver 4</option><option>Driver 5</option>
                        </select>
                    </div>
                </div>
                <div id="pending-list" class="space-y-3">
                    </div>
            </div>

            <div id="content-dispatched" class="hidden space-y-3">
                <div class="flex gap-2 mb-4">
                    <input type="text" id="search-dispatch" placeholder="Search TO or Name..." class="flex-1 p-2 border rounded text-sm">
                    <button onclick="generateReport()" class="bg-dar text-white px-3 rounded"><i class="fas fa-file-pdf"></i></button>
                </div>
                <div id="dispatched-list" class="space-y-3"></div>
            </div>

            <div id="content-calendar" class="hidden">
                <div id="calendar-view" class="bg-white rounded shadow p-2 overflow-x-auto">
                    </div>
            </div>
        </main>
        
        <footer class="bg-white border-t p-2 text-center fixed bottom-0 w-full lg:hidden">
            <button onclick="location.reload()" class="text-red-600 text-sm font-bold">LOGOUT SYSTEM</button>
        </footer>
    </div>

    <script>
        // --- CONFIG ---
        const SB_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SB_KEY = "sb_secret_YNX-IJjveulE3N3gT_yBdA_6PzxoKdB"; 
        
        // FIXED: Browser-compatible Supabase initialization
        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let orders = [];
        let itinerary = [];
        let employees = [];

        // Helper: Format Date/Time to strictly use 12-hour format
        function formatTo12Hour(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleString('en-US', { 
                year: 'numeric', month: 'short', day: 'numeric', 
                hour: 'numeric', minute: '2-digit', hour12: true 
            });
        }

        // --- AUTH ---
        async function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const errEl = document.getElementById('login-error');
            
            errEl.classList.add('hidden');

            try {
                // Query the exact 'users' table structure
                const { data, error } = await supabaseClient
                    .table('users')
                    .select('id, username, password, role, division, full_name, unit')
                    .eq('username', u)
                    .eq('password', p)
                    .single();

                if (error) {
                    errEl.innerText = "Invalid credentials or network error.";
                    errEl.classList.remove('hidden');
                    return;
                }

                if (data) {
                    // Strict validation for VEHICLE_APPROVER role
                    if (data.role === 'VEHICLE_APPROVER') {
                        currentUser = data;
                        document.getElementById('login-screen').classList.add('hidden');
                        document.getElementById('main-app').classList.remove('hidden');
                        document.getElementById('user-display').innerText = `${data.full_name} (${data.role})`;
                        syncData();
                    } else {
                        errEl.innerText = "Access Denied: Account lacks VEHICLE_APPROVER privileges.";
                        errEl.classList.remove('hidden');
                    }
                }
            } catch (err) {
                errEl.innerText = "System error: " + err.message;
                errEl.classList.remove('hidden');
            }
        }

        // --- DATA SYNC ---
        async function syncData() {
            const ordReq = supabaseClient.table('travel_orders').select('*').eq('transport', "GOV'T VEHICLE");
            const itinReq = supabaseClient.table('itinerary').select('*');
            const empReq = supabaseClient.table('employees').select('*');

            const [ordRes, itinRes, empRes] = await Promise.all([ordReq, itinReq, empReq]);
            orders = ordRes.data || [];
            itinerary = itinRes.data || [];
            employees = empRes.data || [];
            
            renderPending();
            renderDispatched();
            renderCalendar();
        }

        // --- UI RENDERING ---
        function switchTab(tabId) {
            ['pending', 'dispatched', 'calendar'].forEach(t => {
                document.getElementById(`content-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active');
            });
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('tab-active');
        }

        function renderPending() {
            const container = document.getElementById('pending-list');
            const pending = orders.filter(o => o.status === 'PENDING_VEHICLE_APPROVER');
            
            container.innerHTML = pending.length ? '' : '<p class="text-center text-gray-400 py-10">No pending requests</p>';
            
            pending.forEach(o => {
                const itin = itinerary.find(i => i.to_no === o.to_no) || {};
                container.innerHTML += `
                    <div class="bg-white p-4 rounded shadow border-l-4 border-green-700 relative">
                        <span class="absolute top-2 right-2 text-[10px] font-bold text-gray-400">TO #${o.to_no}</span>
                        <h3 class="font-bold text-gray-800">${o.emp_name}</h3>
                        <p class="text-xs text-dar font-semibold mb-2 uppercase">${o.unit || 'NO UNIT'}</p>
                        <div class="text-sm text-gray-600 space-y-1">
                            <div><i class="far fa-calendar-alt mr-2"></i>${itin.travel_date || 'N/A'}</div>
                            <div class="italic"><i class="fas fa-map-marker-alt mr-2"></i>${itin.purpose || 'N/A'}</div>
                        </div>
                        <button onclick="approveOrder('${o.to_no}', '${o.emp_name}')" class="mt-4 w-full bg-dar text-white py-2 rounded text-sm font-bold">APPROVE & ASSIGN</button>
                    </div>
                `;
            });
        }

        async function approveOrder(toNo, empName) {
            const veh = document.getElementById('assign-veh').value;
            const drv = document.getElementById('assign-drv').value;

            if (!veh || !drv) {
                alert("Please select Vehicle and Driver first.");
                return;
            }

            const emp = employees.find(e => e.full_name === empName) || {};
            const unit = (emp.unit || '').toUpperCase();
            
            let nextStatus = "PENDING_UNIT_HEAD";
            if (unit === "PARPO") nextStatus = "PENDING_PARPO";
            else if (!unit || unit === "NULL") nextStatus = "PENDING_CHIEF";

            const { error } = await supabaseClient.table('travel_orders').update({
                received: veh,
                driver: drv,
                status: nextStatus
            }).eq('to_no', toNo);

            if (!error) {
                alert(`Approved! Routed to: ${nextStatus}`);
                syncData();
            } else {
                alert("Error updating order: " + error.message);
            }
        }

        function renderDispatched() {
            const container = document.getElementById('dispatched-list');
            const dispatched = orders.filter(o => o.status !== 'PENDING_VEHICLE_APPROVER');
            container.innerHTML = '';
            dispatched.forEach(o => {
                container.innerHTML += `
                    <div class="bg-white p-3 rounded shadow text-sm border-l-4 border-gray-300">
                        <div class="flex justify-between font-bold">
                            <span>${o.received} - ${o.driver}</span>
                            <span class="text-xs text-green-700">${o.status}</span>
                        </div>
                        <div class="text-gray-500 text-xs mt-1">${o.emp_name} • TO #${o.to_no}</div>
                    </div>
                `;
            });
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-view');
            container.innerHTML = '<p class="text-center text-xs p-4 text-gray-400">Weekly Grid rendering based on data...</p>';
        }

        async function generateReport() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("DAR CAM SUR 1 - DISPATCH MANIFEST", 14, 15);
            // 12-hour format used for the generated timestamp
            const now = new Date();
            const timeString = now.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).replace(':', '');
            doc.save(`Dispatch_${now.toISOString().slice(0,10)}_${timeString}.pdf`);
        }

    </script>
</body>
</html>
