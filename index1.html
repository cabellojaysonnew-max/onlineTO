<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR CS I - Mobile Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --dar-green: #003811;
            --dar-light: #006400;
            --dar-gold: #D4AF37;
            --bg-main: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #f59e0b;
            --info: #2563eb;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; background-color: var(--bg-main); color: var(--text-main); -webkit-tap-highlight-color: transparent; }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        .view { display: none; padding: 15px; padding-bottom: 120px; }
        .view.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .app-header { background: var(--dar-green); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--dar-gold); }
        .card { background: var(--card-bg); padding: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 12px; border: 1px solid #e5e7eb; }
        
        h4 { margin-top: 0; color: var(--dar-green); font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 8px; }
        label { display: block; font-size: 11px; font-weight: bold; color: var(--text-muted); margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; margin-bottom: 8px; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-primary { background: var(--dar-green); }
        .btn-gold { background: var(--dar-gold); color: var(--dar-green); }
        .btn-danger { background: var(--danger); }
        .btn-warning { background: var(--warning); }
        .btn-info { background: var(--info); }
        
        .action-group { display: flex; gap: 6px; margin-top: 10px; }
        .btn-small { padding: 8px; font-size: 11px; flex: 1; }

        /* CALENDAR CSS */
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: #f0f4f8; padding: 8px; border-radius: 8px; }
        .cal-nav button { background: var(--dar-green); color: white; border: none; border-radius: 4px; padding: 5px 15px; font-weight: bold; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .calendar-day { background: white; border-radius: 6px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; position: relative; border: 1px solid #eee; min-height: 45px; }
        .calendar-header { font-weight: bold; color: var(--dar-green); font-size: 10px; text-transform: uppercase; padding: 5px 0; text-align: center; }
        .dot-container { display: flex; gap: 2px; position: absolute; bottom: 3px; }
        .dot { width: 5px; height: 5px; border-radius: 50%; }
        .dot-to { background: var(--dar-green); }
        .dot-pso { background: var(--dar-gold); }
        .dot-holiday { background: var(--danger); }
        .today { border: 2px solid var(--dar-gold); font-weight: bold; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--dar-green); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 15px 0; text-align: center; color: #9ca3af; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--dar-gold); border-top: 3px solid var(--dar-gold); background: rgba(255,255,255,0.05); }

        .badge { font-size: 10px; padding: 3px 8px; border-radius: 12px; font-weight: bold; text-transform: uppercase; float: right; }
        .bg-pending { background: #fefce8; color: #854d0e; }
        .bg-approved { background: #ecfdf5; color: #166534; }
        .bg-cancelled { background: #fef2f2; color: #991b1b; }
        
        .search-results { background: white; border: 1px solid #ddd; border-radius: 8px; max-height: 150px; overflow-y: auto; margin-top: -10px; margin-bottom: 10px; display: none; }
        .search-row { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; cursor: pointer; }

        #qr-buffer { display: none; }
    </style>
</head>
<body>
    <div id="qr-buffer"></div>

    <div id="login-screen" class="screen active">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 25px;">
            <div style="background: white; padding: 35px 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--dar-gold);">
                <h2 style="color: var(--dar-green); text-align: center; margin: 0;">DAR PORTAL</h2>
                <input type="text" id="login-id" placeholder="Employee ID" inputmode="numeric">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn btn-primary" onclick="handleLogin()">SECURE LOGIN</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-header">
            <div>
                <div id="user-name" style="font-weight: bold; font-size: 14px;">User</div>
                <div id="user-info" style="font-size: 10px; color: var(--dar-gold); font-weight: bold;">Division | Position</div>
            </div>
            <button onclick="location.reload()" style="background: none; border: 1px solid white; color: white; border-radius: 4px; padding: 4px 8px; font-size: 11px;">Logout</button>
        </div>

        <div id="apply-view" class="view active">
            <div class="card">
                <h4>1. Personnel (Max 5)</h4>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="emp-search" placeholder="Search Name or ID" style="margin-bottom: 0;">
                    <button class="btn btn-primary" style="width: 70px; padding:0;" onclick="searchEmployees()">Find</button>
                </div>
                <div id="search-results" class="search-results"></div>
                <div id="personnel-draft-list" style="margin-top: 10px;"></div>
            </div>

            <div class="card">
                <h4>2. Logistics</h4>
                <label>Means of Transportation</label>
                <select id="to-transport">
                    <option value="LAND">Public Utility (LAND)</option>
                    <option value="GOV'T VEHICLE">Gov't Vehicle</option>
                    <option value="AIR">Air Travel</option>
                    <option value="OTHERS">Others</option>
                </select>
            </div>

            <div class="card">
                <h4>3. Itinerary Builder</h4>
                <label>Date</label>
                <input type="date" id="itin-date">
                <label>Destination</label>
                <input type="text" id="itin-dest" placeholder="Where to?">
                <label>Detailed Purpose</label>
                <textarea id="itin-purp" rows="2" placeholder="Official business description..."></textarea>
                <label>Report To (Required)</label>
                <input type="text" id="to-report" placeholder="e.g. Division Chief">
                <button class="btn btn-primary" onclick="addItinDraft()">+ Add Date</button>
                <div id="itin-draft-list" style="margin-top: 10px;"></div>
            </div>
            <button class="btn btn-gold" onclick="submitTO()">🚀 SUBMIT OFFICIAL REQUEST</button>
        </div>

        <div id="status-view" class="view">
            <h3 style="color: var(--dar-green);">My Applications</h3>
            <div id="status-list"></div>
        </div>

        <div id="calendar-view" class="view">
            <h3 style="color: var(--dar-green);">Personal Schedule</h3>
            <div class="card">
                <div class="cal-nav">
                    <button onclick="changeCalMonth(-1)">&lt;</button>
                    <div id="cal-month-year" style="font-weight: bold; color: var(--dar-green);"></div>
                    <button onclick="changeCalMonth(1)">&gt;</button>
                </div>
                <div class="calendar-grid" id="cal-header"></div>
                <div class="calendar-grid" id="cal-body"></div>
                <div style="margin-top: 20px; display: flex; justify-content: center; gap: 12px; font-size: 10px;">
                    <span><span class="dot dot-to" style="display:inline-block;"></span> Travel</span>
                    <span><span class="dot dot-pso" style="display:inline-block;"></span> PSO</span>
                    <span><span class="dot dot-holiday" style="display:inline-block;"></span> Holiday</span>
                </div>
            </div>
            <div id="day-details" class="card" style="display:none; border-left: 5px solid var(--dar-gold); font-size:12px;"></div>
        </div>

        <div id="security-view" class="view">
            <div class="card">
                <h4>Update Password</h4>
                <input type="password" id="pass-curr" placeholder="Current Password">
                <input type="password" id="pass-new" placeholder="New Password">
                <button class="btn btn-primary" onclick="changePassword()">UPDATE</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('apply-view', this)">📝 Apply</div>
            <div class="nav-item" onclick="switchTab('status-view', this)">📋 Status</div>
            <div class="nav-item" onclick="switchTab('calendar-view', this)">📅 Calendar</div>
            <div class="nav-item" onclick="switchTab('security-view', this)">🔒 Security</div>
        </div>
    </div>

    <script type="module">
        const supabaseUrl = 'https://ytfpiyfapvybihlngxks.supabase.co';
        const supabaseKey = 'sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let itineraryDraft = [];
        let personnelDraft = [];
        const todayStr = new Date().toISOString().split('T')[0];
        let calDate = new Date();

        async function getAssetDataURL(filename) {
            try {
                const { data, error } = await supabase.storage.from('e-sign').download(filename);
                if (error) throw error;
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(data);
                });
            } catch (e) { return null; }
        }

        function generateQRDataURL(text) {
            const buffer = document.getElementById('qr-buffer');
            buffer.innerHTML = "";
            const qr = new QRCode(buffer, { text: text, width: 128, height: 128 });
            return new Promise((resolve) => {
                setTimeout(() => {
                    const canvas = buffer.querySelector('canvas');
                    resolve(canvas ? canvas.toDataURL("image/png") : null);
                }, 150);
            });
        }

        // --- PDF GENERATION: 2-INCH RIGHT MARGIN & CENTERED TO NO ---
        window.printOfficialTO = async function(toNo) {
            alert("Preparing Official PDF...");
            const { data: to } = await supabase.from('travel_orders').select('*').eq('to_no', toNo).single();
            const { data: itin } = await supabase.from('itinerary').select('*').eq('to_no', toNo).order('travel_date');
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const bgImg = await getAssetDataURL('bg_form.jpg');
            const p2Sig = await getAssetDataURL('P2.png');
            const qrData = await generateQRDataURL(toNo);

            const copies = ["ORIGINAL", "DUPLICATE", "TRIPLICATE"];
            const limitX = 159.2; // 210mm - 2 inches

            for (let i = 0; i < copies.length; i++) {
                if (i > 0) doc.addPage();
                if (bgImg) doc.addImage(bgImg, 'JPEG', 0, 0, 210, 297);

                doc.setFontSize(7); doc.setFont("helvetica", "italic");
                doc.text(copies[i], 200, 8, { align: "right" });
                if (qrData) doc.addImage(qrData, 'PNG', 178, 10, 22, 22); // Right QR

                doc.setFontSize(16); doc.setFont("helvetica", "bold");
                doc.text(`TRAVEL ORDER NO. ${toNo}`, 105, 42, { align: "center" }); // Centered

                doc.setTextColor(0, 0, 0); doc.setFontSize(11);

                // FIELD DATA (SINGLE SPACING)
                doc.setFont("helvetica", "bold"); doc.text("NAME:", 15, 60);
                doc.setFont("helvetica", "normal"); doc.text(to.emp_name.toUpperCase(), 40, 60);
                doc.line(40, 61, limitX, 61);

                doc.setFont("helvetica", "bold"); doc.text("DESTINATION:", 15, 70);
                doc.setFont("helvetica", "normal");
                const dests = itin.map(x => x.destination).join(", ");
                doc.text(dests, 45, 70, { maxWidth: 110 });
                doc.line(45, 71, limitX, 71);

                const start = itin[0]?.travel_date || "";
                const end = itin[itin.length - 1]?.travel_date || "";
                doc.setFont("helvetica", "bold");
                doc.text("DEPARTURE:", 15, 80); doc.setFont("helvetica", "normal"); doc.text(start, 45, 80);
                
                doc.setFont("helvetica", "bold");
                doc.text("RETURN:", 90, 80); doc.setFont("helvetica", "normal"); 
                doc.text(end, limitX, 80, { align: "right" });

                doc.setFont("helvetica", "bold"); doc.text("REPORT TO:", 15, 90);
                doc.setFont("helvetica", "normal"); doc.text(to.report_to.toUpperCase(), 45, 90);
                doc.line(45, 91, limitX, 91);

                doc.setFont("helvetica", "bold"); doc.text("PURPOSE:", 15, 100);
                doc.setFont("helvetica", "normal");
                doc.text(itin[0]?.purpose || "", 40, 100, { maxWidth: 115 });

                doc.setFont("helvetica", "bold"); doc.text("Recommended by:", 15, 120);
                doc.text(to.unithead_signed || "AUTHORIZED OFFICIAL", 45, 140, { align: "center" });

                if (p2Sig) doc.addImage(p2Sig, 'PNG', 110, 150, 30, 20);
                doc.setFontSize(11); doc.text("RICARDO C. GARCIA", 125, 175, { align: "center" });
                doc.setFontSize(9); doc.text("PARPO II", 125, 179, { align: "center" });
            }
            doc.save(`TO_${toNo}.pdf`);
        };

        window.handleLogin = async function() {
            const id = document.getElementById('login-id').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const { data } = await supabase.from('employees').select('*').eq('emp_id', id).single();
            if (data && data.pass === pass) {
                currentUser = data;
                document.getElementById('user-name').innerText = data.full_name;
                document.getElementById('user-info').innerText = `${data.division} | ${data.position}`; 
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('app-screen').classList.add('active');
                personnelDraft = [{ emp_id: data.emp_id, name: data.full_name, unit: data.unit }];
                renderPersonnel();
            } else { alert("Invalid Credentials"); }
        };

        window.switchTab = function(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            if (id === 'status-view') loadStatus();
            if (id === 'calendar-view') renderCalendar();
        };

        window.searchEmployees = async function() {
            const term = document.getElementById('emp-search').value;
            if (term.length < 2) return;
            const { data } = await supabase.from('employees').select('emp_id, full_name, unit').or(`full_name.ilike.%${term}%,emp_id.eq.${term}`).limit(5);
            const resDiv = document.getElementById('search-results');
            resDiv.innerHTML = ''; resDiv.style.display = 'block';
            data.forEach(emp => {
                const row = document.createElement('div'); row.className = 'search-row';
                row.innerHTML = `${emp.full_name} (${emp.emp_id})`;
                row.onclick = () => {
                    if (personnelDraft.length >= 5) return alert("Max 5 Personnel");
                    if (!personnelDraft.some(p => p.emp_id === emp.emp_id)) {
                        personnelDraft.push({ emp_id: emp.emp_id, name: emp.full_name, unit: emp.unit });
                    }
                    resDiv.style.display = 'none'; document.getElementById('emp-search').value = ''; renderPersonnel();
                };
                resDiv.appendChild(row);
            });
        };

        function renderPersonnel() {
            const list = document.getElementById('personnel-draft-list');
            list.innerHTML = personnelDraft.map((p, i) => `
                <div style="display:flex; justify-content:space-between; align-items:center; background:#f0f4f8; padding:8px 12px; border-radius:8px; margin-bottom:5px; font-size:13px;">
                    <span>👤 ${p.name}</span>
                    ${p.emp_id !== currentUser.emp_id ? `<button class="btn-danger" style="padding:2px 8px;" onclick="removePersonnel(${i})">X</button>` : ''}
                </div>`).join('');
        }
        window.removePersonnel = (i) => { personnelDraft.splice(i,1); renderPersonnel(); };

        window.addItinDraft = function() {
            const date = document.getElementById('itin-date').value;
            const dest = document.getElementById('itin-dest').value.trim();
            const purp = document.getElementById('itin-purp').value.trim();
            if(!date || !dest || !purp) return alert("Fill all fields.");
            itineraryDraft.push({ date, dest, purp });
            document.getElementById('itin-dest').value = ''; document.getElementById('itin-purp').value = '';
            renderItinerary();
        };

        function renderItinerary() {
            const list = document.getElementById('itin-draft-list');
            list.innerHTML = itineraryDraft.map((it, i) => `
                <div class="card" style="padding:10px; font-size:12px; border-left: 4px solid var(--dar-green);">
                    <div style="display:flex; justify-content:space-between;"><strong>📅 ${it.date}</strong><span style="color:red;" onclick="removeItin(${i})">Del</span></div>
                    <div>📍 ${it.dest}</div>
                </div>`).join('');
        }
        window.removeItin = (i) => { itineraryDraft.splice(i,1); renderItinerary(); };

        window.submitTO = async function() {
            if (itineraryDraft.length === 0) return alert("Itinerary is empty.");
            const reportTo = document.getElementById('to-report').value.trim();
            if (!reportTo) return alert("Report To is required.");
            try {
                const finalToNo = await generateToNo(); 
                const batchPersonnel = personnelDraft.map(p => ({
                    to_no: finalToNo, emp_id: p.emp_id, emp_name: p.name, unit: p.unit, 
                    division: currentUser.division, status: "PENDING_UNIT_HEAD", 
                    transport: document.getElementById('to-transport').value, report_to: reportTo, remarks: ""
                }));
                const batchItin = itineraryDraft.map(it => ({ to_no: finalToNo, travel_date: it.date, destination: it.dest, purpose: it.purp }));
                await supabase.from('travel_orders').insert(batchPersonnel);
                await supabase.from('itinerary').insert(batchItin);
                alert("Submitted: " + finalToNo); 
                itineraryDraft = []; 
                document.getElementById('to-report').value = "";
                renderItinerary();
                switchTab('status-view', document.querySelectorAll('.nav-item')[1]);
            } catch(e) { alert("Error: " + e.message); }
        };

        async function generateToNo() {
            const year = new Date().getFullYear();
            const div = (currentUser.division || "GEN").substring(0, 5).toUpperCase();
            const { data } = await supabase.from('travel_orders').select('to_no').like('to_no', `${year}-${div}-%`).order('to_no', { ascending: false }).limit(1);
            let seq = (data && data[0]) ? parseInt(data[0].to_no.split('-')[2]) + 1 : 1;
            return `${year}-${div}-${String(seq).padStart(5, '0')}`;
        }

        window.deletePendingTO = async function(toNo) {
            if(!confirm(`Delete Pending TO ${toNo}?`)) return;
            await supabase.from('itinerary').delete().eq('to_no', toNo);
            await supabase.from('travel_orders').delete().eq('to_no', toNo);
            loadStatus();
        };

        window.cancelApprovedTO = async function(toNo) {
            if(!confirm(`Cancel Approved TO ${toNo}?`)) return;
            await supabase.from('travel_orders').update({ status: 'CANCELLED' }).eq('to_no', toNo);
            loadStatus();
        };

        async function loadStatus() {
            const list = document.getElementById('status-list'); list.innerHTML = "Fetching...";
            const { data: tos } = await supabase.from('travel_orders').select('*').eq('emp_id', currentUser.emp_id).order('to_no', {ascending: false});
            let html = '';
            for(let to of tos || []) {
                const { data: itin } = await supabase.from('itinerary').select('*').eq('to_no', to.to_no);
                const status = (to.status || "").toUpperCase();
                const sCls = status === 'APPROVED' ? 'bg-approved' : (status.includes('CANCEL') ? 'bg-cancelled' : 'bg-pending');
                html += `
                    <div class="card">
                        <span class="badge ${sCls}">${to.status}</span>
                        <div style="font-weight:bold;">${to.to_no}</div>
                        <div style="margin-top:8px;">
                            ${itin?.map(i => `<div style="font-size:11px;">📅 ${i.travel_date} | 📍 ${i.destination}</div>`).join('')}
                        </div>
                        <div class="action-group">
                            ${status === 'APPROVED' ? `
                                <button class="btn btn-info btn-small" onclick="printOfficialTO('${to.to_no}')">🖨️ Print</button>
                                <button class="btn btn-danger btn-small" onclick="cancelApprovedTO('${to.to_no}')">🚫 Cancel</button>
                            ` : ''}
                            ${status.includes('PENDING') ? `
                                <button class="btn btn-danger btn-small" onclick="deletePendingTO('${to.to_no}')">🗑️ Delete</button>
                            ` : ''}
                        </div>
                    </div>`;
            }
            list.innerHTML = html || "No records found.";
        }

        // --- CALENDAR LOGIC RESTORED & ENHANCED ---
        window.changeCalMonth = function(delta) { calDate.setMonth(calDate.getMonth() + delta); renderCalendar(); };

        async function renderCalendar() {
            const month = calDate.getMonth(), year = calDate.getFullYear();
            document.getElementById('cal-month-year').innerText = calDate.toLocaleString('default', { month: 'long', year: 'numeric' });
            
            const { data: myTOs } = await supabase.from('travel_orders').select('to_no').eq('emp_id', currentUser.emp_id).not('status', 'ilike', '%CANCELLED%');
            const myToNos = myTOs?.map(t => t.to_no) || [];
            const { data: itins } = await supabase.from('itinerary').select('travel_date').in('to_no', myToNos);
            const { data: psos } = await supabase.from('pso_records').select('start_date, end_date').eq('emp_id', currentUser.emp_id);
            const { data: holidays } = await supabase.from('holidays').select('*');

            const header = document.getElementById('cal-header'); const body = document.getElementById('cal-body');
            header.innerHTML = ['S', 'M', 'T', 'W', 'T', 'F', 'S'].map(d => `<div class="calendar-header">${d}</div>`).join('');
            body.innerHTML = '';

            const first = new Date(year, month, 1).getDay(); const last = new Date(year, month + 1, 0).getDate();
            for(let i=0; i<first; i++) body.innerHTML += '<div></div>';
            for(let d=1; d<=last; d++) {
                const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const hasTO = itins?.some(i => i.travel_date === ds);
                const hasPSO = psos?.some(p => ds >= p.start_date && ds <= p.end_date);
                const holiday = holidays?.find(h => h.date === ds);

                body.innerHTML += `
                    <div class="calendar-day ${ds === todayStr ? 'today' : ''}" onclick="showDayInfo('${ds}')">
                        ${d}
                        <div class="dot-container">
                            ${hasTO ? '<div class="dot dot-to"></div>' : ''}
                            ${hasPSO ? '<div class="dot dot-pso"></div>' : ''}
                            ${holiday ? '<div class="dot dot-holiday"></div>' : ''}
                        </div>
                    </div>`;
            }
        }

        window.showDayInfo = async function(date) {
            const info = document.getElementById('day-details');
            const { data: myTOs } = await supabase.from('travel_orders').select('to_no').eq('emp_id', currentUser.emp_id).not('status', 'ilike', '%CANCELLED%');
            const myToNumbers = myTOs?.map(t => t.to_no) || [];
            const { data: itins } = await supabase.from('itinerary').select('to_no, destination').in('to_no', myToNumbers).eq('travel_date', date);
            const { data: hol } = await supabase.from('holidays').select('remarks').eq('date', date).single();
            const { data: psos } = await supabase.from('pso_records').select('subject').eq('emp_id', currentUser.emp_id).lte('start_date', date).gte('end_date', date);

            let html = `<strong>${date}</strong><hr style="border:none; border-top:1px solid #eee;">`;
            if(hol) html += `<div style="color:var(--danger); margin-bottom:8px; font-weight:bold;">🚩 Holiday: ${hol.remarks}</div>`; 
            if(psos?.length) psos.forEach(p => html += `<div style="color:var(--dar-gold); margin-bottom:8px;">📌 PSO: ${p.subject}</div>`);
            if(itins?.length) itins.forEach(i => html += `<div style="margin-bottom:8px;">🛫 Travel Order: ${i.destination}</div>`);
            
            if(!hol && !itins?.length && !psos?.length) html += "No activities scheduled.";
            
            info.innerHTML = html; info.style.display = 'block';
        };
    </script>
</body>
</html>
