<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR Fleet Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dar-green: #003811; --dar-gold: #D4AF37; }
        body { background: #f3f4f6; font-family: -apple-system, sans-serif; }
        .bg-dar { background: var(--dar-green); }
        .text-dar { color: var(--dar-green); }
        ::-webkit-scrollbar { display: none; }
        
        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100% !important; }
            .card { border: 1px solid #000 !important; margin-bottom: 10px; break-inside: avoid; padding: 15px; }
            .print-title { display: block !important; text-align: center; margin-bottom: 20px; font-weight: bold; }
        }
        .print-title { display: none; }
        .search-box { position: absolute; width: 100%; z-index: 100; background: white; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="error-boundary" class="hidden p-6 bg-red-100 text-red-800 font-bold text-center z-50 fixed w-full top-0"></div>
    
    <div id="app">
        <div class="h-screen flex items-center justify-center p-6 bg-dar">
            <div class="bg-white p-8 rounded-3xl w-full max-w-sm shadow-2xl">
                <h1 class="text-2xl font-bold text-dar mb-2 text-center uppercase tracking-tighter">Fleet Console</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-6 text-center">Cam Sur 1 Official Login</p>
                <input id="un" type="text" placeholder="Username" class="w-full p-4 bg-gray-50 border rounded-2xl mb-4 outline-none">
                <input id="pw" type="password" placeholder="Password" class="w-full p-4 bg-gray-50 border rounded-2xl mb-6 outline-none">
                <button onclick="handleLogin()" class="w-full bg-dar text-white p-4 rounded-2xl font-bold shadow-lg uppercase text-sm">Log In</button>
            </div>
        </div>
    </div>

    <script>
        // --- GLOBAL ERROR CATCHER ---
        window.onerror = function(message, source, lineno, colno, error) {
            const errDiv = document.getElementById('error-boundary');
            errDiv.innerHTML = `System Error: ${message} (Line ${lineno})`;
            errDiv.classList.remove('hidden');
        };

        const SB_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SB_KEY = "sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo"; 
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        const VEHICLES = ["MAZDA", "REVO", "INNOVA", "SKY", "BLACK"];
        const DRIVERS = ["Driver 1", "Driver 2", "Driver 3", "Driver 4", "Driver 5"];

        let user = null;
        let tab = 'inbox'; 
        let emps = [], orders = [], itins = [];
        let viewFilter = 'day';

        // --- 1. CORE LOGIC ---
        async function logAction(to, app, act, date = "N/A") {
            await supabase.from('vehicle_logs').insert({ to_no: to, applicant: app, travel_date: date, action: act });
        }

        function getRoutingStatus(unit) {
            const u = (unit || "").toUpperCase();
            if (u === "PARPO") return "PENDING_PARPO";
            return (u && u !== "NULL" && u !== "NAN") ? "PENDING_UNIT_HEAD" : "PENDING_CHIEF";
        }

        async function handleLogin() {
            const u = document.getElementById('un').value.trim();
            const p = document.getElementById('pw').value.trim();
            try {
                const { data, error } = await supabase.from('users').select('*');
                if (error) throw error;
                
                const found = data.find(x => x.username === u && String(x.password) === String(p));
                
                if (found && found.role === 'VEHICLE_APPROVER') { 
                    user = found; 
                    const {data: e} = await supabase.from('employees').select('full_name, unit, division');
                    emps = e || []; 
                    renderDashboard(); 
                } else {
                    alert("Invalid Credentials or Role.");
                }
            } catch(e) { alert("Login Error: " + e.message); }
        }

        async function sync() {
            try {
                const [o, i] = await Promise.all([
                    supabase.from('travel_orders').select('*').neq('status','CANCELLED'), 
                    supabase.from('itinerary').select('*')
                ]);
                orders = o.data || []; 
                itins = i.data || [];
                
                if(tab === 'inbox') renderInbox();
                else if(tab === 'manifest') renderManifest();
                else renderSchedule();
            } catch(e) { console.error("Sync error", e); }
        }

        // --- 2. UI ENGINE ---
        function renderDashboard() {
            document.getElementById('app').innerHTML = `
            <div class="flex flex-col h-screen overflow-hidden">
                <header class="bg-dar text-white p-4 flex justify-between items-center no-print shadow-md">
                    <div class="leading-none"><span class="block font-bold text-sm uppercase">${user.full_name}</span><span class="text-[9px] text-dar-gold font-bold">DISPATCHER CONSOLE</span></div>
                    <div class="flex gap-4"><button onclick="sync()" class="text-xl">🔄</button><button onclick="location.reload()" class="text-xs bg-white/20 px-3 py-1 rounded-full font-bold">Logout</button></div>
                </header>

                <nav class="bg-white border-b flex no-print">
                    <button onclick="switchTab('inbox')" class="flex-1 p-4 text-[10px] font-black ${tab==='inbox'?'border-b-4 border-green-900 text-dar':'text-gray-400'} uppercase">Inbox</button>
                    <button onclick="switchTab('manifest')" class="flex-1 p-4 text-[10px] font-black ${tab==='manifest'?'border-b-4 border-green-900 text-dar':'text-gray-400'} uppercase">Manifest</button>
                    <button onclick="switchTab('schedule')" class="flex-1 p-4 text-[10px] font-black ${tab==='schedule'?'border-b-4 border-green-900 text-dar':'text-gray-400'} uppercase">Fleet View</button>
                </nav>

                <main id="main-content" class="flex-1 overflow-y-auto p-4 print-area no-scrollbar"></main>

                <footer class="p-4 no-print bg-white border-t flex gap-2">
                    <button onclick="openModal('bookModal')" class="flex-1 bg-dar text-white p-4 rounded-2xl font-bold text-xs uppercase shadow-lg">+ Manual Booking</button>
                </footer>
            </div>
            ${modalTemplates()}`;
            sync();
        }

        function modalTemplates() {
            return `
            <div id="bookModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 no-print">
                <div class="bg-white p-6 rounded-3xl w-full max-w-sm relative">
                    <button onclick="closeModal('bookModal')" class="absolute top-4 right-4 text-xl">✕</button>
                    <h2 class="font-bold text-dar uppercase text-sm mb-4">New Reservation</h2>
                    <div class="space-y-3">
                        <div class="relative"><input id="resN" oninput="liveSearch(this, 'resResults')" placeholder="Lead Personnel" class="w-full p-3 border rounded-xl text-sm outline-none"><div id="resResults" class="search-box hidden"></div></div>
                        <div class="flex gap-2"><input id="resD1" type="date" class="flex-1 p-3 border rounded-xl text-xs"><input id="resD2" type="date" class="flex-1 p-3 border rounded-xl text-xs"></div>
                        <select id="resS" class="w-full p-3 border rounded-xl text-sm"><option>WHOLE DAY</option><option>AM</option><option>PM</option></select>
                        <select id="resV" class="w-full p-3 border rounded-xl text-sm">${VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select>
                        <input id="resDr" list="dl" placeholder="Driver (Editable)" class="w-full p-3 border rounded-xl text-sm outline-none">
                        <input id="resR" placeholder="PSO / RSO / SO #" class="w-full p-3 border rounded-xl text-sm outline-none">
                        <input id="resP" placeholder="Purpose" class="w-full p-3 border rounded-xl text-sm outline-none">
                        <button onclick="saveManual()" class="w-full bg-dar text-white p-4 rounded-2xl font-bold uppercase text-xs">Confirm Booking</button>
                    </div>
                </div>
            </div>

            <div id="peopleModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 no-print">
                <div class="bg-white p-6 rounded-3xl w-full max-w-sm">
                    <div class="flex justify-between mb-4"><h2 id="pTitle" class="font-bold text-dar text-xs uppercase tracking-tighter">Personnel</h2><button onclick="closeModal('peopleModal')" class="font-bold">✕</button></div>
                    <div id="pList" class="space-y-2 mb-4 max-h-48 overflow-y-auto pr-2"></div>
                    <div class="relative border-t pt-4"><input id="pAdd" oninput="liveSearch(this, 'pResults')" placeholder="Search and Add Person..." class="w-full p-3 border rounded-xl text-sm outline-none"><div id="pResults" class="search-box hidden bottom-full mb-1"></div></div>
                </div>
            </div>

            <div id="transferModal" class="hidden fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 no-print">
                <div class="bg-white p-6 rounded-3xl w-full max-w-sm shadow-2xl">
                    <h2 class="font-bold text-dar text-xs uppercase mb-1">Smart Transfer</h2>
                    <p class="text-[9px] text-gray-400 mb-4 font-bold uppercase" id="tDetails"></p>
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Available Fleet for these dates:</label>
                        <select id="tSelect" class="w-full p-4 border rounded-2xl text-sm outline-none bg-gray-50 font-bold"></select>
                    </div>
                    <button id="tExec" class="w-full bg-dar text-white p-4 rounded-2xl font-bold uppercase text-xs mt-4">Transfer or Join Deployment</button>
                </div>
            </div>

            <datalist id="dl">${DRIVERS.map(d=>`<option value="${d}">`).join('')}</datalist>`;
        }

        // --- 3. TAB LOGIC ---
        function renderInbox() {
            const m = document.getElementById('main-content');
            const items = orders.filter(x => x.status === 'PENDING_VEHICLE_APPROVER' && x.transport === "GOV'T VEHICLE");
            if (!items.length) { m.innerHTML = `<div class="p-20 text-center opacity-20 uppercase font-black text-xs">Inbox Clear</div>`; return; }
            
            m.innerHTML = items.map(o => {
                const itin = itins.find(i => i.to_no === o.to_no) || {travel_date: 'N/A'};
                return `
                <div class="bg-white p-5 rounded-3xl shadow-sm mb-4 border border-dar-gold/20">
                    <div class="flex justify-between mb-2"><span class="text-[9px] font-black text-gray-400 uppercase">#${o.to_no}</span><button onclick="toLand('${o.to_no}','${o.unit}')" class="text-blue-600 text-[9px] font-bold underline uppercase">Change to LAND</button></div>
                    <p class="font-bold text-gray-800 text-sm leading-tight">${o.emp_name}</p>
                    <p class="text-[10px] text-dar font-bold mt-1 uppercase tracking-tighter">📅 ${itin.travel_date}</p>
                    <div class="mt-4 grid grid-cols-2 gap-2">
                        <select id="v-${o.to_no}" class="p-3 border rounded-xl text-xs bg-gray-50 font-bold text-dar">${VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select>
                        <select id="s-${o.to_no}" class="p-3 border rounded-xl text-xs bg-gray-50 font-bold"><option>WHOLE DAY</option><option>AM</option><option>PM</option></select>
                        <input id="d-${o.to_no}" list="dl" placeholder="Driver Name" class="col-span-2 p-3 border rounded-xl text-xs font-bold bg-gray-50 outline-none">
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="toLand('${o.to_no}','${o.unit}')" class="flex-1 bg-red-50 text-red-600 py-4 rounded-2xl text-[10px] font-bold">REJECT</button>
                        <button onclick="approveDispatch('${o.to_no}','${o.unit}','${o.emp_name.replace(/'/g, "\\'")}')" class="flex-[2] bg-dar text-white py-4 rounded-2xl text-[10px] font-bold shadow-lg">APPROVE & DISPATCH</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function approveDispatch(to, unit, applicant) {
            const v = document.getElementById(`v-${to}`).value, s = document.getElementById(`s-${to}`).value, d = document.getElementById(`d-${to}`).value || "TBD";
            const next = getRoutingStatus(unit);
            await supabase.from('travel_orders').update({ received: v, driver: d, remarks: s, status: next }).eq('to_no', to);
            await logAction(to, applicant, `Approved Vehicle ${v} (${s}) - Driver: ${d}`);
            sync();
        }

        async function toLand(to, unit) {
            if(!confirm("Switch to LAND? This resets the routing process.")) return;
            const next = getRoutingStatus(unit);
            await supabase.from('travel_orders').update({ transport: 'LAND', status: next, received: null, driver: null }).eq('to_no', to);
            sync();
        }

        function renderManifest() {
            const m = document.getElementById('main-content');
            const data = orders.filter(x => x.transport === "GOV'T VEHICLE" && x.status !== 'PENDING_VEHICLE_APPROVER');
            
            if (data.length === 0) { m.innerHTML = `<div class="p-20 text-center opacity-20 uppercase font-black text-xs">No Active Deployments</div>`; return; }

            const grp = {}; data.forEach(x => { if(!grp[x.to_no]) grp[x.to_no] = []; grp[x.to_no].push(x); });
            m.innerHTML = Object.entries(grp).map(([to, list]) => `
            <div class="bg-white p-5 rounded-3xl shadow-sm mb-3 border-l-4 border-dar">
                <div class="flex justify-between items-start mb-2"><span class="text-[9px] font-black text-gray-400 uppercase">TO #${to}</span><span class="text-[8px] bg-green-50 text-dar font-black px-2 py-0.5 rounded uppercase">${list[0].remarks||'WHOLE'}</span></div>
                <p class="font-bold text-sm text-gray-800">${list[0].emp_name}</p>
                <p class="text-[10px] text-gray-400 uppercase font-bold">🚙 ${list[0].received || 'N/A'} | 👤 ${list[0].driver || 'N/A'}</p>
                <div class="flex gap-2 mt-4">
                    <button onclick="handleCancel('${to}','${list[0].status}')" class="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-[9px] font-bold uppercase">Cancel</button>
                    <button onclick="managePeople('${to}')" class="bg-gray-100 text-dar px-4 py-2 rounded-xl text-[9px] font-bold uppercase">Manage People (${list.length})</button>
                </div>
            </div>`).join('');
        }

        async function handleCancel(to, status) {
            if(!confirm("Cancel Deployment?")) return;
            if(status === 'APPROVED') await supabase.from('travel_orders').update({ transport: 'LAND' }).eq('to_no', to);
            else await supabase.from('travel_orders').update({ transport: 'LAND', status: 'PENDING_UNIT_HEAD' }).eq('to_no', to);
            sync();
        }

        // --- 4. SCHEDULE & FEATURE 8 (Smart Transfer) ---
        function renderSchedule() {
            const m = document.getElementById('main-content');
            
            // Safe Date Filtering
            const now = new Date(); now.setHours(0,0,0,0);
            const filteredItins = itins.filter(i => {
                if(!i || !i.travel_date) return false;
                const d = new Date(i.travel_date); d.setHours(0,0,0,0);
                if (viewFilter === 'day') return d.getTime() === now.getTime();
                if (viewFilter === 'week') {
                    const s = new Date(now); s.setDate(now.getDate() - now.getDay());
                    const e = new Date(s); e.setDate(s.getDate() + 6);
                    return d >= s && d <= e;
                }
                if (viewFilter === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                return true;
            });
            const validToNos = filteredItins.map(i => i.to_no);

            m.innerHTML = `
            <h1 class="print-title">OFFICIAL VEHICLE DEPLOYMENT REPORT (${viewFilter.toUpperCase()})</h1>
            <div class="no-print bg-white p-2 rounded-2xl mb-6 flex gap-1 shadow-sm">
                <button onclick="setFilter('day')" class="flex-1 p-2 text-[9px] font-black rounded-xl ${viewFilter==='day'?'bg-dar text-white':'text-gray-400'} uppercase">Daily</button>
                <button onclick="setFilter('week')" class="flex-1 p-2 text-[9px] font-black rounded-xl ${viewFilter==='week'?'bg-dar text-white':'text-gray-400'} uppercase">Weekly</button>
                <button onclick="setFilter('month')" class="flex-1 p-2 text-[9px] font-black rounded-xl ${viewFilter==='month'?'bg-dar text-white':'text-gray-400'} uppercase">Monthly</button>
                <button onclick="window.print()" class="flex-1 p-2 text-[9px] bg-dar-gold text-white font-black rounded-xl uppercase">Print Report</button>
            </div>
            <div class="print-area">` + VEHICLES.map(v => {
                const logs = orders.filter(o => o.received === v && o.transport === "GOV'T VEHICLE" && validToNos.includes(o.to_no));
                
                // Group to prevent dupe printing
                const uniqueLogs = [];
                const seenTo = new Set();
                logs.forEach(o => { if(!seenTo.has(o.to_no)) { uniqueLogs.push(o); seenTo.add(o.to_no); } });

                return `<div class="mb-8 card"><h3 class="font-black text-xs text-dar mb-3 pl-2 border-l-4 border-dar-gold uppercase tracking-widest">${v} STATUS</h3>` + 
                (uniqueLogs.length ? uniqueLogs.map(h => {
                    const iStr = filteredItins.filter(itin => itin.to_no === h.to_no).map(itin => itin.travel_date).join(', ');
                    const isMaint = h.remarks === 'MAINTENANCE' || h.remarks === 'OFF-ROAD/MAINTENANCE';
                    return `<div class="bg-white p-4 rounded-2xl mb-2 flex justify-between items-center border">
                        <div class="overflow-hidden"><p class="text-xs font-bold ${isMaint?'text-red-600':'text-gray-800'} truncate">${h.emp_name}</p><p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">${iStr} | ${h.remarks || 'WHOLE'}</p></div>
                        <button onclick="smartTransfer('${h.to_no}','${v}')" class="text-xl no-print active:scale-90 transition">🔄</button>
                    </div>`;
                }).join('') : `<div class="p-4 bg-white/50 rounded-2xl border border-dashed text-center text-[9px] text-gray-300 font-bold uppercase">Vehicle Available</div>`) + `</div>`;
            }).join('') + `</div>`;
        }

        async function smartTransfer(to, currentV) {
            const dates = itins.filter(i => i.to_no === to).map(i => i.travel_date);
            const busy = orders.filter(o => {
                if (o.status === 'CANCELLED' || o.to_no === to) return false;
                return itins.filter(i => i.to_no === o.to_no).some(i => dates.includes(i.travel_date));
            }).map(o => ({ veh: o.received, to: o.to_no }));

            const options = VEHICLES.filter(v => v !== currentV).map(v => {
                const match = busy.find(b => b.veh === v);
                return `<option value="${v}">${v} ${match ? `(Join existing TO: ${match.to})` : '(Available)'}</option>`;
            }).join('');

            document.getElementById('tDetails').innerText = `Transfering personnel from ${currentV} for dates: ${dates.join(', ')}`;
            document.getElementById('tSelect').innerHTML = options;
            document.getElementById('tExec').onclick = async () => {
                const target = document.getElementById('tSelect').value;
                await supabase.from('travel_orders').update({ received: target }).eq('to_no', to);
                await logAction(to, "Dispatcher", `TRANSFERRED: ${currentV} to ${target}`, dates[0]);
                closeModal('transferModal'); sync();
            };
            openModal('transferModal');
        }

        // --- 5. UTILITIES ---
        let activeTO = "";
        function liveSearch(inp, resId) {
            const div = document.getElementById(resId);
            const val = inp.value.toLowerCase();
            if (val.length < 2) { div.classList.add('hidden'); return; }
            const match = emps.filter(e => e.full_name.toLowerCase().includes(val)).slice(0, 5);
            div.innerHTML = match.map(e => {
                const safeName = e.full_name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const safeUnit = (e.unit || '').replace(/'/g, "\\'");
                const safeDiv = (e.division || '').replace(/'/g, "\\'");
                return `<div onclick="pickPersonnel('${safeName}','${resId}','${inp.id}','${safeUnit}','${safeDiv}')" class="p-3 border-b text-xs font-bold active:bg-gray-100 cursor-pointer">${e.full_name}</div>`;
            }).join('');
            div.classList.remove('hidden');
        }

        function pickPersonnel(n, rId, iId, u, d) {
            const input = document.getElementById(iId);
            input.value = n; input.dataset.unit = u; input.dataset.div = d;
            document.getElementById(rId).classList.add('hidden');
            if (iId === 'pAdd') addPersonToTrip(n, u, d);
        }

        async function managePeople(to) {
            activeTO = to;
            document.getElementById('pTitle').innerText = `DEPLOYMENT: ${to}`;
            openModal('peopleModal');
            refreshPList();
        }

        async function refreshPList() {
            const { data } = await supabase.from('travel_orders').select('id, emp_name').eq('to_no', activeTO);
            if(!data) return;
            document.getElementById('pList').innerHTML = data.map((p, idx) => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border shadow-sm">
                    <span class="text-xs font-bold text-gray-700">${p.emp_name} ${idx===0?'(LEAD)':''}</span>
                    ${idx!==0?`<button onclick="deletePassenger('${p.id}')" class="text-red-600 font-bold">✕</button>`:''}
                </div>`).join('');
        }

        async function addPersonToTrip(n, u, d) {
            const head = orders.find(o => o.to_no === activeTO);
            if(!head) return;
            const row = { ...head }; delete row.id; delete row.created_at;
            row.emp_name = n; row.unit = u; row.division = d;
            await supabase.from('travel_orders').insert(row);
            document.getElementById('pAdd').value = "";
            refreshPList();
        }

        async function deletePassenger(id) { await supabase.from('travel_orders').delete().eq('id', id); refreshPList(); }

        async function saveManual() {
            const n = document.getElementById('resN').value, d1 = document.getElementById('resD1').value, d2 = document.getElementById('resD2').value;
            const s = document.getElementById('resS').value, v = document.getElementById('resV').value, dr = document.getElementById('resDr').value;
            const r = document.getElementById('resR').value, p = document.getElementById('resP').value;
            const unit = document.getElementById('resN').dataset.unit, div = document.getElementById('resN').dataset.div;

            if(!n || !d1 || !p) return alert("Missing Required Info (Name, Start Date, Purpose).");
            const to = r || `RES-${Math.floor(Date.now()%10000)}`;
            await supabase.from('travel_orders').insert({ to_no: to, emp_name: n, unit: unit, division: div, transport: "GOV'T VEHICLE", received: v, driver: dr, remarks: s, status: "APPROVED" });
            
            let start = new Date(d1), end = new Date(d2 || d1);
            while(start <= end) {
                await supabase.from('itinerary').insert({ to_no: to, travel_date: start.toISOString().split('T')[0], destination: "MANUAL RESERVATION", purpose: p });
                start.setDate(start.getDate() + 1);
            }
            alert("Booking Saved."); closeModal('bookModal'); sync();
        }

        function switchTab(t) { tab = t; renderDashboard(); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function setFilter(f) { viewFilter = f; renderSchedule(); }

    </script>
</body>
</html>
