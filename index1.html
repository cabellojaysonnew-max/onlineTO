<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DAR Vehicle Dispatch</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DAR Dispatch">
    <meta name="theme-color" content="#003811">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link id="pwa-manifest" rel="manifest">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        .dar-green { background-color: #003811; }
        .text-dar-green { color: #003811; }
        .dar-gold { background-color: #D4AF37; }
        .text-dar-gold { color: #D4AF37; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f3f4f6; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: none; 
        }
        
        ::-webkit-scrollbar { display: none; }
        .modal-fade { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col overflow-hidden text-gray-800 bg-gray-100 text-left">

    <div id="app" class="w-full h-full flex flex-col relative"></div>

    <script>
        const manifestData = {
            "name": "DAR Cam Sur 1 Dispatch",
            "short_name": "Dispatch",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#F3F4F6",
            "theme_color": "#003811",
            "icons": [{
                "src": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzAwMzgxMSIvPjx0ZXh0IHg9IjUwIiB5PSI2NSIgZm9udC1zaXplPSI1MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iI0Q0QUYzNyI+RDwvdGV4dD48L3N2Zz4=",
                "sizes": "192x192",
                "type": "image/svg+xml"
            }]
        };
        document.getElementById('pwa-manifest').setAttribute('href', 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifestData)));

        // --- UPDATED SUPABASE CONFIG ---
        const SUPABASE_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SUPABASE_KEY = "sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo"; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- CONSTANTS ---
        const OFFICIAL_VEHICLES = ["MAZDA", "REVO", "INNOVA", "SKY", "BLACK"];
        const OFFICIAL_DRIVERS = ["Driver 1", "Driver 2", "Driver 3", "Driver 4", "Driver 5"];

        let currentUser = null;
        let currentTab = 'pending'; 

        function render() { if (!currentUser) renderLogin(); else renderMain(); }

        // --- LOGIN VIEW ---
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="flex-grow flex flex-col justify-center items-center px-6 dar-green h-full">
                    <div class="z-10 w-full max-w-sm bg-white rounded-2xl shadow-2xl overflow-hidden">
                        <div class="dar-gold h-2 w-full"></div>
                        <div class="p-8">
                            <h1 class="text-dar-green font-bold text-3xl font-serif mb-1 text-center">DAR</h1>
                            <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-6 uppercase text-center">Vehicle Dispatch Console</p>
                            <div class="space-y-4">
                                <div><label class="block text-xs font-bold text-gray-700 mb-1">USERNAME</label><input type="text" id="username" class="w-full px-4 py-3 bg-gray-50 border rounded-xl focus:outline-none"></div>
                                <div><label class="block text-xs font-bold text-gray-700 mb-1">PASSWORD</label><input type="password" id="password" class="w-full px-4 py-3 bg-gray-50 border rounded-xl focus:outline-none"></div>
                                <p id="loginError" class="text-red-600 text-[10px] font-bold text-center hidden"></p>
                                <button onclick="handleLogin()" id="loginBtn" class="w-full mt-2 dar-green text-white font-bold py-3.5 rounded-xl shadow-lg">LOG IN</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
        }

        async function handleLogin() {
            const uBox = document.getElementById('username').value.trim();
            const pBox = document.getElementById('password').value.trim();
            const err = document.getElementById('loginError');
            
            try {
                const { data: users } = await supabaseClient.from('users').select('*');
                const u = (users || []).find(x => x.username === uBox && x.password === pBox);
                
                if (u) {
                    if (u.role && u.role.toUpperCase() === 'VEHICLE_APPROVER') {
                        currentUser = { 
                            username: u.username, 
                            fullName: u.full_name, 
                            role: u.role.toUpperCase(), 
                            unit: u.unit ? u.unit.trim().toUpperCase() : '' 
                        };
                        render();
                    } else {
                        err.innerText = "Access Denied: Only Vehicle Approvers permitted.";
                        err.classList.remove("hidden");
                    }
                } else { 
                    err.innerText = "Check credentials."; 
                    err.classList.remove("hidden"); 
                }
            } catch (e) { 
                err.innerText = "Connection Error."; 
                err.classList.remove("hidden"); 
            }
        }

        function logout() { currentUser = null; render(); }

        // --- MAIN APP SHELL ---
        function renderMain() {
            document.getElementById('app').innerHTML = `
                <header class="flex-none w-full h-16 dar-green text-white px-5 flex justify-between items-center shadow-md z-50">
                    <div class="overflow-hidden text-left"><h1 class="font-bold text-lg leading-tight truncate">${currentUser.fullName}</h1><p class="text-[10px] text-dar-gold tracking-wide font-bold uppercase">${currentUser.role}</p></div>
                    <div class="flex items-center space-x-2"><button onclick="logout()" class="text-xs bg-white/20 px-3 py-1.5 rounded-full font-bold">Logout</button></div>
                </header>
                
                <main id="mainContent" class="flex-grow w-full overflow-y-auto bg-gray-100 relative z-10 scroll-smooth"></main>
                
                <nav class="flex-none w-full h-16 bg-white border-t flex z-50 pb-safe shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
                    <button onclick="switchTab('pending')" class="flex flex-col items-center justify-center w-1/3 ${currentTab === 'pending' ? 'text-dar-green font-bold' : 'text-gray-400'}"><span class="text-xl">📥</span><span class="text-[9px] uppercase tracking-tighter">Pending</span></button>
                    <button onclick="switchTab('dispatched')" class="flex flex-col items-center justify-center w-1/3 ${currentTab === 'dispatched' ? 'text-dar-green font-bold' : 'text-gray-400'}"><span class="text-xl">🚚</span><span class="text-[9px] uppercase tracking-tighter">Dispatched</span></button>
                    <button onclick="switchTab('reserve')" class="flex flex-col items-center justify-center w-1/3 ${currentTab === 'reserve' ? 'text-dar-green font-bold' : 'text-gray-400'}"><span class="text-xl">➕</span><span class="text-[9px] uppercase tracking-tighter">Reserve</span></button>
                </nav>
                
                <div id="reserveModal" class="hidden absolute inset-0 bg-black/50 z-[60] flex items-center justify-center px-4 modal-fade">
                    <div class="bg-white w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl">
                        <div class="dar-green text-white p-4 font-bold text-center relative">RSO/PSO Reservation<button onclick="hideReserveModal()" class="absolute right-4 text-xl leading-none">✕</button></div>
                        <div class="p-6 space-y-3 overflow-y-auto max-h-[70vh]">
                            <div><label class="block text-xs font-bold text-gray-700">Type</label><select id="resType" class="w-full px-3 py-2 border rounded-lg text-sm"><option>RSO</option><option>PSO</option><option>MEMO</option></select></div>
                            <div><label class="block text-xs font-bold text-gray-700">Ref Number</label><input type="text" id="resRef" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                            <div><label class="block text-xs font-bold text-gray-700">Date</label><input type="date" id="resDate" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                            <div><label class="block text-xs font-bold text-gray-700">Vehicle</label><select id="resVeh" class="w-full px-3 py-2 border rounded-lg text-sm">${OFFICIAL_VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select></div>
                            <div><label class="block text-xs font-bold text-gray-700">Driver</label><select id="resDrv" class="w-full px-3 py-2 border rounded-lg text-sm">${OFFICIAL_DRIVERS.map(d=>`<option>${d}</option>`).join('')}</select></div>
                            <div><label class="block text-xs font-bold text-gray-700">Purpose</label><input type="text" id="resPurp" class="w-full px-3 py-2 border rounded-lg text-sm"></div>
                            <button onclick="saveReservation()" class="w-full dar-green text-white font-bold py-3 rounded-xl mt-4">Confirm Reservation</button>
                        </div>
                    </div>
                </div>`;
            
            if (currentTab === 'pending') loadPendingTab();
            else if (currentTab === 'dispatched') loadDispatchedTab();
            else if (currentTab === 'reserve') { loadDispatchedTab(); showReserveModal(); currentTab = 'dispatched'; }
        }

        function switchTab(tab) { currentTab = tab; renderMain(); }
        function showReserveModal() { document.getElementById('reserveModal').classList.remove('hidden'); document.getElementById('resDate').valueAsDate = new Date(); }
        function hideReserveModal() { document.getElementById('reserveModal').classList.add('hidden'); }

        // --- PENDING TAB (ASSIGNMENT LOGIC) ---
        async function loadPendingTab() {
            const content = document.getElementById('mainContent');
            content.innerHTML = `<p class="flex items-center justify-center h-full text-gray-400 font-bold animate-pulse">Syncing Inbox...</p>`;
            
            const [oRes, iRes] = await Promise.all([
                supabaseClient.from('travel_orders').select('*').eq('status', 'PENDING_VEHICLE_APPROVER'), 
                supabaseClient.from('itinerary').select('*')
            ]);
            
            const pending = oRes.data || [];
            
            if (pending.length === 0) {
                content.innerHTML = `<div class="flex flex-col items-center justify-center h-full opacity-50"><span class="text-4xl">✨</span><p class="font-bold mt-2 text-xs uppercase">No Pending Vehicles</p></div>`;
                return;
            }
            
            let h = `<div class="p-4 space-y-4 pb-32">`;
            
            const vehOptions = `<option value="">Select Vehicle...</option>` + OFFICIAL_VEHICLES.map(v => `<option value="${v}">${v}</option>`).join('');
            const drvOptions = `<option value="">Select Driver...</option>` + OFFICIAL_DRIVERS.map(d => `<option value="${d}">${d}</option>`).join('');

            pending.forEach(o => { 
                let d = (iRes.data || []).filter(i => i.to_no === o.to_no);
                let dest = d.map(i => i.destination).join(', ') || 'N/A';
                let dates = d.map(i => i.travel_date).join(', ') || 'N/A';
                
                h += `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-dar-gold/50">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-black text-dar-green uppercase">${o.to_no}</span>
                        <span class="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded uppercase font-bold">${o.unit || 'NO UNIT'}</span>
                    </div>
                    <p class="font-bold text-gray-800 text-sm leading-tight">${o.emp_name}</p>
                    <p class="text-xs text-gray-500 mt-1 truncate">📍 ${dest}</p>
                    <p class="text-[10px] text-gray-400 mt-1">📅 ${dates}</p>
                    
                    <div class="mt-4 p-3 bg-gray-50 rounded-xl border space-y-2">
                        <select id="veh-${o.to_no}" class="w-full text-xs p-2 border rounded-lg bg-white">${vehOptions}</select>
                        <select id="drv-${o.to_no}" class="w-full text-xs p-2 border rounded-lg bg-white">${drvOptions}</select>
                    </div>

                    <div class="flex justify-between space-x-2 mt-4">
                        <button onclick="denyVehicle('${o.to_no}')" class="w-1/3 py-2 bg-red-50 text-red-600 rounded-xl text-[11px] font-bold border border-red-100 shadow-sm">Disapprove</button>
                        <button onclick="approveVehicle('${o.to_no}', '${o.unit || ''}')" class="w-2/3 py-2 dar-green text-white rounded-xl text-[11px] font-bold shadow-md">✅ Route & Assign</button>
                    </div>
                </div>`; 
            });
            content.innerHTML = h + `</div>`;
        }

        async function approveVehicle(to_no, unit) {
            const veh = document.getElementById(`veh-${to_no}`).value;
            const drv = document.getElementById(`drv-${to_no}`).value;
            
            if(!veh || !drv) return alert("Please select both a Vehicle and a Driver.");

            let nextStatus = "PENDING_UNIT_HEAD";
            if (unit.toUpperCase() === "PARPO") nextStatus = "PENDING_PARPO";
            else if (!unit || unit.toUpperCase() === "NULL" || unit.toUpperCase() === "NAN") nextStatus = "PENDING_CHIEF";

            document.body.style.pointerEvents = "none";
            try {
                await supabaseClient.from('travel_orders').update({
                    received: veh,
                    driver: drv,
                    status: nextStatus
                }).eq('to_no', to_no);
                loadPendingTab();
            } catch(e) {
                alert("Update failed.");
            } finally {
                document.body.style.pointerEvents = "auto";
            }
        }

        async function denyVehicle(to_no) {
            if(!confirm(`Disapprove vehicle request for TO ${to_no}?\nStatus will change to 'VEHICLE_DISAPPROVED'.`)) return;
            
            document.body.style.pointerEvents = "none";
            try {
                await supabaseClient.from('travel_orders').update({
                    status: "VEHICLE_DISAPPROVED",
                    received: null,
                    driver: null
                }).eq('to_no', to_no);
                loadPendingTab();
            } catch(e) {
                alert("Update failed.");
            } finally {
                document.body.style.pointerEvents = "auto";
            }
        }

        // --- DISPATCHED / TRACKING TAB ---
        async function loadDispatchedTab() {
            const content = document.getElementById('mainContent');
            content.innerHTML = `<p class="flex items-center justify-center h-full text-gray-400 font-bold animate-pulse">Loading Manifest...</p>`;
            
            const { data: oRes } = await supabaseClient.from('travel_orders')
                .select('to_no, emp_name, received, driver, status, created_at')
                .eq('transport', "GOV'T VEHICLE")
                .neq('status', 'PENDING_VEHICLE_APPROVER')
                .neq('status', 'VEHICLE_DISAPPROVED')
                .neq('status', 'CANCELLED')
                .order('created_at', { ascending: false });

            const dispatched = oRes || [];
            
            if (dispatched.length === 0) {
                content.innerHTML = `<div class="flex flex-col items-center justify-center h-full opacity-50"><span class="text-4xl">🚚</span><p class="font-bold mt-2 text-xs uppercase">No Active Dispatches</p></div>`;
                return;
            }

            let h = `<div class="p-4 space-y-3 pb-32">
                        <div class="sticky top-0 bg-gray-100 pt-2 pb-3 z-10">
                            <input type="text" id="searchDispatch" onkeyup="filterDispatched()" placeholder="Search TO or Personnel..." class="w-full px-4 py-3 bg-white border rounded-xl text-xs shadow-sm focus:outline-none focus:ring-1 focus:ring-green-800">
                        </div>
                        <div id="dispatchList">`;
            
            dispatched.forEach(o => {
                let statusColor = o.status === "APPROVED" ? "text-green-600" : "text-orange-500";
                h += `
                <div class="dispatch-card bg-white p-4 rounded-xl shadow-sm border-l-4 border-dar-green mb-3" data-search="${o.to_no.toLowerCase()} ${o.emp_name.toLowerCase()}">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[10px] font-black text-gray-400 uppercase">TO #${o.to_no}</span>
                        <span class="text-[9px] font-bold uppercase ${statusColor} bg-gray-50 px-2 py-0.5 rounded">${o.status.replace('PENDING_', '')}</span>
                    </div>
                    <p class="font-bold text-gray-800 text-sm">${o.emp_name}</p>
                    <div class="flex space-x-3 mt-3 pt-3 border-t">
                        <div class="flex items-center text-[11px] text-gray-600"><span class="mr-1">🚙</span> <b>${o.received || 'N/A'}</b></div>
                        <div class="flex items-center text-[11px] text-gray-600"><span class="mr-1">👤</span> <b>${o.driver || 'N/A'}</b></div>
                    </div>
                </div>`;
            });
            content.innerHTML = h + `</div></div>`;
        }

        function filterDispatched() {
            let input = document.getElementById('searchDispatch').value.toLowerCase();
            let cards = document.getElementsByClassName('dispatch-card');
            for (let i = 0; i < cards.length; i++) {
                let searchData = cards[i].getAttribute('data-search');
                cards[i].style.display = searchData.includes(input) ? "" : "none";
            }
        }

        // --- MANUAL RSO/PSO RESERVATION ---
        async function saveReservation() {
            const rtype = document.getElementById('resType').value;
            const ref = document.getElementById('resRef').value.trim();
            const tdate = document.getElementById('resDate').value;
            const veh = document.getElementById('resVeh').value;
            const drv = document.getElementById('resDrv').value;
            const purp = document.getElementById('resPurp').value.trim();

            if (!ref || !veh || !drv || !purp || !tdate) {
                alert("All fields are required.");
                return;
            }

            const pseudo_to = `${rtype}-${ref}-${Math.floor(Date.now() % 1000)}`;

            document.body.style.pointerEvents = "none";
            try {
                await supabaseClient.from("travel_orders").insert({
                    to_no: pseudo_to,
                    emp_id: currentUser.username,
                    emp_name: `ADMIN RESERVATION (${rtype} ${ref})`,
                    unit: "ADMIN",
                    status: "APPROVED",
                    received: veh,
                    driver: drv,
                    transport: "GOV'T VEHICLE",
                    report_to: "PARPO II",
                    division: "ADMIN"
                });

                await supabaseClient.from("itinerary").insert({
                    to_no: pseudo_to,
                    travel_date: tdate,
                    destination: "Official Business",
                    purpose: `${rtype} ${ref}: ${purp}`
                });

                alert("Vehicle Reserved successfully.");
                hideReserveModal();
                loadDispatchedTab();
            } catch (e) {
                alert("Failed to save reservation.");
            } finally {
                document.body.style.pointerEvents = "auto";
            }
        }

        window.onload = render;
    </script>
</body>
</html>
