<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR CS I - Mobile Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --dar-green: #003811; --dar-gold: #D4AF37; --bg-main: #f4f7f6;
            --card-bg: #ffffff; --text-main: #1f2937; --danger: #dc2626;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background-color: var(--bg-main); color: var(--text-main); -webkit-tap-highlight-color: transparent; }
        .screen { display: none; } .screen.active { display: block; }
        .view { display: none; padding: 15px; padding-bottom: 120px; } .view.active { display: block; }
        .app-header { background: var(--dar-green); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--dar-gold); }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; display: flex; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--dar-green); } .btn-gold { background: var(--dar-gold); color: var(--dar-green); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--dar-green); display: flex; z-index: 1000; }
        .nav-item { flex: 1; padding: 15px 0; text-align: center; color: #9ca3af; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--dar-gold); border-top: 3px solid var(--dar-gold); }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 12px; float: right; font-weight: bold; }
        .bg-approved { background: #ecfdf5; color: #166534; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .calendar-day { background: white; border-radius: 6px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; border: 1px solid #eee; position: relative; }
        .dot { width: 5px; height: 5px; border-radius: 50%; }
        .dot-to { background: var(--dar-green); } .dot-holiday { background: var(--danger); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 25px;">
            <div class="card">
                <h2 style="text-align: center; color: var(--dar-green);">DAR PORTAL</h2>
                <input type="text" id="login-id" placeholder="Employee ID">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn btn-primary" onclick="handleLogin()">SECURE LOGIN</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-header">
            <div><div id="user-name" style="font-weight: bold;">User</div><div id="user-info" style="font-size: 10px; color: var(--dar-gold);">Info</div></div>
            <button onclick="location.reload()" style="background:none; border:1px solid white; color:white; font-size:10px;">Logout</button>
        </div>

        <div id="apply-view" class="view active">
            <div class="card">
                <h4>1. Personnel</h4>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="emp-search" placeholder="Search Name" style="margin-bottom: 0;">
                    <button class="btn btn-primary" style="width: 70px;" onclick="searchEmployees()">Find</button>
                </div>
                <div id="search-results" style="background:white; border:1px solid #ddd; display:none; max-height:100px; overflow:auto;"></div>
                <div id="personnel-draft-list" style="margin-top:10px;"></div>
            </div>

            <div class="card">
                <h4>2. Logistics</h4>
                <select id="to-transport"><option value="LAND">LAND</option><option value="GOV'T VEHICLE">GOV'T VEHICLE</option></select>
                <input type="text" id="to-report" placeholder="Report To">
            </div>

            <div class="card">
                <h4>3. Itinerary</h4>
                <input type="date" id="itin-date">
                <input type="text" id="itin-dest" placeholder="Destination">
                <textarea id="itin-purp" placeholder="Purpose"></textarea>
                <button class="btn btn-primary" onclick="addItinDraft()">+ Add Date</button>
                <div id="itin-draft-list" style="margin-top:10px;"></div>
            </div>
            <button class="btn btn-gold" onclick="submitTO()">🚀 SUBMIT OFFICIAL REQUEST</button>
        </div>

        <div id="status-view" class="view"><div id="status-list"></div></div>

        <div id="calendar-view" class="view">
            <div class="card">
                <div id="cal-month-year" style="font-weight: bold; text-align: center; margin-bottom: 10px;"></div>
                <div class="calendar-grid" id="cal-body"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('apply-view', this)">📝 Apply</div>
            <div class="nav-item" onclick="switchTab('status-view', this)">📋 Status</div>
            <div class="nav-item" onclick="switchTab('calendar-view', this)">📅 Calendar</div>
        </div>
    </div>

    <script type="module">
        const supabaseUrl = 'https://ytfpiyfapvybihlngxks.supabase.co';
        const supabaseKey = 'sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null; let itineraryDraft = []; let personnelDraft = [];
        const todayStr = new Date().toISOString().split('T')[0];

        const urlToBase64 = async (url) => {
            try {
                const res = await fetch(url); if (!res.ok) return null;
                const blob = await res.blob();
                return new Promise(r => { const rd = new FileReader(); rd.onloadend = () => r(rd.result); rd.readAsDataURL(blob); });
            } catch (e) { return null; }
        };

        window.handleLogin = async function() {
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            const { data } = await supabase.from('employees').select('*').eq('emp_id', id).single();
            if (data && data.pass === pass) {
                currentUser = data; document.getElementById('user-name').innerText = data.full_name;
                document.getElementById('user-info').innerText = `${data.division} | ${data.position}`;
                document.getElementById('app-screen').classList.add('active'); document.getElementById('login-screen').classList.remove('active');
                personnelDraft = [{ emp_id: data.emp_id, name: data.full_name, unit: data.unit }]; renderPersonnel();
            } else alert("Invalid Credentials");
        };

        window.switchTab = function(id, el) {
            document.querySelectorAll('.view, .nav-item').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            if (id === 'status-view') loadStatus();
            if (id === 'calendar-view') renderCalendar();
        };

        window.searchEmployees = async function() {
            const term = document.getElementById('emp-search').value;
            const { data } = await supabase.from('employees').select('emp_id, full_name, unit').ilike('full_name', `%${term}%`).limit(5);
            const resDiv = document.getElementById('search-results'); resDiv.innerHTML = ''; resDiv.style.display = 'block';
            data.forEach(e => {
                const div = document.createElement('div'); div.style.padding = '8px'; div.innerText = e.full_name;
                div.onclick = () => { personnelDraft.push({ emp_id: e.emp_id, name: e.full_name, unit: e.unit }); resDiv.style.display = 'none'; renderPersonnel(); };
                resDiv.appendChild(div);
            });
        };

        function renderPersonnel() {
            document.getElementById('personnel-draft-list').innerHTML = personnelDraft.map(p => `<div style="font-size:12px; padding:5px; background:#eee; margin-bottom:2px;">👤 ${p.name}</div>`).join('');
        }

        window.addItinDraft = () => {
            const date = document.getElementById('itin-date').value;
            const dest = document.getElementById('itin-dest').value;
            const purp = document.getElementById('itin-purp').value;
            if (date && dest && purp) { itineraryDraft.push({ date, dest, purp }); renderItin(); }
        };

        function renderItin() {
            document.getElementById('itin-draft-list').innerHTML = itineraryDraft.map(it => `<div style="font-size:11px;">${it.date} | ${it.dest}</div>`).join('');
        }

        window.submitTO = async function() {
            const year = new Date().getFullYear();
            const div = (currentUser.division || "GEN").substring(0,5).toUpperCase();
            const to_no = `${year}-${div}-${Math.floor(10000 + Math.random() * 90000)}`;

            const { data: psos } = await supabase.from('pso_records').select('*').eq('emp_id', currentUser.emp_id);
            const conflict = psos?.some(p => itineraryDraft.some(it => it.date >= p.start_date && it.date <= p.end_date));
            const remarks = conflict ? "WITH EXISTING PSO/RSO" : "";

            const batchP = personnelDraft.map(p => ({
                to_no, emp_id: p.emp_id, emp_name: p.name, division: currentUser.division, unit: p.unit, 
                status: 'APPROVED', transport: document.getElementById('to-transport').value, 
                report_to: document.getElementById('to-report').value, remarks
            }));
            const batchI = itineraryDraft.map(it => ({ to_no, travel_date: it.date, destination: it.dest, purpose: it.purp }));

            await supabase.from('travel_orders').insert(batchP);
            await supabase.from('itinerary').insert(batchI);
            alert("Submitted: " + to_no); location.reload();
        };

        window.generateOfficialPDF = async function(toNo) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const getAssetUrl = (f) => `${supabaseUrl}/storage/v1/object/public/e-sign/${f}`;

            try {
                const { data: od_list } = await supabase.from('travel_orders').select('*').eq('to_no', toNo);
                const { data: itin } = await supabase.from('itinerary').select('*').eq('to_no', toNo).order('travel_date');
                const { data: emp_details } = await supabase.from('employees').select('emp_id, full_name, position, station');

                const [img_bg, img_p2, img_qr] = await Promise.all([
                    urlToBase64(getAssetUrl("bg_form.jpg")), urlToBase64(getAssetUrl("P2.png")),
                    urlToBase64(`https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${toNo}`)
                ]);

                for (let i = 0; i < 3; i++) {
                    if (i > 0) doc.addPage();
                    if (img_bg) doc.addImage(img_bg, 'JPEG', 0, 0, 210, 297);
                    if (img_qr) doc.addImage(img_qr, 'PNG', 172, 10, 22, 22);

                    doc.setFontSize(16); doc.setFont("helvetica", "bold");
                    doc.text(`TRAVEL ORDER NO. ${toNo}`, 105, 45, { align: 'center' });
                    
                    doc.setFontSize(10); doc.setFont("helvetica", "normal");
                    const fDate = new Date(od_list[0].created_at).toLocaleString('en-US', { month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
                    doc.text(`Date Filed: ${fDate}`, 159, 52, { align: 'right' });

                    let currY = 75; const rightLimit = 159;

                    const drawRow = (label, value, xStart) => {
                        doc.setFont("helvetica", "bold"); doc.text(label, 20, currY);
                        doc.setFont("helvetica", "normal");
                        const textLines = doc.splitTextToSize(value || "", rightLimit - xStart);
                        textLines.forEach((line, idx) => {
                            const lineY = currY + (idx * 5.5);
                            doc.text(line, xStart, lineY);
                            doc.line(xStart, lineY + 1, rightLimit, lineY + 1);
                        });
                        currY += (textLines.length * 5.5) + 2.5;
                    };

                    drawRow("NAME:", od_list.map(m => m.emp_name.toUpperCase()).join(", "), 45);
                    
                    doc.setFont("helvetica", "bold"); doc.text("POSITION:", 20, currY);
                    doc.setFont("helvetica", "normal"); 
                    doc.text([...new Set(od_list.map(m => emp_details.find(e => e.emp_id === m.emp_id)?.position || ""))].join(", ").toUpperCase(), 45, currY);
                    doc.line(45, currY+1, 100, currY+1);

                    doc.setFont("helvetica", "bold"); doc.text("STATION:", 110, currY);
                    doc.setFont("helvetica", "normal"); 
                    doc.text([...new Set(od_list.map(m => emp_details.find(e => e.emp_id === m.emp_id)?.station || ""))].join(", ").toUpperCase(), 130, currY);
                    doc.line(130, currY+1, rightLimit, currY+1);
                    currY += 8;

                    doc.setFont("helvetica", "bold"); doc.text("MEANS OF TRANSPORTATION:", 20, currY); currY += 6;
                    const check = (x, y, lbl, val) => { doc.rect(x, y, 4, 4); if(val) doc.text("X", x+1, y+3.5); doc.text(lbl, x+6, y+3.5); };
                    check(30, currY, "LAND", od_list[0].transport === "LAND"); check(80, currY, "GOV'T VEHICLE", od_list[0].transport === "GOV'T VEHICLE");
                    currY += 10;

                    drawRow("DESTINATION:", itin.map(it => `${it.destination} (${it.travel_date})`).join(", "), 50);
                    
                    doc.setFont("helvetica", "bold"); doc.text("DEPARTURE:", 20, currY); 
                    doc.text(itin[0]?.travel_date || "", 50, currY); doc.line(50, currY+1, 100, currY+1);
                    doc.text("RETURN:", 110, currY); 
                    doc.text(itin[itin.length-1]?.travel_date || "", 135, currY); doc.line(135, currY+1, rightLimit, currY+1);
                    currY += 8;

                    drawRow("REPORT TO:", od_list[0].report_to, 50);
                    drawRow("PURPOSE OF TRAVEL:", itin[0]?.purpose || "", 65);

                    if (i > 0 && img_p2) doc.addImage(img_p2, 'PNG', 85, 250, 40, 20);
                    doc.setFont("helvetica", "bold"); doc.text("RICARDO C. GARCIA", 105, 275, { align: 'center' });
                    doc.setFontSize(10); doc.text("PARPO II", 105, 280, { align: 'center' });
                }
                doc.save(`TO_${toNo}.pdf`);
            } catch (e) { console.error(e); }
        };

        async function loadStatus() {
            const { data } = await supabase.from('travel_orders').select('*').eq('emp_id', currentUser.emp_id).order('created_at', { ascending: false });
            document.getElementById('status-list').innerHTML = data.map(to => `<div class="card"><span class="badge bg-approved">${to.status}</span><b>${to.to_no}</b><br><button onclick="generateOfficialPDF('${to.to_no}')" style="margin-top:10px; font-size:10px;">Print PDF</button></div>`).join('');
        }

        window.renderCalendar = async function() {
            document.getElementById('cal-month-year').innerText = new Date().toLocaleString('default', { month: 'long', year: 'numeric' });
            const { data: myTOs } = await supabase.from('travel_orders').select('to_no').eq('emp_id', currentUser.emp_id);
            const { data: itins } = await supabase.from('itinerary').select('travel_date').in('to_no', myTOs?.map(t => t.to_no) || []);
            const body = document.getElementById('cal-body'); body.innerHTML = '';
            for(let d=1; d<=31; d++) {
                const hasTO = itins?.some(i => i.travel_date.includes(`-${String(d).padStart(2,'0')}`));
                body.innerHTML += `<div class="calendar-day">${d}${hasTO ? '<div class="dot dot-to"></div>' : ''}</div>`;
            }
        };
    </script>
</body>
</html>
