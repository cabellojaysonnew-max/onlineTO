    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
:root {
    --dar-green: #003811;
    --dar-light: #006400;
    --dar-gold: #D4AF37;
    --bg-main: #eef3f1;
    --card-bg: #ffffff;
    --text-main: #1f2937;
    --text-muted: #6b7280;
    --danger: #dc2626;
    --success: #16a34a;
    --warning: #f59e0b;
}

/* BASE */
* { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

body {
    margin: 0;
    background: linear-gradient(180deg, #f4f7f6, #e6efec);
    color: var(--text-main);
    -webkit-tap-highlight-color: transparent;
}

/* SCREEN */
.screen { display: none; }
.screen.active { display: block; animation: fadeIn 0.3s ease; }

.view {
    display: none;
    padding: 16px;
    padding-bottom: 120px;
}
.view.active { display: block; animation: fadeIn 0.2s ease; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* HEADER */
.app-header {
    background: linear-gradient(135deg, var(--dar-green), #025928);
    color: white;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--dar-gold);
    box-shadow: 0 6px 18px rgba(0,0,0,0.25);
}

/* CARDS */
.card {
    background: var(--card-bg);
    padding: 16px;
    border-radius: 16px;
    box-shadow: 0 8px 22px rgba(0,0,0,0.08);
    margin-bottom: 16px;
    border: none;
    transition: 0.2s;
}

.card:hover { transform: translateY(-2px); }

/* HEADINGS */
h4 {
    margin-top: 0;
    font-size: 13px;
    color: var(--dar-green);
    margin-bottom: 10px;
    border-left: 4px solid var(--dar-gold);
    padding-left: 8px;
}

/* LABEL */
label {
    font-size: 11px;
    font-weight: bold;
    color: var(--text-muted);
}

/* INPUTS */
input, select, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    font-size: 14px;
    margin-bottom: 12px;
    background: #fafafa;
}

input:focus, select:focus, textarea:focus {
    border-color: var(--dar-green);
    outline: none;
    background: #fff;
    box-shadow: 0 0 0 2px rgba(0,56,17,0.1);
}

/* BUTTONS */
.btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    transition: 0.15s;
}

.btn:active { transform: scale(0.97); }

.btn-primary {
    background: linear-gradient(135deg, var(--dar-green), #025928);
}

.btn-gold {
    background: linear-gradient(135deg, var(--dar-gold), #c19b2e);
    color: #003811;
}

.btn-danger { background: var(--danger); }
.btn-warning { background: var(--warning); }

/* SMALL BUTTON */
.btn-small {
    padding: 8px;
    font-size: 11px;
    border-radius: 8px;
    flex: 1;
}

/* ACTION GROUP */
.action-group {
    display: flex;
    gap: 8px;
    margin-top: 12px;
}

/* SEARCH */
.search-results { border-radius: 10px; }
.search-row:hover { background: #f3f4f6; }

/* PERSONNEL */
#personnel-draft-list div {
    background: #ecfdf5 !important;
    border: 1px solid #bbf7d0;
}

/* CALENDAR */
.calendar-day { border-radius: 10px; }
.calendar-day:hover { background: #f9fafb; }
.today { background: #fffbea; }

/* NAV */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #022c22;
    display: flex;
    z-index: 1000;
    box-shadow: 0 -5px 15px rgba(0,0,0,0.25);
}

.nav-item {
    flex: 1;
    padding: 14px 0;
    text-align: center;
    color: #9ca3af;
    font-size: 11px;
    font-weight: bold;
}

.nav-item.active {
    color: var(--dar-gold);
    border-top: 3px solid var(--dar-gold);
    background: rgba(255,255,255,0.05);
}

/* BADGES */
.badge {
    border-radius: 20px;
    padding: 4px 10px;
}

.bg-pending { background: #fefce8; color: #854d0e; }
.bg-approved { background: #ecfdf5; color: #166534; }
.bg-cancelled { background: #fef2f2; color: #991b1b; }

#qr-buffer { display:none; }
</style>
</head>
