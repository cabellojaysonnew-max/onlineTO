<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DAR Dispatch Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#003811">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        .dar-green { background-color: #003811; }
        .text-dar-green { color: #003811; }
        .dar-gold { background-color: #D4AF37; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f3f4f6; 
            overscroll-behavior-y: none; 
        }
        
        ::-webkit-scrollbar { display: none; }
        .modal-fade { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

        .search-results { position: absolute; width: 100%; max-height: 200px; overflow-y: auto; z-index: 100; background: white; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        
        @media print {
            nav, header, button, .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; height: auto; overflow: visible; }
            .h-screen { height: auto !important; overflow: visible !important; }
        }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col overflow-hidden text-gray-800 bg-gray-100">

    <div id="app" class="w-full h-full flex flex-col relative"></div>

    <script>
        // --- CONFIG ---
        const SB_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SB_KEY = "sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo"; 
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        const VEHICLES = ["MAZDA", "REVO", "INNOVA", "SKY", "BLACK"];
        const DEF_DRIVERS = ["Driver 1", "Driver 2", "Driver 3", "Driver 4", "Driver 5"];

        let user = null;
        let tab = 'pending'; 
        let emps = [];
        let dataOrders = [];
        let dataItin = [];
        let calFilter = 'day'; // day, week, month

        function render() { if (!user) renderLogin(); else renderMain(); }

        // --- AUTH ---
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="flex-grow flex flex-col justify-center items-center px-6 dar-green h-full">
                    <div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8">
                        <h1 class="text-dar-green font-bold text-3xl text-center font-serif">DAR</h1>
                        <p class="text-[10px] text-gray-400 font-bold mb-8 uppercase text-center tracking-widest">Master Dispatch Console</p>
                        <div class="space-y-4">
                            <input type="text" id="un" placeholder="USERNAME" class="w-full px-4 py-4 bg-gray-50 border rounded-2xl outline-none">
                            <input type="password" id="pw" placeholder="PASSWORD" class="w-full px-4 py-4 bg-gray-50 border rounded-2xl outline-none">
                            <button onclick="doLogin()" class="w-full dar-green text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">LOG IN</button>
                        </div>
                    </div>
                </div>`;
        }

        async function doLogin() {
            const u = document.getElementById('un').value.trim();
            const p = document.getElementById('pw').value.trim();
            const { data } = await supabase.from('users').select('*');
            const found = (data || []).find(x => x.username === u && x.password === p);
            if (found && found.role.toUpperCase() === 'VEHICLE_APPROVER') {
                user = found;
                const { data: e } = await supabase.from('employees').select('full_name, unit, division');
                emps = e || [];
                render();
            } else alert("Invalid or Unauthorized.");
        }

        // --- MAIN APP ---
        function renderMain() {
            document.getElementById('app').innerHTML = `
                <header class="flex-none w-full h-16 dar-green text-white px-5 flex justify-between items-center shadow-md no-print">
                    <div class="text-left"><h1 class="font-bold text-sm truncate">${user.full_name}</h1><p class="text-[9px] text-dar-gold font-bold uppercase">Dispatcher Console</p></div>
                    <div class="flex items-center space-x-3"><button onclick="sync()" class="text-lg">🔄</button><button onclick="location.reload()" class="text-xs bg-white/20 px-3 py-1 rounded-full font-bold">Exit</button></div>
                </header>
                
                <main id="mainContent" class="flex-grow w-full overflow-y-auto bg-gray-100 pb-safe no-scrollbar"></main>
                
                <nav class="flex-none w-full h-16 bg-white border-t flex z-50 pb-safe shadow-lg no-print">
                    <button onclick="goTab('pending')" class="flex-1 flex flex-col items-center justify-center ${tab==='pending'?'text-dar-green font-bold':'text-gray-400'}"><span class="text-xl">📥</span><span class="text-[8px] uppercase">Inbox</span></button>
                    <button onclick="goTab('manifest')" class="flex-1 flex flex-col items-center justify-center ${tab==='manifest'?'text-dar-green font-bold':'text-gray-400'}"><span class="text-xl">📋</span><span class="text-[8px] uppercase">Manifest</span></button>
                    <button onclick="goTab('calendar')" class="flex-1 flex flex-col items-center justify-center ${tab==='calendar'?'text-dar-green font-bold':'text-gray-400'}"><span class="text-xl">📅</span><span class="text-[8px] uppercase">Schedule</span></button>
                    <button onclick="showRes()" class="flex-1 flex flex-col items-center justify-center text-gray-400"><span class="text-xl">➕</span><span class="text-[8px] uppercase">Book</span></button>
                </nav>

                <div id="resModal" class="hidden fixed inset-0 bg-black/80 z-[60] flex items-center justify-center p-4 modal-fade no-print">
                    <div class="bg-white w-full max-w-sm rounded-3xl p-6 relative">
                        <h2 class="text-dar-green font-black mb-4 uppercase text-sm">Deployment Reservation</h2>
                        <div class="space-y-3 max-h-[70vh] overflow-y-auto pr-2 no-scrollbar">
                            <div class="relative"><label class="text-[9px] font-bold text-gray-400 uppercase">Personnel Lead</label><input type="text" id="resN" oninput="search(this)" class="w-full px-4 py-3 bg-gray-50 border rounded-xl text-sm"><div id="resResults" class="search-results hidden"></div></div>
                            <div class="grid grid-cols-2 gap-2">
                                <div><label class="text-[9px] font-bold text-gray-400 uppercase">Start Date</label><input type="date" id="resD1" class="w-full p-3 border rounded-xl text-sm"></div>
                                <div><label class="text-[9px] font-bold text-gray-400 uppercase">End Date</label><input type="date" id="resD2" class="w-full p-3 border rounded-xl text-sm"></div>
                            </div>
                            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Slot</label><select id="resS" class="w-full p-3 border rounded-xl text-sm"><option>WHOLE DAY</option><option>AM</option><option>PM</option></select></div>
                            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Vehicle</label><select id="resV" class="w-full p-3 border rounded-xl text-sm">${VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select></div>
                            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Driver</label><input type="text" list="dl" id="resDr" class="w-full p-3 border rounded-xl text-sm"><datalist id="dl">${DEF_DRIVERS.map(d=>`<option value="${d}">`).join('')}</datalist></div>
                            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Ref # / ID</label><input type="text" id="resR" class="w-full p-3 border rounded-xl text-sm"></div>
                            <div><label class="text-[9px] font-bold text-gray-400 uppercase">Purpose</label><input type="text" id="resP" class="w-full p-3 border rounded-xl text-sm"></div>
                            <button onclick="saveRes()" class="w-full dar-green text-white font-bold py-4 rounded-2xl shadow-lg text-xs uppercase">Book Personnel</button>
                            <button onclick="hideRes()" class="w-full py-2 text-gray-400 text-[10px] font-bold uppercase">Cancel</button>
                        </div>
                    </div>
                </div>

                <div id="mModal" class="hidden fixed inset-0 bg-black/80 z-[70] flex items-center justify-center p-4 modal-fade no-print">
                    <div class="bg-white w-full max-w-sm rounded-3xl p-6 relative">
                        <div class="flex justify-between border-b pb-2 mb-4"><h2 class="text-dar-green font-bold text-xs uppercase" id="mTitle">People</h2><button onclick="hideM()" class="font-bold">✕</button></div>
                        <div id="mList" class="space-y-2 mb-6 max-h-[300px] overflow-y-auto pr-2"></div>
                        <div class="relative border-t pt-4"><label class="text-[9px] font-bold text-gray-400 uppercase">Add Personnel</label><input type="text" id="mSearch" oninput="search(this, 'm')" class="w-full p-3 border rounded-xl text-sm outline-none"><div id="mResults" class="search-results hidden"></div></div>
                    </div>
                </div>
            `;
            sync();
        }

        async function sync() {
            const [o, i] = await Promise.all([supabase.from('travel_orders').select('*').neq('status','CANCELLED'), supabase.from('itinerary').select('*')]);
            dataOrders = o.data || [];
            dataItin = i.data || [];
            if (tab === 'pending') loadPending();
            else if (tab === 'manifest') loadManifest();
            else loadCalendar();
        }

        function goTab(t) { tab = t; renderMain(); }
        function showRes() { document.getElementById('resModal').classList.remove('hidden'); document.getElementById('resD1').valueAsDate = new Date(); document.getElementById('resD2').valueAsDate = new Date(); }
        function hideRes() { document.getElementById('resModal').classList.add('hidden'); }
        function hideM() { document.getElementById('mModal').classList.add('hidden'); sync(); }

        // --- HELPERS ---
        function search(inp, mode='res') {
            const div = document.getElementById(mode==='res'?'resResults':'mResults');
            const v = inp.value.toLowerCase();
            if (v.length < 2) { div.classList.add('hidden'); return; }
            const match = emps.filter(e => e.full_name.toLowerCase().includes(v)).slice(0, 5);
            div.innerHTML = match.map(e => `<div onclick="selEmp('${e.full_name}','${e.unit}','${e.division}','${mode}')" class="p-3 border-b text-xs active:bg-gray-100"><b>${e.full_name}</b><br><span class="opacity-50">${e.unit||'N/A'}</span></div>`).join('');
            div.classList.remove('hidden');
        }

        function selEmp(n, u, d, m) {
            if (m === 'res') {
                document.getElementById('resN').value = n;
                document.getElementById('resN').dataset.unit = u;
                document.getElementById('resN').dataset.div = d;
                document.getElementById('resResults').classList.add('hidden');
            } else {
                addP(n, u, d);
                document.getElementById('mResults').classList.add('hidden');
                document.getElementById('mSearch').value = '';
            }
        }

        async function logV(to, applicant, action) {
            await supabase.from('vehicle_logs').insert({ to_no: to, applicant: applicant, travel_date: new Date().toISOString(), action: action });
        }

        // --- PENDING TAB ---
        function loadPending() {
            const c = document.getElementById('mainContent');
            const items = dataOrders.filter(o => o.status === 'PENDING_VEHICLE_APPROVER' && o.transport === "GOV'T VEHICLE");
            if (items.length === 0) { c.innerHTML = `<div class="p-20 text-center opacity-20 uppercase font-black text-xs">No pending items</div>`; return; }
            let h = `<div class="p-4 space-y-4">`;
            items.forEach(o => {
                const itin = dataItin.find(i => i.to_no === o.to_no) || {};
                h += `
                <div class="bg-white p-5 rounded-3xl shadow-sm border">
                    <div class="flex justify-between mb-2 text-[9px] font-black uppercase text-gray-400"><span>${o.to_no}</span><button onclick="toLand('${o.to_no}', '${o.unit}', '${o.division}')" class="text-blue-600 underline">To LAND</button></div>
                    <p class="font-bold text-gray-800">${o.emp_name}</p>
                    <p class="text-[10px] text-gray-500 truncate">📍 ${itin.destination || 'N/A'}</p>
                    <p class="text-[9px] text-dar-green font-bold uppercase mt-1">📅 ${itin.travel_date}</p>
                    <div class="mt-4 grid grid-cols-2 gap-2">
                        <select id="v-${o.to_no}" class="text-xs p-3 border rounded-xl bg-gray-50">${VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select>
                        <select id="s-${o.to_no}" class="text-xs p-3 border rounded-xl bg-gray-50"><option>WHOLE DAY</option><option>AM</option><option>PM</option></select>
                        <input type="text" list="dl" id="d-${o.to_no}" class="col-span-2 text-xs p-3 border rounded-xl bg-gray-50 font-bold" placeholder="Driver">
                    </div>
                    <div class="flex space-x-2 mt-4">
                        <button onclick="toLand('${o.to_no}', '${o.unit}', '${o.division}')" class="flex-1 py-3 bg-red-50 text-red-600 rounded-2xl text-[10px] font-bold uppercase">Reject</button>
                        <button onclick="approve('${o.to_no}', '${o.unit}', '${o.emp_name}')" class="flex-[2] py-3 dar-green text-white rounded-2xl text-[10px] font-bold shadow-lg uppercase tracking-tight">Approve Deployment</button>
                    </div>
                </div>`;
            });
            c.innerHTML = h + `</div>`;
        }

        async function approve(to, u, n) {
            const veh = document.getElementById(`v-${to}`).value;
            const slot = document.getElementById(`s-${to}`).value;
            const drv = document.getElementById(`d-${to}`).value || "TBD";
            let next = (u||"").toUpperCase() === "PARPO" ? "PENDING_PARPO" : "PENDING_UNIT_HEAD";
            await supabase.from('travel_orders').update({ received: veh, driver: drv, remarks: slot, status: next }).eq('to_no', to);
            await logV(to, n, `APPROVED: ${veh} / ${drv}`);
            sync();
        }

        async function toLand(to, u, d) {
            if(!confirm("Switch to LAND? Restarting approval flow...")) return;
            let next = (u||"").toUpperCase()==="PARPO"?"PENDING_PARPO":(u?"PENDING_UNIT_HEAD":"PENDING_CHIEF");
            await supabase.from('travel_orders').update({ transport: 'LAND', status: next, received: null, driver: null }).eq('to_no', to);
            await logV(to, "Dispatcher", "SWAPPED TO LAND");
            sync();
        }

        // --- MANIFEST TAB ---
        let currTo = "";
        function loadManifest() {
            const c = document.getElementById('mainContent');
            const list = dataOrders.filter(o => o.transport === "GOV'T VEHICLE" && o.status !== 'PENDING_VEHICLE_APPROVER');
            const grp = {};
            list.forEach(o => { if(!grp[o.to_no]) grp[o.to_no] = []; grp[o.to_no].push(o); });
            let h = `<div class="p-4 space-y-3">`;
            for (const [to, items] of Object.entries(grp)) {
                const head = items[0];
                h += `
                <div class="bg-white p-5 rounded-3xl shadow-sm border-l-4 border-dar-green">
                    <div class="flex justify-between text-[9px] font-black uppercase text-gray-400 mb-2"><span>TO #${to}</span><span class="text-dar-green bg-green-50 px-2 py-0.5 rounded">${head.remarks || 'WHOLE DAY'}</span></div>
                    <div class="flex justify-between items-end">
                        <div class="overflow-hidden"><p class="font-bold text-sm text-gray-800 truncate">${head.emp_name}</p><p class="text-[9px] text-gray-400 mt-1 uppercase">🚙 ${head.received} | 👤 ${head.driver}</p></div>
                        <div class="flex flex-col gap-2 shrink-0"><button onclick="cancelManifest('${to}', '${head.status}')" class="bg-red-50 text-red-500 px-3 py-1.5 rounded-lg text-[8px] font-black uppercase">Cancel</button><button onclick="openM('${to}')" class="bg-gray-100 px-3 py-1.5 rounded-lg text-[8px] font-black uppercase">Manage</button></div>
                    </div>
                </div>`;
            }
            c.innerHTML = h + `</div>`;
        }

        async function cancelManifest(to, stat) {
            if(!confirm("Cancel deployment? (If approved, switches to LAND. Else, restarts flow.)")) return;
            if(stat === 'APPROVED') await supabase.from('travel_orders').update({ transport: 'LAND' }).eq('to_no', to);
            else await supabase.from('travel_orders').update({ transport: 'LAND', status: 'PENDING_UNIT_HEAD' }).eq('to_no', to);
            await logV(to, "Dispatcher", "MANIFEST CANCELLED / LANDED");
            sync();
        }

        // --- CALENDAR & PRINT TAB ---
        function loadCalendar() {
            const c = document.getElementById('mainContent');
            let h = `
                <div class="p-4 border-b bg-white sticky top-0 z-20 no-print">
                    <div class="flex bg-gray-100 rounded-xl p-1 mb-3">
                        <button onclick="setCal('day')" class="flex-1 py-1.5 text-[10px] font-bold rounded-lg ${calFilter==='day'?'bg-white shadow-sm text-dar-green':'text-gray-400'}">DAILY</button>
                        <button onclick="setCal('week')" class="flex-1 py-1.5 text-[10px] font-bold rounded-lg ${calFilter==='week'?'bg-white shadow-sm text-dar-green':'text-gray-400'}">WEEKLY</button>
                        <button onclick="setCal('month')" class="flex-1 py-1.5 text-[10px] font-bold rounded-lg ${calFilter==='month'?'bg-white shadow-sm text-dar-green':'text-gray-400'}">MONTHLY</button>
                    </div>
                    <button onclick="window.print()" class="w-full py-2 dar-green text-white font-bold text-[10px] rounded-xl shadow-md uppercase">🖨️ Print Dispatch Report</button>
                </div>
                <div class="p-4 space-y-6">`;
            
            VEHICLES.forEach(v => {
                const logs = dataOrders.filter(o => o.received === v && o.transport === "GOV'T VEHICLE");
                h += `<div><h3 class="text-dar-green font-black text-xs uppercase pl-2 border-l-4 border-dar-gold mb-3">${v} Schedule</h3>`;
                if(logs.length === 0) h += `<div class="bg-white p-4 rounded-2xl text-[10px] text-gray-300 italic text-center">No assignments</div>`;
                else {
                    logs.forEach(o => {
                        const itin = dataItin.find(i => i.to_no === o.to_no) || { travel_date: '??' };
                        h += `<div class="bg-white p-3 rounded-2xl mb-2 flex justify-between items-center border border-gray-50 shadow-sm">
                                <div class="overflow-hidden"><p class="text-xs font-bold ${o.remarks==='MAINTENANCE'?'text-red-500':'text-gray-800'}">${o.emp_name}</p><p class="text-[9px] text-gray-400 uppercase tracking-tighter">${itin.travel_date} | ${o.remarks || 'WHOLE DAY'}</p></div>
                                <button onclick="offRoad('${v}','${itin.travel_date}')" class="text-[12px] opacity-20">🔧</button>
                              </div>`;
                    });
                }
                h += `</div>`;
            });
            c.innerHTML = h + `</div>`;
        }

        function setCal(f) { calFilter = f; loadCalendar(); }

        async function offRoad(v, d) {
            if(!confirm(`Declare ${v} unavailable on ${d}?`)) return;
            const to = `MT-${Math.floor(Math.random()*1000)}`;
            await supabase.from('travel_orders').insert({ to_no: to, emp_name: 'MAINTENANCE (OFF-ROAD)', received: v, remarks: 'MAINTENANCE', status: 'APPROVED', transport: "GOV'T VEHICLE" });
            await supabase.from('itinerary').insert({ to_no: to, travel_date: d, destination: 'Shop', purpose: 'Repair' });
            sync();
        }

        // --- MANAGE MODAL ---
        async function openM(to) {
            currTo = to;
            document.getElementById('mTitle').innerText = `TO #${to}`;
            document.getElementById('mModal').classList.remove('hidden');
            refreshM();
        }

        async function refreshM() {
            const { data } = await supabase.from('travel_orders').select('id, emp_name').eq('to_no', currTo);
            document.getElementById('mList').innerHTML = data.map((p, i) => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border">
                    <span class="text-xs font-bold text-gray-700">${p.emp_name}</span>
                    <button onclick="remP('${p.id}')" class="text-red-500 font-bold text-[9px] uppercase">Remove</button>
                </div>
            `).join('');
        }

        async function addP(n, u, d) {
            const head = dataOrders.find(o => o.to_no === currTo);
            const row = { ...head };
            delete row.id; delete row.created_at;
            row.emp_name = n; row.unit = u; row.division = d;
            await supabase.from('travel_orders').insert(row);
            refreshM();
        }

        async function remP(id) {
            await supabase.from('travel_orders').delete().eq('id', id);
            refreshM();
        }

        // --- MANUAL BOOKING ---
        async function saveRes() {
            const n = document.getElementById('resN').value;
            const u = document.getElementById('resN').dataset.unit;
            const d = document.getElementById('resN').dataset.div;
            const d1 = document.getElementById('resD1').value;
            const d2 = document.getElementById('resD2').value;
            const sl = document.getElementById('resS').value;
            const v = document.getElementById('resV').value;
            const dr = document.getElementById('resDr').value || "Dispatcher";
            const r = document.getElementById('resR').value || `RES-${Math.floor(Date.now()%1000)}`;
            const p = document.getElementById('resP').value;

            if(!n || !d1 || !p) return alert("Fill Name, Start Date, and Purpose.");
            
            await supabase.from('travel_orders').insert({ to_no: r, emp_name: n, unit: u, division: d, transport: "GOV'T VEHICLE", received: v, driver: dr, remarks: sl, status: "APPROVED" });
            
            let cur = new Date(d1);
            let end = new Date(d2);
            while(cur <= end) {
                await supabase.from('itinerary').insert({ to_no: r, travel_date: cur.toISOString().split('T')[0], destination: "Manual Booking", purpose: p });
                cur.setDate(cur.getDate() + 1);
            }
            alert("Booking saved.");
            hideRes(); sync();
        }

        window.onload = render;
    </script>
</body>
</html>
