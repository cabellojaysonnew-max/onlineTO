<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR Fleet Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dar-green: #003811; --dar-gold: #D4AF37; }
        body { background: #f3f4f6; font-family: -apple-system, system-ui, sans-serif; overflow-x: hidden; }
        .bg-dar { background: var(--dar-green); }
        .text-dar { color: var(--dar-green); }
        ::-webkit-scrollbar { display: none; }

        /* Modal - FORCED CENTER */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 999;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal-box {
            background: white; width: 100%; max-width: 600px;
            border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            max-height: 85vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .search-results { position: absolute; width: 100%; max-height: 200px; overflow-y: auto; z-index: 1000; background: white; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        
        @media print {
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100% !important; background: white; }
            .card { border: 1px solid #000 !important; margin-bottom: 10px; break-inside: avoid; padding: 15px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="login-screen" class="h-screen flex items-center justify-center p-6 bg-dar">
            <div class="bg-white p-10 rounded-3xl w-full max-w-md shadow-2xl">
                <h1 class="text-3xl font-black text-dar mb-2 text-center tracking-tighter uppercase">Fleet Master</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-8 text-center">Department of Agrarian Reform</p>
                <input id="un" type="text" placeholder="Username" class="w-full p-4 bg-gray-50 border rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-green-900">
                <input id="pw" type="password" placeholder="Password" class="w-full p-4 bg-gray-50 border rounded-2xl mb-6 outline-none focus:ring-2 focus:ring-green-900">
                <button onclick="handleLogin()" class="w-full bg-dar text-white p-4 rounded-2xl font-bold shadow-lg uppercase tracking-wider active:scale-95 transition">Enter Console</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SB_KEY = "sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo"; 
        const db = window.supabase.createClient(SB_URL, SB_KEY); // Fixes SyntaxError from image_3dc8c7.png

        const VEHICLES = ["MAZDA", "REVO", "INNOVA", "SKY", "BLACK"];
        const DRIVERS = ["Driver 1", "Driver 2", "Driver 3", "Driver 4", "Driver 5"];

        let user = null, tab = 'inbox', filter = 'day'; 
        let emps = [], orders = [], itins = [];
        let curTo = "";

        // --- 1. CORE FUNCTIONS ---
        async function log(to, app, act, date = "N/A") {
            await db.from('vehicle_logs').insert({ to_no: to, applicant: app, travel_date: date, action: act });
        }

        function getFirstStep(unit) {
            const u = (unit || "").toUpperCase();
            if (u === "PARPO") return "PENDING_PARPO";
            return (u && u !== "NULL") ? "PENDING_UNIT_HEAD" : "PENDING_CHIEF";
        }

        async function handleLogin() {
            const u = document.getElementById('un').value.trim(), p = document.getElementById('pw').value.trim();
            const { data } = await db.from('users').select('*');
            const f = data.find(x => x.username === u && String(x.password) === String(p));
            if (f && f.role === 'VEHICLE_APPROVER') { 
                user = f; 
                const {data: e} = await db.from('employees').select('*');
                emps = e || []; 
                renderDashboard(); 
            } else alert("Invalid Role or Credentials.");
        }

        async function sync() {
            const [o, i] = await Promise.all([
                db.from('travel_orders').select('*').neq('status', 'CANCELLED'), 
                db.from('itinerary').select('*')
            ]);
            orders = o.data || []; itins = i.data || [];
            if(tab === 'inbox') listInbox();
            else if(tab === 'manifest') listManifest();
            else listSchedule();
        }

        // --- 2. LAYOUT ENGINE ---
        function renderDashboard() {
            document.getElementById('app').innerHTML = `
            <div class="flex flex-col h-screen">
                <header class="bg-dar text-white p-4 flex justify-between items-center no-print shadow-lg shrink-0">
                    <div class="leading-none"><span class="block font-black text-base uppercase tracking-tight">${user.full_name}</span><p class="text-[9px] text-dar-gold font-bold">DISPATCHER CONSOLE</p></div>
                    <div class="flex gap-4 items-center">
                        <button onclick="sync()" class="text-xl">🔄</button>
                        <button onclick="location.reload()" class="bg-white/10 px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest">Exit</button>
                    </div>
                </header>

                <nav class="bg-white border-b flex no-print shrink-0">
                    <button onclick="go('inbox')" class="flex-1 p-4 text-[10px] font-black ${tab==='inbox'?'border-b-4 border-green-900 text-dar':'text-gray-400'} uppercase">Inbox</button>
                    <button onclick="go('manifest')" class="flex-1 p-4 text-[10px] font-black ${tab==='manifest'?'border-b-4 border-green-900 text-dar':'text-gray-400'} uppercase">Manifest</button>
                    <button onclick="go('schedule')" class="flex-1 p-4 text-[10px] font-black ${tab==='schedule'?'border-b-4 border-green-900 text-dar':'text-gray-400'} uppercase">Fleet Status</button>
                </nav>

                <main id="main-content" class="flex-1 overflow-y-auto p-4 no-scrollbar print-area"></main>

                <footer class="p-4 no-print bg-white border-t shrink-0 flex gap-2">
                    <button onclick="openM('bookMod')" class="flex-1 bg-dar text-white p-4 rounded-2xl font-black text-xs uppercase shadow-xl">+ New Reservation</button>
                </footer>
            </div>
            ${allModals()}`;
            sync();
        }

        function allModals() {
            return `
            <div id="bookMod" class="hidden modal-overlay">
                <div class="modal-box p-6">
                    <div class="flex justify-between items-center mb-6 shrink-0 border-b pb-4">
                        <h2 class="font-black text-dar uppercase text-sm">Manual Booking</h2>
                        <button onclick="closeM('bookMod')" class="text-gray-400 text-xl font-bold">✕</button>
                    </div>
                    <div class="space-y-4 overflow-y-auto no-scrollbar pr-1 flex-1">
                        <div class="relative"><input id="resN" oninput="runS(this, 'resResults')" placeholder="Lead Personnel Name" class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none"><div id="resResults" class="search-results hidden"></div></div>
                        <div class="grid grid-cols-2 gap-3"><input id="resD1" type="date" class="p-4 bg-gray-50 border rounded-2xl text-xs"><input id="resD2" type="date" class="p-4 bg-gray-50 border rounded-2xl text-xs"></div>
                        <select id="resS" class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none font-bold"><option>WHOLE DAY</option><option>AM</option><option>PM</option></select>
                        <select id="resV" class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none font-bold">${VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select>
                        <input id="resDr" list="dl" placeholder="Driver Name (Editable)" class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none">
                        <input id="resR" placeholder="PSO / RSO / TO #" class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none">
                        <input id="resP" placeholder="Purpose" class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none">
                    </div>
                    <button onclick="saveManual()" class="w-full bg-dar text-white p-5 rounded-2xl font-black uppercase text-xs shadow-lg mt-4 shrink-0">Confirm Deployment</button>
                </div>
            </div>

            <div id="peepMod" class="hidden modal-overlay">
                <div class="modal-box p-6 h-[500px]">
                    <div class="flex justify-between items-center mb-4 shrink-0 border-b pb-4">
                        <div><h2 class="font-black text-dar uppercase text-sm">Deployment Manifest</h2><p id="pToTitle" class="text-[10px] text-gray-400 font-bold uppercase mt-1"></p></div>
                        <button onclick="closeM('peepMod')" class="text-gray-400 text-xl font-bold">✕</button>
                    </div>
                    <div id="pList" class="flex-1 space-y-3 overflow-y-auto no-scrollbar pr-1 mb-4"></div>
                    <div class="relative shrink-0 border-t pt-4">
                        <p class="text-[10px] font-black text-gray-400 uppercase mb-2">Add Personnel to this trip:</p>
                        <input id="pAdd" oninput="runS(this, 'pResults')" placeholder="Search and click a name..." class="w-full p-4 bg-gray-50 border rounded-2xl text-sm outline-none focus:border-dar">
                        <div id="pResults" class="search-results hidden bottom-full mb-2"></div>
                    </div>
                </div>
            </div>

            <div id="transMod" class="hidden modal-overlay">
                <div class="modal-box p-6">
                    <h2 class="font-black text-dar text-sm uppercase mb-1">Smart Transfer</h2>
                    <p id="tDets" class="text-[10px] text-gray-400 mb-6 font-bold uppercase"></p>
                    <div class="space-y-4 mb-6">
                        <p class="text-[10px] font-black text-gray-400 uppercase">Available Fleet (Date Filtered):</p>
                        <select id="tSelect" class="w-full p-4 border rounded-2xl text-sm bg-gray-50 font-black text-dar outline-none"></select>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="closeM('transMod')" class="flex-1 bg-gray-100 p-4 rounded-2xl font-black uppercase text-[10px]">Cancel</button>
                        <button id="tExec" class="flex-[2] bg-dar-gold text-white p-4 rounded-2xl font-black uppercase text-[10px] shadow-lg">Confirm Transfer</button>
                    </div>
                </div>
            </div>
            <datalist id="dl">${DRIVERS.map(d=>`<option value="${d}">`).join('')}</datalist>`;
        }

        // --- 3. TAB LOGIC ---
        function listInbox() {
            const m = document.getElementById('main-content');
            const data = orders.filter(x => x.status === 'PENDING_VEHICLE_APPROVER' && x.transport === "GOV'T VEHICLE");
            if (!data.length) { m.innerHTML = `<div class="p-20 text-center opacity-20 uppercase font-black text-xs mt-20">Inbox Empty</div>`; return; }
            m.innerHTML = data.map(o => {
                const itin = itins.find(i => i.to_no === o.to_no) || {travel_date: '?'};
                return `
                <div class="bg-white p-6 rounded-3xl shadow-sm mb-4 border border-dar-gold/20 flex flex-col">
                    <div class="flex justify-between mb-2 shrink-0"><span class="text-[10px] font-black text-dar bg-green-50 px-2 py-0.5 rounded uppercase">TO #${o.to_no}</span><button onclick="toLand('${o.to_no}','${o.unit}')" class="text-blue-600 text-[10px] font-bold underline uppercase">Switch to LAND</button></div>
                    <h3 class="font-black text-gray-800 text-lg leading-tight mb-4">${o.emp_name}</h3>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div><label class="text-[8px] font-black text-gray-400 uppercase">Assign Vehicle</label><select id="v-${o.to_no}" class="w-full p-3 bg-gray-50 border rounded-xl text-xs font-black text-dar">${VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select></div>
                        <div><label class="text-[8px] font-black text-gray-400 uppercase">Assignment</label><select id="s-${o.to_no}" class="w-full p-3 bg-gray-50 border rounded-xl text-xs font-black text-gray-600"><option>WHOLE DAY</option><option>AM</option><option>PM</option></select></div>
                    </div>
                    <div class="mb-4"><label class="text-[8px] font-black text-gray-400 uppercase">Driver Name</label><input id="d-${o.to_no}" list="dl" placeholder="Type or select..." class="w-full p-3 bg-gray-50 border rounded-xl text-xs font-black"></div>
                    <div class="flex gap-2">
                        <button onclick="toLand('${o.to_no}','${o.unit}')" class="flex-1 bg-red-50 text-red-600 py-4 rounded-2xl text-[10px] font-black uppercase">Reject</button>
                        <button onclick="doApprove('${o.to_no}','${o.unit}','${o.emp_name.replace(/'/g, "\\'")}')" class="flex-[2] bg-dar text-white py-4 rounded-2xl text-[10px] font-black uppercase shadow-lg">Approve & Dispatch</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function doApprove(to, unit, name) {
            const v = document.getElementById(`v-${to}`).value, s = document.getElementById(`s-${to}`).value, d = document.getElementById(`d-${to}`).value || "TBD";
            const next = getFirstStep(unit);
            await db.from('travel_orders').update({ received: v, driver: d, remarks: s, status: next }).eq('to_no', to);
            await log(to, name, `APPROVED: ${v} (${s}) - Driver: ${d}`);
            sync();
        }

        async function toLand(to, unit) {
            if(!confirm("Change to LAND? This resets the routing process.")) return;
            const next = getFirstStep(unit);
            await db.from('travel_orders').update({ transport: 'LAND', status: next, received: null, driver: null }).eq('to_no', to);
            sync();
        }

        function listManifest() {
            const m = document.getElementById('main-content');
            const data = orders.filter(x => x.transport === "GOV'T VEHICLE" && x.status !== 'PENDING_VEHICLE_APPROVER');
            const grp = {}; data.forEach(x => { if(!grp[x.to_no]) grp[x.to_no] = []; grp[x.to_no].push(x); });
            m.innerHTML = Object.entries(grp).map(([to, list]) => `
            <div class="bg-white p-6 rounded-3xl shadow-sm mb-3 border-l-8 border-dar relative">
                <div class="flex justify-between items-start mb-2"><span class="text-[9px] font-black text-gray-400 uppercase">TO #${to}</span><span class="text-[9px] bg-green-50 text-dar font-black px-2 py-1 rounded uppercase">${list[0].remarks||'WHOLE'}</span></div>
                <h3 class="font-black text-gray-800 text-sm uppercase mb-1">${list[0].emp_name}</h3>
                <p class="text-[10px] text-gray-400 uppercase font-black tracking-tight">🚙 ${list[0].received} | 👤 ${list[0].driver}</p>
                <div class="flex gap-2 mt-5">
                    <button onclick="doCancel('${to}','${list[0].status}')" class="flex-1 bg-white border border-red-200 text-red-600 px-4 py-3 rounded-2xl text-[9px] font-black uppercase">Cancel</button>
                    <button onclick="managePeeps('${to}')" class="flex-[2] bg-gray-100 text-dar px-4 py-3 rounded-2xl text-[9px] font-black uppercase">Manage People (${list.length})</button>
                </div>
            </div>`).join('');
        }

        async function doCancel(to, status) {
            if(!confirm("Cancel deployment?")) return;
            if(status === 'APPROVED') await db.from('travel_orders').update({ transport: 'LAND' }).eq('to_no', to);
            else await db.from('travel_orders').update({ transport: 'LAND', status: 'PENDING_UNIT_HEAD' }).eq('to_no', to);
            sync();
        }

        // --- 4. SCHEDULE & FEATURE 8 (Smart Transfer) ---
        function listSchedule() {
            const m = document.getElementById('main-content');
            const now = new Date(); now.setHours(0,0,0,0);
            const filteredItins = itins.filter(i => {
                const d = new Date(i.travel_date); d.setHours(0,0,0,0);
                if (filter === 'day') return d.getTime() === now.getTime();
                if (filter === 'week') {
                    const s = new Date(now); s.setDate(now.getDate() - now.getDay());
                    const e = new Date(s); e.setDate(s.getDate() + 6);
                    return d >= s && d <= e;
                }
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            const validIds = filteredItins.map(i => i.to_no);

            m.innerHTML = `
            <div class="no-print bg-white p-2 rounded-2xl mb-6 flex gap-1 shadow-sm border border-gray-100">
                <button onclick="setFilter('day')" class="flex-1 py-3 text-[10px] font-black rounded-xl ${filter==='day'?'bg-dar text-white':'text-gray-400'} uppercase">Daily</button>
                <button onclick="setFilter('week')" class="flex-1 py-3 text-[10px] font-black rounded-xl ${filter==='week'?'bg-dar text-white':'text-gray-400'} uppercase">Weekly</button>
                <button onclick="setFilter('month')" class="flex-1 py-3 text-[10px] font-black rounded-xl ${filter==='month'?'bg-dar text-white':'text-gray-400'} uppercase">Monthly</button>
                <button onclick="window.print()" class="flex-1 py-3 text-[10px] bg-dar-gold text-white font-black rounded-xl uppercase">Print</button>
            </div>
            <div class="print-area"><h1 class="print-header text-dar uppercase text-center font-black mb-8 underline">Fleet Status (${filter.toUpperCase()})</h1>` + VEHICLES.map(v => {
                const logs = orders.filter(o => o.received === v && validIds.includes(o.to_no));
                const uniqueIds = [...new Set(logs.map(l => l.to_no))];
                return `<div class="mb-8 card"><div class="flex justify-between items-center mb-4 border-b pb-2"><h3 class="font-black text-xs text-dar uppercase tracking-widest border-l-4 border-dar-gold pl-2">${v} STATUS</h3><button onclick="offRoad('${v}')" class="no-print bg-red-600 text-white text-[8px] px-2 py-1 rounded font-black uppercase">Declare Off-Road</button></div>` + 
                (uniqueIds.length ? uniqueIds.map(toNo => {
                    const h = logs.find(l => l.to_no === toNo);
                    const isMaint = h.remarks === 'MAINTENANCE';
                    const dates = filteredItins.filter(itin => itin.to_no === toNo).map(itin => itin.travel_date).join(', ');
                    return `<div class="bg-white p-4 rounded-2xl mb-2 flex justify-between items-center border border-gray-100 shadow-sm relative">
                        <div class="overflow-hidden leading-tight"><p class="text-xs font-black ${isMaint?'text-red-600':'text-gray-800'} truncate uppercase">${h.emp_name}</p><p class="text-[9px] text-gray-400 font-bold uppercase mt-1 tracking-tight">${dates} | ${h.remarks || 'WHOLE'}</p></div>
                        <button onclick="smartTransfer('${h.to_no}','${v}')" class="text-2xl no-print active:scale-75 transition">🔄</button>
                    </div>`;
                }).join('') : `<div class="p-6 bg-white/50 rounded-2xl border border-dashed text-center text-[10px] text-gray-300 font-black uppercase tracking-widest">Available for Use</div>`) + `</div>`;
            }).join('') + `</div>`;
        }

        async function offRoad(v) {
            const date = prompt("Maintenance Date (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
            if(!date) return;
            const to = `OFF-${Math.floor(Math.random()*1000)}`;
            await db.from('travel_orders').insert({ to_no: to, emp_name: 'VEHICLE UNAVAILABLE', received: v, remarks: 'MAINTENANCE', status: 'APPROVED', transport: "GOV'T VEHICLE" });
            await db.from('itinerary').insert({ to_no: to, travel_date: date, destination: "Garage", purpose: "Maintenance" });
            sync();
        }

        async function smartTransfer(to, currentV) {
            const dates = itins.filter(i => i.to_no === to).map(i => i.travel_date);
            const busy = orders.filter(o => {
                if (o.status === 'CANCELLED' || o.to_no === to) return false;
                return itins.filter(i => i.to_no === o.to_no).some(i => dates.includes(i.travel_date));
            }).map(o => ({ v: o.received, to: o.to_no, drv: o.driver }));

            const options = VEHICLES.filter(v => v !== currentV).map(v => {
                const match = busy.find(b => b.v === v);
                return `<option value="${v}" data-drv="${match?match.drv:''}">${v} ${match ? `(Join TO #${match.to})` : '(Available)'}</option>`;
            }).join('');

            document.getElementById('tDets').innerText = `Moving Personnel (TO #${to}) to another vehicle for: ${dates.join(', ')}`;
            document.getElementById('tSelect').innerHTML = options;
            document.getElementById('tExec').onclick = async () => {
                const target = document.getElementById('tSelect').value;
                const existingDrv = document.getElementById('tSelect').options[document.getElementById('tSelect').selectedIndex].dataset.drv;
                const payload = { received: target };
                if(existingDrv) payload.driver = existingDrv; 
                await db.from('travel_orders').update(payload).eq('to_no', to);
                await log(to, "Dispatcher", `TRANSFERRED: ${currentV} to ${target}`);
                closeM('transMod'); sync();
            };
            openM('transMod');
        }

        // --- 5. SEARCH & PEOPLE MGMT (Feature 9 & 10) ---
        function runS(inp, resId) {
            const div = document.getElementById(resId);
            const val = inp.value.toLowerCase().trim();
            if (val.length < 2) { div.classList.add('hidden'); return; }
            const match = emps.filter(e => e.full_name.toLowerCase().includes(val)).slice(0, 5);
            div.innerHTML = match.map(e => {
                const sn = e.full_name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                return `<div onclick="pickE('${sn}','${resId}','${inp.id}','${e.unit||''}','${e.division||''}')" class="p-4 border-b text-xs font-black text-gray-700 active:bg-gray-100 cursor-pointer uppercase">${e.full_name}</div>`;
            }).join('');
            div.classList.remove('hidden');
        }

        function pickE(n, rId, iId, u, d) {
            const input = document.getElementById(iId);
            input.value = n; input.dataset.unit = u; input.dataset.div = d;
            document.getElementById(rId).classList.add('hidden');
            if (iId === 'pAdd') addPerson(n, u, d);
        }

        async function managePeeps(to) {
            curTo = to;
            document.getElementById('pToTitle').innerText = `TRIP NUMBER: ${to}`;
            openM('peepMod');
            renderPList();
        }

        async function renderPList() {
            const { data } = await db.from('travel_orders').select('id, emp_name').eq('to_no', curTo);
            document.getElementById('pList').innerHTML = data.map((p, idx) => `
                <div class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl border border-gray-100">
                    <span class="text-xs font-black text-gray-700 uppercase">${p.emp_name} ${idx===0?'<span class="ml-2 text-[8px] bg-dar text-white px-2 py-0.5 rounded-full">LEAD</span>':''}</span>
                    ${idx!==0?`<button onclick="remP('${p.id}')" class="w-8 h-8 flex items-center justify-center bg-white rounded-full text-red-500 font-black shadow-sm border border-red-50 active:scale-90 transition">✕</button>`:''}
                </div>`).join('');
        }

        async function addPerson(n, u, d) {
            const head = orders.find(o => o.to_no === curTo);
            const row = { ...head }; delete row.id; delete row.created_at;
            row.emp_name = n; row.unit = u; row.division = d;
            await db.from('travel_orders').insert(row);
            document.getElementById('pAdd').value = "";
            renderPList();
        }

        async function remP(id) { await db.from('travel_orders').delete().eq('id', id); renderPList(); }

        async function saveManual() {
            const n = document.getElementById('resN').value, d1 = document.getElementById('resD1').value, d2 = document.getElementById('resD2').value;
            const s = document.getElementById('resS').value, v = document.getElementById('resV').value, dr = document.getElementById('resDr').value;
            const r = document.getElementById('resR').value, p = document.getElementById('resP').value;
            const u = document.getElementById('resN').dataset.unit, dDiv = document.getElementById('resN').dataset.div;
            if(!n || !d1 || !p) return alert("Missing Personnel, Date, or Purpose.");
            const to = r || `RES-${Math.floor(Date.now()%10000)}`;
            await db.from('travel_orders').insert({ to_no: to, emp_name: n, unit: u, division: dDiv, transport: "GOV'T VEHICLE", received: v, driver: dr, remarks: s, status: "APPROVED" });
            let start = new Date(d1), end = new Date(d2 || d1);
            while(start <= end) {
                await db.from('itinerary').insert({ to_no: to, travel_date: start.toISOString().split('T')[0], destination: "Manual Booking", purpose: p });
                start.setDate(start.getDate() + 1);
            }
            closeM('bookMod'); sync();
        }

        function go(t) { tab = t; renderDashboard(); }
        function openM(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeM(id) { document.getElementById(id).classList.add('hidden'); }
        function setFilter(f) { filter = f; renderSchedule(); }
    </script>
</body>
</html>
