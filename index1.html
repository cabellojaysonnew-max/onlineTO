<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAR CS I - Mobile Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
    --dar-green: #003811;
    --dar-gold: #D4AF37;
    --bg-main: #eef3f1;
}

/* BASE */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg,#f4f7f6,#e6efec);
}

/* CENTER LOGIN */
.login-wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN CARD */
.login-card {
    width: 100%;
    max-width: 420px;
    background: white;
    padding: 40px 30px;
    border-radius: 18px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    border-top: 6px solid var(--dar-gold);
}

/* TITLE */
.login-title {
    text-align: center;
    color: var(--dar-green);
    margin-bottom: 5px;
}

.login-sub {
    text-align: center;
    font-size: 12px;
    color: gray;
    margin-bottom: 30px;
}

/* INPUT GROUP */
.input-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* INPUTS */
input {
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* BUTTON */
.btn {
    margin-top: 10px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--dar-green);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.btn:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="login-wrapper">
    <div class="login-card">
        <h2 class="login-title">DAR PORTAL</h2>
        <p class="login-sub">CAMARINES SUR I - MOBILE</p>

        <div class="input-group">
            <input type="text" id="login-id" placeholder="Employee ID">
            <input type="password" id="login-pass" placeholder="Password">
        </div>

        <button class="btn" onclick="handleLogin()">SECURE LOGIN</button>
    </div>
</div>

<script>
function handleLogin(){
    alert("Login still uses your original logic");
}
</script>

</body>
</html>
