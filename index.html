<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR Portal Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --dar-green: #003811;
            --dar-light: #006400;
            --dar-gold: #D4AF37;
            --bg-main: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --danger: #dc2626;
            --success: #16a34a;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background-color: var(--bg-main); color: var(--text-main); -webkit-tap-highlight-color: transparent; }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        .view { display: none; padding: 15px; padding-bottom: 110px; }
        .view.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .app-header { background: var(--dar-green); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        h4 { margin-top: 0; color: var(--dar-green); font-size: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        label { display: block; font-size: 11px; font-weight: bold; color: var(--text-muted); margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; display: flex; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--dar-green); }
        .btn-gold { background: var(--dar-gold); color: var(--dar-green); }
        .btn-danger { background: var(--danger); font-size: 11px; padding: 5px 10px; width: auto; border: none; border-radius: 4px; color: white; cursor: pointer;}

        /* Calendar Styles */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .calendar-day { background: white; border-radius: 4px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; position: relative; border: 1px solid #eee; }
        .calendar-header { font-weight: bold; color: var(--dar-green); font-size: 10px; text-transform: uppercase; padding: 5px 0; text-align: center; }
        .dot-container { display: flex; gap: 2px; position: absolute; bottom: 3px; }
        .dot { width: 4px; height: 4px; border-radius: 50%; }
        .dot-to { background: var(--dar-green); }
        .dot-pso { background: var(--dar-gold); }
        .dot-holiday { background: var(--danger); }
        .today { border: 2px solid var(--dar-gold); font-weight: bold; }

        /* Status Styles */
        .status-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-bottom: 5px; display: inline-block; }
        .bg-pending { background: #fefce8; color: #854d0e; }
        .bg-approved { background: #ecfdf5; color: #16a34a; }
        .bg-cancelled { background: #fef2f2; color: #991b1b; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--dar-green); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 12px 0; text-align: center; color: #9ca3af; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--dar-gold); border-top: 3px solid var(--dar-gold); background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 25px;">
            <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid var(--dar-gold);">
                <h2 style="color: var(--dar-green); text-align: center; margin: 0;">DAR PORTAL</h2>
                <p style="text-align: center; font-size: 12px; color: gray; margin-bottom: 25px;">Mobile Access</p>
                <input type="text" id="login-id" placeholder="Employee ID">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn btn-primary" onclick="handleLogin()">LOGIN</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-header">
            <div>
                <div id="user-name" style="font-weight: bold; font-size: 14px;">User</div>
                <div id="user-div" style="font-size: 11px; color: var(--dar-gold);">Division</div>
            </div>
            <button onclick="location.reload()" style="background: none; border: 1px solid white; color: white; border-radius: 4px; padding: 4px 8px; font-size: 11px;">Logout</button>
        </div>

        <div id="apply-view" class="view active">
            <div class="card">
                <h4>Personnel Involved</h4>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="emp-search" placeholder="Search..." style="margin-bottom: 0;">
                    <button class="btn btn-primary" style="width: 80px;" onclick="searchEmployees()">Find</button>
                </div>
                <div id="search-results" class="search-results"></div>
                <div id="personnel-draft-list" style="margin-top: 10px;"></div>
            </div>
            <div class="card">
                <h4>Itinerary Builder</h4>
                <input type="date" id="itin-date" onkeydown="return false">
                <input type="text" id="itin-dest" placeholder="Destination">
                <input type="text" id="itin-purp" placeholder="Purpose">
                <button class="btn btn-primary" onclick="addItinDraft()">+ Add Date</button>
                <div id="itin-draft-list" style="margin-top: 10px;"></div>
            </div>
            <button class="btn btn-gold" onclick="submitTO()">🚀 SUBMIT APPLICATION</button>
        </div>

        <div id="status-view" class="view">
            <h3 style="color: var(--dar-green);">My Applications</h3>
            <div id="status-list"></div>
        </div>

        <div id="calendar-view" class="view">
            <h3 style="color: var(--dar-green);">My Schedule</h3>
            <div class="card">
                <div id="calendar-month-year" style="font-weight: bold; color: var(--dar-green); text-align: center; margin-bottom: 10px;">April 2026</div>
                <div class="calendar-grid" id="calendar-header-grid"></div>
                <div class="calendar-grid" id="calendar-body-grid"></div>
                <div style="margin-top: 15px; display: flex; gap: 10px; font-size: 10px; justify-content: center;">
                    <span><span class="dot dot-to" style="display:inline-block; vertical-align:middle;"></span> TO</span>
                    <span><span class="dot dot-pso" style="display:inline-block; vertical-align:middle;"></span> PSO</span>
                    <span><span class="dot dot-holiday" style="display:inline-block; vertical-align:middle;"></span> Holiday</span>
                </div>
            </div>
            <div id="day-details" style="margin-top: 10px; font-size: 12px; color: var(--text-muted); text-align: center;">Select a day to see details</div>
        </div>

        <div id="security-view" class="view">
            <h3 style="color: var(--dar-green);">Security Settings</h3>
            <div class="card">
                <h4>Change Password</h4>
                <label>Current Password</label>
                <input type="password" id="current-pass">
                <label>New Password</label>
                <input type="password" id="new-pass">
                <label>Confirm New Password</label>
                <input type="password" id="confirm-pass">
                <button class="btn btn-primary" onclick="changePassword()">UPDATE PASSWORD</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('apply-view', this)">📝 Apply</div>
            <div class="nav-item" onclick="switchTab('status-view', this)">📋 Status</div>
            <div class="nav-item" onclick="switchTab('calendar-view', this)">📅 Calendar</div>
            <div class="nav-item" onclick="switchTab('security-view', this)">🔒 Security</div>
        </div>
    </div>

    <script type="module">
        const supabaseUrl = 'https://ytfpiyfapvybihlngxks.supabase.co';
        const supabaseKey = 'sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let itineraryDraft = [];
        let personnelDraft = [];
        const todayStr = new Date().toISOString().split('T')[0];

        // --- Navigation ---
        window.switchTab = function(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if (id === 'status-view') loadStatus();
            if (id === 'calendar-view') renderCalendar();
        };

        // --- Login ---
        window.handleLogin = async function() {
            const id = document.getElementById('login-id').value;
            const pass = document.getElementById('login-pass').value;
            const { data } = await supabase.from('employees').select('*').eq('emp_id', id).single();
            if (data && data.pass === pass) {
                currentUser = data;
                document.getElementById('user-name').innerText = data.full_name;
                document.getElementById('user-div').innerText = data.division;
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('app-screen').classList.add('active');
                document.getElementById('itin-date').min = todayStr;
                personnelDraft = [{ emp_id: data.emp_id, name: data.full_name, unit: data.unit }];
            } else { alert("Invalid ID or Password"); }
        };

        // --- Status Details ---
        window.loadStatus = async function() {
            const list = document.getElementById('status-list');
            list.innerHTML = 'Loading...';
            const { data: tos } = await supabase.from('travel_orders').select('*').eq('emp_id', currentUser.emp_id).order('created_at', {ascending: false}).limit(10);
            if (!tos) return;
            
            let html = '';
            for(let to of tos) {
                const { data: itin } = await supabase.from('itinerary').select('*').eq('to_no', to.to_no);
                const statusClass = to.status.includes('APPROVED') ? 'bg-approved' : (to.status.includes('CANCEL') ? 'bg-cancelled' : 'bg-pending');
                
                html += `
                    <div class="card" style="padding:12px;">
                        <span class="status-badge ${statusClass}">${to.status.replace(/_/g, ' ')}</span>
                        <div style="font-weight:bold; font-size:14px; margin-bottom:5px;">${to.to_no}</div>
                        <div style="font-size:11px; color:gray; margin-bottom:8px;">Issued: ${new Date(to.created_at).toLocaleDateString()}</div>
                        <div style="border-top: 1px dashed #eee; padding-top:8px;">
                            ${itin.map(i => `<div style="font-size:12px; margin-bottom:4px;">📅 ${i.travel_date} - 📍 ${i.destination}<br><span style="color:gray; font-style:italic;">"${i.purpose}"</span></div>`).join('')}
                        </div>
                    </div>`;
            }
            list.innerHTML = html || '<p style="text-align:center;">No records.</p>';
        };

        // --- Calendar Logic ---
        window.renderCalendar = async function() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Fetch markers
            const { data: itins } = await supabase.from('itinerary').select('travel_date, to_no');
            const { data: psos } = await supabase.from('pso_records').select('start_date, end_date').eq('emp_id', currentUser.emp_id);
            const { data: holidays } = await supabase.from('holidays').select('date');

            const headerGrid = document.getElementById('calendar-header-grid');
            const bodyGrid = document.getElementById('calendar-body-grid');
            headerGrid.innerHTML = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(d => `<div class="calendar-header">${d}</div>`).join('');
            bodyGrid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) bodyGrid.innerHTML += '<div></div>';
            
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const hasTO = itins?.some(i => i.travel_date === dateStr);
                const hasPSO = psos?.some(p => dateStr >= p.start_date && dateStr <= p.end_date);
                const isHoliday = holidays?.some(h => h.date === dateStr);
                
                bodyGrid.innerHTML += `
                    <div class="calendar-day ${dateStr === todayStr ? 'today' : ''}">
                        ${d}
                        <div class="dot-container">
                            ${hasTO ? '<div class="dot dot-to"></div>' : ''}
                            ${hasPSO ? '<div class="dot dot-pso"></div>' : ''}
                            ${isHoliday ? '<div class="dot dot-holiday"></div>' : ''}
                        </div>
                    </div>`;
            }
        };

        // --- Password Logic ---
        window.changePassword = async function() {
            const curr = document.getElementById('current-pass').value;
            const nw = document.getElementById('new-pass').value;
            const conf = document.getElementById('confirm-pass').value;

            if (curr !== currentUser.pass) return alert("Current password incorrect");
            if (nw !== conf) return alert("New passwords do not match");
            if (nw.length < 4) return alert("Password too short");

            const { error } = await supabase.from('employees').update({ pass: nw }).eq('emp_id', currentUser.emp_id);
            if (!error) {
                currentUser.pass = nw;
                alert("Password updated!");
                location.reload();
            } else { alert("Error updating password."); }
        };
    </script>
</body>
</html>
