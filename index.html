<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR CS I - Mobile Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --dar-green: #003811;
            --dar-light: #006400;
            --dar-gold: #D4AF37;
            --bg-main: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; background-color: var(--bg-main); color: var(--text-main); -webkit-tap-highlight-color: transparent; }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        .view { display: none; padding: 15px; padding-bottom: 120px; }
        .view.active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .app-header { background: var(--dar-green); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--dar-gold); }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #e5e7eb; }
        
        h4 { margin-top: 0; color: var(--dar-green); font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; color: var(--text-muted); margin-bottom: 4px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.2s; margin-bottom: 8px; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn-primary { background: var(--dar-green); }
        .btn-gold { background: var(--dar-gold); color: var(--dar-green); }
        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }
        .btn-warning { background: var(--warning); }
        
        .action-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn-small { padding: 8px; font-size: 11px; flex: 1; margin-bottom: 0; }

        .cal-container { background: white; border-radius: 8px; overflow-x: auto; }
        .cal-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .cal-table th { background: var(--dar-green); color: white; padding: 10px; text-align: left; position: sticky; top: 0; }
        .cal-table td { padding: 8px; border-bottom: 1px solid #eee; vertical-align: top; }
        .day-num { font-weight: bold; font-size: 14px; color: var(--dar-green); }
        .cal-entry { margin-bottom: 4px; padding: 4px; border-radius: 4px; color: white; font-weight: bold; font-size: 10px; }
        .entry-to { background: var(--dar-green); }
        .entry-pso { background: var(--dar-gold); color: #003811; }
        .entry-holiday { background: var(--danger); }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--dar-green); display: flex; z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 15px 0; text-align: center; color: #9ca3af; font-size: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--dar-gold); border-top: 3px solid var(--dar-gold); background: rgba(255,255,255,0.05); }

        .badge { font-size: 10px; padding: 3px 8px; border-radius: 12px; font-weight: bold; text-transform: uppercase; float: right; }
        .bg-pending { background: #fefce8; color: #854d0e; }
        .bg-approved { background: #ecfdf5; color: #166534; }
        .bg-cancelled { background: #fef2f2; color: #991b1b; }
        
        .search-results { background: white; border: 1px solid #ddd; border-radius: 8px; max-height: 150px; overflow-y: auto; margin-top: -10px; margin-bottom: 10px; display: none; }
        .search-row { padding: 10px; border-bottom: 1px solid #eee; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div style="height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 25px;">
            <div style="background: white; padding: 35px 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--dar-gold);">
                <h2 style="color: var(--dar-green); text-align: center; margin: 0;">DAR PORTAL</h2>
                <p style="text-align: center; font-size: 12px; color: gray; margin-bottom: 25px; font-weight: bold;">CAMARINES SUR I - MOBILE</p>
                <input type="text" id="login-id" placeholder="Employee ID" inputmode="numeric">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn btn-primary" onclick="handleLogin()">SECURE LOGIN</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-header">
            <div>
                <div id="user-name" style="font-weight: bold; font-size: 14px;">User</div>
                <div id="user-info" style="font-size: 10px; color: var(--dar-gold); font-weight: bold;">Division | Position</div>
            </div>
            <button onclick="location.reload()" style="background: none; border: 1px solid white; color: white; border-radius: 4px; padding: 4px 8px; font-size: 11px;">Logout</button>
        </div>

        <div id="apply-view" class="view active">
            <div class="card">
                <h4>1. Personnel (Max 5)</h4>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="emp-search" placeholder="Search Name or ID" style="margin-bottom: 0;">
                    <button class="btn btn-primary" style="width: 70px; padding:0; height: 45px;" onclick="searchEmployees()">Find</button>
                </div>
                <div id="search-results" class="search-results"></div>
                <div id="personnel-draft-list" style="margin-top: 10px;"></div>
            </div>

            <div class="card">
                <h4>2. Logistics</h4>
                <label>Means of Transportation</label>
                <select id="to-transport">
                    <option value="LAND">Public Utility (LAND)</option>
                    <option value="GOV'T VEHICLE">Gov't Vehicle</option>
                    <option value="AIR">Air Travel</option>
                    <option value="OTHERS">Others</option>
                </select>
            </div>

            <div class="card">
                <h4>3. Itinerary Builder</h4>
                <label>Date Range (From - To, Max 5 days)</label>
                <div style="display: flex; gap: 5px;">
                    <input type="date" id="itin-from" onchange="handleStartDateChange()" onkeydown="return false">
                    <input type="date" id="itin-to" onchange="generateItinFields()" onkeydown="return false">
                </div>
                <div id="dynamic-itin-fields" style="margin-top: 15px;"></div>
            </div>
            <button class="btn btn-gold" id="btn-submit-to" onclick="submitTO()">🚀 SUBMIT OFFICIAL REQUEST</button>
        </div>

        <div id="status-view" class="view">
            <h3 style="color: var(--dar-green);">APPLICATIONS</h3>
            <div id="status-list"></div>
        </div>

        <div id="calendar-view" class="view">
            <h3 style="color: var(--dar-green);">Personal Activity Schedule</h3>
            <div class="card" style="padding:0;">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; background:#f0f4f8;">
                    <button onclick="changeCalMonth(-1)" class="btn-primary" style="width:auto; padding:5px 15px; margin:0;">&lt;</button>
                    <div id="cal-month-year" style="font-weight:bold; color:var(--dar-green);"></div>
                    <button onclick="changeCalMonth(1)" class="btn-primary" style="width:auto; padding:5px 15px; margin:0;">&gt;</button>
                </div>
                <div class="cal-container">
                    <table class="cal-table">
                        <thead>
                            <tr>
                                <th>Day</th>
                                <th>Schedule / Details</th>
                            </tr>
                        </thead>
                        <tbody id="cal-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="security-view" class="view">
            <h3 style="color: var(--dar-green);">Security</h3>
            <div class="card">
                <h4>Update Portal Password</h4>
                <label>Current Password</label>
                <input type="password" id="pass-curr">
                <label>New Password</label>
                <input type="password" id="pass-new">
                <label>Confirm Password</label>
                <input type="password" id="pass-conf">
                <button class="btn btn-primary" onclick="changePassword()">UPDATE PASSWORD</button>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('apply-view', this)">📝 Apply</div>
            <div class="nav-item" onclick="switchTab('status-view', this)">📋 Status</div>
            <div class="nav-item" onclick="switchTab('calendar-view', this)">📅 Calendar</div>
            <div class="nav-item" onclick="switchTab('security-view', this)">🔒 Security</div>
        </div>
    </div>

    <script type="module">
        // SUPABASE CONFIGURATION
        const supabaseUrl = 'https://ytfpiyfapvybihlngxks.supabase.co';
        const supabaseKey = 'sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // GLOBAL STATE VARIABLES
        let currentUser = null; // Stores authenticated user data
        let itineraryDraft = []; // Stores the current working travel dates and destinations
        let personnelDraft = []; // Stores the list of employees associated with the current TO application
        const todayStr = new Date().toISOString().split('T')[0]; // Pre-calculated string for 'today' to prevent backdating
        let calDate = new Date(); // Tracks the currently viewed month in the calendar
        let isSubmitting = false; // Prevents duplicate submissions on double-click
        let conflictsToProcess = []; // Stores existing TOs identified for SPLIT or OVERWRITE logic during application

        // UTILITY: Convert image URL to Base64 for PDF embedding (required for jsPDF images)
        const urlToBase64 = async (url) => {
            try {
                const response = await fetch(url);
                if (!response.ok) return null;
                const blob = await response.blob();
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                });
            } catch (e) { return null; }
        };

        // AUTHENTICATION
        window.handleLogin = async function() {
            const id = document.getElementById('login-id').value.trim();
            const pass = document.getElementById('login-pass').value.trim();
            const { data } = await supabase.from('employees').select('*').eq('emp_id', id).single();
            if (data && data.pass === pass) {
                currentUser = data;
                document.getElementById('user-name').innerText = data.full_name;
                document.getElementById('user-info').innerText = `${data.division} | ${data.position}`; 
                
                // Hide login screen, show main app
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('app-screen').classList.add('active');
                
                // UI Level Backdating Rule: Restrict HTML date pickers to today or future
                document.getElementById('itin-from').min = todayStr;
                document.getElementById('itin-to').min = todayStr;
                
                // Initialize default personnel list with logged-in user
                personnelDraft = [{ emp_id: data.emp_id, name: data.full_name, unit: data.unit }];
                renderPersonnel();
            } else { alert("Invalid Credentials"); }
        };

        // NAVIGATION (Load Once, Hide & Show Strategy to prevent full page reloads)
        window.switchTab = function(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            
            // Lazy load specific data only when tabs are clicked
            if (id === 'status-view') loadStatus();
            if (id === 'calendar-view') renderCalendar();
        };

        // PERSONNEL MANAGEMENT
        // Queries employees table to allow users to add colleagues to the TO
        window.searchEmployees = async function() {
            const term = document.getElementById('emp-search').value;
            if (term.length < 2) return;
            const { data } = await supabase.from('employees').select('emp_id, full_name, unit').or(`full_name.ilike.%${term}%,emp_id.eq.${term}`).limit(5);
            const resDiv = document.getElementById('search-results');
            resDiv.innerHTML = ''; resDiv.style.display = 'block';
            
            data.forEach(emp => {
                const row = document.createElement('div'); row.className = 'search-row';
                row.innerHTML = `${emp.full_name} (${emp.emp_id})`;
                row.onclick = () => {
                    if (personnelDraft.length >= 5) return alert("Max 5 Personnel"); // Max capacity limit
                    if (personnelDraft.some(p => p.emp_id === emp.emp_id)) return; // Prevent duplicates
                    personnelDraft.push({ emp_id: emp.emp_id, name: emp.full_name, unit: emp.unit });
                    resDiv.style.display = 'none'; document.getElementById('emp-search').value = ''; renderPersonnel();
                };
                resDiv.appendChild(row);
            });
        };

        function renderPersonnel() {
            const list = document.getElementById('personnel-draft-list');
            list.innerHTML = personnelDraft.map((p, i) => `<br>
                <div style="display:flex; justify-content:space-between; align-items:center; background:#f0f4f8; padding:8px 12px; border-radius:8px; margin-bottom:5px; font-size:13px;"><br>
                    <span>👤 ${p.name}</span><br>
                    ${p.emp_id !== currentUser.emp_id ? `<button class="btn-danger" style="padding:2px 8px; width:auto; margin:0;" onclick="removePersonnel(${i})">X</button>` : ''}<br>
                </div>`).join('');
        }
        window.removePersonnel = (i) => { personnelDraft.splice(i,1); renderPersonnel(); };

        // ITINERARY BUILDER & CONFLICT DETECTION
        window.handleStartDateChange = function() {
            const fromDate = document.getElementById('itin-from').value;
            if (fromDate) {
                document.getElementById('itin-to').value = fromDate; // Automatically sync To Date with From Date
                generateItinFields();
            }
        };

        window.generateItinFields = async function() {
            const fromDate = document.getElementById('itin-from').value;
            const toDate = document.getElementById('itin-to').value;
            const container = document.getElementById('dynamic-itin-fields');
            container.innerHTML = ''; itineraryDraft = []; conflictsToProcess = []; // Reset states
            
            // Logic Level Backdating Rule: Block execution if dates are in the past or illogical
            if (!fromDate || !toDate) return;
            if (fromDate < todayStr) return alert("No backdating allowed.");
            if (toDate < fromDate) return alert("End date cannot be before Start date.");
            
            const start = new Date(fromDate);
            const end = new Date(toDate);
            const diffDays = Math.ceil(Math.abs(end - start) / (1000 * 60 * 60 * 24)) + 1;
            if (diffDays > 5) return alert("Maximum of 5 days allowed.");

            // Fetch existing schedules for conflict checking against selected dates
            const { data: psos } = await supabase.from('pso_records').select('*').eq('emp_id', currentUser.emp_id);
            const { data: activeTOs } = await supabase.from('travel_orders').select('*').eq('emp_id', currentUser.emp_id).not('status', 'ilike', '%CANCELLED%');
            let hasPSO = false;

            let currentDt = new Date(start);
            for (let i = 0; i < diffDays; i++) {
                const dateStr = currentDt.toISOString().split('T')[0];
                
                // Rule: TO cannot supersede a PSO
                if(psos?.some(p => dateStr >= p.start_date && dateStr <= p.end_date)) {
                    if(!confirm(`Conflict: Existing PSO on ${dateStr}. Reminding: TO cannot supersede PSO. Continue?`)) { container.innerHTML = ""; return; }
                    hasPSO = true; // Flag to append remarks later
                }

                // Rule: Check for existing TOs (Pre-process for SPLIT/OVERWRITE logic)
                for (let to of activeTOs || []) {
                    const { data: itins } = await supabase.from('itinerary').select('*').eq('to_no', to.to_no).eq('travel_date', dateStr);
                    if (itins && itins.length > 0) {
                        const isApproved = to.status === 'APPROVED';
                        const promptMsg = isApproved ? `Conflict: Approved TO ${to.to_no} exists on ${dateStr}. Overwrite? (This will trigger SPLIT logic for multi-day TOs)` : `Conflict: Pending TO ${to.to_no} exists on ${dateStr}. Overwrite?`;
                        if (confirm(promptMsg)) {
                            // Queue the conflict to be processed upon final submission
                            conflictsToProcess.push({ to_no: to.to_no, status: to.status, affected_date: dateStr });
                        } else { container.innerHTML = ""; return; } // Abort if user declines
                    }
                }

                // Generate dynamic input cards per date
                const cardId = `card-${i}`;
                container.innerHTML += `<br>
                    <div class="card" id="${cardId}" style="border-left: 4px solid var(--dar-green);"><br>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;"><br>
                            <h5 style="margin: 0; color: var(--dar-green); font-size: 13px;">📅 ${dateStr} ${hasPSO ? '<span style="color:red; font-size:9px;">(HAS PSO)</span>' : ''}</h5><br>
                            <button onclick="removeItinCard('${cardId}', '${dateStr}')" style="background:none; border:none; color:red; font-size:11px; font-weight:bold; cursor:pointer;">DELETE</button><br>
                        </div><br>
                        <input type="text" id="dest-${i}" placeholder="Destination"><br>
                        ${i > 0 ? `<label style="display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: normal; margin-bottom: 8px; color: var(--text-muted); cursor: pointer; white-space:nowrap;"><input type="checkbox" style="width: auto; margin: 0; padding: 0;" onchange="if(this.checked) document.getElementById('purp-${i}').value = document.getElementById('purp-${i-1}').value; else document.getElementById('purp-${i}').value = '';"> Copy previous purpose</label>` : ''}<br>
                        <textarea id="purp-${i}" rows="2" placeholder="Purpose"></textarea><br>
                        <input type="text" id="rep-${i}" placeholder="Report To"><br>
                    </div>`;
                itineraryDraft.push({ date: dateStr, destId: `dest-${i}`, purpId: `purp-${i}`, repId: `rep-${i}`, cardId, hasPSO });
                currentDt.setDate(currentDt.getDate() + 1);
            }
        };

        window.removeItinCard = (cardId, date) => {
            if(!confirm(`Remove ${date}?`)) return;
            document.getElementById(cardId).remove();
            itineraryDraft = itineraryDraft.filter(it => it.cardId !== cardId);
        };

        // SUBMISSION & WORKFLOW ROUTING
        window.submitTO = async function() {
            if (isSubmitting) return;
            if (itineraryDraft.length === 0) return alert("Itinerary is empty.");
            
            // Validate all fields are filled before database processing
            const batchItin = []; const reportTos = new Set();
            for (let it of itineraryDraft) {
                const dest = document.getElementById(it.destId).value.trim();
                const purp = document.getElementById(it.purpId).value.trim();
                const rep = document.getElementById(it.repId).value.trim();
                if (!dest || !purp || !rep) return alert(`Fill all fields for ${it.date}.`);
                batchItin.push({ travel_date: it.date, destination: dest, purpose: purp });
                reportTos.add(rep);
            }

            isSubmitting = true;
            const submitBtn = document.getElementById('btn-submit-to');
            if(submitBtn) { submitBtn.disabled = true; submitBtn.innerText = "Processing Logic..."; }

            try {
                // SPLIT / OVERWRITE EXECUTION BLOCK
                for (let conflict of conflictsToProcess) {
                    if (conflict.status.includes("PENDING")) {
                        // Pending Rule: Simply delete the old conflicting record (Overwrite)
                        await supabase.from('itinerary').delete().eq('to_no', conflict.to_no);
                        await supabase.from('travel_orders').delete().eq('to_no', conflict.to_no);
                    } else if (conflict.status === "APPROVED") {
                        // Approved Rule: Execute SPLIT logic
                        const { data: oldItin } = await supabase.from('itinerary').select('*').eq('to_no', conflict.to_no).order('travel_date');
                        const remainingDays = oldItin.filter(day => day.travel_date !== conflict.affected_date);
                        
                        // 1. Cancel Original Record completely
                        await supabase.from('travel_orders').update({ status: 'CANCELLED' }).eq('to_no', conflict.to_no);

                        // 2. Notify lowest approving officer (Unit Head or Chief)
                        let notifyTarget = currentUser.unit ? "UNIT HEAD" : "CHIEF";
                        await supabase.from('notifications').insert({ 
                            emp_id: currentUser.emp_id, 
                            message: `Approved TO ${conflict.to_no} was split/overwritten by ${currentUser.full_name}. Affected date: ${conflict.affected_date}`,
                            sender: currentUser.full_name
                        });

                        // 3. Auto-regenerate the remaining unaffected days as an automatically APPROVED TO
                        if (remainingDays.length > 0) {
                            const remainderToNo = await generateToNo();
                            const { data: origTO } = await supabase.from('travel_orders').select('*').eq('to_no', conflict.to_no);
                            const batchRemainder = origTO.map(p => ({ ...p, id: undefined, to_no: remainderToNo, status: 'APPROVED' }));
                            const batchRemainderItin = remainingDays.map(i => ({ ...i, id: undefined, to_no: remainderToNo }));
                            await supabase.from('travel_orders').insert(batchRemainder);
                            await supabase.from('itinerary').insert(batchRemainderItin);
                        }
                    }
                }

                // 4. Generate New Control Number for the newly applied TO
                const finalToNo = await generateToNo(); 
                const transport = document.getElementById('to-transport').value;
                let routeStatus = "PENDING_CHIEF";
                const isMARPO = currentUser.position && currentUser.position.toUpperCase().includes("MARPO");

                // Route Assignment Logic based on Transport and Employee Unit
                if (transport === "GOV'T VEHICLE") routeStatus = "PENDING_VE_APPROVER"; 
                else if (currentUser.unit === "PARPO") routeStatus = "PENDING_PARPO";
                else if (isMARPO) routeStatus = "PENDING_CHIEF";
                else if (currentUser.unit && currentUser.unit.trim() !== "") routeStatus = "PENDING_UNIT_HEAD";

                const batchPersonnel = personnelDraft.map(p => ({
                    to_no: finalToNo, emp_id: p.emp_id, emp_name: p.name, unit: p.unit, 
                    division: currentUser.division, status: routeStatus, transport, 
                    report_to: Array.from(reportTos).join(", "),
                    // Append Remarks if PSO conflict was accepted
                    remarks: itineraryDraft.some(it => it.hasPSO) ? "EXISTING PSO" : ""
                }));
                
                // Commit new TO to Database
                batchItin.forEach(it => it.to_no = finalToNo);
                await supabase.from('travel_orders').insert(batchPersonnel);
                await supabase.from('itinerary').insert(batchItin);
                
                alert("Logic Executed. Submitted: " + finalToNo);
                location.reload(); // Refresh to clean state
                
            } catch(e) { 
                alert("Error: " + e.message); 
            } finally {
                isSubmitting = false;
                if(submitBtn) { submitBtn.disabled = false; submitBtn.innerText = "🚀 SUBMIT OFFICIAL REQUEST"; }
            }
        };

        // SEQUENTIAL NUMBER GENERATOR (Format: YYYY-DIV-XXXXX)
        async function generateToNo() {
            const year = new Date().getFullYear();
            const div = (currentUser.division || "GEN").trim().substring(0, 5).toUpperCase();
            // Find the highest sequence number for this specific division and year
            const { data } = await supabase.from('travel_orders')
                .select('to_no')
                .like('to_no', `${year}-${div}-%`)
                .order('to_no', { ascending: false })
                .limit(1);
            
            let seq = 1;
            if (data && data.length > 0 && data[0].to_no) {
                const parts = data[0].to_no.split('-');
                if (parts.length >= 3) {
                    const parsed = parseInt(parts[2], 10);
                    if (!isNaN(parsed)) seq = parsed + 1; // Increment latest existing sequence
                }
            }
            return `${year}-${div}-${String(seq).padStart(5, '0')}`;
        }

        // RECORD MODIFICATION HANDLERS (Used in Status View)
        window.deletePendingTO = async function(toNo) {
            if(!confirm(`Permanently delete Pending TO ${toNo}?`)) return;
            await supabase.from('itinerary').delete().eq('to_no', toNo);
            await supabase.from('travel_orders').delete().eq('to_no', toNo);
            loadStatus();
        };

        window.cancelApprovedTO = async function(toNo) {
            if(!confirm(`Cancel Approved TO ${toNo}? PARPO will be notified.`)) return;
            await supabase.from('travel_orders').update({ status: 'CANCELLED' }).eq('to_no', toNo);
            await supabase.from('notifications').insert({ recipient_role: 'PARPO', message: `Approved TO ${toNo} was cancelled by ${currentUser.full_name}`, to_no: toNo });
            loadStatus();
        };

        // Loads an existing pending TO back into the draft state for editing
        window.modifyPendingTO = async function(toNo) {
            if(!confirm("Load this TO back into draft for modification? (Old pending record will be removed)")) return;
            const { data: to } = await supabase.from('travel_orders').select('*').eq('to_no', toNo).single();
            const { data: itin } = await supabase.from('itinerary').select('*').eq('to_no', toNo).order('travel_date');
            
            document.getElementById('to-transport').value = to.transport;
            if (itin.length > 0) {
                document.getElementById('itin-from').value = itin[0].travel_date;
                document.getElementById('itin-to').value = itin[itin.length - 1].travel_date;
            }

            const container = document.getElementById('dynamic-itin-fields');
            container.innerHTML = ''; itineraryDraft = [];

            itin.forEach((i, idx) => {
                const cardId = `itin-card-${idx}`;
                container.innerHTML += `<br>
                    <div class="card" id="${cardId}" style="padding:10px; margin-bottom: 10px; box-shadow: none; border: 1px solid #e5e7eb; border-left: 4px solid var(--dar-green);"><br>
                         <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;"><br>
                             <h5 style="margin: 0; color: var(--dar-green); font-size: 13px;">📅 ${i.travel_date}</h5><br>
                             <span style="color:var(--danger); font-size:11px; font-weight:bold; cursor:pointer;" onclick="removeItinCard('${cardId}', '${i.travel_date}')">DELETE</span><br>
                        </div><br>
                        <input type="text" id="dest-${idx}" placeholder="Destination" value="${i.destination}" style="padding:8px; font-size:13px; margin-bottom:8px;"><br>
                        ${idx > 0 ? `<label style="display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: normal; margin-bottom: 8px; color: var(--text-muted); cursor: pointer; white-space:nowrap;"><input type="checkbox" style="width: auto; margin: 0; padding: 0;" onchange="if(this.checked) document.getElementById('purp-${idx}').value = document.getElementById('purp-${idx-1}').value; else document.getElementById('purp-${idx}').value = '';"> Copy previous purpose</label>` : ''}<br>
                        <textarea id="purp-${idx}" rows="2" placeholder="Purpose" style="padding:8px; font-size:13px; margin-bottom:8px;">${i.purpose}</textarea><br>
                        <input type="text" id="rep-${idx}" placeholder="Report To" value="${to.report_to}" style="padding:8px; font-size:13px; margin-bottom:0;"><br>
                    </div><br>
                `;
                itineraryDraft.push({ date: i.travel_date, destId: `dest-${idx}`, purpId: `purp-${idx}`, repId: `rep-${idx}`, cardId: cardId });
            });
            
            // Delete original so submitting creates a clean replacement
            await supabase.from('itinerary').delete().eq('to_no', toNo);
            await supabase.from('travel_orders').delete().eq('to_no', toNo);
            switchTab('apply-view', document.querySelector('.nav-item'));
        };

        // PDF GENERATION (Strictly mapped to physical DAR/Civil Service Format coordinates)
        window.generateOfficialPDF = async function(toNo) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4'); // A4 paper size, dimensions in mm
            const getAssetUrl = (fileName) => `${supabaseUrl}/storage/v1/object/public/e-sign/${fileName}`;

            try {
                // Fetch relevant data blocks for the PDF
                const { data: group_orders } = await supabase.from('travel_orders').select('*').eq('to_no', toNo);
                const { data: itin_list } = await supabase.from('itinerary').select('*').eq('to_no', toNo).order('travel_date');
                const { data: emp_details } = await supabase.from('employees').select('emp_id, full_name, position, station');
                
                const od = group_orders[0];
                const names = group_orders.map(m => m.emp_name.toUpperCase()).join(", ");
                const positions = [...new Set(group_orders.map(m => emp_details?.find(e => e.emp_id === m.emp_id)?.position || ""))].join(", ").toUpperCase();
                const stations = [...new Set(group_orders.map(m => emp_details?.find(e => e.emp_id === m.emp_id)?.station || ""))].join(", ").toUpperCase();

                const isMARPO = currentUser.position && currentUser.position.toUpperCase().includes("MARPO");
                const baseDiv = currentUser.division ? currentUser.division.split(',')[0].trim() : "";

                // Signatory logic: Determine necessary signatures based on user unit/role
                let uh_data = null;
                if (!isMARPO && currentUser.unit && currentUser.unit !== "PARPO") {
                    const resUH = await supabase.from('users').select('full_name, username').eq('unit', currentUser.unit).maybeSingle();
                    uh_data = resUH.data;
                }

                let dc_data = null;
                if (currentUser.unit !== "PARPO" && baseDiv) {
                    const resDC = await supabase.from('users').select('full_name, username').eq('division', baseDiv).eq('role', 'CHIEF').maybeSingle();
                    dc_data = resDC.data;
                }

                // Fetch necessary images concurrently (Background, QR, E-Signatures)
                const [img_bg, img_qr, img_p2, img_uh, img_dc] = await Promise.all([
                    urlToBase64(getAssetUrl("bg_form.jpg")),
                    urlToBase64(`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${toNo}`),
                    urlToBase64(getAssetUrl("P2.png")), // PARPO Signature
                    uh_data ? urlToBase64(getAssetUrl(`${uh_data.username}.png`)) : null,
                    dc_data ? urlToBase64(getAssetUrl(`${dc_data.username}.png`)) : null
                ]);

                // Loop through 3 copies (standard requirement for physical routing in DAR)
                for (let i = 0; i < 3; i++) {
                    if (i > 0) doc.addPage();
                    if (img_bg) try { doc.addImage(img_bg, 'JPEG', 0, 0, 210, 297); } catch(e){} // Full page background form
                    if (img_qr) doc.addImage(img_qr, 'PNG', 180, 10, 20, 20); 

                    // Inject specific legal/logistics notices
                    if (od.transport === "GOV'T VEHICLE") {
                        doc.setFont("helvetica", "bold"); doc.setFontSize(8);
                        doc.text("NOT VALID FOR TRANSPORTATION REIMBURSEMENT CLAIM", 105, 48, { align: 'center' });
                    }
                    if (od.remarks && od.remarks.includes("EXISTING PSO")) {
                        doc.setFont("helvetica", "bold"); doc.setFontSize(9);
                        doc.text("WITH EXISTING PSO/RSO, subject for PARPO's FINAL APPROVAL", 105, 28, { align: 'center' });
                    }

                    // Header Info
                    doc.setFont("helvetica", "bold"); doc.setFontSize(14);
                    doc.text(`TRAVEL ORDER NO. ${toNo}`, 105, 35, { align: 'center' });
                    const fDate = new Date(od.created_at).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                    doc.setFont("helvetica", "normal"); doc.setFontSize(10);
                    doc.text(`Date: ${fDate}`, 105, 42, { align: 'center' });

                    // Personnel Row
                    doc.setFontSize(10); 
                    doc.setFont("helvetica", "bold"); doc.text("NAME:", 20, 48); 
                    doc.text(names, 40, 48); doc.line(40, 49, 160, 49);

                    // Role/Station Row
                    doc.setFont("helvetica", "bold"); doc.text("POSITION:", 20, 54);
                    doc.setFont("helvetica", "normal"); doc.text(positions, 40, 54); doc.line(40, 55, 85, 55);
                    doc.setFont("helvetica", "bold"); doc.text("STATION:", 90, 54);
                    doc.setFont("helvetica", "normal"); doc.text(stations, 110, 54); doc.line(110, 55, 160, 55);

                    // Transport Selection Checkboxes
                    doc.setFont("helvetica", "bold"); doc.text("MEANS OF TRANSPORTATION:", 20, 61);
                    doc.setFont("helvetica", "normal"); doc.setFontSize(9);
                    const drawCheck = (label, x, y, isChecked) => {
                        doc.rect(x, y - 3, 3, 3);
                        if (isChecked) { doc.setFont("helvetica", "bold"); doc.text("X", x + 0.5, y - 0.2); doc.setFont("helvetica", "normal"); }
                        doc.text(label, x + 5, y);
                    };
                    drawCheck("AIR", 20, 66, od.transport === "AIR");
                    drawCheck("GOV'T VEHICLE", 70, 66, od.transport === "GOV'T VEHICLE");
                    drawCheck("LAND", 20, 71, od.transport === "LAND");
                    drawCheck("OTHERS, PLEASE SPECIFY", 70, 71, od.transport === "OTHERS");

                    // Destination List (One line per date format to preserve space and readability)
                    doc.setFontSize(10); doc.setFont("helvetica", "bold");
                    doc.text("DESTINATION:", 20, 78);
                    const formatDestDate = (dateStr) => new Date(dateStr).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                    doc.setFont("helvetica", "normal"); doc.setFontSize(9);
                    let destY = 78;
                    itin_list.forEach(it => {
                        doc.text(`${formatDestDate(it.travel_date)} - ${it.destination}`, 50, destY);
                        destY += 4.5;
                    });
                    
                    // Dynamic Y-shift to prevent overlapping if destination list is long
                    let curY = Math.max(destY, 83);

                    // Date range and reporting lines
                    doc.setFont("helvetica", "bold"); doc.setFontSize(10);
                    doc.text("DEPARTURE DATE:", 20, curY);
                    doc.setFont("helvetica", "normal"); doc.text(itin_list[0]?.travel_date || "", 55, curY); doc.line(55, curY+1, 90, curY+1);
                    doc.setFont("helvetica", "bold"); doc.text("RETURN DATE:", 95, curY);
                    doc.setFont("helvetica", "normal"); doc.text(itin_list[itin_list.length-1]?.travel_date || "", 125, curY); doc.line(125, curY+1, 160, curY+1);

                    curY += 6;
                    doc.setFont("helvetica", "bold"); doc.text("REPORT TO:", 20, curY);
                    doc.setFont("helvetica", "normal"); doc.text(od.report_to || "", 50, curY); doc.line(50, curY+1, 160, curY+1);
                    
                    curY += 6;
                    doc.setFont("helvetica", "bold"); doc.text("PURPOSE OF TRAVEL:", 20, curY);
                    curY += 4;
                    doc.setFont("helvetica", "normal"); doc.setFontSize(9);
                    // Split purpose text to fit within designated paragraph bounds
                    const purpLines = doc.splitTextToSize(itin_list[0]?.purpose || "", 140);
                    doc.text(purpLines, 20, curY); doc.line(20, curY+1, 160, curY+1);
                    curY += Math.max(5, purpLines.length * 4);

                    doc.setFont("helvetica", "italic"); doc.setFontSize(8);
                    doc.text("In case of seminar/workshop/consultation/briefing, indicate:", 20, curY);
                    drawCheck("LIVE IN", 110, curY, false);
                    drawCheck("LIVE OUT", 135, curY, false);

                    // SIGNATORIES BLOCK
                    doc.setFont("helvetica", "bold"); doc.setFontSize(10);
                    doc.text("Recommended by:", 20, 156);
                    
                    // Note: Signatures only appear on Page 2 and 3 as per DAR rules
                    if (i > 0) {
                        if(uh_data && !isMARPO) { if(img_uh) doc.addImage(img_uh, 'PNG', 34, 153, 35, 15); doc.text(uh_data.full_name.toUpperCase(), 34, 166); }
                        if(dc_data) { if(img_dc) doc.addImage(img_dc, 'PNG', 104, 153, 35, 15); doc.text(dc_data.full_name.toUpperCase(), 104, 166); }
                    } else {
                        if(uh_data && !isMARPO) { doc.text(uh_data.full_name.toUpperCase(), 34, 166); }
                        if(dc_data) { doc.text(dc_data.full_name.toUpperCase(), 104, 166); }
                    }

                    doc.line(25, 168, 80, 168); doc.setFont("helvetica", "normal"); doc.setFontSize(8); doc.text(isMARPO ? "" : "UNIT HEAD", 52, 172, {align: 'center'});
                    doc.line(100, 168, 155, 168); doc.text("DIVISION CHIEF", 127, 172, {align: 'center'});

                    // PARPO Signature overlaps the printed name natively
                    if(i > 0 && img_p2) doc.addImage(img_p2, 'PNG', 122, 187, 20, 20); 
                    doc.setFont("helvetica", "bold"); doc.setFontSize(11);
                    doc.text("RICARDO C. GARCIA", 114, 202);
                    doc.setFont("helvetica", "normal"); doc.setFontSize(9);
                    doc.text("PARPO II", 128, 206);
                }
                doc.save(`TO_${toNo}.pdf`);
            } catch (e) { alert("PDF Error: " + e.message); }
        };

        // STATUS DASHBOARD DATA LOADER
        async function loadStatus() {
            const list = document.getElementById('status-list'); list.innerHTML = "Fetching...";
            // Fetch latest 30 applications based on created_at descending
            const { data: tos } = await supabase.from('travel_orders').select('*').eq('emp_id', currentUser.emp_id).order('created_at', {ascending: false}).limit(30);
            let html = '';
            for(let to of tos || []) {
                const { data: itin } = await supabase.from('itinerary').select('*').eq('to_no', to.to_no).order('travel_date', {ascending: true});
                const sCls = to.status.includes('APPROVED') ? 'bg-approved' : (to.status.includes('CANCEL') ? 'bg-cancelled' : 'bg-pending');
                const isApproved = to.status === 'APPROVED', isPending = to.status.includes('PENDING');

                html += `<div class="card"><br>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;"><br>
                        <div style="font-weight:bold; font-size: 15px;">${to.to_no}</div><br>
                        <span class="badge ${sCls}">${to.status.replace(/_/g, ' ')}</span><br>
                    </div><br>
                    <div style="background: #f9fafb; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--dar-gold);"><br>
                        <div style="font-size: 11px; font-weight: bold; margin-bottom: 5px; color: var(--dar-green);">DETAILS:</div><br>
                        ${itin?.map(i => `<div style="font-size: 11px; border-bottom: 1px dashed #ddd; padding: 5px 0;"><strong>📅 ${i.travel_date}</strong> - 📍 ${i.destination}<br><span style="color: gray; font-style: italic;">"${i.purpose}"</span></div>`).join('')}<br>
                    </div><br>
                    <div class="action-group"><br>
                        ${isPending ? `<button class="btn btn-warning btn-small" onclick="modifyPendingTO('${to.to_no}')">Modify</button><button class="btn btn-danger btn-small" onclick="deletePendingTO('${to.to_no}')">Delete</button>` : ''}<br>
                        ${isApproved ? `<button class="btn btn-success btn-small" onclick="generateOfficialPDF('${to.to_no}')">Print</button><button class="btn btn-danger btn-small" onclick="cancelApprovedTO('${to.to_no}')">Cancel</button>` : ''}<br>
                    </div><br>
                </div>`;
            }
            list.innerHTML = html || "No records found.";
        }

        // CALENDAR DATA AGGREGATOR
        window.changeCalMonth = (d) => { calDate.setMonth(calDate.getMonth()+d); renderCalendar(); };
        async function renderCalendar() {
            document.getElementById('cal-month-year').innerText = calDate.toLocaleString('default',{month:'long',year:'numeric'});
            const month = calDate.getMonth(), year = calDate.getFullYear();
            const tbody = document.getElementById('cal-table-body');
            tbody.innerHTML = "<tr><td colspan='2'>Loading...</td></tr>";

            // Aggregate data from 3 distinct sources
            const { data: tos } = await supabase.from('travel_orders').select('to_no').eq('emp_id', currentUser.emp_id).eq('status', 'APPROVED');
            const { data: itins } = await supabase.from('itinerary').select('to_no, travel_date, destination, purpose').in('to_no', tos?.map(t => t.to_no) || []);
            const { data: psos } = await supabase.from('pso_records').select('*').eq('emp_id', currentUser.emp_id);
            const { data: holidays } = await supabase.from('holidays').select('*');

            tbody.innerHTML = "";
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for(let d=1; d<=daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dateObj = new Date(year, month, d), isWeekend = dateObj.getDay() === 0 || dateObj.getDay() === 6;
                const dayItins = itins?.filter(i => i.travel_date === dateStr), dayPsos = psos?.filter(p => dateStr >= p.start_date && dateStr <= p.end_date), holiday = holidays?.find(h => h.date === dateStr);

                let activityHtml = "";
                if(holiday) activityHtml += `<div class="cal-entry entry-holiday">HOLIDAY: ${holiday.description || holiday.type || 'Holiday'}</div>`;
                
                // Updated Calendar PSO formatting to strictly match the pso_records table schema
                if(dayPsos?.length) dayPsos.forEach(p => activityHtml += `<div class="cal-entry entry-pso">PSO ${p.pso_no || ''}: ${p.subject || 'Duty'}</div>`);
                
                if(dayItins?.length) dayItins.forEach(i => activityHtml += `<div class="cal-entry entry-to">TO: ${i.to_no} - ${i.destination}</div>`);

                let rowStyle = dateStr === todayStr ? 'background:#fffbeb; border-left: 3px solid var(--dar-gold);' : (isWeekend ? 'background:#f9fafb;' : '');
                tbody.innerHTML += `<tr style="${rowStyle}"><td><span class="day-num">${d}</span> <br> <span style="color:gray;">${dateObj.toLocaleDateString('en-US', { weekday: 'short' })}</span></td><td>${activityHtml || '<span style="color:#ccc;">--</span>'}</td></tr>`;
            }
        }

        // SECURITY MODULE
        window.changePassword = async function() {
            const curr = document.getElementById('pass-curr').value, nw = document.getElementById('pass-new').value;
            if(curr !== currentUser.pass) return alert("Wrong current password.");
            await supabase.from('employees').update({ pass: nw }).eq('emp_id', currentUser.emp_id);
            alert("Updated."); location.reload();
        };
    </script>
</body>
</html>
