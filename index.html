<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR Portal Mobile</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --dar-green: #003811;
            --dar-gold: #D4AF37;
            --bg-main: #f4f7f6;
            --card-bg: #ffffff;
            --danger: #dc2626;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background-color: var(--bg-main); }

        /* Screen & View Management */
        .screen { display: none; height: 100vh; flex-direction: column; }
        .screen.active { display: flex; }
        .view { display: none; padding: 15px; padding-bottom: 80px; overflow-y: auto; }
        .view.active { display: block; }

        /* UI Components */
        .app-header { background: var(--dar-green); color: white; padding: 15px; display: flex; justify-content: space-between; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .section-title { color: var(--dar-green); font-size: 13px; font-weight: 700; border-left: 4px solid var(--dar-gold); padding-left: 8px; margin-bottom: 12px; }
        
        input, select { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 15px; margin-bottom: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; color: white; }
        .btn-primary { background: var(--dar-green); }
        .btn-gold { background: var(--dar-gold); color: var(--dar-green); }
        .btn-danger { background: var(--danger); font-size: 11px; padding: 5px 10px; width: auto; }

        /* Draft Lists */
        .draft-item { background: #f8fafc; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .search-results { background: white; border: 1px solid #cbd5e1; border-radius: 8px; max-height: 150px; overflow-y: auto; margin-bottom: 10px; display: none; }
        .search-item { padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--dar-green); display: flex; }
        .nav-item { flex: 1; padding: 15px; text-align: center; color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; }
        .nav-item.active { color: var(--dar-gold); border-top: 3px solid var(--dar-gold); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <div style="padding: 50px 30px; text-align: center;">
            <h2 style="color: var(--dar-green)">DAR PORTAL</h2>
            <input type="text" id="login-id" placeholder="Employee ID">
            <input type="password" id="login-pass" placeholder="Password">
            <button class="btn btn-primary" onclick="handleLogin()">LOGIN</button>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <div class="app-header">
            <div>
                <div id="user-display" style="font-weight:700;">Name</div>
                <small id="user-div" style="color:var(--dar-gold)">Division</small>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:white;">Logout</button>
        </div>

        <div id="apply-view" class="view active">
            <div class="card">
                <div class="section-title">1. PERSONNEL (Max 5)</div>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="search-term" placeholder="Name or ID" onkeyup="if(event.key==='Enter') searchPersonnel()">
                    <button class="btn btn-primary" style="width: 70px;" onclick="searchPersonnel()">FIND</button>
                </div>
                <div id="search-results-box" class="search-results"></div>
                <div id="personnel-list"></div>
            </div>

            <div class="card">
                <div class="section-title">2. LOGISTICS</div>
                <select id="to-transport">
                    <option value="LAND">LAND</option>
                    <option value="GOV'T VEHICLE">GOV'T VEHICLE</option>
                    <option value="AIR">AIR</option>
                </select>
                <input type="text" id="to-report" placeholder="Report To (Official/Position)">
            </div>

            <div class="card">
                <div class="section-title">3. ITINERARY BUILDER</div>
                <input type="date" id="itin-date">
                <input type="text" id="itin-dest" placeholder="Destination">
                <input type="text" id="itin-purp" placeholder="Purpose">
                <button class="btn btn-primary" onclick="addItineraryRow()">+ ADD DATE TO LIST</button>
                <div id="itin-list" style="margin-top: 10px;"></div>
            </div>

            <button class="btn btn-gold" style="margin-bottom: 20px;" onclick="submitGroupTO()">🚀 SUBMIT OFFICIAL REQUEST</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SUPABASE_KEY = "sb_secret_YNX-IJjveulE3N3gT_yBdA_6PzxoKdB"; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let personnelDraft = [];
        let itineraryDraft = [];

        async function handleLogin() {
            const uid = document.getElementById('login-id').value;
            const pwd = document.getElementById('login-pass').value;
            const { data } = await supabase.from('employees').select('*').eq('emp_id', uid).single();

            if (data && data.pass === pwd) {
                currentUser = data;
                document.getElementById('user-display').innerText = data.full_name;
                document.getElementById('user-div').innerText = data.division;
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('app-screen').classList.add('active');
                
                // Add self automatically (Python Logic)
                personnelDraft = [{ emp_id: data.emp_id, full_name: data.full_name, unit: data.unit }];
                renderPersonnel();
            } else {
                alert("Invalid Access");
            }
        }

        // PERSONNEL SEARCH LOGIC (Python Port)
        async function searchPersonnel() {
            const term = document.getElementById('search-term').value.trim();
            if (!term) return;

            const { data, error } = await supabase.from('employees')
                .select('emp_id, full_name, unit')
                .or(`full_name.ilike.%${term}%,emp_id.eq.${term}`);

            const resultsBox = document.getElementById('search-results-box');
            resultsBox.innerHTML = '';
            
            if (data && data.length > 0) {
                if (data.length === 1) {
                    selectPersonnel(data[0]);
                } else {
                    resultsBox.style.display = 'block';
                    data.forEach(emp => {
                        const div = document.createElement('div');
                        div.className = 'search-item';
                        div.innerHTML = `<strong>${emp.full_name}</strong> (${emp.emp_id})`;
                        div.onclick = () => selectPersonnel(emp);
                        resultsBox.appendChild(div);
                    });
                }
            } else {
                alert("No results found");
            }
        }

        function selectPersonnel(emp) {
            if (personnelDraft.length >= 5) return alert("Limit of 5 reached");
            if (personnelDraft.some(p => p.emp_id == emp.emp_id)) return alert("Already added");
            
            personnelDraft.push(emp);
            document.getElementById('search-results-box').style.display = 'none';
            document.getElementById('search-term').value = '';
            renderPersonnel();
        }

        function removePersonnel(index) {
            if (personnelDraft[index].emp_id == currentUser.emp_id) return alert("You cannot remove yourself");
            personnelDraft.splice(index, 1);
            renderPersonnel();
        }

        function renderPersonnel() {
            document.getElementById('personnel-list').innerHTML = personnelDraft.map((p, i) => `
                <div class="draft-item">
                    <span>${p.full_name}</span>
                    <button class="btn-danger" onclick="removePersonnel(${i})">REMOVE</button>
                </div>
            `).join('');
        }

        // ITINERARY LOGIC
        async function addItineraryRow() {
            const date = document.getElementById('itin-date').value;
            const dest = document.getElementById('itin-dest').value;
            const purp = document.getElementById('itin-purp').value;

            if (!date || !dest) return alert("Missing fields");
            if (itineraryDraft.some(i => i.date === date)) return alert("Date already in list");

            // Overwrite Check (Functioning)
            const { data: conflict } = await supabase.from('itinerary')
                .select('to_no, travel_orders!inner(status)')
                .eq('travel_date', date)
                .eq('travel_orders.emp_id', currentUser.emp_id)
                .not('travel_orders.status', 'ilike', '%CANCEL%');

            if (conflict && conflict.length > 0) {
                if (!confirm(`Conflict with ${conflict[0].to_no}. Overwrite?`)) return;
            }

            itineraryDraft.push({ date, dest, purp });
            renderItinerary();
        }

        function removeItinerary(index) {
            itineraryDraft.splice(index, 1);
            renderItinerary();
        }

        function renderItinerary() {
            document.getElementById('itin-list').innerHTML = itineraryDraft.map((it, i) => `
                <div class="draft-item">
                    <div style="font-size:12px;"><strong>${it.date}</strong><br>${it.dest}</div>
                    <button class="btn-danger" onclick="removeItinerary(${i})">REMOVE</button>
                </div>
            `).join('');
        }

        async function submitGroupTO() {
            if (itineraryDraft.length === 0) return alert("Add dates first");

            // TO Number Generation
            const year = "2026";
            const divCode = (currentUser.division || "GEN").substring(0, 3).toUpperCase();
            const { data: lastTO } = await supabase.from('travel_orders').select('to_no').order('created_at', {ascending: false}).limit(1);
            let seq = lastTO && lastTO[0] ? parseInt(lastTO[0].to_no.split('-').pop()) + 1 : 1;
            const newToId = `${year}-${divCode}-${String(seq).padStart(5, '0')}`;

            const transport = document.getElementById('to-transport').value;
            const reportTo = document.getElementById('to-report').value;

            // Python Routing Logic
            let status = "PENDING_CHIEF";
            if (transport === "GOV'T VEHICLE") status = "PENDING_VEHICLE_APPROVER";
            else if (String(currentUser.unit).toUpperCase() === "PARPO") status = "PENDING_PARPO";
            else if (currentUser.unit) status = "PENDING_UNIT_HEAD";

            try {
                // Bulk Personnel Insert
                const toInserts = personnelDraft.map(p => ({
                    to_no: newToId,
                    emp_id: p.emp_id,
                    emp_name: p.full_name,
                    unit: p.unit,
                    division: currentUser.division,
                    status: status,
                    transport: transport,
                    report_to: reportTo,
                    remarks: transport === "GOV'T VEHICLE" ? "NOT VALID FOR REIMBURSEMENT" : ""
                }));
                await supabase.from('travel_orders').insert(toInserts);

                // Bulk Itinerary Insert
                const itinInserts = itineraryDraft.map(it => ({
                    to_no: newToId,
                    travel_date: it.date,
                    destination: it.dest,
                    purpose: it.purp
                }));
                await supabase.from('itinerary').insert(itinInserts);

                alert("Submitted: " + newToId);
                location.reload();
            } catch (e) {
                alert("Error: " + e.message);
            }
        }
    </script>
</body>
</html>
