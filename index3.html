<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DAR Accounting Verifier</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dar-green: #003811; --dar-gold: #D4AF37; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #f3f4f6; }
        .bg-dar { background-color: var(--dar-green); } .text-dar { color: var(--dar-green); } .bg-gold { background-color: var(--dar-gold); }
        .search-results-box { position: absolute; width: 100%; max-height: 200px; overflow-y: auto; z-index: 2000; background: white; border: 2px solid var(--dar-gold); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); top: 100%; left: 0; }
        .btn-primary { background-color: var(--dar-green); color: white; border-radius: 0.75rem; font-weight: bold; text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col overflow-hidden text-gray-800 relative">

    <div id="app" class="w-full h-full flex flex-col relative">
        <div id="login-screen" class="flex-grow flex flex-col justify-center items-center px-6 bg-dar h-full">
            <div class="z-10 w-full max-w-sm bg-white rounded-2xl shadow-2xl overflow-hidden">
                <div class="bg-gold h-2 w-full"></div>
                <div class="p-8">
                    <h1 class="text-dar font-bold text-2xl font-serif mb-1 text-center">DAR ACCOUNTING</h1>
                    <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-6 uppercase text-center">Reimbursement Verification</p>
                    <div class="space-y-4">
                        <div><label class="block text-xs font-bold text-gray-700 mb-1">USERNAME</label><input type="text" id="un" class="w-full px-4 py-3 bg-gray-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-dar"></div>
                        <div><label class="block text-xs font-bold text-gray-700 mb-1">PASSWORD</label><input type="password" id="pw" class="w-full px-4 py-3 bg-gray-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-dar"></div>
                        <button onclick="handleLogin()" class="w-full mt-2 btn-primary text-xs py-3.5">ENTER VERIFIER</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SB_KEY = "sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo"; 
        const db = window.supabase.createClient(SB_URL, SB_KEY);

        let user = null, emps = [];
        let selectedEmp = null;

        async function handleLogin() {
            const u = document.getElementById('un').value.trim(), p = document.getElementById('pw').value.trim();
            const { data } = await db.from('users').select('*');
            const found = data.find(x => x.username === u && String(x.password) === String(p));
            
            if (found && (found.role === 'ACCOUNTANT' || found.role === 'ADMIN' || found.role === 'VEHICLE_APPROVER')) { 
                user = found; 
                const {data: e} = await db.from('employees').select('*');
                emps = e || []; 
                renderDashboard(); 
            } else alert("Invalid Login. You must be authorized for Accounting.");
        }

        function renderDashboard() {
            document.getElementById('app').innerHTML = `
            <header class="flex-none w-full h-16 bg-dar text-white px-5 flex justify-between items-center shadow-md z-50">
                <div class="overflow-hidden text-left"><h1 class="font-bold text-lg leading-tight truncate">Reimbursement Check</h1><p class="text-[10px] text-dar-gold tracking-wide font-bold uppercase">${user.full_name}</p></div>
                <button onclick="location.reload()" class="text-xs bg-white/20 px-3 py-1.5 rounded-full font-bold">Logout</button>
            </header>
            
            <main class="flex-grow w-full overflow-y-auto p-4 md:p-8 relative z-10 scroll-smooth">
                <div class="max-w-2xl mx-auto space-y-6">
                    
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest border-b pb-2 mb-4">Target Parameters</h2>
                        
                        <div class="space-y-4">
                            <div class="relative">
                                <label class="text-[10px] font-black text-dar uppercase mb-1 block tracking-widest">Employee Name</label>
                                <input id="empSearch" oninput="runEmpSearch(this, 'empResults')" placeholder="Search employee..." class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none bg-slate-50 focus:ring-2 focus:ring-dar" autocomplete="off">
                                <div id="empResults" class="search-results-box hidden"></div>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[10px] font-black text-dar uppercase mb-1 block tracking-widest">Start Date</label>
                                    <input id="startDate" type="date" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none bg-slate-50 focus:ring-2 focus:ring-dar">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-dar uppercase mb-1 block tracking-widest">End Date</label>
                                    <input id="endDate" type="date" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none bg-slate-50 focus:ring-2 focus:ring-dar">
                                </div>
                            </div>

                            <button onclick="runVerification()" class="w-full btn-primary text-xs py-4 tracking-widest mt-2">🔍 Execute Range Scan</button>
                        </div>
                    </div>

                    <div id="resultsArea" class="hidden"></div>
                </div>
            </main>`;
        }

        function runEmpSearch(inp, resId) {
            const div = document.getElementById(resId);
            const val = inp.value.toLowerCase().trim();
            if (val.length < 2) { div.classList.add('hidden'); return; }
            const match = emps.filter(e => e.full_name.toLowerCase().includes(val)).slice(0, 5);
            
            div.innerHTML = match.map(e => `<div onclick="pickEmp('${safeStr(e.full_name)}','${resId}','${inp.id}','${safeStr(e.emp_id)}')" class="p-4 border-b border-slate-100 text-[11px] font-black active:bg-slate-100 cursor-pointer uppercase text-slate-700 hover:bg-slate-50 transition">${e.full_name}</div>`).join('');
            div.classList.remove('hidden');
        }

        function pickEmp(n, rId, iId, eId) {
            document.getElementById(iId).value = n;
            document.getElementById(rId).classList.add('hidden');
            selectedEmp = { n, id: eId };
        }

        function safeStr(str) { return (str || "").replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

        async function runVerification() {
            if(!selectedEmp) return alert("Please select an employee.");
            const sDate = document.getElementById('startDate').value;
            const eDate = document.getElementById('endDate').value;
            if(!sDate || !eDate) return alert("Please select both start and end dates.");

            const resArea = document.getElementById('resultsArea');
            resArea.innerHTML = `<div class="text-center p-10"><p class="text-sm font-bold text-slate-400 animate-pulse uppercase tracking-widest">Scanning Date Range...</p></div>`;
            resArea.classList.remove('hidden');

            const empId = selectedEmp.id;

            try {
                // 1. Fetch Itineraries within range
                const { data: itins } = await db.from('itinerary').select('*')
                    .gte('travel_date', sDate)
                    .lte('travel_date', eDate);
                
                const toNosForRange = itins.map(i => i.to_no);

                // 2. Fetch Travel Orders
                let foundTOs = [];
                if (toNosForRange.length > 0) {
                    const { data: tos } = await db.from('travel_orders')
                        .select('*')
                        .eq('emp_id', empId)
                        .in('to_no', toNosForRange)
                        .neq('status', 'CANCELLED');
                    
                    foundTOs = (tos || []).map(to => {
                        const specItins = itins.filter(i => i.to_no === to.to_no);
                        return { ...to, itineraries: specItins };
                    });
                }

                // 3. Fetch Fleet Bookings within range
                const { data: bookings } = await db.from('fleet_bookings')
                    .select('*')
                    .eq('emp_id', empId)
                    .gte('travel_date', sDate)
                    .lte('travel_date', eDate);

                // 4. Fetch PSO Records (Overlap search)
                const { data: psos } = await db.from('pso_records')
                    .select('*')
                    .eq('emp_id', empId)
                    .lte('start_date', eDate)
                    .gte('end_date', sDate);

                // 5. Fetch Leave Ledger (Overlap search)
                const { data: leaves } = await db.from('leave_ledger')
                    .select('*')
                    .eq('emp_id', empId)
                    .eq('transaction_type', 'APPROVED')
                    .lte('start_date', eDate)
                    .gte('end_date', sDate);

                renderResults(foundTOs, bookings || [], psos || [], leaves || []);

            } catch (err) {
                resArea.innerHTML = `<div class="bg-red-50 text-red-600 p-4 rounded-xl border border-red-200 text-sm font-bold">Error: ${err.message}</div>`;
            }
        }

        function renderResults(tos, bookings, psos, leaves) {
            const resArea = document.getElementById('resultsArea');
            
            let hasGovVehicle = bookings.length > 0 || tos.some(to => to.transport === "GOV'T VEHICLE");
            let hasLeave = leaves.length > 0;
            let hasConflicts = hasGovVehicle || hasLeave;

            let verdictHTML = "";
            if (hasConflicts) {
                verdictHTML = `<div class="bg-amber-600 text-white p-5 rounded-2xl shadow-lg mb-6"><h2 class="text-xl font-black uppercase tracking-widest">⚠️ RANGE CONFLICTS FOUND</h2><p class="text-xs font-bold mt-1 opacity-90">Review details below. Some dates in this range involve Gov't Vehicles or Leave.</p></div>`;
            } else if (tos.length > 0) {
                verdictHTML = `<div class="bg-green-600 text-white p-5 rounded-2xl shadow-lg mb-6"><h2 class="text-xl font-black uppercase tracking-widest">🟢 RANGE VERIFIED</h2><p class="text-xs font-bold mt-1 opacity-90">All found travel in this range uses Land transport with no leave conflicts.</p></div>`;
            } else {
                verdictHTML = `<div class="bg-slate-700 text-white p-5 rounded-2xl shadow-lg mb-6"><h2 class="text-xl font-black uppercase tracking-widest">⚪ NO ACTIVITY FOUND</h2><p class="text-xs font-bold mt-1 opacity-90">No records exist for the selected employee in this date range.</p></div>`;
            }

            let html = verdictHTML + `<div class="space-y-4">`;

            if (tos.length > 0) {
                html += `
                <div class="bg-white p-5 rounded-xl border-l-4 border-dar shadow-sm">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-2 mb-3">Travel Orders in Range</h3>
                    ${tos.map(t => `
                        <div class="mb-4 last:mb-0 pb-3 border-b border-dashed border-slate-100 last:border-0">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-sm font-black text-dar uppercase">${t.to_no}</span>
                                <span class="text-[9px] px-2 py-0.5 rounded font-bold uppercase tracking-widest ${t.status === 'APPROVED' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${t.status}</span>
                            </div>
                            <p class="text-xs font-bold text-slate-700 mb-1">Transport: <span class="${t.transport === "GOV'T VEHICLE" ? 'text-red-600' : 'text-blue-600'}">${t.transport || 'NOT SET'}</span></p>
                            <div class="mt-2 space-y-1">
                                ${t.itineraries.map(i => `<p class="text-[10px] text-slate-500 italic leading-tight"><b>${i.travel_date}:</b> ${i.destination} — ${i.purpose}</p>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            }

            if (bookings.length > 0) {
                html += `
                <div class="bg-white p-5 rounded-xl border-l-4 border-red-500 shadow-sm">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-2 mb-3 text-red-500">Fleet Activity (Gov't Vehicle)</h3>
                    ${bookings.map(b => `
                        <div class="mb-2 last:mb-0">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-sm font-black text-slate-800 uppercase">${b.ref_no}</span>
                                <span class="text-[9px] px-2 py-0.5 rounded font-bold uppercase tracking-widest bg-red-100 text-red-700">${b.travel_date}</span>
                            </div>
                            <p class="text-[10px] text-slate-500 font-bold uppercase">Vehicle: ${b.vehicle} | Driver: ${b.driver}</p>
                        </div>
                    `).join('')}
                </div>`;
            }

            if (psos.length > 0) {
                html += `
                <div class="bg-white p-5 rounded-xl border-l-4 border-yellow-500 shadow-sm">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-2 mb-3 text-yellow-600">Personnel Special Orders (PSO)</h3>
                    ${psos.map(p => `
                        <div class="mb-2 last:mb-0">
                            <span class="text-sm font-black text-slate-800 uppercase block mb-1">${p.pso_no}</span>
                            <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Period: ${p.start_date} to ${p.end_date}</p>
                            <p class="text-[10px] text-slate-500 italic leading-tight">${p.subject}</p>
                        </div>
                    `).join('')}
                </div>`;
            }

            if (leaves.length > 0) {
                html += `
                <div class="bg-white p-5 rounded-xl border-l-4 border-purple-500 shadow-sm">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-2 mb-3 text-purple-600">Approved Leave within Range</h3>
                    ${leaves.map(l => `
                        <div class="mb-2 last:mb-0">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-sm font-black text-slate-800 uppercase">${l.type}</span>
                                <span class="text-[9px] px-2 py-0.5 rounded font-bold uppercase tracking-widest bg-purple-100 text-purple-700">APPROVED</span>
                            </div>
                            <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Period: ${l.start_date} to ${l.end_date}</p>
                        </div>
                    `).join('')}
                </div>`;
            }

            html += `</div>`;
            resArea.innerHTML = html;
        }
    </script>
</body>
</html>
