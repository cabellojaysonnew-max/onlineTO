<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DAR CS I - Unified Command Portal</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#003811">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* GLOBAL BRANDING */
        :root { --dar-green: #003811; --dar-gold: #D4AF37; --dar-light: #006400; --danger: #dc2626; --card-bg: #ffffff; --bg-main: #f3f4f6; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg-main); -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        .bg-dar { background-color: var(--dar-green); } .text-dar { color: var(--dar-green); } .bg-gold { background-color: var(--dar-gold); }
        .dar-green { background-color: #003811; } .text-dar-green { color: #003811; } .dar-gold { background-color: #D4AF37; } .text-dar-gold { color: #D4AF37; }
        
        ::-webkit-scrollbar { display: none; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .modal-fade { animation: fadeIn 0.2s ease-in-out; } @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .btn-primary { background-color: var(--dar-green); color: white; border-radius: 0.75rem; font-weight: bold; text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        .search-results-box { position: absolute; width: 100%; max-height: 200px; overflow-y: auto; z-index: 2000; background: white; border: 2px solid var(--dar-gold); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); top: 100%; left: 0; }

        /* EMPLOYEE SPECIFIC */
        .emp-card { background: var(--card-bg); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #e5e7eb; }
        .cal-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .cal-table th { background: var(--dar-green); color: white; padding: 10px; text-align: left; position: sticky; top: 0; font-weight: bold; }
        .cal-table td { padding: 8px; border-bottom: 1px solid #eee; vertical-align: top; }
        .day-num { font-weight: bold; font-size: 14px; color: var(--dar-green); }
        .cal-entry { margin-bottom: 4px; padding: 4px; border-radius: 4px; color: white; font-weight: bold; font-size: 10px; }
        .entry-to { background: var(--dar-green); } .entry-pso { background: var(--dar-gold); color: #003811; } .entry-holiday { background: var(--danger); }
        .emp-badge { font-size: 10px; padding: 3px 8px; border-radius: 12px; font-weight: bold; text-transform: uppercase; float: right; }
        .bg-pending { background: #fefce8; color: #854d0e; } .bg-approved { background: #ecfdf5; color: #166534; } .bg-cancelled { background: #fef2f2; color: #991b1b; }
        .qr-maximized { position: fixed !important; top: 50% !important; left: 50% !important; transform: translate(-50%, -50%) !important; width: 85vw !important; height: 85vw !important; max-width: 400px !important; max-height: 400px !important; z-index: 9999 !important; box-shadow: 0 0 0 2000px rgba(0,0,0,0.85) !important; background: white !important; border: 4px solid var(--dar-gold) !important; cursor: pointer; }

        /* FLEET SPECIFIC MODALS */
        .modal-overlay { position: fixed; inset: 0; z-index: 999; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: white; width: 100%; max-width: 600px; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); max-height: 90vh; display: flex; flex-direction: column; overflow: visible; }

        /* PRINT STYLES */
        @media print { 
            .no-print { display: none !important; } 
            body:not(.printing-table) .print-area { display: block !important; width: 100% !important; background: white; padding: 0 !important; }
            body:not(.printing-table) .card-item { border: 1px solid #e2e8f0 !important; margin-bottom: 10px; break-inside: avoid; padding: 20px; border-radius: 0; box-shadow: none !important; }
            body.printing-table #app, body.printing-table #master-landing, body.printing-table #login-container { display: none !important; }
            body.printing-table #print-table-section { display: block !important; width: 100%; background: white; padding: 20px; position: absolute; inset: 0; z-index: 99999; }
            @page { size: portrait; margin: 10mm; }
        }
        #print-table-section { display: none; }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col overflow-hidden text-gray-800 relative">

    <div id="master-landing" class="h-full w-full flex flex-col justify-center items-center bg-[#f4f7f6] p-6 z-[100] absolute inset-0 transition-all duration-300">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border-t-8 border-[#D4AF37] text-center">
            <h1 class="text-4xl font-black text-[#003811] mb-1">DAR</h1>
            <p class="text-[10px] text-gray-500 mb-8 font-bold tracking-widest uppercase">Camarines Sur I - Unified Portal</p>
            <button onclick="showPortal('employee')" class="w-full mb-4 py-4 bg-[#003811] text-white rounded-xl font-bold text-lg shadow-md transition active:scale-95 flex justify-center items-center gap-2">
                👤 EMPLOYEE PORTAL
            </button>
            <button onclick="showPortal('console')" class="w-full py-4 bg-[#D4AF37] text-[#003811] rounded-xl font-bold text-lg shadow-md transition active:scale-95 flex justify-center items-center gap-2">
                ⚙️ SYSTEM CONSOLE
            </button>
        </div>
    </div>

    <div id="login-container" class="hidden h-full w-full flex flex-col justify-center items-center px-6 bg-dar z-[90] absolute inset-0 transition-all duration-300">
        <button onclick="backToMaster()" class="absolute top-10 left-6 text-white font-bold text-sm">← Back</button>
        <div class="w-full max-w-sm bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-gold h-2 w-full"></div>
            <div class="p-8" id="login-form-content"></div>
        </div>
    </div>

    <div id="app" class="hidden w-full h-full flex flex-col relative overflow-hidden bg-gray-100"></div>

    <div id="global-modals" class="z-[200]"></div>
    <div id="print-table-section"></div>

    <script>
        // ==========================================
        // SHARED SYSTEM CONFIGURATION
        // ==========================================
        const SB_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SB_KEY = "sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo"; 
        const supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null; 
        let userRole = null; // 'EMPLOYEE', 'ACCOUNTANT', 'VEHICLE_APPROVER', 'ADMIN', 'CHIEF', 'UNIT_HEAD', 'PARPO'
        let currentSystem = null; // 'employee', 'accounting', 'fleet', 'admin'
        
        // Format Time Helper
        function formatTo12Hour(timeStr) {
            if (!timeStr) return "";
            let [h, m] = timeStr.split(':');
            let ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return `${h}:${m} ${ampm}`;
        }
        function safeStr(str) { return (str || "").replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

        // ==========================================
        // NAVIGATION & AUTHENTICATION
        // ==========================================
        function showPortal(type) {
            document.getElementById('master-landing').classList.add('hidden');
            document.getElementById('login-container').classList.remove('hidden');
            const loginBox = document.getElementById('login-form-content');
            
            if (type === 'employee') {
                loginBox.innerHTML = `
                    <h2 class="text-dar font-black text-2xl text-center mb-1">EMPLOYEE LOGIN</h2>
                    <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-6 uppercase text-center">Camarines Sur I</p>
                    <div class="space-y-4">
                        <input type="text" id="log-id" placeholder="Employee ID Number" inputmode="numeric" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-dar">
                        <input type="password" id="log-pass" placeholder="Password" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-dar">
                        <button onclick="handleLogin('EMPLOYEE')" class="w-full mt-2 btn-primary py-3.5">SECURE LOGIN</button>
                    </div>`;
            } else {
                loginBox.innerHTML = `
                    <h2 class="text-dar font-black text-2xl text-center mb-1">DAR CONSOLE</h2>
                    <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-6 uppercase text-center">Authorized Access Only</p>
                    <div class="space-y-4">
                        <input type="text" id="log-id" placeholder="Username" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-dar">
                        <input type="password" id="log-pass" placeholder="Password" class="w-full px-4 py-3 bg-gray-50 border rounded-xl outline-none focus:ring-2 focus:ring-dar">
                        <button onclick="handleLogin('CONSOLE')" class="w-full mt-2 btn-primary py-3.5">ENTER CONSOLE</button>
                    </div>`;
            }
        }

        function backToMaster() {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('master-landing').classList.remove('hidden');
        }

        async function handleLogin(portalType) {
            const id = document.getElementById('log-id').value.trim();
            const pass = document.getElementById('log-pass').value.trim();

            if (portalType === 'EMPLOYEE') {
                const { data } = await supabaseClient.from('employees').select('*').eq('emp_id', id).single();
                if (data && data.pass === pass) {
                    currentUser = data; userRole = 'EMPLOYEE'; currentSystem = 'employee';
                    launchSystem();
                } else alert("Invalid Employee Credentials");
            } else {
                const { data: users } = await supabaseClient.from('users').select('*');
                const u = (users || []).find(x => x.username === id && String(x.password) === String(pass));
                if (u) {
                    currentUser = u; 
                    currentUser.role = u.role.toUpperCase();
                    currentUser.divisions = u.division ? u.division.split(',').map(d => d.trim().toUpperCase()) : [];
                    currentUser.unit = u.unit ? u.unit.trim().toUpperCase() : '';
                    userRole = currentUser.role;

                    if (userRole === 'ACCOUNTANT') currentSystem = 'accounting';
                    else if (userRole === 'VEHICLE_APPROVER') currentSystem = 'fleet';
                    else currentSystem = 'admin';
                    
                    launchSystem();
                } else alert("Invalid Console Credentials");
            }
        }

        function launchSystem() {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            
            if (currentSystem === 'employee') emp_initPortal();
            else if (currentSystem === 'accounting') acc_initVerifier();
            else if (currentSystem === 'fleet') fleet_initMaster();
            else admin_initConsole();
        }

        function globalLogout() { location.reload(); }

        function showGlobalChangePwd() {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-6 modal-fade z-[300]';
            modal.id = 'global-pwd-modal';
            modal.innerHTML = `
                <div class="bg-white w-full max-w-sm rounded-3xl p-8 relative shadow-2xl border-t-4 border-dar">
                    <button onclick="this.closest('#global-pwd-modal').remove()" class="absolute top-4 right-4 text-slate-400 font-bold hover:text-red-500">✕</button>
                    <h2 class="text-dar font-black text-xl mb-1 text-center uppercase tracking-tighter">Security</h2>
                    <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-6 uppercase text-center border-b pb-2">Change Password</p>
                    <input type="password" id="global-old-pw" placeholder="Current Password" class="w-full p-4 border border-slate-200 rounded-xl mb-3 text-sm outline-none focus:ring-2 focus:ring-dar bg-slate-50">
                    <input type="password" id="global-new-pw" placeholder="New Password" class="w-full p-4 border border-slate-200 rounded-xl mb-4 text-sm outline-none focus:ring-2 focus:ring-dar bg-slate-50">
                    <button onclick="executeGlobalPwdUpdate(this)" class="w-full btn-primary py-4 text-xs tracking-widest">Update Password</button>
                </div>`;
            document.getElementById('global-modals').appendChild(modal);
        }

        async function executeGlobalPwdUpdate(btn) {
            const opw = document.getElementById('global-old-pw').value.trim();
            const npw = document.getElementById('global-new-pw').value.trim();
            if(!opw || !npw) return alert("Fill all fields.");
            
            const currentPass = currentSystem === 'employee' ? currentUser.pass : currentUser.password;
            if (String(opw) !== String(currentPass)) return alert("Current password is incorrect.");

            btn.innerText = "UPDATING..."; btn.disabled = true;
            try {
                const table = currentSystem === 'employee' ? 'employees' : 'users';
                const col = currentSystem === 'employee' ? 'pass' : 'password';
                const filterCol = currentSystem === 'employee' ? 'emp_id' : 'id';
                const filterVal = currentSystem === 'employee' ? currentUser.emp_id : currentUser.id;
                
                const { error } = await supabaseClient.from(table).update({ [col]: npw }).eq(filterCol, filterVal);
                if(error) throw error;
                alert("Password updated successfully. Please log in again.");
                globalLogout();
            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = "Update Password"; btn.disabled = false;
            }
        }

        // ==========================================
        // SYSTEM 1: ACCOUNTING VERIFIER (Overlap Audit)
        // ==========================================
        let accEmps = [], accSelected = null;
        
        async function acc_initVerifier() {
            document.getElementById('app').innerHTML = `
            <header class="flex-none w-full h-16 bg-dar text-white px-5 flex justify-between items-center shadow-md z-50">
                <div class="text-left"><h1 class="font-bold text-lg leading-tight truncate">Overlap Verifier</h1><p class="text-[10px] text-dar-gold tracking-wide font-bold uppercase">${currentUser.full_name}</p></div>
                <div class="flex gap-2">
                    <button onclick="showGlobalChangePwd()" class="text-xs bg-white/20 px-3 py-1.5 rounded-full font-bold">Password</button>
                    <button onclick="globalLogout()" class="text-xs bg-white/20 px-3 py-1.5 rounded-full font-bold">Logout</button>
                </div>
            </header>
            <main class="flex-grow w-full overflow-y-auto p-4 md:p-8 relative z-10 scroll-smooth">
                <div class="max-w-2xl mx-auto space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div class="flex justify-between items-center border-b pb-2 mb-4">
                            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Verification Filters</h2>
                            <span class="text-[9px] bg-dar text-white px-2 py-0.5 rounded-full font-bold uppercase">Approved Only</span>
                        </div>
                        <div class="space-y-4">
                            <div class="relative">
                                <label class="text-[10px] font-black text-dar uppercase mb-1 block tracking-widest">Employee Search</label>
                                <div class="relative">
                                    <input id="accSearch" oninput="acc_runSearch(this)" placeholder="Search..." class="w-full p-3 pr-10 border border-slate-300 rounded-xl text-sm outline-none bg-slate-50 font-bold uppercase" autocomplete="off">
                                    <button id="accClearBtn" onclick="acc_clearSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-red-500 hidden font-bold text-lg leading-none">✕</button>
                                </div>
                                <div id="accResults" class="search-results-box hidden"></div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="text-[10px] font-black text-dar uppercase mb-1 block tracking-widest">From</label><input id="accD1" type="date" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none bg-slate-50"></div>
                                <div><label class="text-[10px] font-black text-dar uppercase mb-1 block tracking-widest">To</label><input id="accD2" type="date" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none bg-slate-50"></div>
                            </div>
                            <button onclick="acc_runAudit()" class="w-full btn-primary text-xs py-4 tracking-widest mt-2">🔍 Execute Detailed Audit</button>
                        </div>
                    </div>
                    <div id="accResultsArea" class="hidden space-y-4 pb-10"></div>
                </div>
            </main>`;
            const { data } = await supabaseClient.from('employees').select('*');
            accEmps = data || [];
        }

        function acc_runSearch(inp) {
            const div = document.getElementById('accResults');
            const clearBtn = document.getElementById('accClearBtn');
            const val = inp.value.toLowerCase().trim();
            clearBtn.classList.toggle('hidden', val.length === 0);
            if (val.length < 2) { div.classList.add('hidden'); return; }
            const match = accEmps.filter(e => e.full_name.toLowerCase().includes(val)).slice(0, 5);
            div.innerHTML = match.map(e => `<div onclick="acc_pickEmp('${safeStr(e.full_name)}','${e.emp_id}')" class="p-4 border-b border-slate-100 text-[11px] font-black cursor-pointer uppercase text-slate-700 hover:bg-slate-50 transition">${e.full_name}</div>`).join('');
            div.classList.remove('hidden');
        }

        function acc_clearSearch() {
            document.getElementById('accSearch').value = '';
            accSelected = null;
            document.getElementById('accClearBtn').classList.add('hidden');
            document.getElementById('accResults').classList.add('hidden');
            document.getElementById('accResultsArea').classList.add('hidden');
        }

        function acc_pickEmp(n, id) {
            document.getElementById('accSearch').value = n;
            document.getElementById('accResults').classList.add('hidden');
            accSelected = { n, id };
        }

        async function acc_runAudit() {
            if(!accSelected) return alert("Select employee.");
            const sDate = document.getElementById('accD1').value;
            const eDate = document.getElementById('accD2').value;
            if(!sDate || !eDate) return alert("Select range.");

            const resArea = document.getElementById('accResultsArea');
            resArea.innerHTML = `<div class="text-center p-10 font-bold animate-pulse text-slate-400 uppercase text-xs tracking-widest">Extracting Record Details...</div>`;
            resArea.classList.remove('hidden');

            try {
                const [itins, hols, bookings, psos, leaves, orders, ctos] = await Promise.all([
                    supabaseClient.from('itinerary').select('*').gte('travel_date', sDate).lte('travel_date', eDate),
                    supabaseClient.from('holidays').select('*').gte('date', sDate).lte('date', eDate),
                    supabaseClient.from('fleet_bookings').select('*').eq('emp_id', accSelected.id).gte('travel_date', sDate).lte('travel_date', eDate),
                    supabaseClient.from('pso_records').select('*').eq('emp_id', accSelected.id).lte('start_date', eDate).gte('end_date', sDate),
                    supabaseClient.from('leave_ledger').select('*').eq('emp_id', accSelected.id).eq('transaction_type', 'APPROVED').lte('start_date', eDate).gte('end_date', sDate),
                    supabaseClient.from('travel_orders').select('*').eq('emp_id', accSelected.id).eq('status', 'APPROVED'),
                    supabaseClient.from('cto_records').select('*').eq('emp_id', accSelected.id).gte('leave_date', sDate).lte('leave_date', eDate)
                ]);

                const dates = []; let curr = new Date(sDate); const end = new Date(eDate);
                while(curr <= end) { dates.push(curr.toISOString().split('T')[0]); curr.setDate(curr.getDate() + 1); }

                let html = `<div class="space-y-4">`;
                let eventsFound = false;

                dates.forEach(date => {
                    const activeItems = [];
                    
                    hols.data.filter(h => h.date === date).forEach(h => activeItems.push({ title: `📍 HOLIDAY`, subtitle: h.name, color: 'text-red-700', bg: 'bg-red-50', border: 'border-red-200' }));
                    ctos.data.filter(c => c.leave_date === date).forEach(c => activeItems.push({ title: `⏳ CTO: COMPENSATORY TIME-OFF`, subtitle: `Purpose: ${c.purpose || 'N/A'}`, color: 'text-teal-700', bg: 'bg-teal-50', border: 'border-teal-200' }));
                    leaves.data.filter(l => date >= l.start_date && date <= l.end_date).forEach(l => activeItems.push({ title: `🏖️ LEAVE: ${l.type}`, subtitle: l.remarks || 'Approved System Ledger', color: 'text-purple-700', bg: 'bg-purple-50', border: 'border-purple-200' }));
                    bookings.data.filter(b => b.travel_date === date).forEach(b => activeItems.push({ title: `🚗 FLEET: ${b.vehicle}`, subtitle: `Driver: ${b.driver} | Dest: ${b.destination || b.assignment || 'N/A'}`, color: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' }));
                    psos.data.filter(p => date >= p.start_date && date <= p.end_date).forEach(p => activeItems.push({ title: `ℹ️ PSO: ${p.pso_no}`, subtitle: p.subject, color: 'text-blue-700', bg: 'bg-blue-50', border: 'border-blue-200' }));
                    
                    const dayItins = itins.data.filter(i => i.travel_date === date);
                    orders.data.filter(to => dayItins.some(i => i.to_no === to.to_no)).forEach(t => {
                        const specItin = dayItins.find(i => i.to_no === t.to_no);
                        activeItems.push({ title: `📄 TO: ${t.to_no}`, subtitle: `Dest: ${specItin ? specItin.destination : 'Various'} | Trans: ${t.transport}`, color: 'text-dar', bg: 'bg-green-50', border: 'border-green-200' });
                    });

                    if (activeItems.length > 0) {
                        eventsFound = true;
                        const isConflict = activeItems.length > 1;

                        html += `
                        <div class="bg-white rounded-2xl border shadow-sm p-5 ${isConflict ? 'border-red-500' : 'border-slate-200'} transition-all relative overflow-hidden">
                            ${isConflict ? '<div class="absolute top-0 left-0 w-1 h-full bg-red-500"></div>' : ''}
                            <div class="flex justify-between items-center border-b pb-3 mb-3">
                                <div>
                                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${new Date(date).toLocaleDateString('en-US', {weekday:'long'})}</p>
                                    <h4 class="text-sm font-black text-slate-800">${date}</h4>
                                </div>
                                <div>
                                    ${isConflict ? 
                                        '<span class="bg-red-600 text-white text-[9px] px-3 py-1.5 rounded-full font-black uppercase animate-pulse shadow-md">⚠️ OVERLAP FLAG</span>' : 
                                        '<span class="bg-slate-100 text-slate-500 text-[9px] px-3 py-1 rounded-full font-black uppercase">CLEAR LOG</span>'
                                    }
                                </div>
                            </div>
                            <div class="space-y-2">
                                ${activeItems.map(item => `
                                    <div class="p-3 rounded-xl border ${item.bg} ${item.border}">
                                        <h5 class="text-[10px] font-black uppercase ${item.color} mb-1">${item.title}</h5>
                                        <p class="text-[10px] text-slate-600 italic leading-tight">${item.subtitle}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>`;
                    }
                });

                if (!eventsFound) html = `<div class="bg-white p-10 rounded-2xl text-center border border-dashed border-slate-300"><p class="text-xs font-bold text-slate-400 uppercase tracking-widest">No activities logged.</p></div>`;
                
                html += `</div>`;
                resArea.innerHTML = html;
            } catch (err) {

            <div id="fleetTransferModal" class="hidden modal-overlay modal-fade"><div class="modal-box max-w-sm"><div class="p-5 border-b bg-slate-50 rounded-t-2xl"><h2 class="font-black text-dar text-xs uppercase tracking-widest">Smart Transfer</h2><p id="fTSub" class="text-[10px] text-slate-500 font-bold mt-1 uppercase"></p></div><div class="p-8 space-y-4 bg-white"><label class="text-[10px] font-black text-slate-400 uppercase">Available Fleet (Matching Dates):</label><select id="fTSelect" class="w-full p-4 border border-slate-200 rounded-xl font-black text-dar outline-none bg-slate-50 text-base shadow-inner"></select></div><div class="p-5 border-t flex gap-4 bg-slate-50 rounded-b-2xl"><button onclick="fleet_closeModal('fleetTransferModal')" class="flex-1 py-3 text-[10px] font-bold uppercase text-slate-500">Cancel</button><button id="fTExec" class="btn-primary text-xs flex-1 py-3 tracking-widest shadow-lg rounded-xl">Confirm</button></div></div></div>
            
            <div id="fleetMaintModal" class="hidden modal-overlay modal-fade"><div class="modal-box max-w-sm"><div class="p-5 border-b bg-slate-50 rounded-t-2xl"><h2 class="font-black text-dar text-xs uppercase tracking-widest">Schedule Maintenance</h2><p id="fMaintSub" class="text-[10px] text-slate-500 font-bold mt-1 uppercase"></p></div><div class="p-6 space-y-4 bg-white"><div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Reason</label><input id="fMaintReason" placeholder="Change Oil..." class="w-full p-3 border rounded-xl text-sm bg-slate-50 outline-none"></div><div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">Start Date</label><input id="fMaintD1" type="date" class="w-full p-3 border rounded-xl text-sm bg-slate-50 outline-none"></div><div><label class="text-[10px] font-black text-slate-400 uppercase mb-1 block">End Date</label><input id="fMaintD2" type="date" class="w-full p-3 border rounded-xl text-sm bg-slate-50 outline-none"></div></div><div class="p-5 border-t flex gap-4 bg-slate-50 rounded-b-2xl"><button onclick="fleet_closeModal('fleetMaintModal')" class="flex-1 py-3 text-[10px] font-bold uppercase text-slate-500">Cancel</button><button onclick="fleet_saveMaint()" class="bg-red-600 text-white rounded-xl font-bold uppercase text-[10px] flex-1 py-3 tracking-widest shadow-lg hover:bg-red-700">Off-Road</button></div></div></div>
            <datalist id="fDrivers">${FLEET_DRIVERS.map(d=>`<option value="${d}">`).join('')}</datalist>`;
        }

        function fleet_openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function fleet_closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        async function fleet_sync() {
            const [o, i, b, e] = await Promise.all([
                supabaseClient.from('travel_orders').select('*').neq('status','CANCELLED'), 
                supabaseClient.from('itinerary').select('*'), 
                supabaseClient.from('fleet_bookings').select('*'),
                supabaseClient.from('employees').select('*')
            ]);
            fleetData = { orders: o.data||[], itins: i.data||[], bookings: b.data||[], emps: e.data||[] };
            fleet_updateView();
        }

        function fleet_switchTab(t) { fleetTab = t; fleet_updateView(); }
        
        function fleet_updateView() {
            const m = document.getElementById('fleet-content');
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('text-dar'));
            document.getElementById(`ftab-${fleetTab}`).classList.add('text-dar');
            
            if(fleetTab === 'inbox') fleet_renderInbox(m);
            else if(fleetTab === 'res') fleet_renderRes(m);
            else fleet_renderSched(m);
        }

        function fleet_renderInbox(m) {
            const pending = fleetData.orders.filter(x => x.status === 'PENDING_VEHICLE_APPROVER');
            if(!pending.length) { m.innerHTML = `<p class="text-center p-20 text-slate-300 font-bold uppercase text-xs">Inbox Clear</p>`; return; }
            m.innerHTML = `<div class="space-y-4">` + pending.map(o => {
                const tr = fleetData.itins.filter(i=>i.to_no === o.to_no).sort((a,b)=>new Date(a.travel_date)-new Date(b.travel_date));
                return `
                <div class="bg-white p-4 rounded-xl border shadow-sm">
                    <div class="flex justify-between items-center mb-2 pb-2 border-b"><span class="text-[9px] font-black text-dar uppercase bg-green-50 px-2 py-0.5 rounded">TO: ${o.to_no}</span><button onclick="fleet_toLand('${o.to_no}','${o.unit}')" class="text-blue-600 text-[9px] font-bold underline uppercase">LAND</button></div>
                    <h3 class="font-black text-sm uppercase mb-2">${o.emp_name}</h3>
                    <div class="mb-3 bg-slate-50 p-2 rounded-lg text-[9px] max-h-20 overflow-y-auto no-scrollbar">${tr.map(i=>`<b>${i.travel_date}</b>: ${i.destination} <i>(${i.purpose})</i><br>`).join('')}</div>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <select id="fv-${o.to_no}" class="border rounded p-2 text-[10px] font-bold text-dar outline-none"><option disabled selected hidden>Vehicle</option>${FLEET_VEHICLES.map(v=>`<option>${v}</option>`).join('')}</select>
                        <select id="fs-${o.to_no}" class="border rounded p-2 text-[10px] font-bold text-slate-600 outline-none"><option>WHOLE DAY</option><option>AM</option><option>PM</option><option>DROP-OFF ONLY</option><option>PICK-UP ONLY</option></select>
                        <input id="fd-${o.to_no}" list="fDrivers" placeholder="Driver..." class="col-span-2 border rounded p-2 text-[10px] font-bold outline-none">
                    </div>
                    <div class="flex gap-2"><button onclick="fleet_toLand('${o.to_no}','${o.unit}')" class="border border-red-200 text-red-600 rounded-lg px-3 py-2.5 text-[9px] font-bold uppercase flex-1 active:scale-95">Reject</button><button onclick="fleet_approve('${o.to_no}','${o.unit}')" class="btn-primary text-[10px] flex-[2] py-2.5 rounded-lg">Approve</button></div>
                </div>`;
            }).join('') + `</div>`;
        }

        async function fleet_approve(to, unit) {
            const v = document.getElementById(`fv-${to}`).value, s = document.getElementById(`fs-${to}`).value, d = document.getElementById(`fd-${to}`).value || "TBD";
            if(v === "Vehicle") return alert("Select Vehicle");
            const route = (unit === "PARPO") ? "PENDING_PARPO" : (unit && unit !== "NULL" ? "PENDING_UNIT_HEAD" : "PENDING_CHIEF");
            await supabaseClient.from('travel_orders').update({ received: v, driver: d, remarks: s, status: route }).eq('to_no', to);
            fleet_sync();
        }

        async function fleet_toLand(to, unit) {
            const route = (unit === "PARPO") ? "PENDING_PARPO" : (unit && unit !== "NULL" ? "PENDING_UNIT_HEAD" : "PENDING_CHIEF");
            await supabaseClient.from('travel_orders').update({ transport: 'LAND', status: route, received: null, driver: null }).eq('to_no', to);
            fleet_sync();
        }

        function fleet_renderRes(m) {
            const tos = fleetData.orders.filter(x => x.transport === "GOV'T VEHICLE" && x.status !== 'PENDING_VEHICLE_APPROVER' && x.status !== 'OFF_ROAD' && x.remarks !== 'MAINTENANCE');
            const toGrp = {}; tos.forEach(x => { if(!toGrp[x.to_no]) toGrp[x.to_no] = []; toGrp[x.to_no].push(x); });
            const bkGrp = {}; fleetData.bookings.forEach(x => { if(!bkGrp[x.ref_no]) bkGrp[x.ref_no] = []; bkGrp[x.ref_no].push(x); });

            if(Object.keys(toGrp).length===0 && Object.keys(bkGrp).length===0) { m.innerHTML = `<p class="text-center p-20 text-slate-300 font-bold uppercase text-xs">No Reservations</p>`; return; }
            
            let html = `<div class="space-y-6">`;
            if(Object.keys(toGrp).length > 0) {
                html += `<div><h2 class="text-xs font-black text-slate-400 uppercase tracking-widest border-b pb-2 mb-3">Official Travel Orders</h2><div class="space-y-4">` + 
                Object.entries(toGrp).map(([to, list]) => `<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-dar flex flex-col"><div class="flex justify-between items-start mb-2 border-b pb-2"><span class="text-[9px] font-black text-slate-400 uppercase">TO: ${to}</span><span class="text-[9px] bg-green-50 text-dar font-black px-2 py-0.5 rounded uppercase">${list[0].remarks||'WHOLE'}</span></div><h3 class="font-black text-sm uppercase mb-1">${list[0].emp_name} <span class="bg-dar text-white text-[8px] px-1.5 py-0.5 rounded">LEAD</span></h3>${list.length>1?`<div class="text-[10px] text-slate-500 font-bold uppercase mb-3 pl-2 border-l-2">${list.slice(1).map(x=>x.emp_name).join('<br>')}</div>`:''}<div class="bg-slate-50 p-2.5 rounded-lg border flex justify-between mt-auto mb-3"><p class="text-[10px] text-dar font-black uppercase">🚙 ${list[0].received}</p><p class="text-[10px] text-slate-500 font-bold uppercase">👤 ${list[0].driver}</p></div><div class="flex gap-2"><button onclick="fleet_cancelTO('${to}','${list[0].status}')" class="border border-red-200 text-red-600 px-3 py-2 rounded-lg text-[9px] font-black uppercase flex-1 active:scale-95">Cancel</button><button onclick="fleet_openPeople('${to}', false)" class="bg-slate-100 text-dar font-black px-3 py-2 rounded-lg text-[9px] uppercase flex-[2] active:bg-slate-200">Personnel (${list.length})</button></div></div>`).join('') + `</div></div>`;
            }
            if(Object.keys(bkGrp).length > 0) {
                html += `<div><h2 class="text-xs font-black text-blue-600 uppercase tracking-widest border-b pb-2 mb-3 mt-4">Special Fleet Bookings</h2><div class="space-y-4">` + 
                Object.entries(bkGrp).map(([ref, list]) => {
                    const dates = [...new Set(list.map(l => l.travel_date))].join(', ');
                    const seenNames = new Set(); const pass = []; list.forEach(i => { if(!seenNames.has(i.emp_name)){ seenNames.add(i.emp_name); pass.push(i); } });
                    return `<div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500 flex flex-col"><div class="flex justify-between items-start mb-2 border-b pb-2"><span class="text-[9px] font-black text-slate-400 uppercase">REF: ${ref}</span><span class="text-[9px] bg-blue-50 text-blue-600 font-black px-2 py-0.5 rounded uppercase">${list[0].assignment}</span></div><h3 class="font-black text-sm uppercase mb-1">${pass[0].emp_name} <span class="bg-blue-600 text-white text-[8px] px-1.5 py-0.5 rounded">LEAD</span></h3>${pass.length>1?`<div class="text-[10px] text-slate-500 font-bold uppercase mb-2 pl-2 border-l-2">${pass.slice(1).map(x=>x.emp_name).join('<br>')}</div>`:''}<p class="text-[9px] text-slate-400 font-bold uppercase mb-3"><span class="text-blue-500">Dates:</span> ${dates}</p><div class="bg-slate-50 p-2.5 rounded-lg border flex justify-between mt-auto mb-3"><p class="text-[10px] text-dar font-black uppercase">🚙 ${list[0].vehicle}</p><p class="text-[10px] text-slate-500 font-bold uppercase">👤 ${list[0].driver}</p></div><div class="flex gap-2"><button onclick="fleet_cancelBooking('${ref}')" class="border border-red-200 text-red-600 px-3 py-2 rounded-lg text-[9px] font-black uppercase flex-1 active:scale-95">Delete</button><button onclick="fleet_openPeople('${ref}', true)" class="bg-slate-100 text-blue-600 font-black px-3 py-2 rounded-lg text-[9px] uppercase flex-[2] active:bg-slate-200">Personnel (${pass.length})</button></div></div>`;
                }).join('') + `</div></div>`;
            }
            m.innerHTML = html + `</div>`;
        }

        async function fleet_cancelTO(to, status) { if(confirm("Change to LAND or Cancel TO?")) { await supabaseClient.from('travel_orders').update({ transport: 'LAND', status: status==='APPROVED'?'APPROVED':'PENDING_UNIT_HEAD' }).eq('to_no', to); fleet_sync(); } }
        async function fleet_cancelBooking(ref) { if(confirm("Permanently delete this Booking?")) { await supabaseClient.from('fleet_bookings').delete().eq('ref_no', ref); fleet_sync(); } }

        function fleet_renderSched(m) {
            const now = new Date(); now.setHours(0,0,0,0);
            const fItins = fleetData.itins.filter(i => {
                const d = new Date(i.travel_date); d.setHours(0,0,0,0);
                if(fleetSchedFilter === 'day') return d.getTime() === now.getTime();
                if(fleetSchedFilter === 'week') { const s = new Date(now); s.setDate(now.getDate() - now.getDay()); const e = new Date(s); e.setDate(s.getDate()+6); return d>=s && d<=e; }
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            const validToNos = fItins.map(i => i.to_no);
            const fBks = fleetData.bookings.filter(b => {
                const d = new Date(b.travel_date); d.setHours(0,0,0,0);
                if(fleetSchedFilter === 'day') return d.getTime() === now.getTime();
                if(fleetSchedFilter === 'week') { const s = new Date(now); s.setDate(now.getDate() - now.getDay()); const e = new Date(s); e.setDate(s.getDate()+6); return d>=s && d<=e; }
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });

            m.innerHTML = `
            <div class="no-print bg-white p-2 rounded-xl mb-6 flex gap-1 shadow-sm w-full mx-auto items-center sticky top-0 z-20 border">
                <button onclick="fleet_setFilter('day')" class="flex-1 py-2.5 text-[10px] font-black rounded-lg ${fleetSchedFilter==='day'?'bg-dar text-white shadow':'text-slate-500 hover:bg-slate-50'} uppercase tracking-widest">Day</button>
                <button onclick="fleet_setFilter('week')" class="flex-1 py-2.5 text-[10px] font-black rounded-lg ${fleetSchedFilter==='week'?'bg-dar text-white shadow':'text-slate-500 hover:bg-slate-50'} uppercase tracking-widest">Week</button>
                <button onclick="fleet_setFilter('month')" class="flex-1 py-2.5 text-[10px] font-black rounded-lg ${fleetSchedFilter==='month'?'bg-dar text-white shadow':'text-slate-500 hover:bg-slate-50'} uppercase tracking-widest">Month</button>
                <button onclick="window.print()" class="bg-slate-100 flex-[0.8] py-2.5 text-[10px] font-bold text-slate-700 shadow-sm transition flex items-center justify-center rounded-lg">Card View</button>
                <button onclick="fleet_printSummary()" class="btn-gold flex-[1.2] py-2.5 text-[10px] shadow active:scale-95 transition flex items-center justify-center rounded-lg">🖨️ Report</button>
            </div>
            <div class="print-area grid grid-cols-1 gap-6">
                <h1 class="print-header text-dar uppercase font-black col-span-full mb-0 border-b-2 border-dar pb-2 text-lg text-center tracking-tighter">Deployments (${fleetSchedFilter})</h1>
                ` + FLEET_VEHICLES.map(v => {
                const vLogs = fleetData.orders.filter(o => o.received === v && validToNos.includes(o.to_no));
                const uniqueTo = [...new Set(vLogs.map(l => l.to_no))].sort();
                const vBookings = fBks.filter(b => b.vehicle === v);

                else {
                    html += uniqueTo.map(toNo => {
                        const h = vLogs.find(l => l.to_no === toNo);
                        const dates = [...new Set(fleetData.itins.filter(itin => itin.to_no === toNo).map(itin => itin.travel_date))].join(', ');

                        return `<div class="bg-slate-50 p-4 rounded-xl mb-3 flex justify-between items-center border border-slate-200 shadow-sm"><div class="overflow-hidden leading-tight pr-2"><span class="text-[8px] bg-dar text-white px-1.5 py-0.5 rounded font-bold mb-1 inline-block">TO</span><p class="text-[11px] font-black text-slate-800 uppercase mb-2"> • ${allPass}</p><p class="text-[9px] text-slate-500 font-bold tracking-widest uppercase mt-2 pt-1 border-t">${dates} | ${h.remarks || 'WHOLE'}</p></div><button onclick="fleet_smartTransfer('${h.to_no}','${v}')" class="text-xl no-print active:scale-75 transition hover:opacity-70 bg-white rounded-full w-10 h-10 flex items-center justify-center border border-slate-200 shadow-sm shrink-0">🔄</button></div>`;
                    }).join('');
                    html += uniqueRefs.map(ref => {
                        const items = vBookings.filter(b => b.ref_no === ref);
                        const dates = [...new Set(items.map(i => i.travel_date))].join(', ');

                    }).join('');
                }
                return html + `</div>`;
            }).join('') + `</div>`;
        }

        async function fleet_isDoubleBooked(empName, checkDates) {
            const empTrips = fleetData.orders.filter(o => o.emp_name === empName && o.status !== 'CANCELLED' && o.transport === "GOV'T VEHICLE");
            for (let trip of empTrips) {
                const tripDates = fleetData.itins.filter(i => i.to_no === trip.to_no).map(i => i.travel_date);
                if(tripDates.some(d => checkDates.includes(d))) return true;
            }
            const bks = fleetData.bookings.filter(b => b.emp_name === empName && checkDates.includes(b.travel_date));
            return bks.length > 0;
        }

        async function fleet_saveManual() {
            const d1 = document.getElementById('fResD1').value, d2 = document.getElementById('fResD2').value;
            const assign = document.getElementById('fResS').value, v = document.getElementById('fResV').value, dr = document.getElementById('fResDr').value;
            const dest = document.getElementById('fResDest').value.trim(), p = document.getElementById('fResP').value.trim();
            const depT = document.getElementById('fResDepTime').value, arrT = document.getElementById('fResArrTime').value;
            
            if(!d1 || !dest || !p) return alert("Missing Dates, Destination, or Purpose.");
            if(fleetQueue.length === 0) return alert("Queue at least one passenger.");

            let st = new Date(d1), en = new Date(d2 || d1), dates = [];
            while(st <= en) { dates.push(st.toISOString().split('T')[0]); st.setDate(st.getDate() + 1); }

            for (let pass of fleetQueue) {
                if (await fleet_isDoubleBooked(pass.n, dates)) return alert(`Blocked: ${pass.n} already assigned a vehicle on these dates!`);
            }

            let timeStr = assign;
            if (depT && arrT) timeStr = `${assign} (${formatTo12Hour(depT)} - ${formatTo12Hour(arrT)})`;
            else if (depT) timeStr = `${assign} (${formatTo12Hour(depT)} Onward)`;

            const payload = []; const toUpdates = []; const ref = `BK-${Math.floor(Date.now()%100000)}`;

            for (let pass of fleetQueue) {
                const passTOs = fleetData.orders.filter(o => o.emp_name === pass.n && o.status !== 'CANCELLED' && (o.transport !== "GOV'T VEHICLE" || !o.transport));
                let matchedTO = null;
                for (let to of passTOs) {
                    const toDates = fleetData.itins.filter(i => i.to_no === to.to_no).map(i => i.travel_date);
                    if (toDates.some(d => dates.includes(d))) { matchedTO = to.to_no; break; }
                }
                if (matchedTO) toUpdates.push(matchedTO);
                else {
                    for (let date of dates) payload.push({ ref_no: ref, emp_name: pass.n, emp_id: pass.id, travel_date: date, destination: dest, purpose: p, vehicle: v, driver: dr, assignment: timeStr });
                }
            }

            if (payload.length > 0) await supabaseClient.from('fleet_bookings').insert(payload);
            for (let to of [...new Set(toUpdates)]) await supabaseClient.from('travel_orders').update({ transport: "GOV'T VEHICLE", received: v, driver: dr, remarks: timeStr }).eq('to_no', to);
            
            fleetQueue = []; document.getElementById('fResDest').value = ""; document.getElementById('fResP').value = "";
            fleet_renderQueue(); fleet_closeModal('fleetBookModal'); fleet_sync();
        }

        async function fleet_addPersonnel() {
            if(!fleetSelectedEmp) return alert("Search and click a name first.");
            if (fleetIsBooking) {
                const { data } = await supabaseClient.from('fleet_bookings').select('*').eq('ref_no', fleetActiveRef);
                if(!data || !data.length) return;
                const dates = [...new Set(data.map(d => d.travel_date))];
                if (await fleet_isDoubleBooked(fleetSelectedEmp.n, dates)) return alert(`${fleetSelectedEmp.n} is already assigned a vehicle on these dates.`);
                const template = data[0];
                const payload = dates.map(d => ({ ref_no: fleetActiveRef, emp_name: fleetSelectedEmp.n, emp_id: fleetSelectedEmp.id, travel_date: d, destination: template.destination, purpose: template.purpose, vehicle: template.vehicle, driver: template.driver, assignment: template.assignment }));
                await supabaseClient.from('fleet_bookings').insert(payload);
            } else {
                const head = fleetData.orders.find(o => o.to_no === fleetActiveRef);
                const toDates = fleetData.itins.filter(i => i.to_no === fleetActiveRef).map(i => i.travel_date);
                if (await fleet_isDoubleBooked(fleetSelectedEmp.n, toDates)) return alert(`${fleetSelectedEmp.n} is already assigned a vehicle on these dates.`);
                const row = { ...head, emp_name: fleetSelectedEmp.n, emp_id: fleetSelectedEmp.id }; delete row.id; delete row.created_at;
                await supabaseClient.from('travel_orders').insert([row]);
            }
            document.getElementById('fPAdd').value = ""; fleetSelectedEmp = null; await fleet_renderPList(); fleet_sync();
        }

        async function fleet_endMaint(to) { 
            if(!confirm("Maintenance finished? Clears remaining schedules.")) return; 
            const now = new Date(); const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0'); 
            await supabaseClient.from('itinerary').delete().eq('to_no', to).gte('travel_date', `${y}-${m}-${d}`); 
            const remaining = await supabaseClient.from('itinerary').select('id').eq('to_no', to); 
            if(!remaining.data || remaining.data.length === 0) await supabaseClient.from('travel_orders').delete().eq('to_no', to);

        async function fleet_smartTransfer(toNo, curV) { 
            fleetActiveRef = toNo; const dates = fleetData.itins.filter(i => i.to_no === toNo).map(i => i.travel_date); 
            const busy = fleetData.orders.filter(o => o.status !== 'CANCELLED' && o.to_no !== toNo && o.transport === "GOV'T VEHICLE" && fleetData.itins.filter(i => i.to_no === o.to_no).some(d => dates.includes(d.travel_date))).map(o => ({ v: o.received, to: o.to_no, drv: o.driver })); 
            const opts = FLEET_VEHICLES.filter(v => v !== curV).map(v => { const m = busy.find(b => b.v === v); return `<option value="${v}" data-drv="${m?m.drv:''}">${v} ${m ? `(JOIN #${m.to})` : '(AVAIL)'}</option>`; }).join(''); 
            document.getElementById('fTSub').innerText = `ID #${toNo}`; document.getElementById('fTSelect').innerHTML = opts;

        function fleet_printSummary() {
            const printSec = document.getElementById('print-table-section');
            const now = new Date(); now.setHours(0,0,0,0);
            const fItins = fleetData.itins.filter(i => {
                const d = new Date(i.travel_date); d.setHours(0,0,0,0);
                if(fleetSchedFilter === 'day') return d.getTime() === now.getTime();
                if(fleetSchedFilter === 'week') { const s = new Date(now); s.setDate(now.getDate() - now.getDay()); const e = new Date(s); e.setDate(s.getDate()+6); return d>=s && d<=e; }
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });
            const validTOs = fItins.map(i => i.to_no);
            const fBks = fleetData.bookings.filter(b => {
                const d = new Date(b.travel_date); d.setHours(0,0,0,0);
                if(fleetSchedFilter === 'day') return d.getTime() === now.getTime();
                if(fleetSchedFilter === 'week') { const s = new Date(now); s.setDate(now.getDate() - now.getDay()); const e = new Date(s); e.setDate(s.getDate()+6); return d>=s && d<=e; }
                return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
            });

            let html = `<div class="mb-6 border-b-2 border-dar pb-4 text-center"><h1 class="text-2xl font-serif font-bold text-dar uppercase">DAR Fleet Manifest Summary</h1><p class="text-sm font-bold text-gray-500 uppercase">Filter: ${fleetSchedFilter} | Printed: ${new Date().toLocaleDateString()}</p></div><table class="w-full text-left border-collapse text-xs"><thead><tr class="bg-dar text-white uppercase tracking-wider text-[10px]"><th class="p-3 border border-slate-300">Vehicle</th><th class="p-3 border border-slate-300">Date</th><th class="p-3 border border-slate-300 w-1/4">Passengers</th><th class="p-3 border border-slate-300">Destination / Purpose</th><th class="p-3 border border-slate-300">Time / Type</th></tr></thead><tbody>`;

            FLEET_VEHICLES.forEach(v => {
                const vTOs = fleetData.orders.filter(o => o.received === v && validTOs.includes(o.to_no));
                const uniqueTo = [...new Set(vTOs.map(l => l.to_no))].sort();
                const vBks = fBks.filter(b => b.vehicle === v);
                const uniqueRefs = [...new Set(vBks.map(b => b.ref_no))].sort();

                let rowSpan = uniqueTo.length + uniqueRefs.length;
                if (rowSpan === 0) return; 
                let isFirst = true;

                uniqueTo.forEach(toNo => {
                    const h = vTOs.find(l => l.to_no === toNo);
                    const dates = [...new Set(fItins.filter(itin => itin.to_no === toNo).map(itin => itin.travel_date))].join(', ');
                    const allPass = fleetData.orders.filter(o => o.to_no === toNo).map(o => o.emp_name).join(', ');
                    const mainItin = fItins.find(itin => itin.to_no === toNo);
                    
                    html += `<tr class="border-b border-slate-200">
                        ${isFirst ? `<td class="p-3 border-x border-slate-300 font-black text-dar bg-slate-50 uppercase text-center align-middle" rowspan="${rowSpan}">${v}</td>` : ''}
                        <td class="p-3 border-x border-slate-300 font-bold whitespace-nowrap">${dates}</td>
                        <td class="p-3 border-x border-slate-300">${h.remarks==='MAINTENANCE'||h.status==='OFF_ROAD' ? '<span class="text-red-600 font-bold">UNAVAILABLE (OFF-ROAD)</span>' : allPass}</td>
                        <td class="p-3 border-x border-slate-300 italic text-[11px]">${mainItin?.destination || 'Maintenance'} <br><span class="text-slate-500">${mainItin?.purpose || ''}</span></td>
                        <td class="p-3 border-x border-slate-300 font-bold"><span class="bg-green-100 text-green-800 px-1 py-0.5 rounded text-[8px]">TO</span> <br> ${h.remarks || 'WHOLE'}</td>
                    </tr>`;
                    isFirst = false;
                });

                uniqueRefs.forEach(ref => {
                    const items = vBks.filter(b => b.ref_no === ref);
                    const dates = [...new Set(items.map(i => i.travel_date))].join(', ');
                    const seenNames = new Set(); const passNames = []; items.forEach(i => { if(!seenNames.has(i.emp_name)){ seenNames.add(i.emp_name); passNames.push(i.emp_name); } });
                    
                    html += `<tr class="border-b border-slate-200 bg-blue-50/30">
                        ${isFirst ? `<td class="p-3 border-x border-slate-300 font-black text-dar bg-slate-50 uppercase text-center align-middle" rowspan="${rowSpan}">${v}</td>` : ''}
                        <td class="p-3 border-x border-slate-300 font-bold whitespace-nowrap">${dates}</td>
                        <td class="p-3 border-x border-slate-300">${passNames.join(', ')}</td>
                        <td class="p-3 border-x border-slate-300 italic text-[11px]">${items[0].destination} <br><span class="text-slate-500">${items[0].purpose}</span></td>
                        <td class="p-3 border-x border-slate-300 font-bold text-blue-700"><span class="bg-blue-100 text-blue-800 px-1 py-0.5 rounded text-[8px]">BOOKING</span> <br> ${items[0].assignment}</td>
                    </tr>`;
                    isFirst = false;
                });
            });

            html += `</tbody></table>`;
            if (!html.includes('<tr>')) html += `<div class="p-10 text-center text-gray-400 font-bold uppercase">No records found.</div>`;

            printSec.innerHTML = html;
            document.body.classList.add('printing-table');
            setTimeout(() => { window.print(); document.body.classList.remove('printing-table'); }, 300);
        }

        async function emp_generateItin() {
            const d1 = document.getElementById('empD1').value, d2 = document.getElementById('empD2').value;
            const container = document.getElementById('empItinFields');
            container.innerHTML = ''; empItinDraft = []; empConflicts = []; 
            if(!d1 || !d2) return;
            if(d1 < todayStr) return alert("No backdating allowed.");
            if(d2 < d1) return alert("End date cannot be before Start.");
            let start = new Date(d1), end = new Date(d2), diff = Math.ceil(Math.abs(end-start)/(1000*60*60*24))+1;
            if(diff > 5) return alert("Maximum 5 days allowed.");

            const { data: psos } = await supabaseClient.from('pso_records').select('*').eq('emp_id', currentUser.emp_id);
            const { data: actTOs } = await supabaseClient.from('travel_orders').select('*').eq('emp_id', currentUser.emp_id).not('status', 'ilike', '%CANCELLED%');

            let cur = new Date(start);
            for(let i=0; i<diff; i++) {
                const dateStr = cur.toISOString().split('T')[0];
                let hasPSO = false;

                if (psos?.some(p => dateStr >= p.start_date && dateStr <= p.end_date)) {
                    if(!confirm(`Conflict: Existing PSO on ${dateStr}. Continue?`)) return; hasPSO = true;
                }

                for (let to of actTOs || []) {
                    const { data: itins } = await supabaseClient.from('itinerary').select('*').eq('to_no', to.to_no).eq('travel_date', dateStr);
                    if (itins && itins.length > 0) {
                        if (to.status.includes('DISAPPROVED')) { alert(`DISAPPROVED TO on ${dateStr}. Select another date.`); return; }
                        if (confirm(`Conflict: ${to.status} TO ${to.to_no} exists on ${dateStr}. Overwrite? (Splits multi-day TOs)`)) {
                            empConflicts.push({ to_no: to.to_no, status: to.status, affected_date: dateStr });
                        } else return;
                    }
                }

                container.innerHTML += `
                    <div class="emp-card border-l-4 border-dar" id="ecard-${i}" style="margin-bottom:10px; padding:10px;">
                        <div class="flex justify-between items-center mb-2">
                            <h5 class="text-dar font-black text-xs uppercase">📅 ${dateStr} ${hasPSO?'<span class="text-red-500 ml-1">(PSO)</span>':''}</h5>
                            <button onclick="document.getElementById('ecard-${i}').remove(); empItinDraft=empItinDraft.filter(x=>x.id!=='ecard-${i}');" class="text-[10px] font-bold text-red-500">DELETE</button>
                        </div>
                        <input type="text" id="edest-${i}" placeholder="Destination" class="w-full p-2 border rounded-lg text-xs mb-2 bg-white">
                        ${i > 0 ? `<label class="text-[10px] text-slate-500 flex items-center gap-1 mb-2 cursor-pointer"><input type="checkbox" onchange="if(this.checked) document.getElementById('epurp-${i}').value = document.getElementById('epurp-${i-1}').value; else document.getElementById('epurp-${i}').value='';"> Copy previous purpose</label>` : ''}
                        <textarea id="epurp-${i}" rows="2" placeholder="Purpose" class="w-full p-2 border rounded-lg text-xs mb-2 bg-white"></textarea>
                        <input type="text" id="erep-${i}" placeholder="Report To" class="w-full p-2 border rounded-lg text-xs bg-white">
                    </div>`;
                empItinDraft.push({ date: dateStr, destId: `edest-${i}`, purpId: `epurp-${i}`, repId: `erep-${i}`, id: `ecard-${i}`, hasPSO });
                cur.setDate(cur.getDate()+1);
            }
        }

        async function emp_submitTO(btn) {
            if(empItinDraft.length === 0) return alert("Itinerary empty.");
            const batchI = []; const reps = new Set();
            for (let it of empItinDraft) {
                const dst = document.getElementById(it.destId).value.trim(), prp = document.getElementById(it.purpId).value.trim(), rpt = document.getElementById(it.repId).value.trim();
                if(!dst || !prp || !rpt) return alert(`Fill all fields for ${it.date}.`);
                batchI.push({ travel_date: it.date, destination: dst, purpose: prp }); reps.add(rpt);
            }

            btn.disabled = true; btn.innerText = "PROCESSING...";

            try {
                for (let c of empConflicts) {
                    if (c.status.includes("PENDING")) {
                        await supabaseClient.from('itinerary').delete().eq('to_no', c.to_no);
                        await supabaseClient.from('travel_orders').delete().eq('to_no', c.to_no);
                    } else if (c.status === "APPROVED") {
                        const { data: oItin } = await supabaseClient.from('itinerary').select('*').eq('to_no', c.to_no);
                        const remains = oItin.filter(d => d.travel_date !== c.affected_date);
                        await supabaseClient.from('travel_orders').update({ status: 'CANCELLED' }).eq('to_no', c.to_no);
                        if (remains.length > 0) {
                            const newTo = await emp_getSeq();
                            const { data: orig } = await supabaseClient.from('travel_orders').select('*').eq('to_no', c.to_no);
                            await supabaseClient.from('travel_orders').insert(orig.map(p => ({...p, id:undefined, to_no: newTo, status:'APPROVED'})));
                            await supabaseClient.from('itinerary').insert(remains.map(i => ({...i, id:undefined, to_no: newTo})));
                        }
                    }
                }

                const toNo = await emp_getSeq();
                const trans = document.getElementById('emp-transport').value;
                const isMarpo = currentUser.position && currentUser.position.toUpperCase().includes("MARPO");
                let rStatus = "PENDING_CHIEF";
                if(trans === "GOV'T VEHICLE") rStatus = "PENDING_VEHICLE_APPROVER";
                else if(currentUser.unit === "PARPO") rStatus = "PENDING_PARPO";
                else if(isMarpo) rStatus = "PENDING_CHIEF";
                else if(currentUser.unit) rStatus = "PENDING_UNIT_HEAD";

                const bPass = empPassDraft.map(p => ({
                    to_no: toNo, emp_id: p.emp_id, emp_name: p.name, unit: p.unit, division: currentUser.division,
                    status: rStatus, transport: trans, report_to: Array.from(reps).join(", "),
                    remarks: empItinDraft.some(x => x.hasPSO) ? "EXISTING PSO" : ""
                }));
                batchI.forEach(i => i.to_no = toNo);

                await supabaseClient.from('travel_orders').insert(bPass);
                await supabaseClient.from('itinerary').insert(batchI);

                alert("Submitted: " + toNo);
                emp_switchTab('status');
            } catch(e) { alert("Error: " + e.message); }
            finally { btn.disabled = false; btn.innerText = "🚀 SUBMIT OFFICIAL REQUEST"; }
        }

        async function emp_getSeq() {
            const yr = new Date().getFullYear(), div = (currentUser.division || "GEN").trim().substring(0,5).toUpperCase();
            const { data } = await supabaseClient.from('travel_orders').select('to_no').like('to_no', `${yr}-${div}-%`).order('to_no', {ascending:false}).limit(1);
            let seq = 1;
            if(data && data.length && data[0].to_no) {
                const p = data[0].to_no.split('-'); if(p.length>=3 && !isNaN(parseInt(p[2]))) seq = parseInt(p[2])+1;
            }
            return `${yr}-${div}-${String(seq).padStart(5,'0')}`;
        }
