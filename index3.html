<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DAR Accounting Verifier</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dar-green: #003811; --dar-gold: #D4AF37; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #f3f4f6; }
        .bg-dar { background-color: var(--dar-green); } .text-dar { color: var(--dar-green); } .bg-gold { background-color: var(--dar-gold); }
        .search-results-box { position: absolute; width: 100%; max-height: 200px; overflow-y: auto; z-index: 2000; background: white; border: 2px solid var(--dar-gold); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); top: 100%; left: 0; }
        .btn-primary { background-color: var(--dar-green); color: white; border-radius: 0.75rem; font-weight: bold; text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col overflow-hidden text-gray-800 relative">

    <div id="app" class="w-full h-full flex flex-col relative">
        <div id="login-screen" class="flex-grow flex flex-col justify-center items-center px-6 bg-dar h-full">
            <div class="z-10 w-full max-w-sm bg-white rounded-2xl shadow-2xl overflow-hidden">
                <div class="bg-gold h-2 w-full"></div>
                <div class="p-8">
                    <h1 class="text-dar font-bold text-2xl font-serif mb-1 text-center">DAR ACCOUNTING</h1>
                    <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-6 uppercase text-center">Intelligent Verification</p>
                    <div class="space-y-4">
                        <div><label class="block text-xs font-bold text-gray-700 mb-1">USERNAME</label><input type="text" id="un" class="w-full px-4 py-3 bg-gray-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-dar"></div>
                        <div><label class="block text-xs font-bold text-gray-700 mb-1">PASSWORD</label><input type="password" id="pw" class="w-full px-4 py-3 bg-gray-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-dar"></div>
                        <button onclick="handleLogin()" class="w-full mt-2 btn-primary text-xs py-3.5">ENTER VERIFIER</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SB_KEY = "sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo"; 
        const db = window.supabase.createClient(SB_URL, SB_KEY);

        let user = null, emps = [];
        let selectedEmp = null;

        async function handleLogin() {
            const u = document.getElementById('un').value.trim(), p = document.getElementById('pw').value.trim();
            const { data } = await db.from('users').select('*');
            const found = data.find(x => x.username === u && String(x.password) === String(p));
            
            if (found && (found.role === 'ACCOUNTANT' || found.role === 'ADMIN' || found.role === 'VEHICLE_APPROVER')) { 
                user = found; 
                const {data: e} = await db.from('employees').select('*');
                emps = e || []; 
                renderDashboard(); 
            } else alert("Invalid Login. You must be authorized for Accounting.");
        }

        function renderDashboard() {
            document.getElementById('app').innerHTML = `
            <header class="flex-none w-full h-16 bg-dar text-white px-5 flex justify-between items-center shadow-md z-50">
                <div class="overflow-hidden text-left"><h1 class="font-bold text-lg leading-tight truncate">Accounting Verifier</h1><p class="text-[10px] text-dar-gold tracking-wide font-bold uppercase">${user.full_name}</p></div>
                <button onclick="location.reload()" class="text-xs bg-white/20 px-3 py-1.5 rounded-full font-bold">Logout</button>
            </header>
            
            <main class="flex-grow w-full overflow-y-auto p-4 md:p-8 relative z-10 scroll-smooth">
                <div class="max-w-2xl mx-auto space-y-6">
                    
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div class="flex justify-between items-center border-b pb-2 mb-4">
                            <h2 class="text-xs font-black text-slate-400 uppercase tracking-widest">Verification Filters</h2>
                            <span class="text-[9px] bg-dar text-white px-2 py-0.5 rounded-full font-bold uppercase">Approved Only</span>
                        </div>
                        
                        <div class="space-y-4">
                            <div class="relative">
                                <label class="text-[10px] font-black text-dar uppercase mb-1 block tracking-widest">Employee Search</label>
                                <div class="relative">
                                    <input id="empSearch" oninput="runEmpSearch(this, 'empResults')" placeholder="Search employee..." class="w-full p-3 pr-10 border border-slate-300 rounded-xl text-sm outline-none bg-slate-50 focus:ring-2 focus:ring-dar" autocomplete="off">
                                    <button id="clearEmpBtn" onclick="clearEmpSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-red-500 hidden transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                                        </svg>
                                    </button>
                                </div>
                                <div id="empResults" class="search-results-box hidden"></div>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="text-[10px] font-black text-dar uppercase mb-1 block tracking-widest">Range Start</label>
                                    <input id="startDate" type="date" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none bg-slate-50 focus:ring-2 focus:ring-dar">
                                </div>
                                <div>
                                    <label class="text-[10px] font-black text-dar uppercase mb-1 block tracking-widest">Range End</label>
                                    <input id="endDate" type="date" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none bg-slate-50 focus:ring-2 focus:ring-dar">
                                </div>
                            </div>

                            <button onclick="runVerification()" class="w-full btn-primary text-xs py-4 tracking-widest mt-2">🔍 Run Intelligent Analysis</button>
                        </div>
                    </div>

                    <div id="resultsArea" class="hidden"></div>
                </div>
            </main>`;
        }

        function runEmpSearch(inp, resId) {
            const div = document.getElementById(resId);
            const clearBtn = document.getElementById('clearEmpBtn');
            const val = inp.value.toLowerCase().trim();
            
            // Toggle clear button
            if (val.length > 0) clearBtn.classList.remove('hidden');
            else clearBtn.classList.add('hidden');

            if (val.length < 2) { div.classList.add('hidden'); return; }
            const match = emps.filter(e => e.full_name.toLowerCase().includes(val)).slice(0, 5);
            
            div.innerHTML = match.map(e => `<div onclick="pickEmp('${safeStr(e.full_name)}','${resId}','${inp.id}','${safeStr(e.emp_id)}')" class="p-4 border-b border-slate-100 text-[11px] font-black active:bg-slate-100 cursor-pointer uppercase text-slate-700 hover:bg-slate-50 transition">${e.full_name}</div>`).join('');
            div.classList.remove('hidden');
        }

        function clearEmpSearch() {
            const inp = document.getElementById('empSearch');
            const clearBtn = document.getElementById('clearEmpBtn');
            const resId = document.getElementById('empResults');
            const resultsArea = document.getElementById('resultsArea');
            
            inp.value = '';
            selectedEmp = null;
            clearBtn.classList.add('hidden');
            resId.classList.add('hidden');
            resultsArea.classList.add('hidden');
            inp.focus();
        }

        function pickEmp(n, rId, iId, eId) {
            document.getElementById(iId).value = n;
            document.getElementById(rId).classList.add('hidden');
            document.getElementById('clearEmpBtn').classList.remove('hidden');
            selectedEmp = { n, id: eId };
        }

        function safeStr(str) { return (str || "").replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

        async function runVerification() {
            if(!selectedEmp) return alert("Please select an employee.");
            const sDate = document.getElementById('startDate').value;
            const eDate = document.getElementById('endDate').value;
            if(!sDate || !eDate) return alert("Select start and end dates.");

            const resArea = document.getElementById('resultsArea');
            resArea.innerHTML = `<div class="text-center p-10"><p class="text-sm font-bold text-slate-400 animate-pulse uppercase tracking-widest">Checking Approved Records...</p></div>`;
            resArea.classList.remove('hidden');

            const empId = selectedEmp.id;

            try {
                // 1. Fetch Itineraries in range
                const { data: itins } = await db.from('itinerary').select('*')
                    .gte('travel_date', sDate)
                    .lte('travel_date', eDate);
                
                const toNosForRange = itins.map(i => i.to_no);

                // 2. Intelligence Update: Strict filter on 'APPROVED' status only. 
                let approvedTOs = [];
                if (toNosForRange.length > 0) {
                    const { data: tos } = await db.from('travel_orders')
                        .select('*')
                        .eq('emp_id', empId)
                        .in('to_no', toNosForRange)
                        .eq('status', 'APPROVED');
                    
                    approvedTOs = (tos || []).map(to => {
                        const specItins = itins.filter(i => i.to_no === to.to_no);
                        return { ...to, itineraries: specItins };
                    });
                }

                const { data: bookings } = await db.from('fleet_bookings')
                    .select('*')
                    .eq('emp_id', empId)
                    .gte('travel_date', sDate)
                    .lte('travel_date', eDate);

                const { data: psos } = await db.from('pso_records')
                    .select('*')
                    .eq('emp_id', empId)
                    .lte('start_date', eDate)
                    .gte('end_date', sDate);

                const { data: leaves } = await db.from('leave_ledger')
                    .select('*')
                    .eq('emp_id', empId)
                    .eq('transaction_type', 'APPROVED')
                    .lte('start_date', eDate)
                    .gte('end_date', sDate);

                renderResults(approvedTOs, bookings || [], psos || [], leaves || []);

            } catch (err) {
                resArea.innerHTML = `<div class="bg-red-50 text-red-600 p-4 rounded-xl border border-red-200 text-sm font-bold">Error: ${err.message}</div>`;
            }
        }

        function renderResults(tos, bookings, psos, leaves) {
            const resArea = document.getElementById('resultsArea');
            
            let usedGovVehicle = bookings.length > 0 || tos.some(to => to.transport === "GOV'T VEHICLE");
            let onLeave = leaves.length > 0;
            let hasConflicts = usedGovVehicle || onLeave;

            let verdictHTML = "";
            if (onLeave) {
                verdictHTML = `<div class="bg-red-600 text-white p-5 rounded-2xl shadow-lg mb-6"><h2 class="text-xl font-black uppercase tracking-widest">🚫 REIMBURSEMENT DENIED</h2><p class="text-xs font-bold mt-1 opacity-90">APPROVED LEAVE DETECTED WITHIN THIS RANGE.</p></div>`;
            } else if (usedGovVehicle) {
                verdictHTML = `<div class="bg-red-600 text-white p-5 rounded-2xl shadow-lg mb-6"><h2 class="text-xl font-black uppercase tracking-widest">🚫 REIMBURSEMENT DENIED</h2><p class="text-xs font-bold mt-1 opacity-90">GOV'T VEHICLE USE DETECTED. NOT ELIGIBLE FOR TRANSPORT CLAIM.</p></div>`;
            } else if (tos.length > 0) {
                verdictHTML = `<div class="bg-green-600 text-white p-5 rounded-2xl shadow-lg mb-6"><h2 class="text-xl font-black uppercase tracking-widest">✅ VERIFIED - ELIGIBLE</h2><p class="text-xs font-bold mt-1 opacity-90">APPROVED LAND TRAVEL ORDERS FOUND. NO CONFLICTS DETECTED.</p></div>`;
            } else if (psos.length > 0) {
                 verdictHTML = `<div class="bg-yellow-500 text-white p-5 rounded-2xl shadow-lg mb-6"><h2 class="text-xl font-black uppercase tracking-widest">⚠️ CAUTION - PSO ONLY</h2><p class="text-xs font-bold mt-1 opacity-90">ONLY POSTED PSO FOUND. VERIFY TRAVEL ITINERARY ATTACHMENTS.</p></div>`;
            } else {
                verdictHTML = `<div class="bg-slate-700 text-white p-5 rounded-2xl shadow-lg mb-6"><h2 class="text-xl font-black uppercase tracking-widest">⚪ NO APPROVED RECORDS</h2><p class="text-xs font-bold mt-1 opacity-90">NO APPROVED TRAVEL, LEAVE, OR BOOKINGS IN THIS RANGE.</p></div>`;
            }

            let html = verdictHTML + `<div class="space-y-4">`;

            if (tos.length > 0) {
                html += `
                <div class="bg-white p-5 rounded-xl border-l-4 border-dar shadow-sm">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b pb-2 mb-3">Official Approved Travel Orders</h3>
                    ${tos.map(t => `
                        <div class="mb-4 last:mb-0 pb-3 border-b border-dashed border-slate-100 last:border-0">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-sm font-black text-dar uppercase">${t.to_no}</span>
                                <span class="text-[9px] px-2 py-0.5 rounded font-bold uppercase tracking-widest bg-green-100 text-green-700">APPROVED</span>
                            </div>
                            <p class="text-xs font-bold text-slate-700 mb-1">Transport: <span class="${t.transport === "GOV'T VEHICLE" ? 'text-red-600' : 'text-blue-600'}">${t.transport}</span></p>
                            <div class="mt-2 space-y-1">
                                ${t.itineraries.map(i => `<p class="text-[10px] text-slate-500 italic leading-tight"><b>${i.travel_date}:</b> ${i.destination}</p>`).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            }

            if (bookings.length > 0) {
                html += `
                <div class="bg-white p-5 rounded-xl border-l-4 border-red-500 shadow-sm">
                    <h3 class="text-[10px] font-black text-red-500 uppercase tracking-widest border-b pb-2 mb-3">Conflict: Official Vehicle Booking</h3>
                    ${bookings.map(b => `
                        <div class="mb-2 last:mb-0">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-sm font-black text-slate-800 uppercase">${b.vehicle}</span>
                                <span class="text-[9px] px-2 py-0.5 rounded font-bold uppercase tracking-widest bg-red-100 text-red-700">${b.travel_date}</span>
                            </div>
                            <p class="text-[10px] text-slate-500 font-bold uppercase leading-tight">Driver: ${b.driver} | Purpose: ${b.purpose}</p>
                        </div>
                    `).join('')}
                </div>`;
            }

            if (psos.length > 0) {
                html += `
                <div class="bg-white p-5 rounded-xl border-l-4 border-yellow-500 shadow-sm">
                    <h3 class="text-[10px] font-black text-yellow-600 uppercase tracking-widest border-b pb-2 mb-3">Posted Special Orders (PSO)</h3>
                    ${psos.map(p => `
                        <div class="mb-2 last:mb-0">
                            <span class="text-sm font-black text-slate-800 uppercase block mb-1">${p.pso_no}</span>
                            <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">Period: ${p.start_date} to ${p.end_date}</p>
                            <p class="text-[10px] text-slate-400 italic leading-tight">${p.subject}</p>
                        </div>
                    `).join('')}
                </div>`;
            }

            if (leaves.length > 0) {
                html += `
                <div class="bg-white p-5 rounded-xl border-l-4 border-purple-500 shadow-sm">
                    <h3 class="text-[10px] font-black text-purple-600 uppercase tracking-widest border-b pb-2 mb-3">Conflict: Approved Leaves</h3>
                    ${leaves.map(l => `
                        <div class="mb-2 last:mb-0 flex justify-between items-center">
                            <div>
                                <span class="text-sm font-black text-slate-800 uppercase">${l.type}</span>
                                <p class="text-[10px] text-slate-500 font-bold uppercase">${l.start_date} to ${l.end_date}</p>
                            </div>
                            <span class="text-[8px] bg-purple-100 text-purple-700 px-2 py-0.5 rounded font-bold">APPROVED</span>
                        </div>
                    `).join('')}
                </div>`;
            }

            html += `</div>`;
            resArea.innerHTML = html;
        }
    </script>
</body>
</html>
