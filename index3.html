                    doc.setFont("helvetica", "bold"); doc.text("MEANS OF TRANSPORTATION:", 20, 61); doc.setFont("helvetica", "normal"); doc.setFontSize(9);
                    const drawCheck = (label, x, y, isChecked) => { doc.rect(x, y - 3, 3, 3); if (isChecked) { doc.setFont("helvetica", "bold"); doc.text("X", x + 0.5, y - 0.2); doc.setFont("helvetica", "normal"); } doc.text(label, x + 5, y); };
                    drawCheck("AIR", 20, 66, od.transport === "AIR"); drawCheck("GOV'T VEHICLE", 70, 66, od.transport === "GOV'T VEHICLE"); drawCheck("LAND", 20, 71, od.transport === "LAND"); drawCheck("OTHERS, PLEASE SPECIFY", 70, 71, od.transport === "OTHERS");

                    doc.setFontSize(10); doc.setFont("helvetica", "bold"); doc.text("DESTINATION:", 20, 78);
                    doc.setFont("helvetica", "normal"); doc.setFontSize(9); let destY = 78;
                    iL.forEach(it => { doc.text(`${new Date(it.travel_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} - ${it.destination}`, 50, destY); destY += 4.5; });
                    let curY = Math.max(destY, 83);

                    doc.setFont("helvetica", "bold"); doc.setFontSize(10); doc.text("DEPARTURE DATE:", 20, curY); doc.setFont("helvetica", "normal"); doc.text(iL[0]?.travel_date || "", 55, curY); doc.line(55, curY+1, 90, curY+1);
                    doc.setFont("helvetica", "bold"); doc.text("RETURN DATE:", 95, curY); doc.setFont("helvetica", "normal"); doc.text(iL[iL.length-1]?.travel_date || "", 125, curY); doc.line(125, curY+1, 160, curY+1);

                    curY += 6; doc.setFont("helvetica", "bold"); doc.text("REPORT TO:", 20, curY); doc.setFont("helvetica", "normal"); doc.text(od.report_to || "", 50, curY); doc.line(50, curY+1, 160, curY+1);
                    curY += 6; doc.setFont("helvetica", "bold"); doc.text("PURPOSE OF TRAVEL:", 20, curY); curY += 4;
                    doc.setFont("helvetica", "normal"); doc.setFontSize(9); const pL = doc.splitTextToSize(iL[0]?.purpose || "", 140); doc.text(pL, 20, curY); doc.line(20, curY+1, 160, curY+1); curY += Math.max(5, pL.length * 4);

                    doc.setFont("helvetica", "italic"); doc.setFontSize(8); doc.text("In case of seminar/workshop/consultation/briefing, indicate:", 20, curY); drawCheck("LIVE IN", 110, curY, false); drawCheck("LIVE OUT", 135, curY, false);

                    doc.setFont("helvetica", "bold"); doc.setFontSize(10); doc.text("Recommended by:", 20, 156);
                    if (i > 0) {
                        if(uh_d && !isM) { if(iUh) doc.addImage(iUh, 'PNG', 34, 153, 35, 15); doc.text(uh_d.full_name.toUpperCase(), 34, 166); }
                        if(dc_d) { if(iDc) doc.addImage(iDc, 'PNG', 104, 153, 35, 15); doc.text(dc_d.full_name.toUpperCase(), 104, 166); }
                    } else {
                        if(uh_d && !isM) doc.text(uh_d.full_name.toUpperCase(), 34, 166);
                        if(dc_d) doc.text(dc_d.full_name.toUpperCase(), 104, 166);
                    }
                    doc.line(25, 168, 80, 168); doc.setFont("helvetica", "normal"); doc.setFontSize(8); doc.text(isM ? "" : "UNIT HEAD", 52, 172, {align: 'center'});
                    doc.line(100, 168, 155, 168); doc.text("DIVISION CHIEF", 127, 172, {align: 'center'});

                    if(i > 0 && iP2) doc.addImage(iP2, 'PNG', 122, 187, 20, 20); 
                    doc.setFont("helvetica", "bold"); doc.setFontSize(11); doc.text("RICARDO C. GARCIA", 114, 202);
                    doc.setFont("helvetica", "normal"); doc.setFontSize(9); doc.text("PARPO II", 128, 206);
                }
                doc.save(`TO_${toNo}.pdf`);
            } catch(e) { alert("PDF Error: "+e.message); }
        }


        // ==========================================
        // SYSTEM 4: ADMIN CONSOLE (Approvals & Analytics)
        // ==========================================
        let adminTab = 'pending', adminRepFilter = 'month', adminRepData = [];

        function admin_initConsole() {
            document.getElementById('app').innerHTML = `
            <header class="flex-none h-16 px-5 border-b shadow-sm flex items-center justify-between bg-white text-dar">
                <div><h1 class="font-black text-sm uppercase tracking-widest">${currentUser.role} CONSOLE</h1><p class="text-[10px] text-slate-500 font-bold">${currentUser.full_name}</p></div>
                <div class="flex gap-2">
                    <button onclick="showGlobalChangePwd()" class="text-[10px] font-bold border border-slate-200 px-3 py-1 rounded-lg">Pass</button>
                    <button onclick="globalLogout()" class="text-[10px] font-bold border border-slate-200 px-3 py-1 rounded-lg bg-slate-50 hover:bg-red-50 hover:text-red-500 transition">Logout</button>
                </div>
            </header>
            <main id="admin-main" class="flex-grow overflow-y-auto p-4 pb-32 bg-slate-50"></main>
            <nav class="flex-none h-16 bg-white border-t flex items-center pb-safe shadow-[0_-2px_10px_rgba(0,0,0,0.05)] z-50">
                <div onclick="admin_switchTab('pending')" id="atab-pending" class="flex-1 flex flex-col items-center justify-center text-[10px] font-bold text-gray-400 uppercase cursor-pointer">📥 Action</div>
                <div onclick="admin_switchTab('approved')" id="atab-approved" class="flex-1 flex flex-col items-center justify-center text-[10px] font-bold text-gray-400 uppercase cursor-pointer">✅ Approved</div>
                <div onclick="admin_switchTab('reports')" id="atab-reports" class="flex-1 flex flex-col items-center justify-center text-[10px] font-bold text-gray-400 uppercase cursor-pointer">📊 Analytics</div>
            </nav>`;
            admin_switchTab('pending');
        }

        function admin_switchTab(t) {
            adminTab = t;
            document.querySelectorAll('nav div').forEach(d => d.classList.remove('text-dar', 'border-t-2', 'border-dar-gold'));
            document.getElementById(`atab-${t}`).classList.add('text-dar', 'border-t-2', 'border-dar-gold');
            
            const m = document.getElementById('admin-main');
            if(t === 'pending') admin_loadPending(m);
            else if(t === 'approved') admin_loadApproved(m);
            else admin_loadReports(m);
        }

        const admin_checkScope = (div, unit) => {
            if (userRole === "PARPO") return true;
            const dM = div && currentUser.divisions.includes(div.toUpperCase());
            if (userRole === "CHIEF") return dM;
            return dM && (unit && unit.toUpperCase() === currentUser.unit);
        };

        async function admin_loadPending(m) {
            m.innerHTML = `<p class="text-center p-10 font-bold text-slate-400 animate-pulse text-xs uppercase tracking-widest">Scanning Inbox...</p>`;
            const [o, i] = await Promise.all([supabaseClient.from('travel_orders').select('*'), supabaseClient.from('itinerary').select('*')]);
            let g = {}; (o.data||[]).forEach(x=>{if(!g[x.to_no])g[x.to_no]=[];g[x.to_no].push(x);});
            
            let arr = [];
            for (const [to, list] of Object.entries(g)) {
                const s = (list[0].status || "").toUpperCase(); let show = false;
                if (userRole === "PARPO" && s === "PENDING_PARPO") show = true;
                else if (userRole === "CHIEF" && s === "PENDING_CHIEF" && currentUser.divisions.includes(list[0].division?.toUpperCase())) show = true;
                else if (userRole === "UNIT_HEAD" && s === "PENDING_UNIT_HEAD" && currentUser.divisions.includes(list[0].division?.toUpperCase()) && currentUser.unit === list[0].unit?.toUpperCase()) show = true;
                
                if (show) {
                    const ds = i.data.filter(x=>x.to_no===to);
                    arr.push({ to, names: list.map(l=>l.emp_name), dest: ds.map(d=>d.destination).join(', ') });
                }
            }

            if(!arr.length) return m.innerHTML = `<p class="text-center p-10 font-bold text-slate-300 uppercase">Inbox Clear</p>`;
            
            m.innerHTML = `<div class="space-y-4">` + arr.map(a => `
                <div class="bg-white p-5 rounded-2xl border shadow-sm">
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 block">${a.to}</span>
                    <h3 class="font-black text-dar uppercase text-xs">${a.names.join(', ')}</h3>
                    <p class="text-[10px] text-slate-500 mt-2 italic truncate">📍 ${a.dest}</p>
                    <div class="flex gap-2 mt-4">
                        <button onclick="admin_act('${a.to}', 'DISAPPROVED')" class="flex-1 bg-red-50 text-red-600 border border-red-200 rounded-xl font-bold py-3 text-[10px] uppercase tracking-widest active:scale-95">Deny</button>
                        <button onclick="admin_act('${a.to}', 'APPROVE')" class="flex-[2] btn-primary rounded-xl py-3 text-[10px] shadow">Approve</button>
                    </div>
                </div>`).join('') + `</div>`;
        }

        async function admin_act(to, act) {
            let nxt = 'APPROVED', payload = {};
            if(act === 'DISAPPROVED') {
                const rs = prompt("Reason for denial:"); if(!rs) return;
                nxt = 'DISAPPROVED'; payload.received = rs;
            } else {
                if(userRole === 'UNIT_HEAD') { nxt = 'PENDING_CHIEF'; payload.unithead_signed = currentUser.full_name; }
                else if(userRole === 'CHIEF') { nxt = 'PENDING_PARPO'; payload.dc_signed = currentUser.full_name; }
                else payload.parpo_signed = "RICARDO C. GARCIA";
            }
            payload.status = nxt;
            await supabaseClient.from('travel_orders').update(payload).eq('to_no', to);
            admin_loadPending(document.getElementById('admin-main'));
        }

        async function admin_loadApproved(m) {
            m.innerHTML = `<p class="text-center p-10 font-bold text-slate-400 animate-pulse text-xs uppercase tracking-widest">Loading...</p>`;
            const [o, i] = await Promise.all([supabaseClient.from('travel_orders').select('*').eq('status','APPROVED'), supabaseClient.from('itinerary').select('*')]);
            let h = `<div class="space-y-3">`;
            (o.data||[]).forEach(x => {
                if(admin_checkScope(x.division, x.unit)) {
                    const ds = i.data.filter(d=>d.to_no===x.to_no).map(d=>d.destination).join(', ');
                    h += `<div class="bg-white p-4 rounded-xl border-l-4 border-green-500 shadow-sm"><span class="text-[9px] font-black uppercase text-slate-400 tracking-widest">${x.to_no}</span><p class="font-black text-dar text-xs uppercase mt-1">${x.emp_name}</p><p class="text-[10px] text-slate-500 mt-1 truncate">📍 ${ds}</p></div>`;
                }
            });
            m.innerHTML = h + `</div>`;
        }

        async function admin_loadReports(m) {
            m.innerHTML = `<p class="text-center p-10 font-bold text-slate-400 animate-pulse text-xs uppercase tracking-widest">Building Dashboard...</p>`;
            try {
                const [to, it, ps, ho] = await Promise.all([
                    supabaseClient.from('travel_orders').select('*').eq('status', 'APPROVED'),
                    supabaseClient.from('itinerary').select('*'),
                    supabaseClient.from('pso_records').select('*'),
                    supabaseClient.from('holidays').select('*')
                ]);
                adminRepData = []; let seen = new Set();
                (it.data||[]).forEach(i => {
                    const p = (to.data||[]).find(x => x.to_no === i.to_no);
                    if(p && i.travel_date && admin_checkScope(p.division, p.unit)) {
                        const k = `${p.emp_name}-${i.travel_date}`;
                        if(!seen.has(k)) { adminRepData.push({ type: 'TO', date: new Date(i.travel_date), title: p.emp_name, sub: i.destination, c: 'text-dar bg-green-50 border-green-200' }); seen.add(k); }
                    }
                });
                (ps.data||[]).forEach(p => { if(p.date && admin_checkScope(p.division, p.unit)) adminRepData.push({ type: 'PSO', date: new Date(p.date), title: p.emp_name||'Personnel', sub: p.destination||'Field Work', c: 'text-blue-700 bg-blue-50 border-blue-200' }); });
                (ho.data||[]).forEach(h => { if(h.date) adminRepData.push({ type: 'HOLIDAY', date: new Date(h.date), title: h.name||'Holiday', sub: 'National/Local', c: 'text-red-700 bg-red-50 border-red-200' }); });
                
                m.innerHTML = `
                <div class="flex bg-slate-200 rounded-xl p-1 mb-4">
                    <button onclick="admin_setRepFilter('day')" class="w-1/3 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition ${adminRepFilter==='day'?'bg-white shadow text-dar':'text-slate-500 hover:bg-slate-100'}">Day</button>
                    <button onclick="admin_setRepFilter('week')" class="w-1/3 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition ${adminRepFilter==='week'?'bg-white shadow text-dar':'text-slate-500 hover:bg-slate-100'}">Week</button>
                    <button onclick="admin_setRepFilter('month')" class="w-1/3 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition ${adminRepFilter==='month'?'bg-white shadow text-dar':'text-slate-500 hover:bg-slate-100'}">Month</button>
                </div>
                <div id="admin-rep-list" class="space-y-3"></div>`;
                admin_updateRepList();
            } catch(e) { m.innerHTML = `<p class="p-10 text-red-500 text-xs font-bold text-center border bg-red-50 rounded-xl">Error loading analytics.</p>`; }
        }

        function admin_setRepFilter(v) { adminRepFilter = v; admin_updateRepList(); }
        
        function admin_updateRepList() {
            const list = document.getElementById('admin-rep-list');
            document.querySelectorAll('#admin-main button').forEach(b=> { if(b.innerText.toLowerCase()===adminRepFilter) { b.classList.add('bg-white','shadow','text-dar'); b.classList.remove('text-slate-500','hover:bg-slate-100'); } else { b.classList.remove('bg-white','shadow','text-dar'); b.classList.add('text-slate-500','hover:bg-slate-100'); } });
            
            const n = new Date(); n.setHours(0,0,0,0);
            let f = adminRepData.filter(r => {
                const d = new Date(r.date); d.setHours(0,0,0,0);
                if(adminRepFilter==='day') return d.getTime()===n.getTime();
                if(adminRepFilter==='week') { const s = new Date(n); s.setDate(n.getDate()-n.getDay()); const e = new Date(s); e.setDate(s.getDate()+6); return d>=s && d<=e; }
                return d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
            });
            f.sort((a,b) => b.date - a.date);

            if(!f.length) { list.innerHTML = `<p class="text-center py-10 text-slate-400 font-bold text-[10px] tracking-widest uppercase">No Records</p>`; return; }
            
            let h = '', last = '';
            f.forEach(r => {
                const cur = r.date.toDateString();
                if(cur !== last) {
                    h += `<h3 class="text-[9px] font-black text-slate-400 mt-4 mb-2 tracking-widest uppercase border-b pb-1">${r.date.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</h3>`;
                    last = cur;
                }
                h += `<div class="bg-white p-4 rounded-xl border shadow-sm flex items-center justify-between ${r.c} border-l-4"><div class="overflow-hidden pr-2"><p class="font-black text-xs uppercase truncate">${r.title}</p><p class="text-[9px] italic mt-1 truncate">📍 ${r.sub}</p></div><div class="shrink-0"><span class="text-[8px] font-black px-2 py-1 rounded bg-white/50 uppercase shadow-sm">${r.type}</span></div></div>`;
            });
            list.innerHTML = h;
        }

    </script>
