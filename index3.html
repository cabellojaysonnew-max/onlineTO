<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DAR Accounting Verifier</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --dar-green: #003811; --dar-gold: #D4AF37; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #f3f4f6; }
        .bg-dar { background-color: var(--dar-green); } .text-dar { color: var(--dar-green); } .bg-gold { background-color: var(--dar-gold); }
        .search-results-box { position: absolute; width: 100%; max-height: 200px; overflow-y: auto; z-index: 2000; background: white; border: 2px solid var(--dar-gold); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); top: 100%; left: 0; }
        .btn-primary { background-color: var(--dar-green); color: white; border-radius: 0.75rem; font-weight: bold; text-transform: uppercase; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="h-[100dvh] w-full flex flex-col overflow-hidden text-gray-800 relative">

    <div id="app" class="w-full h-full flex flex-col relative">
        <div id="login-screen" class="flex-grow flex flex-col justify-center items-center px-6 bg-dar h-full">
            <div class="z-10 w-full max-w-sm bg-white rounded-2xl shadow-2xl overflow-hidden">
                <div class="bg-gold h-2 w-full"></div>
                <div class="p-8">
                    <h1 class="text-dar font-bold text-2xl font-serif mb-1 text-center">DAR ACCOUNTING</h1>
                    <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-6 uppercase text-center">Detailed Overlap Audit</p>
                    <div class="space-y-4">
                        <div><label class="block text-xs font-bold text-gray-700 mb-1">USERNAME</label><input type="text" id="un" class="w-full px-4 py-3 bg-gray-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-dar"></div>
                        <div><label class="block text-xs font-bold text-gray-700 mb-1">PASSWORD</label><input type="password" id="pw" class="w-full px-4 py-3 bg-gray-50 border rounded-xl focus:outline-none focus:ring-2 focus:ring-dar"></div>
                        <button onclick="handleLogin()" class="w-full mt-2 btn-primary text-xs py-3.5">ENTER AUDITOR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://ytfpiyfapvybihlngxks.supabase.co";
        const SB_KEY = "sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo"; 
        const db = window.supabase.createClient(SB_URL, SB_KEY);

        let user = null, emps = [];
        let selectedEmp = null;

        async function handleLogin() {
            const u = document.getElementById('un').value.trim(), p = document.getElementById('pw').value.trim();
            const { data } = await db.from('users').select('*');
            const found = data.find(x => x.username === u && String(x.password) === String(p));
            
            if (found && (found.role === 'ACCOUNTANT' || found.role === 'ADMIN')) { 
                user = found; 
                const {data: e} = await db.from('employees').select('*');
                emps = e || []; 
                renderDashboard(); 
            } else alert("Invalid Login. Authorized personnel only.");
        }

        function renderDashboard() {
            document.getElementById('app').innerHTML = `
            <header class="flex-none w-full h-16 bg-dar text-white px-5 flex justify-between items-center shadow-md z-50">
                <div class="overflow-hidden text-left"><h1 class="font-bold text-lg leading-tight truncate">Overlap Verifier</h1><p class="text-[10px] text-dar-gold tracking-wide font-bold uppercase">${user.full_name}</p></div>
                <div class="flex gap-2">
                    <button onclick="showChangePassword()" class="text-xs bg-white/20 px-3 py-1.5 rounded-full font-bold">Password</button>
                    <button onclick="location.reload()" class="text-xs bg-white/20 px-3 py-1.5 rounded-full font-bold">Logout</button>
                </div>
            </header>
            
            <main class="flex-grow w-full overflow-y-auto p-4 md:p-8 relative z-10 scroll-smooth">
                <div class="max-w-2xl mx-auto space-y-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div class="space-y-4">
                            <div class="relative">
                                <label class="text-[10px] font-black text-dar uppercase mb-1 block tracking-widest">Employee</label>
                                <div class="relative">
                                    <input id="empSearch" oninput="runEmpSearch(this, 'empResults')" placeholder="Search..." class="w-full p-3 pr-10 border border-slate-300 rounded-xl text-sm outline-none bg-slate-50 font-bold uppercase" autocomplete="off">
                                    <button id="clearEmpBtn" onclick="clearEmpSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-red-500 hidden"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg></button>
                                </div>
                                <div id="empResults" class="search-results-box hidden"></div>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="text-[10px] font-black text-dar uppercase mb-1 block tracking-widest">From</label><input id="startDate" type="date" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none bg-slate-50"></div>
                                <div><label class="text-[10px] font-black text-dar uppercase mb-1 block tracking-widest">To</label><input id="endDate" type="date" class="w-full p-3 border border-slate-300 rounded-xl text-sm outline-none bg-slate-50"></div>
                            </div>

                            <button onclick="runVerification()" class="w-full btn-primary text-xs py-4 tracking-widest mt-2">🔍 Execute Detailed Audit</button>
                        </div>
                    </div>
                    <div id="resultsArea" class="hidden space-y-4 pb-10"></div>
                </div>

                <div id="pwdModal" class="hidden fixed inset-0 bg-slate-900/40 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                    <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl relative">
                        <button onclick="document.getElementById('pwdModal').classList.add('hidden')" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 font-black">✕</button>
                        <h2 class="text-dar font-black text-lg mb-4 uppercase tracking-widest border-b pb-2">Change Password</h2>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-[10px] font-black text-dar uppercase mb-1 tracking-widest">Current Password</label>
                                <input type="password" id="cpw" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-dar">
                            </div>
                            <div>
                                <label class="block text-[10px] font-black text-dar uppercase mb-1 tracking-widest">New Password</label>
                                <input type="password" id="npw" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-dar">
                            </div>
                            <button onclick="executePasswordChange(this)" class="w-full btn-primary text-xs py-3 mt-2 tracking-widest">UPDATE PASSWORD</button>
                        </div>
                    </div>
                </div>

            </main>`;
        }

        function showChangePassword() {
            document.getElementById('cpw').value = '';
            document.getElementById('npw').value = '';
            document.getElementById('pwdModal').classList.remove('hidden');
        }

        async function executePasswordChange(btn) {
            const cpw = document.getElementById('cpw').value.trim();
            const npw = document.getElementById('npw').value.trim();
            
            if (!cpw || !npw) return alert("Please fill all fields.");
            if (String(cpw) !== String(user.password)) return alert("Current password is incorrect.");
            if (cpw === npw) return alert("New password must be different from current.");

            btn.innerText = "UPDATING...";
            btn.disabled = true;

            try {
                const { error } = await db.from('users').update({ password: npw }).eq('id', user.id);
                if (error) throw error;
                
                user.password = npw;
                alert("Password successfully updated!");
                document.getElementById('pwdModal').classList.add('hidden');
            } catch (err) {
                alert("Database Error: " + err.message);
            } finally {
                btn.innerText = "UPDATE PASSWORD";
                btn.disabled = false;
            }
        }

        function runEmpSearch(inp, resId) {
            const div = document.getElementById(resId);
            const val = inp.value.toLowerCase().trim();
            document.getElementById('clearEmpBtn').classList.toggle('hidden', val.length === 0);
            if (val.length < 2) { div.classList.add('hidden'); return; }
            const match = emps.filter(e => e.full_name.toLowerCase().includes(val)).slice(0, 5);
            div.innerHTML = match.map(e => `<div onclick="pickEmp('${safeStr(e.full_name)}','${resId}','${inp.id}','${safeStr(e.emp_id)}')" class="p-4 border-b border-slate-100 text-[11px] font-black cursor-pointer uppercase hover:bg-slate-50">${e.full_name}</div>`).join('');
            div.classList.remove('hidden');
        }

        function clearEmpSearch() {
            document.getElementById('empSearch').value = '';
            selectedEmp = null;
            document.getElementById('clearEmpBtn').classList.add('hidden');
            document.getElementById('empResults').classList.add('hidden');
            document.getElementById('resultsArea').classList.add('hidden');
        }

        function pickEmp(n, rId, iId, eId) {
            document.getElementById(iId).value = n;
            document.getElementById(rId).classList.add('hidden');
            selectedEmp = { n, id: eId };
        }

        function safeStr(str) { return (str || "").replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

        async function runVerification() {
            if(!selectedEmp) return alert("Select employee.");
            const sDate = document.getElementById('startDate').value;
            const eDate = document.getElementById('endDate').value;
            if(!sDate || !eDate) return alert("Select range.");

            const resArea = document.getElementById('resultsArea');
            resArea.innerHTML = `<div class="text-center p-10 font-bold animate-pulse text-slate-400 uppercase text-xs tracking-widest">Extracting Record Details...</div>`;
            resArea.classList.remove('hidden');

            try {
                const [itins, hols, bookings, psos, leaves, orders, ctos] = await Promise.all([
                    db.from('itinerary').select('*').gte('travel_date', sDate).lte('travel_date', eDate),
                    db.from('holidays').select('*').gte('date', sDate).lte('date', eDate),
                    db.from('fleet_bookings').select('*').eq('emp_id', selectedEmp.id).gte('travel_date', sDate).lte('travel_date', eDate),
                    db.from('pso_records').select('*').eq('emp_id', selectedEmp.id).lte('start_date', eDate).gte('end_date', sDate),
                    db.from('leave_ledger').select('*').eq('emp_id', selectedEmp.id).eq('transaction_type', 'APPROVED').lte('start_date', eDate).gte('end_date', sDate),
                    db.from('travel_orders').select('*').eq('emp_id', selectedEmp.id).eq('status', 'APPROVED'),
                    db.from('cto_records').select('*').eq('emp_id', selectedEmp.id).gte('leave_date', sDate).lte('leave_date', eDate)
                ]);

                const dates = [];
                let curr = new Date(sDate);
                const end = new Date(eDate);
                while(curr <= end) {
                    dates.push(curr.toISOString().split('T')[0]);
                    curr.setDate(curr.getDate() + 1);
                }

                renderOverlapList(dates, itins.data, hols.data, bookings.data, psos.data, leaves.data, orders.data, ctos.data);

            } catch (err) {
                resArea.innerHTML = `<div class="p-4 bg-red-50 text-red-600 text-xs font-bold rounded-xl border border-red-200">System Error: ${err.message}</div>`;
            }
        }

        function renderOverlapList(dates, itins, hols, bookings, psos, leaves, orders, ctos) {
            const resArea = document.getElementById('resultsArea');
            let html = `<div class="space-y-4">`;
            let eventsFound = false;

            dates.forEach(date => {
                const activeItems = [];
                
                // Detailed Extracts
                hols.filter(h => h.date === date).forEach(h => {
                    activeItems.push({ type: 'holiday', title: `📍 HOLIDAY`, subtitle: h.name, color: 'text-red-700', bg: 'bg-red-50', border: 'border-red-200' });
                });

                ctos.filter(c => c.leave_date === date).forEach(c => {
                    activeItems.push({ type: 'cto', title: `⏳ CTO: COMPENSATORY TIME-OFF`, subtitle: `Purpose: ${c.purpose || 'N/A'} | Remarks: ${c.remarks || 'None'}`, color: 'text-teal-700', bg: 'bg-teal-50', border: 'border-teal-200' });
                });

                leaves.filter(l => date >= l.start_date && date <= l.end_date).forEach(l => {
                    activeItems.push({ type: 'leave', title: `🏖️ LEAVE: ${l.type}`, subtitle: l.remarks || 'Approved System Ledger', color: 'text-purple-700', bg: 'bg-purple-50', border: 'border-purple-200' });
                });

                bookings.filter(b => b.travel_date === date).forEach(b => {
                    activeItems.push({ type: 'fleet', title: `🚗 FLEET: ${b.vehicle}`, subtitle: `Driver: ${b.driver} | Dest: ${b.destination || b.assignment || 'N/A'}`, color: 'text-amber-700', bg: 'bg-amber-50', border: 'border-amber-200' });
                });

                psos.filter(p => date >= p.start_date && date <= p.end_date).forEach(p => {
                    activeItems.push({ type: 'pso', title: `ℹ️ PSO: ${p.pso_no}`, subtitle: p.subject, color: 'text-blue-700', bg: 'bg-blue-50', border: 'border-blue-200' });
                });
                
                const dayItins = itins.filter(i => i.travel_date === date);
                orders.filter(to => dayItins.some(i => i.to_no === to.to_no)).forEach(t => {
                    const specItin = dayItins.find(i => i.to_no === t.to_no);
                    activeItems.push({ type: 'to', title: `📄 TO: ${t.to_no}`, subtitle: `Dest: ${specItin ? specItin.destination : 'Various'} | Trans: ${t.transport}`, color: 'text-dar', bg: 'bg-green-50', border: 'border-green-200' });
                });

                if (activeItems.length > 0) {
                    eventsFound = true;
                    const isConflict = activeItems.length > 1;

                    html += `
                    <div class="bg-white rounded-2xl border shadow-sm p-5 ${isConflict ? 'border-red-500' : 'border-slate-200'} transition-all relative overflow-hidden">
                        ${isConflict ? '<div class="absolute top-0 left-0 w-1 h-full bg-red-500"></div>' : ''}
                        <div class="flex justify-between items-center border-b pb-3 mb-3">
                            <div>
                                <p class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${new Date(date).toLocaleDateString('en-US', {weekday:'long'})}</p>
                                <h4 class="text-sm font-black text-slate-800">${date}</h4>
                            </div>
                            <div>
                                ${isConflict ? 
                                    '<span class="bg-red-600 text-white text-[9px] px-3 py-1.5 rounded-full font-black uppercase animate-pulse shadow-md">⚠️ OVERLAP FLAG</span>' : 
                                    '<span class="bg-slate-100 text-slate-500 text-[9px] px-3 py-1 rounded-full font-black uppercase">CLEAR LOG</span>'
                                }
                            </div>
                        </div>
                        <div class="space-y-2">
                            ${activeItems.map(item => `
                                <div class="p-3 rounded-xl border ${item.bg} ${item.border}">
                                    <h5 class="text-[10px] font-black uppercase ${item.color} mb-1">${item.title}</h5>
                                    <p class="text-[10px] text-slate-600 italic leading-tight">${item.subtitle}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                }
            });

            if (!eventsFound) {
                html = `<div class="bg-white p-10 rounded-2xl text-center border border-dashed border-slate-300">
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">No activities logged in this range.</p>
                </div>`;
            }

            html += `</div>`;
            resArea.innerHTML = html;
        }
    </script>
</body>
</html>
