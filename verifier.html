<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR CS I - Travel Order Verifier</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --dar-green: #003811;
            --dar-gold: #D4AF37;
            --bg-main: #f3f4f6;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
        }

        /* The "Document" Look */
        .document-wrapper {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-top: 6px solid var(--dar-green);
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 30px 20px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            margin: 0;
            font-size: 16px;
            letter-spacing: 1px;
            color: var(--dar-green);
            text-transform: uppercase;
        }

        .header p {
            margin: 5px 0 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        .content-body {
            padding: 0 25px 30px;
        }

        /* Top Meta Section */
        .doc-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid var(--dar-green);
            margin-bottom: 20px;
        }

        .meta-col {
            display: flex;
            flex-direction: column;
        }

        .meta-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .to-number {
            font-size: 22px;
            font-weight: 700;
            color: var(--dar-green);
        }

        /* Sections */
        .section {
            margin-bottom: 25px;
        }

        .section h3 {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--dar-gold);
            margin: 0 0 12px 0;
            letter-spacing: 0.5px;
        }

        /* Grid Details */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #fafafa;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .detail-item.full-width {
            grid-column: 1 / -1;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        /* Lists */
        .list-container {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
        }

        .list-row {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            background: #ffffff;
        }

        .list-row:last-child {
            border-bottom: none;
        }

        .primary-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .secondary-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Badges */
        .badge {
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .status-APPROVED { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
        .status-CANCELLED { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .status-PENDING { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }

        /* States */
        .state-message {
            text-align: center;
            padding: 50px 20px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .error { color: var(--danger); font-weight: 600; }
        #content { display: none; }
    </style>
</head>
<body>

    <div class="document-wrapper">
        <div class="header">
            <h1>Document Verification</h1>
            <p>Department of Agrarian Reform - Camarines Sur I</p>
        </div>

        <div id="loading" class="state-message">
            Retrieving official records...
        </div>
        <div id="error-msg" class="state-message error" style="display: none;"></div>

        <div id="content" class="content-body">
            
            <div class="doc-meta">
                <div class="meta-col">
                    <span class="meta-label">Travel Order No.</span>
                    <span class="to-number" id="disp-to-no"></span>
                </div>
                <div class="meta-col" style="align-items: flex-end;">
                    <span class="meta-label">Current Status</span>
                    <span id="disp-status" class="badge"></span>
                </div>
            </div>

            <div class="section">
                <h3>Logistics & Details</h3>
                <div class="detail-grid">
                    <div class="detail-item">
                        <div class="meta-label">Transportation</div>
                        <div class="detail-value" id="disp-transport"></div>
                    </div>
                    <div class="detail-item">
                        <div class="meta-label">Report To</div>
                        <div class="detail-value" id="disp-report"></div>
                    </div>
                    <div class="detail-item full-width">
                        <div class="meta-label">Remarks</div>
                        <div class="detail-value" id="disp-remarks"></div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h3>Authorized Personnel</h3>
                <div class="list-container" id="disp-personnel"></div>
            </div>

            <div class="section">
                <h3>Approved Itinerary</h3>
                <div class="list-container" id="disp-itinerary"></div>
            </div>

        </div>
    </div>

    <script type="module">
        // SUPABASE CONFIGURATION
        const supabaseUrl = 'https://ytfpiyfapvybihlngxks.supabase.co';
        const supabaseKey = 'sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function verifyDocument() {
            const urlParams = new URLSearchParams(window.location.search);
            const toNo = urlParams.get('to_no');

            if (!toNo) {
                showError("Invalid link: Travel Order Number is missing.");
                return;
            }

            try {
                // Fetch Travel Order Details
                const { data: orders, error: toError } = await supabase
                    .from('travel_orders')
                    .select('*')
                    .eq('to_no', toNo);

                if (toError) throw toError;
                
                if (!orders || orders.length === 0) {
                    showError("Record Not Found. This Travel Order does not exist or has been permanently deleted.");
                    return;
                }

                // Fetch Itinerary
                const { data: itinerary, error: itinError } = await supabase
                    .from('itinerary')
                    .select('*')
                    .eq('to_no', toNo)
                    .order('travel_date', { ascending: true });

                if (itinError) throw itinError;

                renderData(toNo, orders, itinerary);

            } catch (err) {
                showError("Connection Error: " + err.message);
            }
        }

        function renderData(toNo, orders, itinerary) {
            const baseOrder = orders[0]; 

            // Headers
            document.getElementById('disp-to-no').innerText = toNo;
            document.getElementById('disp-transport').innerText = baseOrder.transport || "N/A";
            document.getElementById('disp-report').innerText = baseOrder.report_to || "N/A";
            document.getElementById('disp-remarks').innerText = baseOrder.remarks || "None";

            // Status Badge
            const statusEl = document.getElementById('disp-status');
            const statusText = baseOrder.status.toUpperCase();
            statusEl.innerText = statusText.replace(/_/g, ' ');
            
            if (statusText.includes('APPROVED')) {
                statusEl.className = "badge status-APPROVED";
            } else if (statusText.includes('CANCELLED') || statusText.includes('DISAPPROVED')) {
                statusEl.className = "badge status-CANCELLED";
            } else {
                statusEl.className = "badge status-PENDING";
            }

            // Personnel List
            document.getElementById('disp-personnel').innerHTML = orders.map(p => `
                <div class="list-row">
                    <div class="primary-text">${p.emp_name.toUpperCase()}</div>
                    <div class="secondary-text">ID: ${p.emp_id} &nbsp;&bull;&nbsp; Unit: ${p.unit || 'N/A'}</div>
                </div>
            `).join('');

            // Itinerary List
            const itinContainer = document.getElementById('disp-itinerary');
            if (itinerary && itinerary.length > 0) {
                itinContainer.innerHTML = itinerary.map(i => {
                    const fDate = new Date(i.travel_date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
                    return `
                    <div class="list-row">
                        <div class="primary-text">${i.destination}</div>
                        <div class="secondary-text">${fDate} &nbsp;&bull;&nbsp; <i>"${i.purpose}"</i></div>
                    </div>
                    `;
                }).join('');
            } else {
                itinContainer.innerHTML = '<div class="list-row" style="color: gray; font-size: 13px;">No itinerary records found.</div>';
            }

            // Reveal Content
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            const errEl = document.getElementById('error-msg');
            errEl.innerText = msg;
            errEl.style.display = 'block';
        }

        // Init
        document.addEventListener("DOMContentLoaded", verifyDocument);
    </script>
</body>
</html>
