<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR CS I - Travel Order Verifier</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --dar-green: #003811;
            --dar-gold: #D4AF37;
            --bg-main: #f3f4f6;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
        }

        .document-wrapper {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-top: 8px solid var(--dar-green);
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 30px 20px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            margin: 0;
            font-size: 15px;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .header .agency {
            margin: 8px 0 0;
            font-size: 16px;
            font-weight: bold;
            color: var(--dar-green);
        }

        .content-body {
            padding: 30px;
        }

        /* Highlight Section 1: TO Number */
        .to-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .to-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .to-number {
            font-size: 26px;
            font-weight: 800;
            color: var(--dar-green);
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        /* Badge Styling */
        .badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .status-APPROVED { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
        .status-CANCELLED { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
        .status-PENDING { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }

        /* Highlight Section 2: Core Details */
        .highlight-box {
            background: #fafafa;
            border-left: 4px solid var(--dar-gold);
            padding: 20px;
            border-radius: 0 6px 6px 0;
            margin-bottom: 30px;
        }

        .highlight-item {
            margin-bottom: 15px;
        }
        .highlight-item:last-child {
            margin-bottom: 0;
        }

        .highlight-data {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin-top: 4px;
        }

        /* Highlight Section 3: Personnel */
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--dar-green);
            font-weight: 700;
            letter-spacing: 1px;
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .personnel-list {
            display: grid;
            gap: 10px;
            margin-bottom: 30px;
        }

        .personnel-row {
            padding: 12px 15px;
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .emp-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .emp-meta {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Highlight Section 4: Activity Log */
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .activity-row {
            padding: 10px 15px;
            background: #fafafa;
            border-left: 3px solid var(--dar-green);
            border-radius: 0 6px 6px 0;
        }

        .activity-action {
            font-size: 12px;
            font-weight: 700;
            color: var(--dar-green);
            margin-bottom: 3px;
        }

        .activity-details {
            font-size: 13px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .activity-time {
            font-size: 10px;
            color: var(--text-muted);
        }

        .state-message { text-align: center; padding: 50px 20px; font-size: 14px; color: var(--text-muted); }
        .error { color: var(--danger); font-weight: 600; }
        #content { display: none; }
    </style>
</head>
<body>

    <div class="document-wrapper">
        <div class="header">
            <h1>Official Document Verification</h1>
            <div class="agency">DAR Camarines Sur I</div>
        </div>

        <div id="loading" class="state-message">
            Retrieving official records...
        </div>
        <div id="error-msg" class="state-message error" style="display: none;"></div>

        <div id="content" class="content-body">
            
            <div class="to-header">
                <div class="to-label">Travel Order No.</div>
                <div class="to-number" id="disp-to-no"></div>
                <div id="disp-status" class="badge"></div>
            </div>

            <div class="highlight-box">
                <div class="highlight-item">
                    <div class="to-label">Date of Travel</div>
                    <div class="highlight-data" id="disp-date"></div>
                </div>
                <div class="highlight-item">
                    <div class="to-label">Destination</div>
                    <div class="highlight-data" id="disp-dest"></div>
                </div>
            </div>

            <div>
                <div class="section-title">Authorized Personnel</div>
                <div class="personnel-list" id="disp-personnel"></div>
            </div>

            <div>
                <div class="section-title">Activity Log</div>
                <div class="activity-list" id="disp-activity"></div>
            </div>

        </div>
    </div>

    <script type="module">
        // SUPABASE CONFIGURATION
        const supabaseUrl = 'https://ytfpiyfapvybihlngxks.supabase.co';
        const supabaseKey = 'sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function verifyDocument() {
            const urlParams = new URLSearchParams(window.location.search);
            const toNo = urlParams.get('to_no');

            if (!toNo) {
                showError("Invalid link: Travel Order Number is missing.");
                return;
            }

            try {
                const { data: orders, error: toError } = await supabase
                    .from('travel_orders')
                    .select('*')
                    .eq('to_no', toNo);

                if (toError) throw toError;
                
                if (!orders || orders.length === 0) {
                    showError("Record Not Found. This Travel Order does not exist or has been permanently deleted.");
                    return;
                }

                const { data: itinerary, error: itinError } = await supabase
                    .from('itinerary')
                    .select('*')
                    .eq('to_no', toNo)
                    .order('travel_date', { ascending: true });

                if (itinError) throw itinError;

                const { data: activities, error: actError } = await supabase
                    .from('activity_log')
                    .select('*')
                    .eq('to_no', toNo)
                    .order('created_at', { ascending: false });

                if (actError) throw actError;

                renderData(toNo, orders, itinerary, activities);

            } catch (err) {
                showError("Connection Error: " + err.message);
            }
        }

        function renderData(toNo, orders, itinerary, activities) {
            const baseOrder = orders[0]; 

            // 1. TO Number & Status
            document.getElementById('disp-to-no').innerText = toNo;
            const statusEl = document.getElementById('disp-status');
            const statusText = baseOrder.status.toUpperCase();
            statusEl.innerText = statusText.replace(/_/g, ' ');
            
            if (statusText.includes('APPROVED')) {
                statusEl.className = "badge status-APPROVED";
            } else if (statusText.includes('CANCELLED') || statusText.includes('DISAPPROVED')) {
                statusEl.className = "badge status-CANCELLED";
            } else {
                statusEl.className = "badge status-PENDING";
            }

            // 2. Date & Destination Processing
            let travelDates = "N/A";
            let dests = "N/A";
            
            if (itinerary && itinerary.length > 0) {
                // Get Date Range
                const startDate = new Date(itinerary[0].travel_date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                const endDate = new Date(itinerary[itinerary.length - 1].travel_date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                travelDates = startDate === endDate ? startDate : `${startDate} — ${endDate}`;
                
                // Get Unique Destinations
                dests = [...new Set(itinerary.map(i => i.destination))].join(' • ');
            }
            
            document.getElementById('disp-date').innerText = travelDates;
            document.getElementById('disp-dest').innerText = dests;

            // 3. Personnel List
            document.getElementById('disp-personnel').innerHTML = orders.map(p => `
                <div class="personnel-row">
                    <div class="emp-name">${p.emp_name.toUpperCase()}</div>
                    <div class="emp-meta">ID: ${p.emp_id}</div>
                </div>
            `).join('');

            // 4. Activity Log
            const actContainer = document.getElementById('disp-activity');
            if (activities && activities.length > 0) {
                actContainer.innerHTML = activities.map(act => `
                    <div class="activity-row">
                        <div class="activity-action">${act.action.toUpperCase()}</div>
                        <div class="activity-details">${act.details}</div>
                        <div class="activity-time">${new Date(act.created_at).toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' })}</div>
                    </div>
                `).join('');
            } else {
                actContainer.innerHTML = `<div style="text-align:center; font-size: 12px; color: var(--text-muted); padding: 15px;">No activity logs found.</div>`;
            }

            // Reveal Content
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            const errEl = document.getElementById('error-msg');
            errEl.innerText = msg;
            errEl.style.display = 'block';
        }

        // Init
        document.addEventListener("DOMContentLoaded", verifyDocument);
    </script>
</body>
</html>
