<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAR CS I - TO Verifier</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --dar-green: #003811;
            --dar-gold: #D4AF37;
            --bg-main: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --danger: #dc2626;
            --success: #16a34a;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { margin: 0; background-color: var(--bg-main); color: var(--text-main); padding: 15px; display: flex; flex-direction: column; align-items: center; }

        .header { background: var(--dar-green); color: white; padding: 20px; text-align: center; border-radius: 12px; width: 100%; max-width: 600px; margin-bottom: 15px; border-bottom: 4px solid var(--dar-gold); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h2 { margin: 0; font-size: 18px; letter-spacing: 1px; }
        .header p { margin: 5px 0 0 0; font-size: 11px; color: #d1d5db; }

        .card { background: var(--card-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); width: 100%; max-width: 600px; margin-bottom: 15px; border: 1px solid #e5e7eb; }
        
        .status-banner { padding: 15px; text-align: center; border-radius: 8px; font-weight: bold; font-size: 18px; margin-bottom: 20px; letter-spacing: 1px; text-transform: uppercase; }
        .status-valid { background: #ecfdf5; color: #166534; border: 2px solid #166534; }
        .status-invalid { background: #fef2f2; color: #991b1b; border: 2px solid #991b1b; }
        .status-pending { background: #fefce8; color: #854d0e; border: 2px solid #854d0e; }

        .data-group { margin-bottom: 15px; border-bottom: 1px solid #f3f4f6; padding-bottom: 15px; }
        .data-group:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
        
        .label { font-size: 11px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .value { font-size: 14px; font-weight: 600; color: var(--text-main); }
        
        .itin-row { background: #f9fafb; padding: 10px; border-radius: 6px; margin-top: 8px; border-left: 3px solid var(--dar-green); font-size: 12px; }
        .itin-date { font-weight: bold; color: var(--dar-green); margin-bottom: 3px; }
        
        #loading { text-align: center; padding: 40px; font-weight: bold; color: var(--dar-green); }
        #content { display: none; width: 100%; max-width: 600px; }
        
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; background: #e5e7eb; color: #374151; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <h2>DAR CS I E-VERIFIER</h2>
        <p>Official Document Verification System</p>
    </div>

    <div id="loading" class="card">
        Scanning Document Details...
    </div>

    <div id="content">
        <div class="card">
            <div id="status-banner" class="status-banner">...</div>
            
            <div class="data-group">
                <div class="label">Control Number</div>
                <div class="value" id="val-to-no" style="font-size: 18px; color: var(--dar-green);"></div>
            </div>

            <div class="data-group">
                <div class="label">Authorized Personnel</div>
                <div class="value" id="val-personnel"></div>
            </div>

            <div class="data-group">
                <div class="label">Logistics & Transportation</div>
                <div class="value" id="val-transport"></div>
                <div id="val-remarks" style="font-size: 11px; color: var(--danger); font-weight: bold; margin-top: 5px;"></div>
            </div>

            <div class="data-group">
                <div class="label">Itinerary & Scope</div>
                <div id="val-itinerary"></div>
            </div>
            
            <div class="data-group">
                <div class="label">Document Audit Trail</div>
                <div style="font-size: 11px; color: var(--text-muted); margin-top: 5px;" id="val-audit"></div>
            </div>
        </div>
    </div>

    <script>
        // SUPABASE CONFIGURATION
        const supabaseUrl = 'https://ytfpiyfapvybihlngxks.supabase.co';
        const supabaseKey = 'sb_publishable_poSZUQ9HI4wcY9poEo5b1w_Z-pAJbKo'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const formatTime12PST = (dateStr) => {
            if(!dateStr) return "N/A";
            const dateObj = new Date(dateStr);
            return dateObj.toLocaleString('en-US', { timeZone: 'Asia/Manila', year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
        };

        async function verifyDocument() {
            const urlParams = new URLSearchParams(window.location.search);
            // UPDATED: Now strictly reading the 'to_no' parameter generated by the QR code
            const toNo = urlParams.get('to_no');

            const loadingEl = document.getElementById('loading');
            const contentEl = document.getElementById('content');
            const statusBanner = document.getElementById('status-banner');

            if (!toNo) {
                loadingEl.innerHTML = `
                    <h3 style='color: var(--danger); margin: 0;'>⚠️ Invalid Link</h3>
                    <p style='color: gray; font-size: 12px; margin-top: 5px;'>No Control Number was detected in the QR Code.</p>
                `;
                return;
            }

            try {
                // Fetch Travel Order Base Data (Grouped by to_no, multiple personnel might exist)
                const { data: toData, error: toError } = await supabase.from('travel_orders').select('*').eq('to_no', toNo);
                
                if (toError || !toData || toData.length === 0) {
                    loadingEl.innerHTML = `
                        <h3 style='color: var(--danger); margin: 0;'>❌ Document Not Found</h3>
                        <p style='color: gray; font-size: 12px; margin-top: 5px;'>This Travel Order (${toNo}) does not exist in the database or has been permanently deleted.</p>
                    `;
                    return;
                }

                // Fetch Itinerary Data
                const { data: itinData } = await supabase.from('itinerary').select('*').eq('to_no', toNo).order('travel_date', { ascending: true });

                const baseRecord = toData[0];
                const status = String(baseRecord.status).toUpperCase();
                
                // Set Status Banner
                if (status === 'APPROVED') {
                    statusBanner.className = 'status-banner status-valid';
                    statusBanner.innerHTML = "✅ VALID & APPROVED";
                } else if (status.includes('CANCELLED') || status.includes('DISAPPROVED')) {
                    statusBanner.className = 'status-banner status-invalid';
                    statusBanner.innerHTML = "❌ " + status;
                } else {
                    statusBanner.className = 'status-banner status-pending';
                    statusBanner.innerHTML = "⏳ " + status.replace(/_/g, ' ');
                }

                // Populate Fields
                document.getElementById('val-to-no').innerText = baseRecord.to_no;
                
                // Extract unique personnel names
                const personnelNames = [...new Set(toData.map(p => p.emp_name.toUpperCase()))];
                document.getElementById('val-personnel').innerHTML = personnelNames.map(n => `<div>• ${n}</div>`).join('');

                // Transport
                document.getElementById('val-transport').innerText = baseRecord.transport;
                if (baseRecord.remarks) {
                    document.getElementById('val-remarks').innerText = `⚠️ ${baseRecord.remarks}`;
                }

                // Itinerary Builder
                let itinHtml = '';
                if (itinData && itinData.length > 0) {
                    itinData.forEach(i => {
                        const formattedDate = new Date(i.travel_date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                        itinHtml += `
                            <div class="itin-row">
                                <div class="itin-date">${formattedDate}</div>
                                <div style="font-weight: 600;">📍 ${i.destination}</div>
                                <div style="color: var(--text-muted); font-style: italic; margin-top: 2px;">Purpose: ${i.purpose}</div>
                            </div>
                        `;
                    });
                } else {
                    itinHtml = "<div style='font-size: 12px; color: gray;'>No itinerary data mapped.</div>";
                }
                document.getElementById('val-itinerary').innerHTML = itinHtml;

                // Audit Trail
                document.getElementById('val-audit').innerHTML = `
                    <div><strong>Created:</strong> ${formatTime12PST(baseRecord.created_at)}</div>
                    <div><strong>Unit Head Sign:</strong> ${formatTime12PST(baseRecord.unithead_signed_time || baseRecord.uh_signed_time)}</div>
                    <div><strong>Div Chief Sign:</strong> ${formatTime12PST(baseRecord.dc_signed_time)}</div>
                    <div><strong>PARPO Sign:</strong> ${formatTime12PST(baseRecord.parpo_signed_time)}</div>
                `;

                // Show Content
                loadingEl.style.display = 'none';
                contentEl.style.display = 'block';

            } catch (err) {
                loadingEl.innerHTML = `<h3 style='color: var(--danger); margin: 0;'>⚠️ System Error</h3><p style='color: gray; font-size: 12px; margin-top: 5px;'>${err.message}</p>`;
            }
        }

        // Initialize
        window.onload = verifyDocument;
    </script>
</body>
</html>
