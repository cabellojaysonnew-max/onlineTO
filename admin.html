        // PASSWORD HASHING UTILITY
        async function hashPassword(msg) {
            const msgUint8 = new TextEncoder().encode(msg);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function bufferToBase64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
        function base64ToBuffer(b64) {
            const binary_string = atob(b64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binary_string.charCodeAt(i); }
            return bytes.buffer;
        }

        async function setupAdminBiometric(username, hashedPass) {
            if (!window.PublicKeyCredential) return;
            const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
            if (!available) return;

            if (!localStorage.getItem('dar_admin_bio_cred')) {
                if(confirm("Do you want to enable Biometric/Device lock login for future use?")) {
                    try {
                        const challenge = new Uint8Array(32);
                        window.crypto.getRandomValues(challenge);
                        const userId = new Uint8Array(16);
                        window.crypto.getRandomValues(userId);

                        const cred = await navigator.credentials.create({
                            publicKey: {
                                challenge: challenge,
                                rp: { name: "DAR Admin Console" },
                                user: { id: userId, name: username, displayName: username },
                                pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
                                authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                                timeout: 60000,
                                attestation: "none"
                            }
                        });
                        localStorage.setItem('dar_admin_bio_cred', bufferToBase64(cred.rawId));
                        localStorage.setItem('dar_admin_user', username);
                        localStorage.setItem('dar_admin_token', hashedPass);
                        alert("Biometric login enabled!");
                        const bioBtn = document.getElementById('bioLoginBtn');
                        if(bioBtn) bioBtn.classList.remove('hidden');
                    } catch(e) { console.log("Biometric setup failed or cancelled", e); }
                }
            }
        }

        async function handleBiometricLogin() {
            try {
                const credId = localStorage.getItem('dar_admin_bio_cred');
                const username = localStorage.getItem('dar_admin_user');
                const token = localStorage.getItem('dar_admin_token');
                if (!credId || !username) return;

                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);

                await navigator.credentials.get({
                    publicKey: {
                        challenge: challenge,
                        allowCredentials: [{ type: "public-key", id: base64ToBuffer(credId) }],
                        userVerification: "required",
                        timeout: 60000
                    }
                });

                const { data: users } = await supabaseClient.from('users').select('*').eq('username', username).single();
                if (users && (users.password === token)) {
                    currentUser = {
                        username: users.username,
                        fullName: users.full_name,
                        role: users.role.toUpperCase(),
                        divisions: users.division ? users.division.split(',').map(d => d.trim().toUpperCase()) : [],
                        units: users.unit ? users.unit.split(',').map(x => x.trim().toUpperCase()) : [],
                        emp_id: users.id
                    };
                    localStorage.setItem('dar_admin_session', JSON.stringify({ user: currentUser, time: Date.now() }));
                    render();
                } else { alert("Authentication failed. Please use password."); }
            } catch(e) { console.log("Biometric auth failed", e); }
        }

        function checkSession() {
            const stored = localStorage.getItem('dar_admin_session');

                    currentUser = session.user;
                } else {
                    localStorage.removeItem('dar_admin_session');
                }
            }
        }

            const uBox = document.getElementById('username').value.trim();

                const hashedPBox = await hashPassword(pBox);

        async function updatePassword() {
            const o = document.getElementById('oldPwd').value.trim();
            const n = document.getElementById('newPwd').value.trim();
            const { data } = await supabaseClient.from('users').select('password').eq('username', currentUser.username).single();

        // --- LEAVE ROUTING HELPER FUNCTIONS ---
        function getLeaveStatus(remarks) {
            const m = remarks.match(/ROUTING_STATUS:\s*([^\s|]+)/);
            return m ? m[1].toUpperCase() : 'PENDING_CHIEF';
        }

        function setLeaveStatus(remarks, newStatus) {
            if (remarks.includes('ROUTING_STATUS:')) {
                return remarks.replace(/ROUTING_STATUS:\s*([^\s|]+)/, `ROUTING_STATUS: ${newStatus}`);
            }
            return remarks + ` | ROUTING_STATUS: ${newStatus}`;
        }

            function getLeaveAppPayload(u, leaveRec) {
            const role = u.role ? u.role.trim().toUpperCase() : "";
            const currentStatus = getLeaveStatus(leaveRec.remarks || "");
            let nextStatus = currentStatus;
            let transType = "APPLICATION";

            const empUnit = leaveRec.unit ? leaveRec.unit.trim().toUpperCase() : "";

            if (role === "HRMO" || role === "ADMIN") {
                nextStatus = "APPROVED";
                transType = "APPROVED";
            } else if (empUnit === "PARPO") {
                // PARPO Unit bypasses all other approvals and goes straight to HRMO
                nextStatus = "PENDING_HRMO";
            } else if (role === "UNIT_HEAD" || role === "UNIT HEAD" || role === "MARPO") {
                nextStatus = "PENDING_CHIEF";
            } else if (role === "CHIEF") {
                nextStatus = "PENDING_HRMO";
            }

            return {
                transaction_type: transType,
                remarks: setLeaveStatus(leaveRec.remarks || "", nextStatus)
            };
        }

        function cancelEntireTO() {

        }

        async function confirmCancelTO() {
            const checkboxes = document.querySelectorAll('.cancel-date-cb');
            const selectedDates = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
            const totalDates = checkboxes.length;

            if (selectedDates.length === 0) return alert("Select at least one date.");

            const targetToNo = currentCancelToNo;
            hideCancelModal();

            const content = document.getElementById('mainContent');
            content.innerHTML = `<p class="flex items-center justify-center h-full text-red-600 font-bold animate-pulse">Processing Cancellation...</p>`;

            if (selectedDates.length === totalDates) {
                await processFullCancel(targetToNo);
            } else {
                for (let d of selectedDates) {
                    await supabaseClient.from('itinerary').delete().eq('to_no', targetToNo).eq('travel_date', d);
                }
                await window.logActivity(targetToNo, 'SPLIT_CANCELLED', `Dates cancelled (${selectedDates.join(', ')}) by ${currentUser.fullName}`);
                await supabaseClient.from('notifications').insert({
                    recipient_role: 'PARPO',
                    message: `Approved TO ${targetToNo} had dates cancelled (${selectedDates.join(', ')}) by ${currentUser.fullName}`,
                    to_no: targetToNo
                });
                loadStatusTab('APPROVED');
            }
        }

        async function processFullCancel(to_no) {
            const content = document.getElementById('mainContent');
            content.innerHTML = `<p class="flex items-center justify-center h-full text-red-600 font-bold animate-pulse">Cancelling TO...</p>`;
            await supabaseClient.from('travel_orders').update({ status: 'CANCELLED' }).eq('to_no', to_no);
            await window.logActivity(to_no, 'CANCELLED', `Entire TO cancelled by ${currentUser.fullName}`);
            await supabaseClient.from('notifications').insert({
                recipient_role: 'PARPO',
                message: `Approved TO ${to_no} was entirely cancelled by ${currentUser.fullName}`,
                to_no: to_no
            });

        }

        // --- SHARED SCOPE CHECK ---
        const checkScope = (div, unit) => {
            const role = currentUser.role ? currentUser.role.trim().toUpperCase() : "";
            if (role === "PARPO" || role === "VEHICLE_APPROVER" || role === "VEHICLE APPROVER" || role === "ADMIN" || role === "HRMO") return true;
            
            const oDivs = div ? div.split(',').map(x => x.trim().toUpperCase()) : [];
            const dMatch = oDivs.some(d => currentUser.divisions.includes(d));
            
            if (role === "CHIEF") return dMatch;
            if ((role === "UNIT_HEAD" || role === "UNIT HEAD") && div && div.toUpperCase().includes("PBDD") && dMatch) return true;
            
            const oUnits = unit ? unit.split(',').map(x => x.trim().toUpperCase()) : [];
            const uMatch = oUnits.some(u => currentUser.units.includes(u));
            
            return dMatch && uMatch;
        };

        // --- BATCH ACTION LOGIC ---
        window.toggleBatchSelection = function(id, isChecked) {
            if (isChecked) selectedPendingOrders.add(id);
            else selectedPendingOrders.delete(id);
            updateBatchActionBar();
        }

        window.selectAllPending = function(checkbox) {

            checkboxes.forEach(cb => {
                cb.checked = checkbox.checked;

        function updateBatchActionBar() {
            const bar = document.getElementById('batchActionBar');
            const countText = document.getElementById('batchCountText');
            if (selectedPendingOrders.size > 0) {
                countText.innerText = `${selectedPendingOrders.size} selected`;

        function hideBatchActionBar() {
            const bar = document.getElementById('batchActionBar');

        window.processBatch = async function(action) {
            try {
                if (selectedPendingOrders.size === 0) return;

                hideBatchActionBar();

                let denyReason = "";
                if (action === 'DISAPPROVED') {
                    denyReason = prompt("Reason for denying ALL selected:");
                    if (!denyReason) { 
                        if (currentTab === 'leaves') loadLeavesTab(); else loadPendingTab(); 
                        return; 
                    }
                }

                const content = document.getElementById('mainContent');
                content.innerHTML = `<p class="flex items-center justify-center h-full text-dar-green font-bold animate-pulse">Processing Batch...</p>`;

                const toNos = Array.from(selectedPendingOrders).filter(id => id.startsWith('TO:')).map(id => id.split(':')[1]);
                const leaveIds = Array.from(selectedPendingOrders).filter(id => id.startsWith('LEAVE:')).map(id => id.split(':')[1]);

                // Batch TOs
                if (toNos.length > 0) {
                    const { data: toDataList, error } = await supabaseClient.from('travel_orders').select('to_no, unit, division, transport, unithead_signed').in('to_no', toNos);
                    if (!error) {
                        const updatePromises = toNos.map(async (to_no) => {
                            if (action === 'DISAPPROVED') {
                                await supabaseClient.from('travel_orders').update({ status: "DISAPPROVED", received: denyReason }).eq('to_no', to_no);
                                await window.logActivity(to_no, 'DISAPPROVED', `Batch disapproved by ${currentUser.fullName}. Reason: ${denyReason}`);
                            } else {
                                const toRec = (toDataList || []).find(t => t.to_no === to_no);
                                const p = getAppPayload(currentUser, toRec);
                                if (Object.keys(p).length === 0) return; 
                                await supabaseClient.from('travel_orders').update(p).eq('to_no', to_no);
                                await window.logActivity(to_no, 'STATUS_UPDATED', `Status advanced to ${p.status} by ${currentUser.fullName}`);
                            }
                        });
                        await Promise.all(updatePromises);
                    }
                }

                // Batch Leaves
                if (leaveIds.length > 0) {
                    const { data: lResData, error } = await supabaseClient.from('leave_ledger').select('*').in('id', leaveIds);
                    if (!error) {
                        const leavePromises = leaveIds.map(async (id) => {
                            const leaveData = (lResData || []).find(l => l.id === id);
                            if (!leaveData) return;

                            if (action === 'DISAPPROVED') {
                                const newRemarks = setLeaveStatus(leaveData.remarks || "", 'DISAPPROVED') + ` | Denied: ${denyReason}`;
                                await supabaseClient.from('leave_ledger').update({ transaction_type: 'DISAPPROVED', remarks: newRemarks }).eq('id', id);
                                await window.logActivity(id, 'LEAVE_DENIED', `Batch denied by ${currentUser.fullName}. Reason: ${denyReason}`);
                            } else {
                                const p = getLeaveAppPayload(currentUser, leaveData);
                                if (!p || Object.keys(p).length === 0) return;
                                await supabaseClient.from('leave_ledger').update(p).eq('id', id);
                                await window.logActivity(id, 'LEAVE_APPROVED', `Leave status advanced to ${getLeaveStatus(p.remarks)} by ${currentUser.fullName}`);
                            }
                        });
                        await Promise.all(leavePromises);
                    }
                }

                selectedPendingOrders.clear();
                if (currentTab === 'leaves') loadLeavesTab(); else loadPendingTab();
            } catch (err) {
                alert("Batch processing error: " + err.message);
                if (currentTab === 'leaves') loadLeavesTab(); else loadPendingTab();
            }
        }

        // --- PENDING MODAL & DIRECT ACTIONS ---

                const checkApproveReasonVisibility = () => {
                    const checkboxes = document.querySelectorAll('.pending-date-cb');
                    const checkedCount = Array.from(checkboxes).filter(cb => cb.checked).length;
                    const totalCount = checkboxes.length;

                    if (checkedCount === 1) {

                        approveInput.classList.add('hidden');
                    }

                    if (checkedCount < totalCount) {

                const checkboxes = document.querySelectorAll('.pending-date-cb');

            document.getElementById('pendingDateConfirmBtn').onclick = processPendingDates;

        window.processPendingDates = async function() {
            const checkboxes = document.querySelectorAll('.pending-date-cb');
            const selectedDates = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
            const totalDates = checkboxes.length;

            if (selectedDates.length === 0) return alert("Select at least one date.");

            let denyReason = "";
            let approveReason = "";
            let partialDenyReason = "";

            if (currentPendingAction === 'DISAPPROVED') {
                denyReason = document.getElementById('pendingDenyReason').value.trim();
                if (!denyReason && selectedDates.length === totalDates) return alert("Please provide a reason for denying the entire TO.");
            } else {
                if (selectedDates.length === 1) {
                    approveReason = document.getElementById('pendingApproveReason').value.trim();
                }
                if (selectedDates.length < totalDates) {
                    partialDenyReason = document.getElementById('pendingPartialDenyReason').value.trim();
                    if (!partialDenyReason) return alert("Please provide a reason for the unchecked (disapproved) dates.");
                }
            }

            hidePendingDateModal();
            await executePartialTO(currentPendingToNo, currentPendingAction, selectedDates, totalDates, denyReason, approveReason, partialDenyReason);
        };

        window.executePartialTO = async function(to_no, action, selectedDates, totalDates, denyReason, approveReason, partialDenyReason) {
            const content = document.getElementById('mainContent');
            content.innerHTML = `<p class="flex items-center justify-center h-full text-dar-green font-bold animate-pulse">Processing...</p>`;

            try {
                if (action === 'DISAPPROVED') {
                    if (selectedDates.length === totalDates) {
                        await supabaseClient.from('travel_orders').update({ status: 'DISAPPROVED', received: denyReason }).eq('to_no', to_no);
                        await window.logActivity(to_no, 'DISAPPROVED', `Disapproved by ${currentUser.fullName}. Reason: ${denyReason}`);
                    } else {
                        for (let d of selectedDates) {
                            await supabaseClient.from('itinerary').delete().eq('to_no', to_no).eq('travel_date', d);
                        }
                        await window.logActivity(to_no, 'PARTIAL_DENY', `Dates denied and removed (${selectedDates.join(', ')}) by ${currentUser.fullName}`);
                    }
                } else {
                    if (selectedDates.length < totalDates) {
                        const unselectedDates = Array.from(document.querySelectorAll('.pending-date-cb')).filter(cb => !cb.checked).map(cb => cb.value);
                        for (let d of unselectedDates) {
                            await supabaseClient.from('itinerary').delete().eq('to_no', to_no).eq('travel_date', d);
                        }
                        await window.logActivity(to_no, 'PARTIAL_DENY', `Dates denied and removed (${unselectedDates.join(', ')}) by ${currentUser.fullName}. Reason: ${partialDenyReason}`);
                    }
                    
                    const { data: toData, error } = await supabaseClient.from('travel_orders').select('*').eq('to_no', to_no).limit(1);
                    if (error) throw error;
                    const p = getAppPayload(currentUser, toData[0]);
                    
                    if (approveReason) {
                        p.remarks = approveReason;
                    }

                    if (Object.keys(p).length === 0) throw new Error("Approval failed: Role not configured.");

                    await supabaseClient.from('travel_orders').update(p).eq('to_no', to_no);
                    await window.logActivity(to_no, 'STATUS_UPDATED', `Status advanced to ${p.status} by ${currentUser.fullName}`);
                    
                    if (approveReason) {
                        await supabaseClient.from('notifications').insert({
                            recipient_role: 'EMPLOYEE',
                            message: `Your TO ${to_no} was processed. Reason/Note: ${approveReason}`,
                            to_no: to_no
                        });
                    }
                }
                loadPendingTab();
            } catch(e) {
                alert(e.message);
                loadPendingTab();
            }
        };

        window.processDirectLeave = async function(id, action) {
            try {
                const { data: leaveData, error } = await supabaseClient.from('leave_ledger').select('*').eq('id', id).single();
                if (error || !leaveData) throw new Error("Leave record not found.");

                const content = document.getElementById('mainContent');
                content.innerHTML = `<p class="flex items-center justify-center h-full text-emerald-600 font-bold animate-pulse">Processing Leave...</p>`;

                if (action === 'DISAPPROVED') {
                    const reason = prompt("Reason for denying:");

                    const newRemarks = setLeaveStatus(leaveData.remarks || "", 'DISAPPROVED') + ` | Denied: ${reason}`;
                    await supabaseClient.from('leave_ledger').update({ transaction_type: 'DISAPPROVED', remarks: newRemarks }).eq('id', id);
                    await window.logActivity(id, 'LEAVE_DENIED', `Leave denied by ${currentUser.fullName}. Reason: ${reason}`);
                } else {

                    if (!p || Object.keys(p).length === 0) {
                        alert("Approval failed: Your role is not configured to approve this status.");

                    await supabaseClient.from('leave_ledger').update(p).eq('id', id);
                    await window.logActivity(id, 'LEAVE_APPROVED', `Leave status advanced to ${getLeaveStatus(p.remarks)} by ${currentUser.fullName}`);
                }
                loadLeavesTab();
            } catch(e) {
                alert("Error: " + e.message);
                loadLeavesTab();
            }
        };

        function getAppPayload(u, toRecord = null) {
            const nowISO = new Date().toISOString(); 
            const role = u.role ? u.role.trim().toUpperCase() : "";
            
            if (role === "VEHICLE_APPROVER" || role === "VEHICLE APPROVER" || role === "ADMIN") {
                let nextStatus = "PENDING_CHIEF";
                if (toRecord && toRecord.unit) {
                    const unt = toRecord.unit.trim().toUpperCase();
                    if (unt === "PARPO") nextStatus = "PENDING_PARPO";
                    else if (unt !== "") nextStatus = "PENDING_UNIT_HEAD";
                }
                return { status: nextStatus };
            }

            if (role === "UNIT_HEAD" || role === "UNIT HEAD" || role === "MARPO") {
                if (!toRecord) return {};
                
                const requiredUnits = toRecord.unit ? toRecord.unit.split(',').map(x => x.trim().toUpperCase()).filter(x => x && x !== 'NA') : [];
                const matchingUnitsToSign = requiredUnits.filter(reqU => u.units.includes(reqU));
                
                let currentSigs = toRecord.unithead_signed ? toRecord.unithead_signed : "";
                
                matchingUnitsToSign.forEach(unit => {
                    const sigFragment = `${u.fullName} (${unit})`;
                    if (!currentSigs.includes(sigFragment)) {
                        currentSigs = currentSigs ? currentSigs + ", " + sigFragment : sigFragment;
                    }
                });
                
                let allSigned = true;
                if (requiredUnits.length > 0) {
                    allSigned = requiredUnits.every(reqU => currentSigs.toUpperCase().includes(`(${reqU})`));
                }

                return { 
                    status: allSigned ? "PENDING_CHIEF" : "PENDING_UNIT_HEAD", 
                    unithead_signed: currentSigs, 
                    uh_signed_time: nowISO 
                };
            }

            if (role === "CHIEF") {
                return { 
                    status: "PENDING_PARPO", 
                    dc_signed: u.fullName, 
                    dc_signed_time: nowISO 
                };
            }
            if (role === "PARPO") {
                return { 
                    status: "APPROVED", 
                    parpo_signed: u.fullName, 
                    parpo_signed_time: nowISO 
                };
            }
            
            return {};
        }

        // --- PENDING TAB (TO ONLY) ---

            selectedPendingOrders.clear();

            content.innerHTML = `<p class="flex items-center justify-center h-full text-gray-400 font-bold animate-pulse">Syncing Inbox...</p>`;
            
            const [oRes, iRes] = await Promise.all([
                supabaseClient.from('travel_orders').select('*'),
                supabaseClient.from('itinerary').select('*')

            let pendingItems = [];

            // -- TOs --
            let grp = {};
            (oRes.data || []).forEach(o => { if (!grp[o.to_no]) grp[o.to_no] = []; grp[o.to_no].push(o); });
            for (const [to_no, list] of Object.entries(grp)) {
                let show = false;
                
                for (let o of list) {
                    const s = (o.status || "").trim().toUpperCase();
                    const oDivs = o.division ? o.division.split(',').map(x => x.trim().toUpperCase()) : [];
                    const dMatch = oDivs.some(d => currentUser.divisions.includes(d));
                    const r = currentUser.role ? currentUser.role.trim().toUpperCase() : "";

                    const requiredUnits = o.unit ? o.unit.split(',').map(x => x.trim().toUpperCase()).filter(x => x && x !== 'NA') : [];

                    const currentSigs = o.unithead_signed ? o.unithead_signed.toUpperCase() : "";
                    const hasUnsignedUnit = unitsCanSign.some(reqU => !currentSigs.includes(`(${reqU})`));

                    if ((r === "VEHICLE_APPROVER" || r === "VEHICLE APPROVER" || r === "ADMIN") && s === "PENDING_VEHICLE_APPROVER") show = true;
                    else if (r === "PARPO" && s === "PENDING_PARPO") show = true;
                    else if (r === "CHIEF" && s === "PENDING_CHIEF" && dMatch) show = true;
                    else if ((r === "UNIT_HEAD" || r === "UNIT HEAD" || r === "MARPO") && s === "PENDING_UNIT_HEAD" && dMatch) {

                            show = true;
                        }

                    }).join('');

                    pendingItems.push({ 
                        type: 'TO',

                        itinDetailsHTML: itinDetailsHTML, 
                        report_to: list[0].report_to || 'N/A', 
                        dateStr: dt,
                        itinEncoded: itinEncoded,

                    });
                }
            }

            pendingItems.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

            if (pendingItems.length === 0) content.innerHTML = `<div class="flex flex-col items-center justify-center h-full opacity-50"><span class="text-4xl">✨</span><p class="font-bold mt-2 text-xs uppercase">Inbox Clear</p></div>`;
            else {
                let h = `
                <div class="sticky top-0 bg-gray-100 z-20 pt-4 px-4 pb-2 flex justify-between items-center shadow-sm border-b">
                    <label class="flex items-center space-x-2 cursor-pointer text-sm font-bold text-gray-700">
                        <input type="checkbox" class="batch-checkbox" onchange="selectAllPending(this)">
                        <span>Select All</span>
                    </label>
                    <span class="text-xs text-gray-500 font-bold">${pendingItems.length} Pending</span>
                </div>
                <div class="p-4 space-y-4 pb-32">`;
                
                pendingItems.forEach(o => { 
                    h += `
                    <div class="p-4 rounded-2xl shadow-sm border-2 border-blue-200 bg-blue-50/20 flex gap-3 relative mb-4">
                        <div class="pt-1">
                            <input type="checkbox" value="TO:${o.id}" class="batch-checkbox to-checkbox" onchange="toggleBatchSelection('TO:${o.id}', this.checked)">
                        </div>
                        <div class="flex-grow overflow-hidden">

                                    ✈️ TRAVEL ORDER - ${o.id}
                                </span>
                            </div>

        // --- REPORTS (WHEREABOUTS) ---
        async function loadReportsTab() {
            const content = document.getElementById('mainContent');
            content.innerHTML = `<p class="flex items-center justify-center h-full text-blue-500 font-bold animate-pulse">Building Activity Dashboard...</p>`;
            try {
                const [toR, itR, psR, soR, hoR] = await Promise.all([
                    supabaseClient.from('travel_orders').select('*').eq('status', 'APPROVED'),
                    supabaseClient.from('itinerary').select('*'),
                    supabaseClient.from('pso_records').select('*'),
                    supabaseClient.from('so_records').select('*'),
                    supabaseClient.from('holidays').select('*')
                ]);

                const validTOEmps = [...new Set((toR.data || []).map(t => t.emp_id).filter(id => id))];
                let attData = [];
                if (validTOEmps.length > 0) {
                    const { data } = await supabaseClient.from('attendance_logs')
                        .select('emp_id, log_time, device_id, place_name')
                        .in('emp_id', validTOEmps)
                        .order('log_time', { ascending: false })
                        .limit(2000);
                    attData = data || [];
                }

               reportData = [];
                let seen = new Set();
                
                // First, filter all approved TO records for personnel under the user's scope
                const scopedTOs = (toR.data || []).filter(t => checkScope(t.division, t.unit));
                
                scopedTOs.forEach(p => {
                    // Find all itinerary dates for this TO number
                    const myItins = (itR.data || []).filter(i => i.to_no === p.to_no);
                    
                    myItins.forEach(i => {
                        if (i.travel_date) {
                            const key = `${p.emp_id}-${i.travel_date}`; // Use emp_id for unique tracking
                            if (!seen.has(key)) {
                                let mobileLogInfo = `<div class="mt-1 flex items-center space-x-1 truncate"><span class="text-[10px] text-slate-500 font-bold truncate">📱 No Remote Attendance Log</span></div>`;
                                const dStr = i.travel_date.split('T')[0];
                                
                                const logsToday = attData.filter(l => {
                                    if(!l.log_time) return false;
                                    const logDateStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date(l.log_time));
                                    return l.emp_id === p.emp_id && logDateStr === dStr;
                                });
                                
                                const mobileLog = logsToday.find(l => l.place_name || (l.device_id && l.device_id.toUpperCase() !== 'TERMINAL' && l.device_id.length > 5));

                                if (mobileLog) {
                                    const loc = (mobileLog.place_name || '').toLowerCase();
                                    const dest = (i.destination || '').toLowerCase();
                                    
                                    const ignoreWords = ['city', 'municipality', 'brgy', 'barangay', 'brgy.', 'prov.', 'province'];
                                    const destParts = dest.split(/[\s,/-]+/).map(x => x.trim()).filter(x => x.length > 2 && !ignoreWords.includes(x));
                                    
                                    const isMatch = dest && dest !== 'n/a' && destParts.some(part => loc.includes(part) || part.includes(loc));
                                    
                                    if (isMatch) {
                                        mobileLogInfo = `<div class="mt-1 flex items-center space-x-1 truncate"><span class="text-[10px] text-emerald-600 font-bold truncate">📱 Employee Reported to the Destination</span></div>`;
                                    } else {
                                        mobileLogInfo = `<div class="mt-1 flex items-center space-x-1 truncate"><span class="text-[10px] text-red-500 font-bold truncate">📱 Remote Attendance Log do not match destination</span></div>`;
                                    }
                                }

                                reportData.push({ type: 'TO', date: new Date(i.travel_date), title: p.emp_name, subtitle: i.destination, purpose: i.purpose, color: 'blue', extraHTML: mobileLogInfo });
                                seen.add(key);
                            }
                        }
                    });
                });
                
                
                
                
                (psR.data || []).forEach(p => { if(p.date && checkScope(p.division, p.unit)) reportData.push({ type: 'PSO', date: new Date(p.date), title: p.emp_name || 'Personnel', subtitle: p.destination || 'Field Work', purpose: p.subject, color: 'purple' }); });
                (soR.data || []).forEach(s => { if(s.date && checkScope(s.division, s.unit)) reportData.push({ type: 'SO', date: new Date(s.date), title: s.emp_name || 'Personnel', subtitle: s.destination || 'Special Assignment', purpose: s.subject, color: 'orange' }); });
                (hoR.data || []).forEach(h => { if(h.date) {
                    const name = h.name || h.holiday || h.description || "Holiday";
                    reportData.push({ type: 'HOLIDAY', date: new Date(h.date), title: name, subtitle: 'National/Local Holiday', purpose: '', color: 'red' }); 
                }});
                renderReportsShell();
            } catch (e) { content.innerHTML = `<p class="p-10 text-red-500">Error.</p>`; }
        }

        function renderReportsShell() {
            document.getElementById('mainContent').innerHTML = `
                <div class="sticky top-0 bg-gray-100 z-20 pt-4 px-4 pb-2 border-b shadow-sm">
                    <h2 class="font-extrabold text-lg text-slate-800 mb-3 text-center tracking-tighter uppercase">Whereabouts Log</h2>
                    <div class="flex bg-slate-200 rounded-xl p-1 mb-3">
                        <button id="btn-day" onclick="setReportFilter('day')" class="w-1/3 py-1.5 text-xs font-bold rounded-lg transition-all ${reportFilter === 'day' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500'}">Today</button>
                        <button id="btn-week" onclick="setReportFilter('week')" class="w-1/3 py-1.5 text-xs font-bold rounded-lg transition-all ${reportFilter === 'week' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500'}">Week</button>
                        <button id="btn-month" onclick="setReportFilter('month')" class="w-1/3 py-1.5 text-xs font-bold rounded-lg transition-all ${reportFilter === 'month' ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-500'}">Month</button>
                    </div>
                </div>
                <div id="reportListContainer" class="p-4 space-y-4 pb-20"></div>`;
            updateReportList();
        }

        function setReportFilter(v) { reportFilter = v; renderReportsShell(); }

        function updateReportList() {
            const container = document.getElementById('reportListContainer');
            const todayStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());
            const [ty, tm, td] = todayStr.split('-').map(Number);
            const nowManila = new Date(ty, tm - 1, td);
            
            let f = reportData.filter(r => {
                const rStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila', year: 'numeric', month: '2-digit', day: '2-digit' }).format(r.date);
                const [ry, rm, rd] = rStr.split('-').map(Number);
                const dManila = new Date(ry, rm - 1, rd);

                if (reportFilter === 'day') return rStr === todayStr;
                if (reportFilter === 'week') { 
                    const s = new Date(nowManila); 
                    s.setDate(nowManila.getDate() - nowManila.getDay()); 
                    const e = new Date(s); 
                    e.setDate(s.getDate() + 6); 
                    return dManila >= s && dManila <= e; 
                }
                if (reportFilter === 'month') return rm === tm && ry === ty;
                return true;
            });
            
            f.sort((a, b) => b.date.getTime() - a.date.getTime());
            
            if (f.length === 0) { container.innerHTML = `<p class="text-center py-20 text-slate-400 font-bold text-[10px] tracking-widest uppercase">No Records Found</p>`; return; }
            let h = '', last = '';
            f.forEach(r => {
                const rStrManila = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila', year: 'numeric', month: '2-digit', day: '2-digit' }).format(r.date);
                if (rStrManila !== last) {
                    last = rStrManila;
                    h += `<h3 class="text-[10px] font-black text-slate-400 mt-6 mb-2 tracking-widest text-left border-b pb-1 uppercase">${new Date(rStrManila).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</h3>`;
                }
                const cMap = { blue: 'border-blue-500 bg-blue-50 text-blue-800', purple: 'border-purple-500 bg-purple-50 text-purple-800', orange: 'border-orange-500 bg-orange-50 text-orange-800', red: 'border-red-500 bg-red-50 text-red-800' };
                const c = cMap[r.color];
                const extra = r.extraHTML ? r.extraHTML : '';
                h += `<div class="bg-white p-4 rounded-xl border-l-4 shadow-sm flex items-center justify-between text-left ${c.split(' ')[0]}"><div class="overflow-hidden w-full"><p class="font-bold text-sm text-slate-800 truncate">${r.title}</p><p class="text-[10px] text-slate-500 truncate mt-1">📍 ${r.subtitle || 'N/A'}</p><p class="text-[10px] text-slate-500 break-words whitespace-normal mt-0.5">🎯 ${r.purpose || 'N/A'}</p>${extra}</div><div class="shrink-0 ml-2"><span class="text-[8px] font-black px-2 py-1 rounded bg-white border opacity-80 uppercase ${c.split(' ').slice(1).join(' ')}">${r.type}</span></div></div>`;
            });
            container.innerHTML = h;
        }

                const nowManilaStr = new Date().toLocaleString("en-US", {timeZone: "Asia/Manila"});
                const nowManilaObj = new Date(nowManilaStr);
                const currentMonth = Number(tM);
                const isMonday = nowManilaObj.getDay() === 1;

                // Supabase explicit timezone bounds for Philippine Standard Time (UTC+08:00)
                const todayMidnightPST = `${todayStr}T00:00:00+08:00`;

                const [toRes, logRes, leaveRes, itRes, psoRes, soRes, flagRes, gateRes, schedRes] = await Promise.all([
                    supabaseClient.from('travel_orders').select('status, emp_id, to_no, emp_name, unit').in('emp_id', validEmpIds),
                    supabaseClient.from('attendance_logs').select('emp_id, log_time, device_id, place_name, spoof_flag').in('emp_id', validEmpIds).gte('log_time', todayMidnightPST),
                    supabaseClient.from('leave_ledger').select('emp_id, type').in('emp_id', validEmpIds).eq('transaction_type', 'APPROVED').lte('start_date', todayStr).gte('end_date', todayStr),
                    supabaseClient.from('itinerary').select('to_no, destination').eq('travel_date', todayStr),
                    supabaseClient.from('pso_records').select('emp_id').in('emp_id', validEmpIds).lte('start_date', todayStr).gte('end_date', todayStr),
                    supabaseClient.from('so_records').select('emp_id').in('emp_id', validEmpIds).eq('date', todayStr),
                    isMonday ? supabaseClient.from('flag_attendance').select('emp_id, time_in, status').in('emp_id', validEmpIds).eq('date', todayStr) : Promise.resolve({data: []}),
                    supabaseClient.from('gate_pass_logs').select('emp_id, purpose, time_out, time_in').in('emp_id', validEmpIds).eq('date', todayStr),
                    supabaseClient.from('schedule_override').select('emp_id, start_time').in('emp_id', validEmpIds).lte('start_date', todayStr).gte('end_date', todayStr)
                ]);

                const tos = toRes.data || [];
                const activeTOs = tos.filter(t => t.status === 'APPROVED');
                const activeToNos = activeTOs.map(t => t.to_no);
                const itinsToday = (itRes.data || []).filter(i => activeToNos.includes(i.to_no));
                const empIdsOnTO = activeTOs.filter(t => itinsToday.some(i => i.to_no === t.to_no)).map(t => t.emp_id);
                
                const empIdsOnPSO = (psoRes.data || []).map(p => p.emp_id);
                const empIdsOnSO = (soRes.data || []).map(s => s.emp_id);

                const leavesMap = new Map();
                (leaveRes.data || []).forEach(l => leavesMap.set(l.emp_id, l.type));

                const schedMap = new Map();
                (schedRes.data || []).forEach(s => schedMap.set(s.emp_id, s.start_time));

                let anomalyCount = 0;
                const logsMap = new Map();
                (logRes.data || []).forEach(l => {
                    const logDateStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date(l.log_time));
                    
                    if (logDateStr === todayStr) {
                        if (l.spoof_flag === true) anomalyCount++;
                        if(!logsMap.has(l.emp_id) || new Date(l.log_time) < new Date(logsMap.get(l.emp_id))) {
                            logsMap.set(l.emp_id, l.log_time);
                        }
                    }
                });

                const flagsMap = new Map();
                (flagRes.data || []).forEach(f => flagsMap.set(f.emp_id, f));

                let listLate = [];
                let listAbsent = [];
                let listLeave = [];
                let listBirthday = [];
                let listGatePass = [];
                
                let listAtDestination = [];
                let listOutsideDestination = [];
                let listNoLogsField = [];

                (gateRes.data || []).forEach(gp => {
                    if (gp.time_out && !gp.time_in) {
                        const empName = validEmps.find(e => e.emp_id === gp.emp_id)?.full_name || 'Unknown';
                        listGatePass.push({ name: empName, purpose: gp.purpose });
                    }
                });

                empIdsOnTO.forEach(empId => {
                    const emp = validEmps.find(e => e.emp_id === empId);
                    if(!emp) return;
                    
                    const empActiveTOs = activeTOs.filter(t => t.emp_id === empId);
                    const itinForEmp = itinsToday.find(i => empActiveTOs.some(t => t.to_no === i.to_no));
                    
                    if(itinForEmp) {
                        const logsToday = (logRes.data || []).filter(l => {
                             if(!l.log_time) return false;
                             const logDateStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date(l.log_time));
                             return l.emp_id === empId && logDateStr === todayStr;
                        });
                        
                        const mobileLog = logsToday.find(l => l.place_name || (l.device_id && l.device_id.toUpperCase() !== 'TERMINAL' && l.device_id.length > 5));
                        
                        if (mobileLog) {
                            const loc = (mobileLog.place_name || '').toLowerCase();
                            const dest = (itinForEmp.destination || '').toLowerCase();
                            const ignoreWords = ['city', 'municipality', 'brgy', 'barangay', 'brgy.', 'prov.', 'province'];
                            const destParts = dest.split(/[\s,/-]+/).map(x => x.trim()).filter(x => x.length > 2 && !ignoreWords.includes(x));
                            const isMatch = dest && dest !== 'n/a' && destParts.some(part => loc.includes(part) || part.includes(loc));
                            
                            if(isMatch) {
                                listAtDestination.push({ name: emp.full_name, location: mobileLog.place_name || 'Destination Matched' });
                            } else {
                                listOutsideDestination.push({ name: emp.full_name, location: mobileLog.place_name || 'Outside Dest.' });
                            }
                        } else {
                            listNoLogsField.push({ name: emp.full_name, destination: itinForEmp.destination });
                        }
                    }
                });

                validEmps.forEach(emp => {
                    if (emp.dob) {
                        try {
                            const parts = emp.dob.split('-');
                            if (parts.length >= 3) {
                                const dobM = parseInt(parts[1], 10);
                                const dobD = parseInt(parts[2].substring(0, 2), 10);
                                if (dobM === currentMonth) {
                                    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                                    listBirthday.push({ name: emp.full_name, date: `${monthNames[dobM - 1]} ${dobD}` });
                                }
                            }
                        } catch(e){}
                    }

                    if (leavesMap.has(emp.emp_id)) {
                        listLeave.push({ name: emp.full_name, type: leavesMap.get(emp.emp_id) });
                        return; 
                    }

                    if (empIdsOnTO.includes(emp.emp_id) || empIdsOnPSO.includes(emp.emp_id) || empIdsOnSO.includes(emp.emp_id)) {
                        return; 
                    }

                    if (logsMap.has(emp.emp_id)) {
                        const timeIn = new Date(logsMap.get(emp.emp_id));
                        
                        const formatter12 = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Manila', hour: 'numeric', minute: '2-digit', hour12: true });
                        const timeInStr12 = formatter12.format(timeIn); 
                        
                        const formatter24 = new Intl.DateTimeFormat('en-GB', { timeZone: 'Asia/Manila', hour: '2-digit', minute: '2-digit' });
                        const timeInStr24 = formatter24.format(timeIn); 
                        const [timeInH, timeInM] = timeInStr24.split(':').map(Number);
                        
                        let flexiEnd = schedMap.has(emp.emp_id) ? schedMap.get(emp.emp_id) : (emp.flexi_range_end || "08:00"); 
                        let [h, m] = flexiEnd.split(':').map(Number);

                        if (timeInH > h || (timeInH === h && timeInM > m)) {
                            listLate.push({ name: emp.full_name, time: timeInStr12 });
                        } else if (isMonday) {
                            if (flagsMap.has(emp.emp_id)) {
                                const fLog = flagsMap.get(emp.emp_id);
                                if (fLog.status === 'LATE' || fLog.status === 'ABSENT') {
                                    listLate.push({ name: emp.full_name, time: `Flag: ${fLog.time_in || fLog.status}` });
                                }
                            } else {
                                 listLate.push({ name: emp.full_name, time: `No Flag Record` });
                            }
                        }
                    } else {
                        const dayOfWeek = nowManilaObj.getDay();
                        if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                            listAbsent.push({ name: emp.full_name });
                        }
                    }
                });

                const toStats = { Approved: 0, Pending: 0, Denied: 0 };
                tos.forEach(t => {
                    if (t.status === 'APPROVED') toStats.Approved++;
                    else if (t.status.includes('DISAPPROVED') || t.status === 'CANCELLED') toStats.Denied++;
                    else toStats.Pending++;
                });

                // SCOPED INSIGHTS: Based strictly on personnel currently under your jurisdiction
                const destCounts = {};
                itinsToday.forEach(i => {
                    if (i.destination && i.destination.toUpperCase() !== 'N/A') {
                        const d = i.destination.trim();
                        destCounts[d] = (destCounts[d] || 0) + 1;
                    }
                });
                let topDest = { name: 'None', count: 0 };
                for (const [dest, count] of Object.entries(destCounts)) {
                    if (count > topDest.count) topDest = { name: dest, count };
                }

                const travCounts = {};
                activeTOs.forEach(t => {
                    if (t.emp_name) {
                        const n = t.emp_name.trim();
                        travCounts[n] = (travCounts[n] || 0) + 1;
                    }
                });
                let topTrav = { name: 'None', count: 0 };
                for (const [name, count] of Object.entries(travCounts)) {
                    if (count > topTrav.count) topTrav = { name, count };
                }

                const totalStaff = validEmps.length;
                const fieldStaff = empIdsOnTO.length + empIdsOnPSO.length + empIdsOnSO.length;
                const deskStaff = logsMap.size - fieldStaff; 

                analyticsData = { 
                    toStats, 
                    workforce: { total: totalStaff, field: fieldStaff, desk: Math.max(0, deskStaff), onLeave: listLeave.length },
                    lists: { late: listLate, absent: listAbsent, leave: listLeave, birthday: listBirthday, gatepass: listGatePass, atDestination: listAtDestination, outsideDestination: listOutsideDestination, noLogsField: listNoLogsField },
                    anomalies: anomalyCount,
                    insights: { topDest, topTrav }
                };
                
                renderAnalyticsView();

            } catch(e) {
                content.innerHTML = `<p class="p-10 text-red-500 text-center">Analytics Error: ${e.message}</p>`;
            }
        }

        function renderAnalyticsView() {
            let activeForce = analyticsData.workforce.field + analyticsData.workforce.desk;
            let capacity = Math.round((activeForce / Math.max(1, analyticsData.workforce.total)) * 100);
            let availabilityRate = Math.round(((analyticsData.workforce.total - analyticsData.lists.absent.length - analyticsData.workforce.onLeave) / Math.max(1, analyticsData.workforce.total)) * 100);
            
            let aiText = `<strong>SCOPED BRIEF:</strong> Daily operational capacity stands at ${capacity}% for your jurisdiction. `;
            if (analyticsData.workforce.field > analyticsData.workforce.desk) aiText += `Resource deployment is currently optimized for field operations. `;
            if (analyticsData.anomalies > 0) aiText += `<span class="text-rose-600 font-bold">Action Required: ${analyticsData.anomalies} attendance log(s) flagged for potential compliance review.</span> `;
            if (analyticsData.lists.absent.length > 0) aiText += `Unaccounted personnel stands at ${analyticsData.lists.absent.length}. `;

            const renderListRows = (arr, detailKey, iconPath) => {
                if (arr.length === 0) return `<div class="p-4 text-center text-xs text-slate-400 font-bold tracking-widest uppercase">No Records Found</div>`;
                return arr.map(item => `
                    <div class="list-row">
                        <div class="flex items-center space-x-3">
                            <span class="text-slate-400 w-4 h-4">${iconPath}</span>
                            <span class="text-xs font-bold text-slate-700">${item.name}</span>
                        </div>
                        ${item[detailKey] ? `<span class="text-[10px] font-bold px-2 py-1 rounded bg-slate-100 text-slate-500">${item[detailKey]}</span>` : ''}
                    </div>
                `).join('');
            };

            const iconUser = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" /></svg>`;
            const iconClock = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>`;
            const iconDoor = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" /></svg>`;
            const iconSun = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" /></svg>`;
            const iconCake = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M21 11.25v8.25a1.5 1.5 0 0 1-1.5 1.5H5.25a1.5 1.5 0 0 1-1.5-1.5v-8.25M12 4.875A2.625 2.625 0 1 0 9.375 7.5H12m0-2.625V7.5m0-2.625A2.625 2.625 0 1 1 14.625 7.5H12m0 0V21m-8.625-9.75h18c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125h-18c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" /></svg>`;
            const iconLocation = `<svg fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" /></svg>`;

            document.getElementById('mainContent').innerHTML = `
                <div class="p-4 pb-32 space-y-4">
                    <p class="text-xs text-slate-600 leading-relaxed bg-white shadow-sm p-4 rounded-xl border border-slate-200">
                        ${aiText}
                    </p>

                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center items-start">
                            <span class="kpi-label mb-1">Most Visited</span>
                            <span class="text-sm font-black text-slate-800 leading-tight truncate w-full">${analyticsData.insights.topDest.name !== 'None' ? analyticsData.insights.topDest.name : 'N/A'}</span>
                            <span class="text-[10px] text-emerald-600 font-bold mt-1">${analyticsData.insights.topDest.count} Deployments Today</span>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center items-start">
                            <span class="kpi-label mb-1">Active Traveler</span>
                            <span class="text-sm font-black text-slate-800 leading-tight truncate w-full">${analyticsData.insights.topTrav.name !== 'None' ? analyticsData.insights.topTrav.name : 'N/A'}</span>
                            <span class="text-[10px] text-emerald-600 font-bold mt-1">${analyticsData.insights.topTrav.count} Approved TOs</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center items-start">
                            <span class="kpi-label">Availability</span>
                            <span class="kpi-value">${availabilityRate}%</span>
                        </div>
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col justify-center items-start">
                            <span class="kpi-label">Compliance Flags</span>
                            <span class="kpi-value ${analyticsData.anomalies > 0 ? 'text-rose-600' : 'text-emerald-600'}">${analyticsData.anomalies}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="analytics-card mb-0">
                            <div class="analytics-header">Workforce Dist.</div>
                            <div class="p-4 relative h-40"><canvas id="workforceChart"></canvas></div>
                        </div>
                        <div class="analytics-card mb-0">
                            <div class="analytics-header">Approval Queue</div>
                            <div class="p-4 relative h-40"><canvas id="toQueueChart"></canvas></div>
                        </div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>At Actual Destination</span><span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600">${analyticsData.lists.atDestination.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.atDestination, 'location', iconLocation)}</div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>Outside Destination</span><span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600">${analyticsData.lists.outsideDestination.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.outsideDestination, 'location', iconLocation)}</div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>No Logs (Field Personnel)</span><span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600">${analyticsData.lists.noLogsField.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.noLogsField, 'destination', iconLocation)}</div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>Absent / Unaccounted</span><span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600">${analyticsData.lists.absent.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.absent, null, iconUser)}</div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>Late Arrivals</span><span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600">${analyticsData.lists.late.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.late, 'time', iconClock)}</div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>Currently Out (Gate Pass)</span><span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600">${analyticsData.lists.gatepass.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.gatepass, 'purpose', iconDoor)}</div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>On Leave</span><span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600">${analyticsData.lists.leave.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.leave, 'type', iconSun)}</div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>Birthdays This Month</span><span class="bg-slate-100 px-2 py-0.5 rounded text-slate-600">${analyticsData.lists.birthday.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.birthday, 'date', iconCake)}</div>
                    </div>
                </div>
            `;

            // Draw Workforce Chart (Doughnut)
            const ctxWork = document.getElementById('workforceChart').getContext('2d');
            const absentEstimate = Math.max(0, analyticsData.workforce.total - analyticsData.workforce.desk - analyticsData.workforce.field - analyticsData.workforce.onLeave);
            new Chart(ctxWork, {
                type: 'doughnut',
                data: {
                    labels: ['Desk', 'Field', 'Leave', 'Absent'],
                    datasets: [{
                        data: [
                            analyticsData.workforce.desk, 
                            analyticsData.workforce.field,
                            analyticsData.workforce.onLeave, 
                            absentEstimate
                        ],
                        backgroundColor: ['#059669', '#2563eb', '#d97706', '#e11d48'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    cutout: '70%'
                }
            });

            // Draw TO Queue Chart (Bar)
            const ctxQueue = document.getElementById('toQueueChart').getContext('2d');
            new Chart(ctxQueue, {
                type: 'bar',
                data: {
                    labels: ['Apprv', 'Pend', 'Deny'],
                    datasets: [{
                        data: [analyticsData.toStats.Approved, analyticsData.toStats.Pending, analyticsData.toStats.Denied],
                        backgroundColor: ['#059669', '#d97706', '#e11d48'],
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false, beginAtZero: true },
                        x: { grid: { display: false }, ticks: { font: {size: 9, family: "-apple-system, sans-serif"}, color: '#64748b' } }
                    }
                }
            });
        }

        window.onload = () => { checkSession(); render(); };
    </script>
</body>
</html>
