        // PASSWORD HASHING UTILITY
        async function hashPassword(msg) {
            const msgUint8 = new TextEncoder().encode(msg);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function bufferToBase64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
        function base64ToBuffer(b64) {
            const binary_string = atob(b64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binary_string.charCodeAt(i); }
            return bytes.buffer;
        }

        async function setupAdminBiometric(username, hashedPass) {
            if (!window.PublicKeyCredential) return;
            const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
            if (!available) return;

            if (!localStorage.getItem('dar_admin_bio_cred')) {
                if(confirm("Do you want to enable Biometric/Device lock login for future use?")) {
                    try {
                        const challenge = new Uint8Array(32);
                        window.crypto.getRandomValues(challenge);
                        const userId = new Uint8Array(16);
                        window.crypto.getRandomValues(userId);

                        const cred = await navigator.credentials.create({
                            publicKey: {
                                challenge: challenge,
                                rp: { name: "DAR Admin Console" },
                                user: { id: userId, name: username, displayName: username },
                                pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
                                authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                                timeout: 60000,
                                attestation: "none"
                            }
                        });
                        localStorage.setItem('dar_admin_bio_cred', bufferToBase64(cred.rawId));
                        localStorage.setItem('dar_admin_user', username);
                        localStorage.setItem('dar_admin_token', hashedPass);
                        alert("Biometric login enabled!");
                        const bioBtn = document.getElementById('bioLoginBtn');
                        if(bioBtn) bioBtn.classList.remove('hidden');
                    } catch(e) { console.log("Biometric setup failed or cancelled", e); }
                }
            }
        }

        async function handleBiometricLogin() {
            try {
                const credId = localStorage.getItem('dar_admin_bio_cred');
                const username = localStorage.getItem('dar_admin_user');
                const token = localStorage.getItem('dar_admin_token');
                if (!credId || !username) return;

                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);

                await navigator.credentials.get({
                    publicKey: {
                        challenge: challenge,
                        allowCredentials: [{ type: "public-key", id: base64ToBuffer(credId) }],
                        userVerification: "required",
                        timeout: 60000
                    }
                });

                const { data: users } = await supabaseClient.from('users').select('*').eq('username', username).single();
                if (users && (users.password === token)) {

                        units: users.unit ? users.unit.split(',').map(x => x.trim().toUpperCase()) : [],
                        emp_id: users.id
                    };
                    localStorage.setItem('dar_admin_session', JSON.stringify({ user: currentUser, time: Date.now() }));
                    render();
                } else { alert("Authentication failed. Please use password."); }
            } catch(e) { console.log("Biometric auth failed", e); }
        }

        window.processBatch = async function(action) {
            try {
                if (selectedPendingOrders.size === 0) return;

                hideBatchActionBar();

                if (action === 'DISAPPROVED') {
                    let p = { status: "DISAPPROVED", received: prompt("Reason for denying ALL selected:") };
                    if (!p.received) { loadPendingTab(); return; }
                    const content = document.getElementById('mainContent');
                    content.innerHTML = `<p class="flex items-center justify-center h-full text-dar-green font-bold animate-pulse">Processing Batch...</p>`;
                    
                    const updatePromises = Array.from(selectedPendingOrders).map(async (to_no) => {
                        const { error } = await supabaseClient.from('travel_orders').update(p).eq('to_no', to_no);
                        if(error) throw error;
                        await window.logActivity(to_no, 'DISAPPROVED', `Batch disapproved by ${currentUser.fullName}. Reason: ${p.received}`);
                    });
                    await Promise.all(updatePromises);

                } else {
                    const toNos = Array.from(selectedPendingOrders);
                    const { data: toDataList, error } = await supabaseClient.from('travel_orders').select('to_no, unit, division, transport, unithead_signed').in('to_no', toNos);
                    if (error) throw error;

                    const content = document.getElementById('mainContent');
                    content.innerHTML = `<p class="flex items-center justify-center h-full text-dar-green font-bold animate-pulse">Processing Batch...</p>`;

                    const updatePromises = toNos.map(async (to_no) => {
                        const toRec = (toDataList || []).find(t => t.to_no === to_no);
                        const p = getAppPayload(currentUser, toRec);
                        
                        if (Object.keys(p).length === 0) return null; 

                        const { error: updError } = await supabaseClient.from('travel_orders').update(p).eq('to_no', to_no);
                        if(updError) throw updError;
                        await window.logActivity(to_no, 'STATUS_UPDATED', `Status advanced to ${p.status} by ${currentUser.fullName}`);
                        return true;
                    });

                    const results = await Promise.all(updatePromises);
                    const validUpdates = results.filter(r => r !== null);
                    
                    if (validUpdates.length === 0) {
                        alert("No valid approval actions configured for your role (" + currentUser.role + ").");
                    }
                }

                selectedPendingOrders.clear();
                loadPendingTab();
            } catch (err) {
                alert("Batch processing error: " + err.message);
                loadPendingTab();
            }
        }

        window.processDirectTO = async function(to_no, action) {

                let p;

        function getAppPayload(u, toRecord = null) {
            const nowISO = new Date().toISOString(); 
            const role = u.role ? u.role.trim().toUpperCase() : "";
            
            if (role === "VEHICLE_APPROVER" || role === "VEHICLE APPROVER" || role === "ADMIN") {
                let nextStatus = "PENDING_CHIEF";
                if (toRecord && toRecord.unit) {
                    const unt = toRecord.unit.trim().toUpperCase();
                    if (unt === "PARPO") nextStatus = "PENDING_PARPO";
                    else if (unt !== "") nextStatus = "PENDING_UNIT_HEAD";
                }
                return { status: nextStatus };
            }

            if (role === "UNIT_HEAD" || role === "UNIT HEAD" || role === "MARPO") {
                if (!toRecord) return {};
                
                const requiredUnits = toRecord.unit ? toRecord.unit.split(',').map(x => x.trim().toUpperCase()).filter(x => x && x !== 'NA') : [];
                const matchingUnitsToSign = requiredUnits.filter(reqU => u.units.includes(reqU));
                
                let currentSigs = toRecord.unithead_signed ? toRecord.unithead_signed : "";
                
                matchingUnitsToSign.forEach(unit => {
                    const sigFragment = `${u.fullName} (${unit})`;
                    if (!currentSigs.includes(sigFragment)) {
                        currentSigs = currentSigs ? currentSigs + ", " + sigFragment : sigFragment;
                    }
                });
                
                let allSigned = true;
                if (requiredUnits.length > 0) {
                    allSigned = requiredUnits.every(reqU => currentSigs.toUpperCase().includes(`(${reqU})`));
                }

                return { 
                    status: allSigned ? "PENDING_CHIEF" : "PENDING_UNIT_HEAD", 
                    unithead_signed: currentSigs, 
                    uh_signed_time: nowISO 
                };
            }

            if (role === "CHIEF") {
                return { 
                    status: "PENDING_PARPO", 
                    dc_signed: u.fullName, 
                    dc_signed_time: nowISO 
                };
            }
            if (role === "PARPO") {
                return { 
                    status: "APPROVED", 
                    parpo_signed: u.fullName, 
                    parpo_signed_time: nowISO 
                };
            }
            
            return {};
        }

        // --- PENDING TAB ---
        async function loadPendingTab() {
            selectedPendingOrders.clear();
            const content = document.getElementById('mainContent');
            content.innerHTML = `<p class="flex items-center justify-center h-full text-gray-400 font-bold animate-pulse">Syncing Inbox...</p>`;
            const [oRes, iRes] = await Promise.all([supabaseClient.from('travel_orders').select('*'), supabaseClient.from('itinerary').select('*')]);
            let grp = {};
            (oRes.data || []).forEach(o => { if (!grp[o.to_no]) grp[o.to_no] = []; grp[o.to_no].push(o); });
            let pendingOrders = [];
            for (const [to_no, list] of Object.entries(grp)) {
                let show = false;
                let showOnlyDatesForUnits = null;
                
                for (let o of list) {
                    const s = (o.status || "").trim().toUpperCase();
                    const oDivs = o.division ? o.division.split(',').map(x => x.trim().toUpperCase()) : [];
                    const dMatch = oDivs.some(d => currentUser.divisions.includes(d));
                    const r = currentUser.role ? currentUser.role.trim().toUpperCase() : "";

                    const requiredUnits = o.unit ? o.unit.split(',').map(x => x.trim().toUpperCase()).filter(x => x && x !== 'NA') : [];
                    const unitsCanSign = requiredUnits.filter(reqU => currentUser.units.includes(reqU));
                    const currentSigs = o.unithead_signed ? o.unithead_signed.toUpperCase() : "";
                    const hasUnsignedUnit = unitsCanSign.some(reqU => !currentSigs.includes(`(${reqU})`));

                    if ((r === "VEHICLE_APPROVER" || r === "VEHICLE APPROVER" || r === "ADMIN") && s === "PENDING_VEHICLE_APPROVER") show = true;
                    else if (r === "PARPO" && s === "PENDING_PARPO") show = true;
                    else if (r === "CHIEF" && s === "PENDING_CHIEF" && dMatch) show = true;
                    else if ((r === "UNIT_HEAD" || r === "UNIT HEAD" || r === "MARPO") && s === "PENDING_UNIT_HEAD" && dMatch) {
                        if (unitsCanSign.length > 0 && hasUnsignedUnit) {
                            show = true;
                            // Set flag to filter itinerary tags
                            showOnlyDatesForUnits = unitsCanSign; 
                        }
                    }
                }
                
                if (show) {
                    let fullItinerary = (iRes.data || []).filter(i => i.to_no === to_no).sort((a,b) => new Date(a.travel_date) - new Date(b.travel_date));
                    
                    let dt = "N/A";
                    if(fullItinerary.length > 0) {
                        const start = new Date(fullItinerary[0].travel_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                        const end = new Date(fullItinerary[fullItinerary.length-1].travel_date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                        dt = fullItinerary.length === 1 ? end : `${start} - ${end}`;
                    }

                    pendingOrders.push({ 
                        to_no, 
                        names: list.map(g => g.emp_name), 
                        destinations: [...new Set(fullItinerary.map(i => i.destination))].join(', ') || 'N/A', 
                        purpose: [...new Set(fullItinerary.map(i => i.purpose))].join(', ') || 'N/A', 
                        report_to: list[0].report_to || 'N/A', 
                        dateStr: dt
                    });
                }
            }
            if (pendingOrders.length === 0) content.innerHTML = `<div class="flex flex-col items-center justify-center h-full opacity-50"><span class="text-4xl">✨</span><p class="font-bold mt-2 text-xs uppercase">Inbox Clear</p></div>`;

        async function loadReportsTab() {

                        .select('emp_id, log_time, device_id, place_name')

                reportData = [];

                (itR.data || []).forEach(i => {
                    const p = (toR.data || []).find(x => x.to_no === i.to_no);

                            let mobileLogInfo = `<div class="mt-1 flex items-center space-x-1 truncate"><span class="text-[10px] text-slate-500 font-bold truncate">📱 No Remote Attendance Log</span></div>`;

                                const logDateStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date(l.log_time));
                                return l.emp_id === p.emp_id && logDateStr === dStr;
                            });
                            
                            const mobileLog = logsToday.find(l => l.place_name || (l.device_id && l.device_id.toUpperCase() !== 'TERMINAL' && l.device_id.length > 5));

                            if (mobileLog) {
                                const loc = (mobileLog.place_name || '').toLowerCase();
                                const dest = (i.destination || '').toLowerCase();
                                
                                const ignoreWords = ['city', 'municipality', 'brgy', 'barangay', 'brgy.', 'prov.', 'province'];
                                const destParts = dest.split(/[\s,/-]+/).map(x => x.trim()).filter(x => x.length > 2 && !ignoreWords.includes(x));
                                
                                const isMatch = dest && dest !== 'n/a' && destParts.some(part => loc.includes(part) || part.includes(loc));
                                
                                if (isMatch) {
                                    mobileLogInfo = `<div class="mt-1 flex items-center space-x-1 truncate"><span class="text-[10px] text-emerald-600 font-bold truncate">📱 Employee Reported to the Destination</span></div>`;

                                }
                            }

                            reportData.push({ type: 'TO', date: new Date(i.travel_date), title: p.emp_name, subtitle: i.destination, purpose: i.purpose, color: 'blue', extraHTML: mobileLogInfo });
                            seen.add(key);
                        }
                    }
                });
                (psR.data || []).forEach(p => { if(p.date && checkScope(p.division, p.unit)) reportData.push({ type: 'PSO', date: new Date(p.date), title: p.emp_name || 'Personnel', subtitle: p.destination || 'Field Work', purpose: p.subject, color: 'purple' }); });
                (soR.data || []).forEach(s => { if(s.date && checkScope(s.division, s.unit)) reportData.push({ type: 'SO', date: new Date(s.date), title: s.emp_name || 'Personnel', subtitle: s.destination || 'Special Assignment', purpose: s.subject, color: 'orange' }); });

        function setReportFilter(v) { reportFilter = v; renderReportsShell(); }

        function updateReportList() {
            const container = document.getElementById('reportListContainer');
            const todayStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());
            const [ty, tm, td] = todayStr.split('-').map(Number);
            const nowManila = new Date(ty, tm - 1, td);
            
            let f = reportData.filter(r => {
                const rStr = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila', year: 'numeric', month: '2-digit', day: '2-digit' }).format(r.date);
                const [ry, rm, rd] = rStr.split('-').map(Number);
                const dManila = new Date(ry, rm - 1, rd);

                if (reportFilter === 'day') return rStr === todayStr;
                if (reportFilter === 'week') { 
                    const s = new Date(nowManila); 
                    s.setDate(nowManila.getDate() - nowManila.getDay()); 
                    const e = new Date(s); 
                    e.setDate(s.getDate() + 6); 
                    return dManila >= s && dManila <= e; 
                }
                if (reportFilter === 'month') return rm === tm && ry === ty;
                return true;
            });
            
            f.sort((a, b) => b.date.getTime() - a.date.getTime());
            
            if (f.length === 0) { container.innerHTML = `<p class="text-center py-20 text-slate-400 font-bold text-[10px] tracking-widest uppercase">No Records Found</p>`; return; }
            let h = '', last = '';
            f.forEach(r => {
                const rStrManila = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Manila', year: 'numeric', month: '2-digit', day: '2-digit' }).format(r.date);
                if (rStrManila !== last) {
                    last = rStrManila;
                    h += `<h3 class="text-[10px] font-black text-slate-400 mt-6 mb-2 tracking-widest text-left border-b pb-1 uppercase">${new Date(rStrManila).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</h3>`;
                }
                const cMap = { blue: 'border-blue-500 bg-blue-50 text-blue-800', purple: 'border-purple-500 bg-purple-50 text-purple-800', orange: 'border-orange-500 bg-orange-50 text-orange-800', red: 'border-red-500 bg-red-50 text-red-800' };
                const c = cMap[r.color];
                const extra = r.extraHTML ? r.extraHTML : '';
                h += `<div class="bg-white p-4 rounded-xl border-l-4 shadow-sm flex items-center justify-between text-left ${c.split(' ')[0]}"><div class="overflow-hidden w-full"><p class="font-bold text-sm text-slate-800 truncate">${r.title}</p><p class="text-[10px] text-slate-500 truncate mt-1">📍 ${r.subtitle || 'N/A'}</p><p class="text-[10px] text-slate-500 truncate mt-0.5">🎯 ${r.purpose || 'N/A'}</p>${extra}</div><div class="shrink-0 ml-2"><span class="text-[8px] font-black px-2 py-1 rounded bg-white border opacity-80 uppercase ${c.split(' ').slice(1).join(' ')}">${r.type}</span></div></div>`;
            });
            container.innerHTML = h;
        }
