        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0ZnBpeWZhcHZ5YmlobG5neGtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxMDA2MTIsImV4cCI6MjA4NTY3NjYxMn0.7TRVjvFjxVtxkP_hL3wnlxPT6FXJd0y7aKHNzDHThAQ";

        // PASSWORD HASHING UTILITY
        async function hashPassword(msg) {
            const msgUint8 = new TextEncoder().encode(msg);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function bufferToBase64(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))); }
        function base64ToBuffer(b64) {
            const binary_string = atob(b64);
            const len = binary_string.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binary_string.charCodeAt(i); }
            return bytes.buffer;
        }

        async function setupAdminBiometric(username, hashedPass) {
            if (!window.PublicKeyCredential) return;
            const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
            if (!available) return;

            if (!localStorage.getItem('dar_admin_bio_cred')) {
                if(confirm("Do you want to enable Biometric/Device lock login for future use?")) {
                    try {
                        const challenge = new Uint8Array(32);
                        window.crypto.getRandomValues(challenge);
                        const userId = new Uint8Array(16);
                        window.crypto.getRandomValues(userId);

                        const cred = await navigator.credentials.create({
                            publicKey: {
                                challenge: challenge,
                                rp: { name: "DAR Admin Console" },
                                user: { id: userId, name: username, displayName: username },
                                pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
                                authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                                timeout: 60000,
                                attestation: "none"
                            }
                        });
                        localStorage.setItem('dar_admin_bio_cred', bufferToBase64(cred.rawId));
                        localStorage.setItem('dar_admin_user', username);
                        localStorage.setItem('dar_admin_token', hashedPass);
                        alert("Biometric login enabled!");
                        const bioBtn = document.getElementById('bioLoginBtn');
                        if(bioBtn) bioBtn.classList.remove('hidden');
                    } catch(e) { console.log("Biometric setup failed or cancelled", e); }
                }
            }
        }

        async function handleBiometricLogin() {
            try {
                const credId = localStorage.getItem('dar_admin_bio_cred');
                const username = localStorage.getItem('dar_admin_user');
                const token = localStorage.getItem('dar_admin_token');
                if (!credId || !username) return;

                const challenge = new Uint8Array(32);
                window.crypto.getRandomValues(challenge);

                await navigator.credentials.get({
                    publicKey: {
                        challenge: challenge,
                        allowCredentials: [{ type: "public-key", id: base64ToBuffer(credId) }],
                        userVerification: "required",
                        timeout: 60000
                    }
                });

                const { data: users } = await supabaseClient.from('users').select('*').eq('username', username).single();
                if (users && (users.password === token)) {
                    currentUser = {
                        username: users.username,
                        fullName: users.full_name,
                        role: users.role.toUpperCase(),
                        divisions: users.division ? users.division.split(',').map(d => d.trim().toUpperCase()) : [],
                        units: users.unit ? users.unit.split(',').map(x => x.trim().toUpperCase()) : []
                    };
                    localStorage.setItem('dar_admin_session', JSON.stringify({ user: currentUser, time: Date.now() }));
                    render();
                } else { alert("Authentication failed. Please use password."); }
            } catch(e) { console.log("Biometric auth failed", e); }
        }

        function checkSession() {
            const stored = localStorage.getItem('dar_admin_session');
            if (stored) {
                const session = JSON.parse(stored);
                if (Date.now() - session.time < 30 * 24 * 60 * 60 * 1000) {
                    currentUser = session.user;
                } else {
                    localStorage.removeItem('dar_admin_session');
                }
            }
        }

        function render() { if (!currentUser) renderLogin(); else renderMain(); }

        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="flex-grow flex flex-col justify-center items-center px-6 dar-green h-full">
                    <div class="z-10 w-full max-w-sm bg-white rounded-2xl shadow-2xl overflow-hidden">
                        <div class="dar-gold h-2 w-full"></div>
                        <div class="p-8">
                            <h1 class="text-dar-green font-bold text-3xl font-serif mb-1 text-center">DAR</h1>
                            <p class="text-[10px] text-gray-400 font-bold tracking-widest mb-6 uppercase text-center">Cam Sur 1 Console</p>
                            <div class="space-y-4">
                                <div><label class="block text-xs font-bold text-gray-700 mb-1">USERNAME</label><input type="text" id="username" class="w-full px-4 py-3 bg-gray-50 border rounded-xl focus:outline-none"></div>
                                <div><label class="block text-xs font-bold text-gray-700 mb-1">PASSWORD</label><input type="password" id="password" class="w-full px-4 py-3 bg-gray-50 border rounded-xl focus:outline-none"></div>
                                <p id="loginError" class="text-red-600 text-[10px] font-bold text-center hidden"></p>
                                <button onclick="handleLogin()" id="loginBtn" class="w-full mt-2 dar-green text-white font-bold py-3.5 rounded-xl shadow-lg">LOG IN</button>
                                <button onclick="handleBiometricLogin()" id="bioLoginBtn" class="w-full mt-2 bg-gray-200 text-dar-green font-bold py-3.5 rounded-xl shadow-lg hidden">🧬 BIOMETRIC LOGIN</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });

            setTimeout(() => {
                if (window.PublicKeyCredential) {
                    PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(avail => {
                        if (avail && localStorage.getItem('dar_admin_bio_cred')) {
                            const btn = document.getElementById('bioLoginBtn');
                            if(btn) btn.classList.remove('hidden');
                        }
                    });
                }
            }, 100);
        }

        async function handleLogin() {
            const uBox = document.getElementById('username').value.trim();
            const pBox = document.getElementById('password').value.trim();
            const err = document.getElementById('loginError');
            try {
                const hashedPBox = await hashPassword(pBox);
                const { data: users } = await supabaseClient.from('users').select('*');
                const u = (users || []).find(x => x.username === uBox && (x.password === pBox || x.password === hashedPBox));
                
                if (u) {
                    currentUser = { 
                        username: u.username, 
                        fullName: u.full_name, 
                        role: u.role.toUpperCase(), 
                        divisions: u.division ? u.division.split(',').map(d => d.trim().toUpperCase()) : [], 
                        units: u.unit ? u.unit.split(',').map(x => x.trim().toUpperCase()) : [] 
                    };
                    localStorage.setItem('dar_admin_session', JSON.stringify({ user: currentUser, time: Date.now() }));
                    setupAdminBiometric(u.username, u.password);
                    render();
                } else { err.innerText = "Check credentials."; err.classList.remove("hidden"); }
            } catch (e) { err.innerText = "Error."; err.classList.remove("hidden"); }
        }

        function logout() { currentUser = null; localStorage.removeItem('dar_admin_session'); render(); }

        function renderMain() {
            document.getElementById('app').innerHTML = `
                <header class="flex-none w-full h-16 dar-green text-white px-5 flex justify-between items-center shadow-md z-50">
                    <div class="overflow-hidden text-left"><h1 class="font-bold text-lg leading-tight truncate">${currentUser.fullName}</h1><p class="text-[10px] text-dar-gold tracking-wide font-bold uppercase">${currentUser.role}</p></div>
                    <div class="flex items-center space-x-2"><button onclick="showChangePassword()" class="text-xl px-2">🔒</button><button onclick="logout()" class="text-xs bg-white/20 px-3 py-1.5 rounded-full font-bold">Logout</button></div>

                    <button onclick="switchTab('approved')" class="flex flex-col items-center justify-center w-1/5 ${currentTab === 'approved' ? 'text-dar-green font-bold' : 'text-gray-400'}"><span class="text-xl">✅</span><span class="text-[9px] uppercase tracking-tighter">Approved</span></button>
                    <button onclick="switchTab('denied')" class="flex flex-col items-center justify-center w-1/5 ${currentTab === 'denied' ? 'text-red-600 font-bold' : 'text-gray-400'}"><span class="text-xl">❌</span><span class="text-[9px] uppercase tracking-tighter">Denied</span></button>
                    <button onclick="switchTab('reports')" class="flex flex-col items-center justify-center w-1/5 ${currentTab === 'reports' ? 'text-blue-600 font-bold' : 'text-gray-400'}"><span class="text-xl">📋</span><span class="text-[9px] uppercase tracking-tighter">Reports</span></button>
                    <button onclick="switchTab('analytics')" class="flex flex-col items-center justify-center w-1/5 ${currentTab === 'analytics' ? 'text-purple-600 font-bold' : 'text-gray-400'}"><span class="text-xl">📊</span><span class="text-[9px] uppercase tracking-tighter">Analytics</span></button>
                </nav>
                <div id="batchActionBar" class="fixed w-full left-0 bg-white border-t shadow-[0_-10px_20px_rgba(0,0,0,0.1)] z-40 px-4 py-3 flex justify-between items-center transition-transform duration-300 transform translate-y-full batch-bar-position">
                    <span id="batchCountText" class="font-bold text-sm text-gray-700">0 selected</span>
                    <div class="space-x-2">
                        <button onclick="processBatch('DISAPPROVED')" class="px-4 py-2 bg-red-50 text-red-600 rounded-lg text-xs font-bold">Deny</button>
                        <button onclick="processBatch('APPROVE')" class="px-4 py-2 dar-green text-white rounded-lg text-xs font-bold shadow-md">Approve</button>
                    </div>
                </div>
                
                <div id="pwdModal" class="hidden absolute inset-0 bg-black/50 z-[60] flex items-center justify-center px-4 modal-fade"><div class="bg-white w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl"><div class="dar-green text-white p-4 font-bold text-center relative">Security<button onclick="hideChangePassword()" class="absolute right-4 text-xl leading-none">✕</button></div><div class="p-6 space-y-4"><input type="password" id="oldPwd" placeholder="Current Password" class="w-full px-4 py-2 border rounded-lg text-sm"><input type="password" id="newPwd" placeholder="New Password" class="w-full px-4 py-2 border rounded-lg text-sm"><button onclick="updatePassword()" class="w-full dar-green text-white font-bold py-3 rounded-xl">Save</button></div></div></div>
                
                <div id="cancelModal" class="hidden absolute inset-0 bg-black/50 z-[60] flex items-center justify-center px-4 modal-fade"><div class="bg-white w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl"><div class="bg-red-600 text-white p-4 font-bold text-center relative">Cancel Travel Order<button onclick="hideCancelModal()" class="absolute right-4 text-xl leading-none">✕</button></div><div class="p-6 space-y-4"><p class="text-sm font-bold text-gray-700">Select dates to cancel:</p><div id="cancelDatesList" class="space-y-2 max-h-48 overflow-y-auto"></div><button onclick="confirmCancelTO()" class="w-full bg-red-600 text-white font-bold py-3 rounded-xl mt-2">Cancel Selected Dates</button><button onclick="cancelEntireTO()" class="w-full bg-red-800 text-white font-bold py-3 rounded-xl mt-2">Cancel Entire TO</button></div></div></div>

                <div id="hrNotifModal" class="hidden absolute inset-0 bg-black/60 z-[70] flex items-center justify-center px-4 modal-fade"><div class="bg-white w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl relative"><div class="dar-gold h-2 w-full"></div><div class="p-6"><div class="flex items-center space-x-3 mb-4"><span class="text-3xl">📢</span><div><h2 class="font-bold text-lg text-gray-800 leading-tight">HR Notification</h2><p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Important Update</p></div></div><div id="hrNotifContent" class="space-y-3 max-h-60 overflow-y-auto text-sm text-gray-700"></div><button onclick="closeHRNotifModal()" class="w-full mt-6 dar-green text-white font-bold py-3 rounded-xl shadow-md">Acknowledge</button></div></div></div>
            `;
            
            if (currentTab === 'pending') loadPendingTab();
            else {
                hideBatchActionBar();
                if (currentTab === 'approved') loadStatusTab('APPROVED');
                else if (currentTab === 'denied') loadStatusTab('DISAPPROVED');
                else if (currentTab === 'reports') loadReportsTab();
                else loadAnalyticsTab();
            }

            checkHRNotifications();

        function switchTab(tab) { 
            currentTab = tab; 
            selectedPendingOrders.clear(); 
            renderMain(); 
        }
        function showChangePassword() { document.getElementById('pwdModal').classList.remove('hidden'); }
        function hideChangePassword() { document.getElementById('pwdModal').classList.add('hidden'); }

        async function updatePassword() {
            const o = document.getElementById('oldPwd').value.trim();
            const n = document.getElementById('newPwd').value.trim();
            const { data } = await supabaseClient.from('users').select('password').eq('username', currentUser.username).single();
            const hashedOld = await hashPassword(o);
            
            if (data.password !== o && data.password !== hashedOld) {
                return alert("Incorrect.");
            }
            
            const hashedNew = await hashPassword(n);
            await supabaseClient.from('users').update({ password: hashedNew }).eq('username', currentUser.username);
            alert("Updated!"); hideChangePassword();
        }

        // --- CANCEL MODAL LOGIC (Approved Tab) ---
        function showCancelModal(to_no, datesEncoded) {
            const dates = JSON.parse(decodeURIComponent(datesEncoded));
            currentCancelToNo = to_no;
            const list = document.getElementById('cancelDatesList');
            list.innerHTML = '';
            dates.forEach(d => {
                list.innerHTML += `
                    <label class="flex items-center space-x-3 p-3 border rounded-xl bg-gray-50 cursor-pointer">
                        <input type="checkbox" value="${d}" class="cancel-date-cb w-5 h-5 text-red-600 rounded focus:ring-red-500 border-gray-300">
                        <span class="text-sm font-bold text-gray-700">${d}</span>
                    </label>
                `;
            });
            document.getElementById('cancelModal').classList.remove('hidden');
        }

        function hideCancelModal() {
            document.getElementById('cancelModal').classList.add('hidden');
        }

        function cancelEntireTO() {
            if(confirm("Are you sure you want to cancel this ENTIRE Travel Order?")) {
                hideCancelModal();
                processFullCancel(currentCancelToNo);
            }
        }

        async function confirmCancelTO() {
            const checkboxes = document.querySelectorAll('.cancel-date-cb');
            const selectedDates = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
            const totalDates = checkboxes.length;

            if (selectedDates.length === 0) return alert("Select at least one date.");

            const targetToNo = currentCancelToNo;
            hideCancelModal();

            const content = document.getElementById('mainContent');
            content.innerHTML = `<p class="flex items-center justify-center h-full text-red-600 font-bold animate-pulse">Processing Cancellation...</p>`;

            if (selectedDates.length === totalDates) {
                await processFullCancel(targetToNo);
            } else {
                for (let d of selectedDates) {
                    await supabaseClient.from('itinerary').delete().eq('to_no', targetToNo).eq('travel_date', d);
                }
                await supabaseClient.from('notifications').insert({
                    recipient_role: 'PARPO',
                    message: `Approved TO ${targetToNo} had dates cancelled (${selectedDates.join(', ')}) by ${currentUser.fullName}`,
                    to_no: targetToNo
                });
                loadStatusTab('APPROVED');
            }
        }

        async function processFullCancel(to_no) {
            const content = document.getElementById('mainContent');
            content.innerHTML = `<p class="flex items-center justify-center h-full text-red-600 font-bold animate-pulse">Cancelling TO...</p>`;
            await supabaseClient.from('travel_orders').update({ status: 'CANCELLED' }).eq('to_no', to_no);
            await supabaseClient.from('notifications').insert({
                recipient_role: 'PARPO',
                message: `Approved TO ${to_no} was entirely cancelled by ${currentUser.fullName}`,
                to_no: to_no
            });
            loadStatusTab('APPROVED');
        }

        // --- SHARED SCOPE CHECK ---
        const checkScope = (div, unit) => {
            const role = currentUser.role ? currentUser.role.trim().toUpperCase() : "";
            if (role === "PARPO" || role === "VEHICLE_APPROVER" || role === "VEHICLE APPROVER" || role === "ADMIN") return true;
            
            const oDivs = div ? div.split(',').map(x => x.trim().toUpperCase()) : [];
            const dMatch = oDivs.some(d => currentUser.divisions.includes(d));
            
            if (role === "CHIEF") return dMatch;
            if ((role === "UNIT_HEAD" || role === "UNIT HEAD") && div && div.toUpperCase().includes("PBDD") && dMatch) return true;
            
            const oUnits = unit ? unit.split(',').map(x => x.trim().toUpperCase()) : [];
            const uMatch = oUnits.some(u => currentUser.units.includes(u));
            
            return dMatch && uMatch;
        };

        // --- BATCH ACTION LOGIC ---
        function toggleBatchSelection(to_no, isChecked) {
            if (isChecked) selectedPendingOrders.add(to_no);
            else selectedPendingOrders.delete(to_no);
            updateBatchActionBar();
        }

        function selectAllPending(checkbox) {
            const checkboxes = document.querySelectorAll('.to-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = checkbox.checked;
                if (checkbox.checked) selectedPendingOrders.add(cb.value);
                else selectedPendingOrders.delete(cb.value);
            });
            updateBatchActionBar();
        }

        function updateBatchActionBar() {
            const bar = document.getElementById('batchActionBar');
            const countText = document.getElementById('batchCountText');
            if (selectedPendingOrders.size > 0) {
                countText.innerText = `${selectedPendingOrders.size} selected`;
                bar.classList.remove('translate-y-full');
            } else {
                hideBatchActionBar();
            }
        }

        function hideBatchActionBar() {
            const bar = document.getElementById('batchActionBar');
            if(bar) bar.classList.add('translate-y-full');
        }

        async function processBatch(action) {
            try {
                if (selectedPendingOrders.size === 0) return;

                hideBatchActionBar();

                if (action === 'DISAPPROVED') {
                    let p = { status: "DISAPPROVED", received: prompt("Reason for denying ALL selected:") };
                    if (!p.received) { loadPendingTab(); return; }
                    const content = document.getElementById('mainContent');
                    content.innerHTML = `<p class="flex items-center justify-center h-full text-dar-green font-bold animate-pulse">Processing Batch...</p>`;
                    
                    const updatePromises = Array.from(selectedPendingOrders).map(async (to_no) => {
                        const { error } = await supabaseClient.from('travel_orders').update(p).eq('to_no', to_no);
                        if(error) throw error;
                    });
                    await Promise.all(updatePromises);

                } else {
                    const toNos = Array.from(selectedPendingOrders);
                    const { data: toDataList, error } = await supabaseClient.from('travel_orders').select('to_no, unit, division, transport, unithead_signed').in('to_no', toNos);
                    if (error) throw error;

                    const content = document.getElementById('mainContent');
                    content.innerHTML = `<p class="flex items-center justify-center h-full text-dar-green font-bold animate-pulse">Processing Batch...</p>`;

                    const updatePromises = toNos.map(async (to_no) => {
                        const toRec = (toDataList || []).find(t => t.to_no === to_no);
                        const p = getAppPayload(currentUser, toRec);
                        
                        if (Object.keys(p).length === 0) return null; 

                        const { error: updError } = await supabaseClient.from('travel_orders').update(p).eq('to_no', to_no);
                        if(updError) throw updError;
                        return true;
                    });

                    const results = await Promise.all(updatePromises);
                    const validUpdates = results.filter(r => r !== null);
                    
                    if (validUpdates.length === 0) {
                        alert("No valid approval actions configured for your role (" + currentUser.role + ").");
                    }
                }

                selectedPendingOrders.clear();
                loadPendingTab();
            } catch (err) {
                alert("Batch processing error: " + err.message);
                loadPendingTab();
            }
        }

        async function processDirectTO(to_no, action) {
            try {
                let p;
                if (action === 'DISAPPROVED') {
                    p = { status: "DISAPPROVED", received: prompt("Reason for denying:") };
                    if (!p.received) return;
                } else {
                    const { data: toData, error } = await supabaseClient.from('travel_orders').select('to_no, unit, division, transport, unithead_signed').eq('to_no', to_no).limit(1);
                    if (error) throw error;
                    p = getAppPayload(currentUser, toData && toData.length > 0 ? toData[0] : null);
                }
                
                // Guard against blank payload if role mapping failed
                if (Object.keys(p).length === 0) {
                    alert("Approval failed: Your role (" + currentUser.role + ") is not configured to approve this status.");
                    return;
                }

                const content = document.getElementById('mainContent');
                content.innerHTML = `<p class="flex items-center justify-center h-full text-dar-green font-bold animate-pulse">Processing...</p>`;
                
                const { error: updErr } = await supabaseClient.from('travel_orders').update(p).eq('to_no', to_no);
                if (updErr) throw updErr;
                
                loadPendingTab();
            } catch (err) {
                alert("Error processing TO: " + err.message);
                loadPendingTab();
            }
        }

        function getAppPayload(u, toRecord = null) {
            const nowISO = new Date().toISOString(); 
            const role = u.role ? u.role.trim().toUpperCase() : "";
            
            if (role === "VEHICLE_APPROVER" || role === "VEHICLE APPROVER" || role === "ADMIN") {
                let nextStatus = "PENDING_CHIEF";
                if (toRecord && toRecord.unit) {
                    const unt = toRecord.unit.trim().toUpperCase();
                    if (unt === "PARPO") nextStatus = "PENDING_PARPO";
                    else if (unt !== "") nextStatus = "PENDING_UNIT_HEAD";
                }
                return { status: nextStatus };
            }

            if (role === "UNIT_HEAD" || role === "UNIT HEAD" || role === "MARPO") {
                if (!toRecord) return {};
                
                const requiredUnits = toRecord.unit ? toRecord.unit.split(',').map(x => x.trim().toUpperCase()).filter(x => x && x !== 'NA') : [];
                const matchingUnitsToSign = requiredUnits.filter(reqU => u.units.includes(reqU));
                
                let currentSigs = toRecord.unithead_signed ? toRecord.unithead_signed : "";
                
                matchingUnitsToSign.forEach(unit => {
                    const sigFragment = `${u.fullName} (${unit})`;
                    if (!currentSigs.includes(sigFragment)) {
                        currentSigs = currentSigs ? currentSigs + ", " + sigFragment : sigFragment;
                    }
                });
                
                let allSigned = true;
                if (requiredUnits.length > 0) {
                    allSigned = requiredUnits.every(reqU => currentSigs.toUpperCase().includes(`(${reqU})`));
                }

                return { 
                    status: allSigned ? "PENDING_CHIEF" : "PENDING_UNIT_HEAD", 
                    unithead_signed: currentSigs, 
                    uh_signed_time: nowISO 
                };
            }

            if (role === "CHIEF") {
                return { 
                    status: "PENDING_PARPO", 
                    dc_signed: u.fullName, 
                    dc_signed_time: nowISO 
                };
            }
            if (role === "PARPO") {
                return { 
                    status: "APPROVED", 
                    parpo_signed: u.fullName, 
                    parpo_signed_time: nowISO 
                };
            }
            
            return {};
        }

        // --- PENDING TAB ---
        async function loadPendingTab() {

            const content = document.getElementById('mainContent');

            const [oRes, iRes] = await Promise.all([supabaseClient.from('travel_orders').select('*'), supabaseClient.from('itinerary').select('*')]);

            (oRes.data || []).forEach(o => { if (!grp[o.to_no]) grp[o.to_no] = []; grp[o.to_no].push(o); });
            let pendingOrders = [];
            for (const [to_no, list] of Object.entries(grp)) {
                let show = false;
                let showOnlyDatesForUnits = null;
                
                for (let o of list) {
                    const s = (o.status || "").trim().toUpperCase();
                    const oDivs = o.division ? o.division.split(',').map(x => x.trim().toUpperCase()) : [];
                    const dMatch = oDivs.some(d => currentUser.divisions.includes(d));
                    const r = currentUser.role ? currentUser.role.trim().toUpperCase() : "";

                    const requiredUnits = o.unit ? o.unit.split(',').map(x => x.trim().toUpperCase()).filter(x => x && x !== 'NA') : [];
                    const unitsCanSign = requiredUnits.filter(reqU => currentUser.units.includes(reqU));
                    const currentSigs = o.unithead_signed ? o.unithead_signed.toUpperCase() : "";
                    const hasUnsignedUnit = unitsCanSign.some(reqU => !currentSigs.includes(`(${reqU})`));

                    if ((r === "VEHICLE_APPROVER" || r === "VEHICLE APPROVER" || r === "ADMIN") && s === "PENDING_VEHICLE_APPROVER") show = true;
                    else if (r === "PARPO" && s === "PENDING_PARPO") show = true;
                    else if (r === "CHIEF" && s === "PENDING_CHIEF" && dMatch) show = true;
                    else if ((r === "UNIT_HEAD" || r === "UNIT HEAD" || r === "MARPO") && s === "PENDING_UNIT_HEAD" && dMatch) {
                        if (unitsCanSign.length > 0 && hasUnsignedUnit) {

                    pendingOrders.push({ 
                        to_no,

                        destinations: [...new Set(fullItinerary.map(i => i.destination))].join(', ') || 'N/A', 
                        purpose: [...new Set(fullItinerary.map(i => i.purpose))].join(', ') || 'N/A', 
                        report_to: list[0].report_to || 'N/A', 
                        dateStr: dt
                    });

            }
            if (pendingOrders.length === 0) content.innerHTML = `<div class="flex flex-col items-center justify-center h-full opacity-50"><span class="text-4xl">✨</span><p class="font-bold mt-2 text-xs uppercase">Inbox Clear</p></div>`;
            else {

                    <label class="flex items-center space-x-2 cursor-pointer text-sm font-bold text-gray-700">
                        <input type="checkbox" class="batch-checkbox" onchange="selectAllPending(this)">
                        <span>Select All</span>
                    </label>
                    <span class="text-xs text-gray-500 font-bold">${pendingOrders.length} Pending</span>
                </div>
                <div class="p-4 space-y-4 pb-32">`;
                
                pendingOrders.forEach(o => { 
                    h += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border flex gap-3 relative">
                        <div class="pt-1">
                            <input type="checkbox" value="${o.to_no}" class="batch-checkbox to-checkbox" onchange="toggleBatchSelection('${o.to_no}', this.checked)">
                        </div>
                        <div class="flex-grow overflow-hidden">
                            <div class="flex justify-between items-start">
                                <span class="text-[10px] font-black text-gray-300 uppercase">${o.to_no}</span>
                            </div>
                            <p class="font-bold text-gray-800 leading-tight">${o.names.join(', ')}</p>
                            <p class="text-[11px] text-gray-500 truncate mt-1">📍 ${o.destinations}</p>
                            <p class="text-[11px] text-gray-500 truncate mt-0.5">🎯 ${o.purpose}</p>
                            <p class="text-[11px] text-gray-500 truncate mt-0.5">👤 Report To: ${o.report_to}</p>
                            <p class="text-[11px] text-dar-green font-bold mt-1">📅 ${o.dateStr}</p>
                            <div class="mt-3 pt-3 border-t border-gray-100 flex gap-2">
                                <button onclick="processDirectTO('${o.to_no}', 'DISAPPROVED')" class="px-5 py-2 bg-red-50 text-red-600 rounded-lg text-xs font-bold shadow-sm w-1/2 active:scale-95 transition-transform">DENY</button>
                                <button onclick="processDirectTO('${o.to_no}', 'APPROVE')" class="px-5 py-2 dar-green text-white rounded-lg text-xs font-bold shadow-md w-1/2 active:scale-95 transition-transform">APPROVE</button>

        function updateReportList() {
            const container = document.getElementById('reportListContainer');
            const now = new Date(); now.setHours(0,0,0,0);
            let f = reportData.filter(r => {
                const d = new Date(r.date); d.setHours(0,0,0,0);
                if (reportFilter === 'day') return d.getTime() === now.getTime();
                if (reportFilter === 'week') { const s = new Date(now); s.setDate(now.getDate() - now.getDay()); const e = new Date(s); e.setDate(s.getDate() + 6); return d >= s && d <= e; }
                if (reportFilter === 'month') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                return true;
            });
            
            // STRICTLY Latest to Oldest Sorting
            f.sort((a, b) => b.date.getTime() - a.date.getTime());
            
            if (f.length === 0) { container.innerHTML = `<p class="text-center py-20 text-gray-400 font-bold text-[10px] tracking-widest uppercase">No Records Found</p>`; return; }

            });
            container.innerHTML = h;
        }

                ]);

                const tos = toRes.data || [];
                const activeTOs = tos.filter(t => t.status === 'APPROVED');
                const activeToNos = activeTOs.map(t => t.to_no);
                const itinsToday = (itRes.data || []).filter(i => activeToNos.includes(i.to_no));
                const empIdsOnTO = activeTOs.filter(t => itinsToday.some(i => i.to_no === t.to_no)).map(t => t.emp_id);
                
                const empIdsOnPSO = (psoRes.data || []).map(p => p.emp_id);
                const empIdsOnSO = (soRes.data || []).map(s => s.emp_id);

                const leavesMap = new Map();
                (leaveRes.data || []).forEach(l => leavesMap.set(l.emp_id, l.type));

                const schedMap = new Map();
                (schedRes.data || []).forEach(s => schedMap.set(s.emp_id, s.start_time));

                let anomalyCount = 0;
                const logsMap = new Map();
                (logRes.data || []).forEach(l => {
                    if (l.spoof_flag === true) anomalyCount++;
                    if(!logsMap.has(l.emp_id) || new Date(l.log_time) < new Date(logsMap.get(l.emp_id))) {
                        logsMap.set(l.emp_id, l.log_time);
                    }
                });

                const flagsMap = new Map();
                (flagRes.data || []).forEach(f => flagsMap.set(f.emp_id, f));

                let listLate = [];
                let listAbsent = [];
                let listLeave = [];
                let listBirthday = [];
                let listGatePass = [];

                // Process Gate Pass (Currently Out)
                (gateRes.data || []).forEach(gp => {
                    if (gp.time_out && !gp.time_in) {
                        const empName = validEmps.find(e => e.emp_id === gp.emp_id)?.full_name || 'Unknown';
                        listGatePass.push({ name: empName, purpose: gp.purpose });
                    }
                });

                validEmps.forEach(emp => {
                    // Birthday Processing
                    if (emp.dob) {
                        try {
                            const dobDate = new Date(emp.dob);
                            if (dobDate.getMonth() + 1 === currentMonth) {
                                listBirthday.push({ name: emp.full_name, date: dobDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) });
                            }
                        } catch(e){}
                    }

                    // Leave Processing
                    if (leavesMap.has(emp.emp_id)) {
                        listLeave.push({ name: emp.full_name, type: leavesMap.get(emp.emp_id) });
                        return; 
                    }

                    // Active Field Work
                    if (empIdsOnTO.includes(emp.emp_id) || empIdsOnPSO.includes(emp.emp_id) || empIdsOnSO.includes(emp.emp_id)) {
                        return; // Counted as present/field
                    }

                    // Attendance Processing
                    if (logsMap.has(emp.emp_id)) {
                        const timeIn = new Date(logsMap.get(emp.emp_id));
                        
                        // Use Schedule Override if exists, else use flexi_range_end, else 08:00
                        let flexiEnd = schedMap.has(emp.emp_id) ? schedMap.get(emp.emp_id) : (emp.flexi_range_end || "08:00"); 
                        let [h, m] = flexiEnd.split(':').map(Number);
                        
                        let lateThreshold = new Date(timeIn);
                        lateThreshold.setHours(h, m, 0, 0);

                        if (timeIn > lateThreshold) {
                            listLate.push({ name: emp.full_name, time: timeIn.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) });
                        } else if (isMonday) {
                            // Flag ceremony logic
                            if (flagsMap.has(emp.emp_id)) {
                                const fLog = flagsMap.get(emp.emp_id);
                                if (fLog.status === 'LATE' || fLog.status === 'ABSENT') {
                                    listLate.push({ name: emp.full_name, time: `Flag: ${fLog.time_in || fLog.status}` });
                                }
                            } else {
                                 listLate.push({ name: emp.full_name, time: `No Flag Record` });
                            }
                        }
                    } else {
                        const dayOfWeek = nowPST.getDay();
                        if (dayOfWeek !== 0 && dayOfWeek !== 6) {
                            listAbsent.push({ name: emp.full_name });
                        }
                    }
                });

                // Stats for charts
                const toStats = { Approved: 0, Pending: 0, Denied: 0 };
                tos.forEach(t => {
                    if (t.status === 'APPROVED') toStats.Approved++;
                    else if (t.status.includes('DISAPPROVED') || t.status === 'CANCELLED') toStats.Denied++;
                    else toStats.Pending++;
                });

                const totalStaff = validEmps.length;
                const fieldStaff = empIdsOnTO.length + empIdsOnPSO.length + empIdsOnSO.length;
                const deskStaff = logsMap.size - fieldStaff; 

                analyticsData = { 
                    toStats, 
                    workforce: { total: totalStaff, field: fieldStaff, desk: Math.max(0, deskStaff), onLeave: listLeave.length },
                    lists: { late: listLate, absent: listAbsent, leave: listLeave, birthday: listBirthday, gatepass: listGatePass },
                    anomalies: anomalyCount
                };
                
                renderAnalyticsView();

            } catch(e) {
                content.innerHTML = `<p class="p-10 text-red-500 text-center">Analytics Error: ${e.message}</p>`;
            }
        }

        function renderAnalyticsView() {
            let activeForce = analyticsData.workforce.field + analyticsData.workforce.desk;
            let capacity = Math.round((activeForce / Math.max(1, analyticsData.workforce.total)) * 100);
            
            let aiText = `<strong>AI Insight:</strong> Operational capacity is currently at ${capacity}%. `;
            if (analyticsData.workforce.field > analyticsData.workforce.desk) aiText += `A high volume of your team is deployed in the field today. `;
            if (analyticsData.anomalies > 0) aiText += `<span class="text-red-600">Warning: ${analyticsData.anomalies} attendance log(s) flagged for potential location spoofing.</span> `;
            if (analyticsData.lists.absent.length > 0) aiText += `Verify the status of ${analyticsData.lists.absent.length} unaccounted personnel. `;
            if (analyticsData.lists.birthday.length > 0) aiText += `There are ${analyticsData.lists.birthday.length} birthdays this month to celebrate!`;

            const renderListRows = (arr, detailKey, icon) => {
                if (arr.length === 0) return `<div class="p-4 text-center text-xs text-gray-400 font-medium tracking-widest uppercase">No Records</div>`;
                return arr.map(item => `
                    <div class="list-row">
                        <div class="flex items-center space-x-3">
                            <span class="text-lg">${icon}</span>
                            <span class="text-xs font-bold text-gray-700">${item.name}</span>
                        </div>
                        ${item[detailKey] ? `<span class="text-[10px] font-medium px-2 py-1 rounded bg-gray-100 text-gray-600">${item[detailKey]}</span>` : ''}
                    </div>
                `).join('');
            };

            document.getElementById('mainContent').innerHTML = `
                <div class="p-4 pb-32 space-y-4">
                    <p class="text-xs text-gray-600 leading-relaxed bg-white shadow-sm p-4 rounded-2xl border border-purple-100">
                        ${aiText}
                    </p>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="analytics-card mb-0">
                            <div class="analytics-header">Workforce Distribution</div>
                            <div class="p-4 relative h-40"><canvas id="workforceChart"></canvas></div>
                        </div>
                        <div class="analytics-card mb-0">
                            <div class="analytics-header">Queue Health</div>
                            <div class="p-4 relative h-40"><canvas id="toQueueChart"></canvas></div>
                        </div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>🔴 Absent / Unaccounted</span><span>${analyticsData.lists.absent.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.absent, null, '👤')}</div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>🟡 Arrived Late</span><span>${analyticsData.lists.late.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.late, 'time', '⏰')}</div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>🚪 Currently Out (Gate Pass)</span><span>${analyticsData.lists.gatepass.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.gatepass, 'purpose', '🚶')}</div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>🔵 On Leave</span><span>${analyticsData.lists.leave.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.leave, 'type', '🌴')}</div>
                    </div>

                    <div class="analytics-card">
                        <div class="analytics-header flex justify-between"><span>🎉 Birthdays This Month</span><span>${analyticsData.lists.birthday.length}</span></div>
                        <div class="analytics-list">${renderListRows(analyticsData.lists.birthday, 'date', '🎂')}</div>
                    </div>
                </div>
            `;

            // Draw Workforce Chart (Doughnut)
            const ctxWork = document.getElementById('workforceChart').getContext('2d');
            const absentEstimate = Math.max(0, analyticsData.workforce.total - analyticsData.workforce.desk - analyticsData.workforce.field - analyticsData.workforce.onLeave);
            new Chart(ctxWork, {
                type: 'doughnut',
                data: {
                    labels: ['Desk', 'Field', 'Leave', 'Absent'],
                    datasets: [{
                        data: [
                            analyticsData.workforce.desk, 
                            analyticsData.workforce.field,
                            analyticsData.workforce.onLeave, 
                            absentEstimate
                        ],
                        backgroundColor: ['#16a34a', '#3b82f6', '#f59e0b', '#dc2626'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    cutout: '65%'
                }
            });

            // Draw TO Queue Chart (Bar)
            const ctxQueue = document.getElementById('toQueueChart').getContext('2d');
            new Chart(ctxQueue, {
                type: 'bar',
                data: {
                    labels: ['Apprv', 'Pend', 'Deny'],
                    datasets: [{
                        data: [analyticsData.toStats.Approved, analyticsData.toStats.Pending, analyticsData.toStats.Denied],
                        backgroundColor: ['#16a34a', '#eab308', '#ef4444'],
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false, beginAtZero: true },
                        x: { grid: { display: false }, ticks: { font: {size: 9} } }
                    }
                }
            });
        }

        window.onload = () => { checkSession(); render(); };
    </script>
</body>
</html>
